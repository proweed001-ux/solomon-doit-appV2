<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store">
<title>Performance Dashboard</title>
<style>
:root{--bg:#08111f;--ink:#eef8ff;--muted:#7b91a8;--panel:#ffffff;--panelInk:#102033;--soft:#eef7ff;--line:#d8e8f5;--brand:#00a78e;--brand2:#4378ff;--gold:#f6b83f;--red:#ef4444;--green:#16a34a;--blue:#2563eb;--shadow:0 22px 60px rgba(10,31,68,.14)}*{box-sizing:border-box;min-width:0}html,body{margin:0;max-width:100%;overflow-x:hidden}body{background:linear-gradient(160deg,#eaf7ff 0%,#f8fbff 36%,#f5fff8 100%);color:var(--panelInk);font-family:system-ui,-apple-system,'Segoe UI',Tahoma,sans-serif}.top{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.82);backdrop-filter:blur(18px);border-bottom:1px solid rgba(116,146,174,.22)}.topbar{max-width:1180px;margin:auto;display:grid;grid-template-columns:64px 1fr 64px;align-items:center;gap:8px;padding:10px 12px}.back{color:#0f4c81;text-decoration:none;font-weight:950}.brand{text-align:center;font-weight:950;font-size:17px;color:#102033}.wrap{max-width:1180px;margin:auto;padding:12px}.card{background:rgba(255,255,255,.88);border:1px solid rgba(181,207,227,.78);border-radius:26px;box-shadow:var(--shadow);padding:14px;margin-bottom:12px;overflow:hidden}.hero{background:radial-gradient(circle at 10% 0%,rgba(67,120,255,.28),transparent 34%),radial-gradient(circle at 92% 18%,rgba(0,167,142,.28),transparent 32%),linear-gradient(135deg,#ffffff,#eef8ff 52%,#f2fff7);border:1px solid rgba(67,120,255,.18)}h2,h3{margin:0 0 10px;color:#102033}.muted{color:var(--muted);font-size:12px;line-height:1.55;overflow-wrap:anywhere}.modeBar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;background:#eef6fd;border:1px solid #d7e9f6;border-radius:18px;padding:6px}.mode{height:42px;border-radius:14px;border:0;background:transparent;color:#486177;font-weight:950;padding:0 14px;white-space:nowrap}.mode.on{background:linear-gradient(135deg,var(--brand2),var(--brand));box-shadow:0 10px 26px rgba(0,128,128,.18);color:white}.grid{display:grid;gap:10px}.kpis{grid-template-columns:repeat(4,minmax(0,1fr))}.cards{grid-template-columns:repeat(2,minmax(0,1fr))}.kpi,.box,.item,.rawItem{background:linear-gradient(180deg,#ffffff,#f8fcff);border:1px solid #dcecf8;border-radius:20px;padding:12px;box-shadow:0 10px 28px rgba(24,65,112,.07)}.kpi span,.box span,.item span{display:block;color:#65819b;font-size:11px;font-weight:950}.kpi b,.box b,.item b{display:block;color:#0f2035;font-size:clamp(18px,5vw,28px);line-height:1.15;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.box b,.item b{font-size:18px}.box small,.kpi small,.item small{display:block;color:var(--muted);font-size:11px;margin-top:5px;overflow-wrap:anywhere}.badge{display:inline-flex;align-items:center;min-height:28px;border-radius:999px;padding:0 11px;font-size:12px;font-weight:950}.ok{background:#dcfce7;color:#166534}.warn{background:#fef3c7;color:#92400e}.bad{background:#fee2e2;color:#991b1b}.neutral{background:#eaf2ff;color:#1d4ed8}.meter{height:10px;background:#e7eef6;border-radius:999px;overflow:hidden;margin-top:9px}.fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#ef4444,#f6b83f,#16a34a);width:0}.tableWrap{overflow:auto}.table{width:100%;border-collapse:separate;border-spacing:0 8px;min-width:760px}.table th{font-size:11px;color:#607d98;text-align:left;padding:0 8px}.table td{background:#ffffff;border-top:1px solid #dcecf8;border-bottom:1px solid #dcecf8;padding:11px 8px;font-size:13px;font-weight:850}.table td:first-child{border-left:1px solid #dcecf8;border-radius:16px 0 0 16px}.table td:last-child{border-right:1px solid #dcecf8;border-radius:0 16px 16px 0;text-align:right}.right{text-align:right}.name{font-weight:950;color:#102033}.empty{border:1px dashed #b6d2e8;border-radius:18px;color:#6b879e;padding:14px;background:#f8fcff;overflow-wrap:anywhere}.sectionNote{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:space-between}.select{width:100%;height:44px;border-radius:16px;border:1px solid #d3e6f3;background:#fff;color:#102033;font-weight:900;padding:0 12px}.flow{display:grid;gap:12px}.flowTop{display:grid;grid-template-columns:minmax(0,1fr) minmax(270px,.45fr);gap:12px}.rawGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.rawItem b{display:block;color:#607d98;font-size:11px;overflow-wrap:anywhere}.rawItem span{display:block;margin-top:3px;font-weight:850;font-size:13px;overflow-wrap:anywhere}.details{margin-top:10px}.details summary{cursor:pointer;color:#0f766e;font-weight:950;font-size:12px}.pillLine{display:flex;gap:6px;flex-wrap:wrap}.pill{background:#ecfdf5;border:1px solid #c8efdc;border-radius:999px;padding:6px 9px;font-size:12px;font-weight:900;color:#166534}.mono{font-family:ui-monospace,SFMono-Regular,Consolas,monospace}.loading{text-align:center;color:#0f766e;font-weight:950;padding:28px}.hero h2{font-size:24px}.hero .muted{color:#435e75}.heroMark{display:inline-flex;align-items:center;gap:6px;font-weight:950;color:#0f766e;background:rgba(255,255,255,.7);border:1px solid #dcecf8;border-radius:999px;padding:7px 10px}@media(max-width:900px){.flowTop{grid-template-columns:1fr}.cards,.kpis,.rawGrid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:560px){.topbar{grid-template-columns:48px 1fr 0}.wrap{padding:8px}.card{border-radius:22px;padding:11px}.cards,.kpis,.rawGrid{grid-template-columns:1fr}.modeBar{grid-template-columns:1fr 1fr 1fr}.mode{padding:0 8px}}
</style>
</head>
<body>
<header class="top"><div class="topbar"><a class="back" href="/pro.html?t=1028">← Pro</a><div class="brand">Performance Dashboard</div><span></span></div></header>
<main class="wrap" id="app"><section class="card"><div class="loading">กำลังโหลดข้อมูลจริง...</div></section></main>
<script>
(()=>{'use strict';
const PUBLIC_EDGE='https://saodmeoilixfdqentofp.supabase.co/functions/v1/performance-active';
const ADS_MAP={AYAADS01:['011','012','013','014','015','016'],AYAADS02:['021','022','023','071','072','073'],AYAADS03:['031','032','033','061','062','063'],AYAADS04:['041','042','043','051','052']};
let DATA=null,MODE='ads',ACTIVE_ADS='',ACTIVE_PS='',ACTIVE_MS='';
const $=s=>document.querySelector(s),T=v=>String(v??'').trim(),N=v=>Number(String(v??0).replace(/,/g,'').replace(/%/g,'').replace(/[^0-9.\-]/g,''))||0,esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money=v=>N(v).toLocaleString('th-TH',{maximumFractionDigits:0}),num=v=>N(v).toLocaleString('th-TH',{maximumFractionDigits:0}),pct=v=>N(v).toLocaleString('th-TH',{minimumFractionDigits:1,maximumFractionDigits:1})+'%';
function nk(v){return T(v).replace(/\s+/g,'').toLowerCase()}function pick(o,exact,contains=[]){o=o&&typeof o==='object'?o:{};const keys=Object.keys(o),ex=exact.map(nk),ct=contains.map(nk);let k=keys.find(x=>ex.includes(nk(x)));if(!k)k=keys.find(x=>ct.some(c=>nk(x).includes(c)));return k?o[k]:''}
async function loadData(){const r=await fetch(PUBLIC_EDGE+'?t='+Date.now(),{cache:'no-store'}),txt=await r.text();if(!r.ok)throw Error(txt||r.statusText);const d=JSON.parse(txt);if(d.error)throw Error(d.detail||d.error);return{current:normalize(d.current||{}),previous:normalize(d.previous||{}),history:Array.isArray(d.history)?d.history:[],meta:d.meta||{},src:d.src||'performance-active'}}
function psCode(r){const raw=T(r.psCode||r.code||r.ps||r.seller||r.id).toUpperCase();const m=raw.match(/AYA\s*PS\s*0*(\d{2,3})/i)||raw.match(/\bPS\s*0*(\d{2,3})\b/i);return m?'AYAPS'+m[1].padStart(3,'0'):raw}
function msCode(r){const raw=T(r.msCode||r.code||r.ms||r.slpCode).toUpperCase();const m=raw.match(/MS\s*0*(\d{2,3})/i);return m?'MS'+m[1].padStart(3,'0'):raw}
function adsFromPs(r){const given=T(r.adsCode||r.ads||r.adsName).toUpperCase();if(/^AYAADS\d{2}$/.test(given))return given;const n=psCode(r).replace(/\D/g,'').slice(-3);for(const [ads,arr] of Object.entries(ADS_MAP))if(arr.includes(n))return ads;return 'ไม่ระบุ ADS'}
function normPs(r){const sr=r.sellerReport||{};const code=psCode(r),name=T(r.psName||r.name||r.sellerName||pick(sr,['Sales Name','Seller Name','ชื่อ'])||code||'ไม่ระบุ');const target=N(r.target||pick(sr,['เป้าหมายยอดขาย']));const actual=N(r.actual||pick(sr,['ยอดขายใน Doit','ยอดขายในDOIT'],['ยอดขาย']));const dgp=N(r.dgp||pick(sr,['DGP Point','Golden Point'],['DGP']));const bills=N(r.bills||pick(sr,['จำนวนบิลซื้อทั้งหมด'],['บิลซื้อทั้งหมด']));const index=target?actual/target*100:N(r.index||pick(sr,['Index']));return{...r,kind:'PS',code,name,ps:code,ads:adsFromPs(r),target,actual,dgp,bills,index,targetSource:target?'PS target':'ไม่พบ Target'}}
function normMs(r){const code=msCode(r),name=T(r.msName||r.name||r.lastName||code||'ไม่ระบุ');const target=N(r.target||r.sbdTargetSku);const actual=N(r.actual||r.sbdActualSku||r.sbdAmount||r.newProduct?.totalAmount);const dgp=N(r.dgp||r.sbdDetailCount||r.sbdActualSku);const bills=N(r.bills||r.storeCount||r.stores?.total);const index=target?actual/target*100:N(r.index||r.sbdCompliance);return{...r,kind:'MS',code,name,ms:code,target,actual,dgp,bills,index,targetSource:target?'MS/SBD target':'ไม่พบ Target'}}
function sumRows(rs,name='รวม'){const a=rs.reduce((x,r)=>{x.target+=N(r.target);x.actual+=N(r.actual);x.dgp+=N(r.dgp);x.bills+=N(r.bills);return x},{name,target:0,actual:0,dgp:0,bills:0});a.index=a.target?a.actual/a.target*100:0;return a}
function normalize(d){const ps=(Array.isArray(d.ps)?d.ps:[]).map(normPs);const ms=(Array.isArray(d.ms)?d.ms:[]).map(normMs);const ads=[...Object.keys(ADS_MAP),'ไม่ระบุ ADS'].map(name=>{const children=ps.filter(p=>p.ads===name);return{...sumRows(children,name),code:name,name,children,targetSource:'sum PS target'}}).filter(a=>a.children.length||a.name!=='ไม่ระบุ ADS');return{raw:d,ps,ms,ads}}
function statusBadge(i){i=N(i);return i>=100?'<span class="badge ok">เกินเป้า</span>':i>=80?'<span class="badge warn">ตามงาน</span>':'<span class="badge bad">ต้องเร่ง</span>'}function meter(i){return`<div class="meter"><div class="fill" style="width:${Math.max(0,Math.min(130,N(i)))}%"></div></div>`}
function kpis(t,label){return`<div class="grid kpis"><div class="kpi"><span>มุมมอง</span><b>${esc(label)}</b><small>อยู่ในฟอร์มเดียว</small></div><div class="kpi"><span>Target</span><b>${money(t.target)}</b><small>${esc(t.targetSource||'')}</small></div><div class="kpi"><span>Actual</span><b>${money(t.actual)}</b><small>ทำได้</small></div><div class="kpi"><span>%</span><b>${pct(t.index)}</b><small>${statusBadge(t.index)}</small></div><div class="kpi"><span>DGP</span><b>${money(t.dgp)}</b><small>DGP</small></div><div class="kpi"><span>บิล</span><b>${num(t.bills)}</b><small>Bills</small></div><div class="kpi"><span>ขาด/เกิน</span><b>${money(t.actual-t.target)}</b><small>Actual - Target</small></div><div class="kpi"><span>จำนวน</span><b>${num(t.count||0)}</b><small>รายการ</small></div></div>`}
function table(rows,type){if(!rows.length)return'<div class="empty">ไม่มีข้อมูล</div>';return`<div class="tableWrap"><table class="table"><thead><tr><th>${type}</th><th class="right">Target</th><th class="right">Actual</th><th class="right">%</th><th class="right">DGP</th><th class="right">บิล</th></tr></thead><tbody>${rows.map(r=>`<tr><td><div class="name">${esc(r.code||r.name)}</div><div class="muted">${esc(r.name)}${r.ads?' · '+esc(r.ads):''}</div></td><td class="right">${money(r.target)}</td><td class="right">${money(r.actual)}</td><td class="right">${pct(r.index)}${meter(r.index)}</td><td class="right">${money(r.dgp)}</td><td class="right">${num(r.bills)}</td></tr>`).join('')}</tbody></table></div>`}
function rawGrid(o,limit=36){const entries=Object.entries(o||{}).filter(([k,v])=>v!==null&&v!==undefined&&v!==''&&typeof v!=='object').slice(0,limit);if(!entries.length)return'<div class="empty">ไม่มีรายละเอียดเพิ่มเติม</div>';return`<div class="rawGrid">${entries.map(([k,v])=>`<div class="rawItem"><b>${esc(k)}</b><span>${esc(v)}</span></div>`).join('')}</div>`}
function detail(r){if(!r)return'<div class="empty">ไม่มีรายการที่เลือก</div>';let html=`<div class="grid cards"><div class="box"><span>${esc(r.kind||'รายการ')}</span><b>${esc(r.code||r.name)}</b><small>${esc(r.name)} ${r.ads?'· '+esc(r.ads):''}</small></div><div class="box"><span>Target Source</span><b>${esc(r.targetSource||'-')}</b><small>จับคู่ Target ตามรหัสรายการ</small></div><div class="box"><span>Actual / Target</span><b>${money(r.actual)} / ${money(r.target)}</b><small>${pct(r.index)}</small>${meter(r.index)}</div><div class="box"><span>ขาด/เกิน</span><b>${money(r.actual-r.target)}</b><small>DGP ${money(r.dgp)} · บิล ${num(r.bills)}</small></div></div>`;if(r.kind==='PS')html+=`<details class="details" open><summary>Seller Report ของ PS นี้</summary>${rawGrid(r.sellerReport||r,60)}</details>`;if(r.kind==='MS')html+=`<details class="details" open><summary>รายละเอียด MS</summary>${rawGrid(r,70)}</details>`;return html}
function insight(rows){if(!rows.length)return'<div class="empty">ไม่มี insight</div>';const best=[...rows].sort((a,b)=>N(b.index)-N(a.index))[0],low=[...rows].sort((a,b)=>N(a.index)-N(b.index))[0];return`<div class="grid cards"><div class="box"><span>ดีที่สุด</span><b>${esc(best.code||best.name)}</b><small>${pct(best.index)}</small></div><div class="box"><span>ต้องเร่ง</span><b>${esc(low.code||low.name)}</b><small>${pct(low.index)}</small></div></div>`}
function header(){const m=DATA.meta||{};return`<section class="card hero"><div class="sectionNote"><div><span class="heroMark">Aurora Clean</span><h2>Performance Dashboard</h2><div class="muted">ADS เป็นหัวหน้า PS · MS แยกโหมด · Target จับตามรหัส PS/MS</div></div><div class="badge neutral">${esc(m.currentDate||'ไม่พบวันที่')}</div></div><div class="muted mono">source: ${esc(DATA.src)} · current: ${esc(m.currentPath||'-')}</div></section><section class="card"><div class="modeBar"><button class="mode ${MODE==='ads'?'on':''}" data-mode="ads">ADS</button><button class="mode ${MODE==='ps'?'on':''}" data-mode="ps">PS</button><button class="mode ${MODE==='ms'?'on':''}" data-mode="ms">MS</button></div></section>`}
function renderAds(){const ads=DATA.current.ads,sel=ads.find(a=>a.name===ACTIVE_ADS)||ads[0]||{children:[]};ACTIVE_ADS=sel.name||'';const total=sumRows(ads,'ADS ทั้งหมด');total.count=ads.length;total.targetSource='sum PS target';return`<section class="card flow"><div class="sectionNote"><h3>ADS Form</h3><select class="select" id="adsPick">${ads.map(a=>`<option value="${esc(a.name)}" ${a.name===ACTIVE_ADS?'selected':''}>${esc(a.name)} · PS ${(a.children||[]).length} คน</option>`).join('')}</select></div>${kpis(total,'ADS Mode')}<div class="flowTop"><div>${table((sel.children||[]).sort((a,b)=>N(b.index)-N(a.index)),'PS ใต้ '+(ACTIVE_ADS||'-'))}</div><div>${insight(sel.children||[])}</div></div><details class="details" open><summary>รายละเอียด ADS ที่เลือก: ${esc(ACTIVE_ADS||'-')}</summary>${kpis({...sel,count:(sel.children||[]).length,targetSource:'sum PS target'},ACTIVE_ADS||'ADS')}</details></section>`}
function renderPs(){const ps=[...DATA.current.ps].sort((a,b)=>N(b.index)-N(a.index));const selected=ps.find(p=>p.code===ACTIVE_PS)||ps[0];ACTIVE_PS=selected?.code||'';const total=sumRows(ps,'PS ทั้งหมด');total.count=ps.length;total.targetSource='sum PS target';return`<section class="card flow"><div class="sectionNote"><h3>PS Form</h3><select class="select" id="psPick">${ps.map(p=>`<option value="${esc(p.code)}" ${p.code===ACTIVE_PS?'selected':''}>${esc(p.code)} · ${esc(p.name)}</option>`).join('')}</select></div>${kpis(total,'PS Mode')}<div class="flowTop"><div>${table(ps,'PS')}</div><div>${detail(selected)}</div></div><details class="details"><summary>Insight PS</summary>${insight(ps)}</details></section>`}
function renderMs(){const ms=[...DATA.current.ms].sort((a,b)=>N(b.index)-N(a.index));const selected=ms.find(m=>m.code===ACTIVE_MS)||ms[0];ACTIVE_MS=selected?.code||'';const total=sumRows(ms,'MS ทั้งหมด');total.count=ms.length;total.targetSource='sum MS target';return`<section class="card flow"><div class="sectionNote"><h3>MS Form</h3><select class="select" id="msPick">${ms.map(m=>`<option value="${esc(m.code)}" ${m.code===ACTIVE_MS?'selected':''}>${esc(m.code)} · ${esc(m.name)}</option>`).join('')}</select></div><div class="badge neutral">MS Mode · ไม่เกี่ยวกับ ADS / PS</div>${kpis(total,'MS Mode')}<div class="flowTop"><div>${table(ms,'MS')}</div><div>${detail(selected)}</div></div><details class="details"><summary>Insight MS</summary>${insight(ms)}</details></section>`}
function bind(){document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{MODE=b.dataset.mode;render()});const a=$('#adsPick');if(a)a.onchange=()=>{ACTIVE_ADS=a.value;render()};const p=$('#psPick');if(p)p.onchange=()=>{ACTIVE_PS=p.value;render()};const m=$('#msPick');if(m)m.onchange=()=>{ACTIVE_MS=m.value;render()}}
function render(){if(!DATA)return;$('#app').innerHTML=header()+(MODE==='ads'?renderAds():MODE==='ps'?renderPs():renderMs());bind()}
loadData().then(d=>{DATA=d;render()}).catch(e=>{$('#app').innerHTML=`<section class="card"><h2>โหลด Dashboard ไม่สำเร็จ</h2><div class="empty">${esc(e.message||e)}</div></section>`;console.error(e)});
})();
</script>
</body>
</html>
