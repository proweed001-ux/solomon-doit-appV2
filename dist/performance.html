บิล',dgp:'DGP'};const A=['AYAADS01','AYAADS02','AYAADS03','AYAADS04'];const app=document.getElementById('app'),q=new URLSearchParams(location.search),L=q.get('level')||'ds',AD=q.get('ads')||'',PS=q.get('ps')||'';const N=x=>+x||0,M=x=>N(x).toLocaleString('th-TH',{maximumFractionDigits:0}),P=x=>N(x).toLocaleString('th-TH',{maximumFractionDigits:1,minimumFractionDigits:1})+'%',E=x=>String(x??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;'),H=(l,a='',p='')=>location.pathname+'?level='+l+(a?'&ads='+a:'')+(p?'&ps='+p:'');function idx(r,k){let m=r[k]||[0,0];return m[0]?m[1]/m[0]*100:0}function sum(rows,code){let r={a:code,p:code,n:code};for(const k in C)r[k]=[0,0];rows.forEach(x=>{for(const k in C){r[k][0]+=N(x[k]?.[0]);r[k][1]+=N(x[k]?.[1])}});r.s=r.s||[0,0];return r}function adsRows(){return A.map(a=>sum(DATA.ps.filter(p=>p.a===a),a)).filter(r=>r.s[0])}function nav(){return '<div class="nav"><a class="'+(L==='ds'?'on':'')+'" href="'+H('ds')+'">DS ภาพรวม</a><a class="'+(L==='ads'?'on':'')+'" href="'+H('ads')+'">ADS ทั้ง 4</a><a class="'+(L==='ms'?'on':'')+'" href="'+H('ms')+'">MS แยก</a></div>'}function meter(v){return '<div class="meter"><div class="fill" style="width:'+Math.max(0,Math.min(140,N(v)))+'%"></div></div>'}function kpis(r){let s=idx(r,'s');return '<div class="kpis"><div class="kpi"><span>Target</span><b>'+M(r.s[0])+'</b><small>ยอดขาย</small></div><div class="kpi"><span>Actual</span><b>'+M(r.s[1])+'</b><small>ยอดขาย</small></div><div class="kpi"><span>Index</span><b>'+P(s)+'</b><small>'+(s>=100?'เกินเป้า':s>=80?'ตามงาน':'ต้องเร่ง')+'</small></div><div class="kpi"><span>GIV</span><b>'+M(r.giv[1])+'</b><small>'+P(idx(r,'giv'))+'</small></div><div class="kpi"><span>MOQ</span><b>'+M(r.moq[1])+'</b><small>'+P(idx(r,'moq'))+'</small></div><div class="kpi"><span>บิล</span><b>'+M(r.bill[1])+'</b><small>'+P(idx(r,'bill'))+'</small></div></div>'}function rank(rows,next){return '<div class="rank">'+rows.map((r,i)=>{let link=next==='ps'?H('person',r.a,r.p):next==='ads'?H('ps',r.p):'#';return '<a class="row" href="'+link+'"><div class="no">'+(i+1)+'</div><div><b>'+E(r.p)+' · '+E(r.n)+'</b><span>'+E(r.a||'')+' ยอดขาย '+M(r.s[1])+' / GIV '+M(r.giv[1])+' / MOQ '+M(r.moq[1])+'</span>'+meter(idx(r,'s'))+'</div><div class="right">'+P(idx(r,'s'))+'</div></a>'}).join('')+'</div>'}function catBoards(rows,title){return '<section class="panel"><h3>'+E(title)+'</h3><div class="catgrid">'+Object.keys(C).map(k=>{let rr=[...rows].sort((a,b)=>idx(b,k)-idx(a,k)).slice(0,5);return '<div class="panel cat"><h3>'+C[k]+'</h3>'+rr.map((r,i)=>'<a class="row" href="'+(r.p.startsWith('AYAADS')?H('ps',r.p):H('person',r.a,r.p))+'"><div class="no">'+(i+1)+'</div><div><b>'+E(r.p)+'</b><span>Target '+M(r[k][0])+' / Actual '+M(r[k][1])+'</span>'+meter(idx(r,k))+'</div><div class="right">'+P(idx(r,k))+'</div></a>').join('')+'</div>'}).join('')+'</div></section>'}function hero(t,sub,r){return '<section class="panel"><div class="title">'+E(t)+'</div><div class="muted">'+E(sub)+'</div>'+kpis(r)+'</section>'}function ds(){let ar=adsRows(),total=sum(DATA.ps,'DS');app.innerHTML=nav()+hero('DS ภาพรวม','ข้อมูลฝังจาก Excel Seller Report ล่าสุด โหลดทันที ไม่รอ JSON ใหญ่ และไม่รวม MS',total)+'<section class="panel"><h3>แตกย่อย</h3><div class="grid"><a class="card" href="'+H('ads')+'"><b>ADS ทั้ง 4</b><span>กดเพื่อดู ADS → PS</span></a><a class="card" href="'+H('ms')+'"><b>MS</b><span>แยกโหมด ไม่รวม DS</span></a></div></section>'+catBoards(ar,'บอร์ดจัดอันดับแต่ละหมวด ระดับ ADS')+catBoards(DATA.ps,'บอร์ดจัดอันดับแต่ละหมวด ระดับ PS')}function ads(){let ar=adsRows();app.innerHTML=nav()+hero('ADS ทั้ง 4','กด ADS เพื่อแตกไปหน้า PS',sum(DATA.ps,'ADS'))+'<section class="panel"><h3>ADS Rank</h3>'+rank(ar,'ads')+'</section>'+catBoards(ar,'จัดอันดับ ADS แต่ละหมวด')}function ps(){let rows=DATA.ps.filter(x=>x.a===(AD||'AYAADS01'));app.innerHTML=nav()+hero((AD||'AYAADS01')+' · PS','ข้อมูลเฉพาะ PS ใต้ ADS นี้',sum(rows,AD||'AYAADS01'))+'<section class="panel"><h3>PS
