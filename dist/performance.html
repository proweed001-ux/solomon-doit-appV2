<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store">
<title>โหมดผลงาน</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f6f7f8;color:#111827;font-family:system-ui,-apple-system,'Segoe UI',Tahoma,sans-serif}.top{min-height:58px;background:linear-gradient(90deg,#075424,#087b34);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 14px;position:sticky;top:0;z-index:5}.top a{color:#fff;text-decoration:none;font-weight:950}.title{font-weight:950;font-size:18px;text-shadow:0 1px 2px #0005}.wrap{max-width:920px;margin:auto;padding:12px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;box-shadow:0 2px 12px #0f172a14;padding:14px;margin-bottom:12px}.meta{background:#f0fdf4;border-color:#bbf7d0}.meta b{display:block;color:#064e3b;font-size:16px}.meta span{display:block;color:#166534;font-size:12px;line-height:1.55;margin-top:4px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{display:grid;gap:5px}.field label{font-size:12px;color:#374151;font-weight:950}.field select{height:42px;border:1px solid #d1d5db;border-radius:10px;background:#fff;padding:0 10px;font-weight:900;color:#111827}.btn{height:42px;border:0;background:linear-gradient(180deg,#34d66d 0%,#0a9f42 58%,#06722f 100%);color:#fff;border-radius:12px;font-weight:950;box-shadow:0 3px 0 #03451e,0 6px 10px rgba(3,69,30,.22),inset 0 1px 0 rgba(255,255,255,.48);width:100%;margin-top:10px}.person{font-weight:950;font-size:17px;color:#064e3b}.sub{font-size:12px;color:#6b7280;margin-top:3px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.stat{border:1px solid #e5e7eb;border-radius:14px;padding:12px;background:#f8fafc}.stat span{display:block;color:#6b7280;font-weight:850;font-size:12px;margin-bottom:6px}.stat strong{font-size:21px;color:#111827}.badge{display:inline-flex;align-items:center;min-height:34px;border-radius:999px;padding:0 12px;font-weight:950;margin-top:10px}.good{background:#dcfce7;color:#166534}.warn{background:#fef9c3;color:#854d0e}.bad{background:#fee2e2;color:#b91c1c}.sectionTitle{font-weight:950;color:#111827;margin-bottom:8px}.rankList{display:grid;gap:8px}.rankItem{display:grid;grid-template-columns:34px 1fr auto;gap:8px;align-items:center;border:1px solid #e5e7eb;background:#fff;border-radius:13px;padding:10px}.rankNo{width:30px;height:30px;border-radius:999px;background:#ecfdf5;color:#087b34;display:grid;place-items:center;font-weight:950}.rankName b{display:block;font-size:13px}.rankName span{display:block;font-size:11px;color:#6b7280}.rankPct{font-weight:950}.feedList{display:grid;gap:8px}.feedItem{border-left:4px solid #22c55e;background:#f8fafc;border-radius:10px;padding:9px 10px;font-size:13px;font-weight:800;color:#374151}.feedItem.bad{border-left-color:#ef4444}.feedItem.warn{border-left-color:#f59e0b}.sellerFullList{display:grid;gap:7px;max-height:460px;overflow:auto;padding-right:2px}.sellerFullItem{display:grid;grid-template-columns:42% 1fr;gap:8px;border:1px solid #e5e7eb;background:#f8fafc;border-radius:10px;padding:8px}.sellerFullItem b{font-size:12px;color:#374151;word-break:break-word}.sellerFullItem span{font-size:13px;font-weight:850;color:#111827;word-break:break-word}.small{font-size:12px;color:#6b7280;line-height:1.55}.loading{padding:28px;text-align:center;color:#166534;font-weight:950}.err{background:#fff1f2;border-color:#fecaca;color:#991b1b}@media(max-width:720px){.grid,.stats{grid-template-columns:1fr}.wrap{padding:8px}.rankItem{grid-template-columns:30px 1fr auto}.title{font-size:16px}.sellerFullItem{grid-template-columns:1fr}.top{gap:8px}}
</style>
</head>
<body>
<header class="top"><a href="/pro.html?t=1028">← กลับหน้า Pro</a><div class="title">โหมดผลงาน</div><span></span></header>
<main class="wrap" id="app"><section class="card meta"><b>กำลังโหลดข้อมูลผลงาน</b><span>กำลังดึง performance/active.json จาก Supabase...</span></section><section class="card"><div class="loading">กรุณารอสักครู่</div></section></main>
<script>
(()=>{'use strict';
const DEFAULT_URL='https://saodmeoilixfdqentofp.supabase.co',DEFAULT_KEY='sb_publishable_JThYwAl_-askk_cIaCd75w_TCWK2BTT',BUCKET='doit-files';
const $=s=>document.querySelector(s),T=v=>String(v??'').trim(),N=v=>Number(v)||0,money=v=>N(v).toLocaleString('th-TH',{maximumFractionDigits:0}),pct=v=>N(v).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2})+'%',esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const mockData={updatedAtText:'mock preview',source:'ยังไม่มี JSON จาก Supabase จึงแสดงข้อมูลตัวอย่าง',sellerReportFields:['Type','ADS/DS Name','Branch','Seller code','Sales Name','CD1','CD2','CD3'],sellerReportRows:[],ads:[{adsCode:'AYAADS01',adsName:'ทีมตัวอย่าง 1',target:1775000,actual:1405279,dgp:39240,bills:1288}],ps:[{adsCode:'AYAADS01',psCode:'AYAPS011',psName:'PS ตัวอย่าง 011',target:333000,actual:361898,dgp:3533,bills:629,sellerReport:{'Seller code':'AYAPS011','Sales Name':'PS ตัวอย่าง 011','CD1':'10','CD2':'8','CD3':'7'}}],ms:[{msCode:'MS001',msName:'MS ตัวอย่าง 001',storeCount:18.85,sbdTargetSku:2293,sbdActualSku:1947,sbdCompliance:84.9,newProduct:{totalCount:42,totalAmount:128000},sbdAmount:51200}],msSbd:[],msNewProduct:[],msSbdDetail:[]};
function cloudCfg(){let saved={};try{saved=JSON.parse(localStorage.getItem('doit-cloud-cfg')||'{}')}catch{}return{u:T(saved.url||DEFAULT_URL).replace(/\/$/,''),k:T(saved.key||DEFAULT_KEY)}}
function headers(c){return{apikey:c.k,authorization:'Bearer '+c.k}}
async function fetchStorageJson(path,timeoutMs=15000){const c=cloudCfg(),ac=new AbortController(),timer=setTimeout(()=>ac.abort(),timeoutMs);try{const res=await fetch(`${c.u}/storage/v1/object/${BUCKET}/${encodeURIComponent(path).replace(/%2F/g,'/')}`,{headers:headers(c),cache:'no-store',signal:ac.signal}),text=await res.text();if(!res.ok)throw new Error(text||res.statusText);return JSON.parse(text)}finally{clearTimeout(timer)}}
async function loadData(){try{const active=await fetchStorageJson('performance/active.json',12000);if(active?.dataPath){const data=await fetchStorageJson(active.dataPath,20000);if(Array.isArray(data?.ps)&&data.ps.length){localStorage.setItem('doit-performance-data-v1',JSON.stringify(data));return{data,sourceMode:'supabase',active}}}}catch(err){console.warn('[performance] Supabase active JSON load failed',err)}try{const saved=JSON.parse(localStorage.getItem('doit-performance-data-v1')||'null');if(saved&&Array.isArray(saved.ps)&&saved.ps.length)return{data:saved,sourceMode:'localStorage fallback'}}catch{}return{data:mockData,sourceMode:'mock'}}
function withIndex(row){const target=N(row.target);return{...row,index:target?(N(row.actual)/target)*100:0}}
function statusFor(index){if(index>=100)return{text:'เกินเป้า',cls:'good'};if(index>=80)return{text:'ใกล้เป้า',cls:'warn'};return{text:'ต่ำกว่าเป้า ต้องเร่ง',cls:'bad'}}
function sumRows(rows){return withIndex(rows.reduce((s,r)=>{s.target+=N(r.target);s.actual+=N(r.actual);s.dgp+=N(r.dgp);s.bills+=N(r.bills);return s},{target:0,actual:0,dgp:0,bills:0}))}
function msRows(data){const ms=Array.isArray(data.ms)?data.ms:[],sbd=Array.isArray(data.msSbd)?data.msSbd:[],np=Array.isArray(data.msNewProduct)?data.msNewProduct:[];if(ms.length)return ms;const m=new Map();sbd.forEach(r=>m.set(r.msCode,{...r,msName:r.msCode}));np.forEach(r=>m.set(r.msCode,{...(m.get(r.msCode)||{msCode:r.msCode,msName:r.msCode}),newProduct:r}));return[...m.values()]}
function sellerRecord(data,psCode){if(!psCode)return null;const rows=Array.isArray(data.sellerReportRows)?data.sellerReportRows:[];return rows.find(r=>r.psCode===psCode)?.sellerReport || data.ps.find(p=>p.psCode===psCode)?.sellerReport || null}
function sellerPreviewRows(data){const rows=Array.isArray(data.sellerReportRows)?data.sellerReportRows:[];return rows.slice(0,5)}
function render(data,sourceMode){const q=new URLSearchParams(location.search),adsCode=q.get('ads')||'',psCode=q.get('ps')||'';const psAll=(data.ps||[]).map(withIndex),filtered=psAll.filter(r=>(!adsCode||r.adsCode===adsCode)&&(!psCode||r.psCode===psCode));const summary=psCode&&filtered[0]?filtered[0]:sumRows(filtered.length?filtered:psAll);const st=statusFor(summary.index);const rankRows=psAll.filter(r=>!adsCode||r.adsCode===adsCode).sort((a,b)=>b.index-a.index);const all=psAll,over=all.filter(r=>r.index>=100),below80=all.filter(r=>r.index<80).length,worst=(data.ads||[]).map(withIndex).sort((a,b)=>a.index-b.index)[0]||{};const ms=msRows(data).sort((a,b)=>N(b.sbdCompliance)-N(a.sbdCompliance));const msTotal=ms.reduce((s,r)=>{s.store+=N(r.storeCount);s.target+=N(r.sbdTargetSku);s.actual+=N(r.sbdActualSku);s.amount+=N(r.sbdAmount);s.npAmt+=N(r.newProduct?.totalAmount);s.npCnt+=N(r.newProduct?.totalCount);return s},{store:0,target:0,actual:0,amount:0,npAmt:0,npCnt:0});const msComp=msTotal.target?msTotal.actual/msTotal.target*100:0;const adsOpts=(data.ads||[]).map(a=>`<option value="${esc(a.adsCode)}" ${a.adsCode===adsCode?'selected':''}>${esc(a.adsCode)}</option>`).join('');const psOpts=(data.ps||[]).filter(p=>!adsCode||p.adsCode===adsCode).map(p=>`<option value="${esc(p.psCode)}" ${p.psCode===psCode?'selected':''}>${esc(p.psCode)}</option>`).join('');const seller=sellerRecord(data,psCode);const fields=Array.isArray(data.sellerReportFields)?data.sellerReportFields:Object.keys(seller||{});const sellerSection=seller?`<div class="small">PS ที่เลือก: ${esc(psCode)} · แสดงทุกหัวข้อจาก Seller Report ${fields.length} หัวข้อ รวม CD/DC1-7</div><div class="sellerFullList" style="margin-top:10px">${fields.map(f=>`<div class="sellerFullItem"><b>${esc(f)}</b><span>${esc(seller[f]??'')}</span></div>`).join('')}</div>`:`<div class="small">Seller Report มี ${fields.length} หัวข้อ · เลือก PS ด้านบนแล้วกด “ดูผลงาน” เพื่อแสดงทุกหัวข้อของ PS นั้น</div><div class="rankList" style="margin-top:10px">${sellerPreviewRows(data).map((r,i)=>`<div class="rankItem"><div class="rankNo">${i+1}</div><div class="rankName"><b>${esc(r.psCode)} · ${esc(r.psName)}</b><span>${esc(r.adsCode)} · มีข้อมูล Seller Report ครบ ${fields.length} หัวข้อ</span></div><div class="rankPct">ดู</div></div>`).join('')}</div>`;
$('#app').innerHTML=`<section class="card meta"><b>หน้าโหมดผลงานจริง</b><span>ไม่ใช่ popup/overlay · แหล่งข้อมูล: ${esc(sourceMode)} · อัปเดต: ${esc(data.updatedAtText||data.updatedAt||'-')}<br>${esc(data.source||'')}</span></section><section class="card"><div class="grid"><div class="field"><label>เลือก ADS</label><select id="adsSel"><option value="">รวมทุก ADS</option>${adsOpts}</select></div><div class="field"><label>เลือก PS</label><select id="psSel"><option value="">รวมทุก PS</option>${psOpts}</select></div></div><button class="btn" id="applyBtn">ดูผลงาน</button></section><section class="card"><div class="person">${esc(psCode||adsCode||'รวมผลงานทั้งหมด')}</div><div class="sub">ยอดขาย / เป้าหมาย / DGP / บิลซื้อ</div><div class="stats"><div class="stat"><span>เป้าหมาย</span><strong>${money(summary.target)}</strong></div><div class="stat"><span>ยอดจริง DOIT</span><strong>${money(summary.actual)}</strong></div><div class="stat"><span>Index</span><strong>${pct(summary.index)}</strong></div><div class="stat"><span>DGP</span><strong>${money(summary.dgp)}</strong></div><div class="stat"><span>บิลซื้อ</span><strong>${money(summary.bills)}</strong></div><div class="stat"><span>PS ต่ำกว่า 80%</span><strong>${below80}</strong></div></div><div class="badge ${st.cls}">${esc(st.text)}</div></section><section class="card"><div class="sectionTitle">สรุปที่ต้องรู้</div><div class="feedList"><div class="feedItem">PS เกินเป้า ${over.length} คน จากทั้งหมด ${all.length} คน</div><div class="feedItem ${below80?'bad':''}">PS ต่ำกว่า 80% ${below80} คน</div><div class="feedItem warn">ADS ต่ำสุดตอนนี้: ${esc(worst.adsCode||'-')} · ${pct(worst.index||0)}</div><div class="feedItem">MS SBD รวม ${pct(msComp)} · Store ${money(msTotal.store)} · New Product ${money(msTotal.npCnt)} ชิ้น / ${money(msTotal.npAmt)} บาท</div></div></section><section class="card"><div class="sectionTitle">อันดับ PS ตาม Index</div><div class="rankList">${rankRows.slice(0,12).map((r,i)=>`<div class="rankItem"><div class="rankNo">${i+1}</div><div class="rankName"><b>${esc(r.psCode)} · ${esc(r.psName)}</b><span>${esc(r.adsCode)} · ยอด ${money(r.actual)} / เป้า ${money(r.target)}</span></div><div class="rankPct">${pct(r.index)}</div></div>`).join('')||'<div class="small">ไม่มีข้อมูล PS</div>'}</div></section><section class="card"><div class="sectionTitle">Seller Report ทุกหัวข้อ</div>${sellerSection}</section><section class="card"><div class="sectionTitle">MS / MAS SBD / New Product</div><div class="rankList">${ms.slice(0,15).map((r,i)=>`<div class="rankItem"><div class="rankNo">${i+1}</div><div class="rankName"><b>${esc(r.msCode)} · ${esc(r.msName||'')}</b><span>Store ${money(r.storeCount)} · SBD ${money(r.sbdActualSku)} / ${money(r.sbdTargetSku)} · New ${money(r.newProduct?.totalCount)}</span></div><div class="rankPct">${pct(r.sbdCompliance||0)}</div></div>`).join('')||'<div class="small">ไม่มีข้อมูล MS</div>'}</div></section>`;
$('#adsSel').onchange=()=>{const u=new URL(location.href);u.searchParams.set('ads',$('#adsSel').value);u.searchParams.delete('ps');location.href=u.pathname+u.search};$('#applyBtn').onclick=()=>{const u=new URL(location.href);const a=$('#adsSel').value,p=$('#psSel').value;if(a)u.searchParams.set('ads',a);else u.searchParams.delete('ads');if(p)u.searchParams.set('ps',p);else u.searchParams.delete('ps');location.href=u.pathname+u.search};}
(async()=>{try{const {data,sourceMode}=await loadData();render(data,sourceMode)}catch(e){$('#app').innerHTML=`<section class="card err"><b>โหลดโหมดผลงานไม่สำเร็จ</b><div class="small">${esc(e.message||e)}</div></section>`}})();
})();
</script>
</body>
</html>
