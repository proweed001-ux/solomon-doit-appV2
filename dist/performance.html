<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store">
<title>Performance Inspector</title>
<style>
:root{--bg:#eef5fb;--card:#fff;--ink:#102033;--muted:#72879b;--line:#d8e7f2;--soft:#f6fbff;--blue:#2563eb;--green:#16a34a;--amber:#d97706;--red:#dc2626;--shadow:0 16px 42px rgba(22,54,92,.10)}*{box-sizing:border-box;min-width:0}html,body{margin:0;max-width:100%;overflow-x:hidden}body{background:linear-gradient(145deg,#eef7ff,#f8fbff 42%,#f2fff7);color:var(--ink);font-family:system-ui,-apple-system,'Segoe UI',Tahoma,sans-serif}.top{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.88);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}.topbar{max-width:1180px;margin:auto;display:grid;grid-template-columns:64px 1fr 64px;align-items:center;gap:8px;padding:10px 12px}.back{color:#0f4c81;text-decoration:none;font-weight:950}.brand{text-align:center;font-weight:950;font-size:17px}.wrap{max-width:1180px;margin:auto;padding:12px}.card{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:14px;margin-bottom:12px}.hero{background:radial-gradient(circle at top left,rgba(37,99,235,.18),transparent 32%),linear-gradient(135deg,#fff,#f5fbff)}h2,h3{margin:0 0 10px}.muted{color:var(--muted);font-size:12px;line-height:1.55;overflow-wrap:anywhere}.mono{font-family:ui-monospace,SFMono-Regular,Consolas,monospace}.modeBar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;background:#edf6ff;border:1px solid var(--line);border-radius:16px;padding:6px}.mode{height:42px;border:0;border-radius:12px;background:transparent;color:#496276;font-weight:950}.mode.on{background:linear-gradient(135deg,#2563eb,#0f9f87);color:white;box-shadow:0 10px 24px rgba(37,99,235,.18)}.summary{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px}.kpi{background:var(--soft);border:1px solid var(--line);border-radius:16px;padding:10px}.kpi span{display:block;color:#637c93;font-size:11px;font-weight:950}.kpi b{display:block;font-size:clamp(18px,4.7vw,25px);line-height:1.15;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.inspector{display:grid;grid-template-columns:minmax(280px,.42fr) minmax(0,1fr);gap:12px}.panel{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:12px}.toolbar{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:10px}.select,.search{width:100%;height:42px;border-radius:14px;border:1px solid var(--line);background:#fff;color:var(--ink);font-weight:900;padding:0 12px}.list{display:grid;gap:8px;max-height:680px;overflow:auto;padding-right:2px}.person{width:100%;border:1px solid var(--line);background:#fff;border-radius:16px;padding:10px;text-align:left;box-shadow:0 8px 20px rgba(28,70,114,.06)}.person.on{border-color:#2563eb;outline:2px solid rgba(37,99,235,.15)}.personTop{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.code{font-size:14px;font-weight:950;color:#102033}.name{font-size:12px;color:#64788c;font-weight:800;margin-top:2px}.pct{font-weight:950;font-size:16px}.mini{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;margin-top:8px}.mini div{background:#f6fbff;border:1px solid #e1edf6;border-radius:10px;padding:6px}.mini span{display:block;font-size:10px;color:#75899b;font-weight:950}.mini b{display:block;font-size:12px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meter{height:9px;background:#e7eef6;border-radius:999px;overflow:hidden;margin-top:8px}.fill{height:100%;background:linear-gradient(90deg,#ef4444,#f59e0b,#16a34a);border-radius:999px}.badge{display:inline-flex;align-items:center;min-height:26px;border-radius:999px;padding:0 9px;font-size:12px;font-weight:950}.ok{background:#dcfce7;color:#166534}.warn{background:#fef3c7;color:#92400e}.bad{background:#fee2e2;color:#991b1b}.neutral{background:#eaf2ff;color:#1d4ed8}.detailHead{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:10px}.detailTitle b{font-size:24px}.detailTitle div{color:var(--muted);font-size:13px;font-weight:800}.detailGrid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px}.box{background:var(--soft);border:1px solid var(--line);border-radius:16px;padding:10px}.box span{display:block;color:#637c93;font-size:11px;font-weight:950}.box b{display:block;font-size:20px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sectionTitle{display:flex;justify-content:space-between;align-items:center;margin:14px 0 8px}.rawGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.raw{background:#fff;border:1px solid var(--line);border-radius:14px;padding:9px}.raw b{display:block;color:#64788c;font-size:11px;overflow-wrap:anywhere}.raw span{display:block;font-weight:850;font-size:13px;margin-top:3px;overflow-wrap:anywhere}.empty{border:1px dashed var(--line);border-radius:16px;color:var(--muted);padding:14px;background:#f8fcff}.tabsNote{display:flex;gap:6px;flex-wrap:wrap}.pill{background:#eef7ff;border:1px solid var(--line);border-radius:999px;padding:6px 9px;font-size:12px;font-weight:900;color:#1d4ed8}details{margin-top:10px}summary{cursor:pointer;font-weight:950;color:#0f766e;font-size:13px}@media(max-width:900px){.inspector{grid-template-columns:1fr}.summary,.detailGrid{grid-template-columns:repeat(2,minmax(0,1fr))}.list{max-height:none}.rawGrid{grid-template-columns:1fr}}@media(max-width:560px){.wrap{padding:8px}.topbar{grid-template-columns:48px 1fr 0}.card,.panel{border-radius:18px;padding:11px}.summary,.detailGrid{grid-template-columns:1fr}.mode{padding:0 6px}.detailHead{display:block}.badge{margin-top:8px}}
</style>
</head>
<body>
<header class="top"><div class="topbar"><a class="back" href="/pro.html?t=1028">← Pro</a><div class="brand">Performance Inspector</div><span></span></div></header>
<main class="wrap" id="app"><section class="card"><div class="empty">กำลังโหลดข้อมูลจริง...</div></section></main>
<script>
(()=>{'use strict';
const EDGE='https://saodmeoilixfdqentofp.supabase.co/functions/v1/performance-active';
const ADS_MAP={AYAADS01:['011','012','013','014','015','016'],AYAADS02:['021','022','023','071','072','073'],AYAADS03:['031','032','033','061','062','063'],AYAADS04:['041','042','043','051','052']};
let DATA=null,MODE='ads',ACTIVE_ADS='',ACTIVE_PS='',ACTIVE_MS='',QUERY='';
const $=s=>document.querySelector(s),T=v=>String(v??'').trim(),N=v=>Number(String(v??0).replace(/,/g,'').replace(/%/g,'').replace(/[^0-9.\-]/g,''))||0;
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money=v=>N(v).toLocaleString('th-TH',{maximumFractionDigits:0}),pct=v=>N(v).toLocaleString('th-TH',{minimumFractionDigits:1,maximumFractionDigits:1})+'%';
function nk(v){return T(v).replace(/\s+/g,'').toLowerCase()}function pick(o,exact,contains=[]){o=o&&typeof o==='object'?o:{};const keys=Object.keys(o),ex=exact.map(nk),ct=contains.map(nk);let k=keys.find(x=>ex.includes(nk(x)));if(!k)k=keys.find(x=>ct.some(c=>nk(x).includes(c)));return k?o[k]:''}
function show(v){if(v===null||v===undefined||T(v)==='')return'-';const s=T(v);return /^-?[\d,]+(\.\d+)?%?$/.test(s)?money(s):s}
async function load(){const r=await fetch(EDGE+'?t='+Date.now(),{cache:'no-store'}),txt=await r.text();if(!r.ok)throw Error(txt||r.statusText);const d=JSON.parse(txt);return{current:normalize(d.current||{}),previous:normalize(d.previous||{}),meta:d.meta||{},src:d.src||'performance-active'}}
function psCode(r){const raw=T(r.psCode||r.code||r.ps||r.seller||r.id).toUpperCase();const m=raw.match(/AYA\s*PS\s*0*(\d{2,3})/i)||raw.match(/\bPS\s*0*(\d{2,3})\b/i);return m?'AYAPS'+m[1].padStart(3,'0'):raw}
function msCode(r){const raw=T(r.msCode||r.code||r.ms||r.slpCode).toUpperCase();const m=raw.match(/MS\s*0*(\d{2,3})/i);return m?'MS'+m[1].padStart(3,'0'):raw}
function adsFromPs(r){const g=T(r.adsCode||r.ads||r.adsName).toUpperCase();if(/^AYAADS\d{2}$/.test(g))return g;const n=psCode(r).replace(/\D/g,'').slice(-3);for(const [ads,arr] of Object.entries(ADS_MAP))if(arr.includes(n))return ads;return'ไม่ระบุ ADS'}
function cdInfo(r){const cd=r.cd||{};const count=Object.values(cd).filter(v=>T(v)).length;return{count,text:count?String(count)+' CD':T(pick(r.sellerReport||{},['CD','CD GPS','CD/GPS'],['cd']))||'-'}}
function givMoqInfo(sr){const direct=pick(sr,['GIV MOQ','GIV/MOQ','ยอด GIV MOQ','ยอดGIVMOQ'],['givmoq']);const giv=pick(sr,['GIV','ยอด GIV','ยอดGIV'],['giv']);const moq=pick(sr,['MOQ','ยอด MOQ','ยอดMOQ'],['moq']);return{giv:N(giv),moq:N(moq),text:T(direct)||[T(giv)?'GIV '+show(giv):'',T(moq)?'MOQ '+show(moq):''].filter(Boolean).join(' / ')||'-'}}
function gpsInfo(sr,r){const gps=pick(sr,['GPS','CD GPS','CD/GPS'],['gps']);const dgp=pick(sr,['DGP Point','Golden Point'],['dgp']);return{text:T(gps)||T(dgp)||T(r.dgp)||'-',value:N(gps||dgp||r.dgp)}}
function normPs(r){const sr=r.sellerReport||{};const code=psCode(r),name=T(r.psName||r.name||r.sellerName||pick(sr,['Sales Name','Seller Name','ชื่อ'])||code||'ไม่ระบุ');const target=N(r.target||pick(sr,['เป้าหมายยอดขาย']));const actual=N(r.actual||pick(sr,['ยอดขายใน Doit','ยอดขายในDOIT'],['ยอดขาย']));const dgp=N(r.dgp||pick(sr,['DGP Point','Golden Point'],['DGP']));const bills=N(r.bills||pick(sr,['จำนวนบิลซื้อทั้งหมด'],['บิลซื้อทั้งหมด']));const index=target?actual/target*100:N(r.index||pick(sr,['Index']));const gm=givMoqInfo(sr),cd=cdInfo(r),gps=gpsInfo(sr,{dgp});return{...r,kind:'PS',code,name,ads:adsFromPs(r),target,actual,dgp,bills,index,gap:actual-target,giv:gm.giv,moq:gm.moq,givMoqText:gm.text,cdCount:cd.count,cdText:cd.text,gpsValue:gps.value,gpsText:gps.text}}
function normMs(r){const code=msCode(r),name=T(r.msName||r.name||r.lastName||code||'ไม่ระบุ');const target=N(r.target||r.sbdTargetSku);const actual=N(r.actual||r.sbdActualSku||r.sbdAmount||r.newProduct?.totalAmount);const dgp=N(r.dgp||r.sbdDetailCount||r.sbdActualSku);const bills=N(r.bills||r.storeCount||r.stores?.total);const index=target?actual/target*100:N(r.index||r.sbdCompliance);return{...r,kind:'MS',code,name,target,actual,dgp,bills,index,gap:actual-target,giv:N(r.newProduct?.totalAmount),moq:N(r.sbdTargetSku),givMoqText:N(r.newProduct?.totalAmount)?'New '+money(r.newProduct.totalAmount):'-',cdCount:0,cdText:'-',gpsValue:N(r.sbdActualSku||r.sbdDetailCount),gpsText:T(r.sbdActualSku||r.sbdDetailCount||'-')}}
function sumRows(rs,name){const x=rs.reduce((a,r)=>{a.target+=N(r.target);a.actual+=N(r.actual);a.dgp+=N(r.dgp);a.bills+=N(r.bills);a.giv+=N(r.giv);a.moq+=N(r.moq);a.cdCount+=N(r.cdCount);a.gpsValue+=N(r.gpsValue);return a},{kind:'ADS',code:name,name,target:0,actual:0,dgp:0,bills:0,giv:0,moq:0,cdCount:0,gpsValue:0});x.index=x.target?x.actual/x.target*100:0;x.gap=x.actual-x.target;x.givMoqText=(x.giv||x.moq)?`GIV ${money(x.giv)} / MOQ ${money(x.moq)}`:'-';x.cdText=x.cdCount?x.cdCount+' CD':'-';x.gpsText=x.gpsValue?money(x.gpsValue):'-';return x}
function normalize(d){const ps=(Array.isArray(d.ps)?d.ps:[]).map(normPs);const ms=(Array.isArray(d.ms)?d.ms:[]).map(normMs);const ads=[...Object.keys(ADS_MAP),'ไม่ระบุ ADS'].map(name=>{const children=ps.filter(p=>p.ads===name);return{...sumRows(children,name),children}}).filter(a=>a.children.length||a.name!=='ไม่ระบุ ADS');return{raw:d,ps,ms,ads}}
function status(i){i=N(i);return i>=100?'<span class="badge ok">เกินเป้า</span>':i>=80?'<span class="badge warn">ตามงาน</span>':'<span class="badge bad">ต้องเร่ง</span>'}
function meter(i){return`<div class="meter"><div class="fill" style="width:${Math.max(0,Math.min(130,N(i)))}%"></div></div>`}
function summary(t){return`<div class="summary"><div class="kpi"><span>ยอดขาย</span><b>${money(t.actual)}</b></div><div class="kpi"><span>GIV / MOQ</span><b>${esc(t.givMoqText||'-')}</b></div><div class="kpi"><span>CD</span><b>${esc(t.cdText||'-')}</b></div><div class="kpi"><span>GPS / DGP</span><b>${esc(t.gpsText||money(t.dgp))}</b></div><div class="kpi"><span>บิล</span><b>${money(t.bills)}</b></div></div>`}
function personButton(r,on){return`<button class="person ${on?'on':''}" data-code="${esc(r.code)}"><div class="personTop"><div><div class="code">${esc(r.code||r.name)}</div><div class="name">${esc(r.name)}${r.ads?' · '+esc(r.ads):''}</div></div><div class="pct">${pct(r.index)}</div></div>${meter(r.index)}<div class="mini"><div><span>ยอดขาย</span><b>${money(r.actual)}</b></div><div><span>GIV/MOQ</span><b>${esc(r.givMoqText||'-')}</b></div><div><span>CD/GPS</span><b>${esc((r.cdText||'-')+' / '+(r.gpsText||'-'))}</b></div><div><span>บิล</span><b>${money(r.bills)}</b></div></div></button>`}
function filterRows(rows){const q=nk(QUERY);return q?rows.filter(r=>nk([r.code,r.name,r.ads].join(' ')).includes(q)):rows}
function rawGrid(o,limit=80){const entries=Object.entries(o||{}).filter(([k,v])=>v!==null&&v!==undefined&&v!==''&&typeof v!=='object').slice(0,limit);if(!entries.length)return'<div class="empty">ไม่มีรายละเอียดเพิ่มเติม</div>';return`<div class="rawGrid">${entries.map(([k,v])=>`<div class="raw"><b>${esc(k)}</b><span>${esc(v)}</span></div>`).join('')}</div>`}
function cdPills(r){const cd=r?.cd||{};const e=Object.entries(cd).filter(([k,v])=>T(v));return e.length?`<div class="tabsNote">${e.map(([k,v])=>`<span class="pill">${esc(k)}: ${esc(v)}</span>`).join('')}</div>`:''}
function detail(r){if(!r)return'<div class="empty">แตะรายชื่อด้านซ้ายเพื่อดูรายละเอียดรายบุคคล</div>';const extra=r.kind==='PS'?`<div class="sectionTitle"><h3>ข้อมูลอื่นของ PS นี้</h3></div>${cdPills(r)}<details open><summary>ดู Seller Report ทั้งหมด</summary>${rawGrid(r.sellerReport||r,100)}</details>`:`<div class="sectionTitle"><h3>ข้อมูลอื่นของ MS นี้</h3></div><details open><summary>ดูข้อมูล MS ทั้งหมด</summary>${rawGrid(r,100)}</details>`;return`<div class="detailHead"><div class="detailTitle"><b>${esc(r.code||r.name)}</b><div>${esc(r.name)}${r.ads?' · '+esc(r.ads):''}</div></div>${status(r.index)}</div><div class="detailGrid"><div class="box"><span>ยอดขาย</span><b>${money(r.actual)}</b></div><div class="box"><span>GIV / MOQ</span><b>${esc(r.givMoqText||'-')}</b></div><div class="box"><span>CD</span><b>${esc(r.cdText||'-')}</b></div><div class="box"><span>GPS / DGP</span><b>${esc(r.gpsText||money(r.dgp))}</b></div><div class="box"><span>บิล</span><b>${money(r.bills)}</b></div><div class="box"><span>Target</span><b>${money(r.target)}</b></div><div class="box"><span>Index</span><b>${pct(r.index)}</b>${meter(r.index)}</div><div class="box"><span>ขาด/เกิน</span><b>${money(r.gap)}</b></div><div class="box"><span>DGP</span><b>${money(r.dgp)}</b></div><div class="box"><span>หัวหน้า/กลุ่ม</span><b>${esc(r.ads||'-')}</b></div></div>${extra}`}
function hero(){const m=DATA.meta||{};return`<section class="card hero"><div class="sectionNote"><div><h2>Performance Inspector</h2><div class="muted">หน้าหลักแสดงเฉพาะ: ยอดขาย · GIV/MOQ · CD/GPS · บิล · ข้อมูลอื่นกดที่ PS/MS เพื่อดูรายละเอียด</div></div><span class="badge neutral">${esc(m.currentDate||'ไม่พบวันที่')}</span></div><div class="muted mono">source: ${esc(DATA.src)} · current: ${esc(m.currentPath||'-')}</div></section><section class="card"><div class="modeBar"><button class="mode ${MODE==='ads'?'on':''}" data-mode="ads">ADS → PS</button><button class="mode ${MODE==='ps'?'on':''}" data-mode="ps">PS รายคน</button><button class="mode ${MODE==='ms'?'on':''}" data-mode="ms">MS รายคน</button></div></section>`}
function inspector(rows,total,activeCode,title,selectHtml=''){rows=filterRows(rows);const selected=rows.find(r=>r.code===activeCode)||rows[0];return`<section class="card"><div class="sectionNote"><h3>${esc(title)}</h3>${selectHtml}</div>${summary(total)}</section><section class="inspector"><aside class="panel"><div class="toolbar"><input id="search" class="search" placeholder="ค้นหารหัส / ชื่อ" value="${esc(QUERY)}"></div><div class="list">${rows.map(r=>personButton(r,selected&&r.code===selected.code)).join('')||'<div class="empty">ไม่พบรายการ</div>'}</div></aside><section class="panel">${detail(selected)}</section></section>`}
function renderAds(){const ads=DATA.current.ads;const a=ads.find(x=>x.code===ACTIVE_ADS)||ads[0]||{children:[]};ACTIVE_ADS=a.code||'';const rows=[...(a.children||[])].sort((x,y)=>N(y.index)-N(x.index));if(!ACTIVE_PS||!rows.find(r=>r.code===ACTIVE_PS))ACTIVE_PS=rows[0]?.code||'';const sel=`<select id="adsPick" class="select">${ads.map(x=>`<option value="${esc(x.code)}" ${x.code===ACTIVE_ADS?'selected':''}>${esc(x.code)} · PS ${(x.children||[]).length} คน</option>`).join('')}</select>`;return inspector(rows,{...a,gap:a.actual-a.target},ACTIVE_PS,'ตรวจรายบุคคลใต้ '+(ACTIVE_ADS||'ADS'),sel)}
function renderPs(){const rows=[...DATA.current.ps].sort((x,y)=>N(y.index)-N(x.index));if(!ACTIVE_PS)ACTIVE_PS=rows[0]?.code||'';const total=sumRows(rows,'PS ทั้งหมด');return inspector(rows,total,ACTIVE_PS,'ตรวจ PS รายบุคคล')}
function renderMs(){const rows=[...DATA.current.ms].sort((x,y)=>N(y.index)-N(x.index));if(!ACTIVE_MS)ACTIVE_MS=rows[0]?.code||'';const total=sumRows(rows,'MS ทั้งหมด');return inspector(rows,total,ACTIVE_MS,'ตรวจ MS รายบุคคล')}
function bind(){document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{MODE=b.dataset.mode;QUERY='';render()});const a=$('#adsPick');if(a)a.onchange=()=>{ACTIVE_ADS=a.value;ACTIVE_PS='';QUERY='';render()};const s=$('#search');if(s)s.oninput=()=>{QUERY=s.value;render()};document.querySelectorAll('.person').forEach(b=>b.onclick=()=>{if(MODE==='ms')ACTIVE_MS=b.dataset.code;else ACTIVE_PS=b.dataset.code;render()})}
function render(){if(!DATA)return;$('#app').innerHTML=hero()+(MODE==='ads'?renderAds():MODE==='ps'?renderPs():renderMs());bind()}
load().then(d=>{DATA=d;render()}).catch(e=>{$('#app').innerHTML=`<section class="card"><h2>โหลด Dashboard ไม่สำเร็จ</h2><div class="empty">${esc(e.message||e)}</div></section>`;console.error(e)});
})();
</script>
</body>
</html>
