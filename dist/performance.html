<style>
:root{--bg:#071526;--panel:#0d2741;--panel2:#092035;--line:#24506f;--text:#ecf8ff;--muted:#9bb8d3;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--blue:#38bdf8;--violet:#a78bfa}*{box-sizing:border-box;min-width:0}html,body{margin:0;max-width:100%;overflow-x:hidden}body{background:radial-gradient(circle at top left,#164e86 0,#071526 38%,#030b14 100%);color:var(--text);font-family:system-ui,-apple-system,'Segoe UI',Tahoma,sans-serif}.top{position:sticky;top:0;z-index:20;background:rgba(7,21,38,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}.topbar{max-width:1180px;margin:auto;display:grid;grid-template-columns:64px 1fr 64px;align-items:center;gap:8px;padding:10px 12px}.back{color:#dff6ff;text-decoration:none;font-weight:950}.brand{text-align:center;font-weight:950;font-size:17px}.wrap{max-width:1180px;margin:auto;padding:12px}.card{background:linear-gradient(180deg,rgba(13,39,65,.96),rgba(9,32,53,.96));border:1px solid var(--line);border-radius:22px;box-shadow:0 18px 48px #0007;padding:14px;margin-bottom:12px;overflow:hidden}h2,h3{margin:0 0 10px}.muted{color:var(--muted);font-size:12px;line-height:1.5;overflow-wrap:anywhere}.layout{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(300px,.9fr);gap:12px}.grid{display:grid;gap:8px}.filters{grid-template-columns:minmax(0,1fr) minmax(0,1fr) 86px}.field label{display:block;color:#c6e3f8;font-size:11px;font-weight:950;margin-bottom:5px}select,.btn{width:100%;height:42px;border-radius:14px;border:1px solid var(--line);background:#071a2c;color:#fff;font-weight:900;padding:0 10px}.btn{background:#123858}.hero{background:linear-gradient(135deg,#0d61a8,#087b59)}.heroHead{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap}.scope{font-size:clamp(22px,5.8vw,32px);font-weight:950;line-height:1.15}.badge{display:inline-flex;align-items:center;min-height:30px;border-radius:999px;padding:0 11px;font-size:12px;font-weight:950;white-space:nowrap}.ok{background:#064e3b;color:#bbf7d0}.warn{background:#78350f;color:#fde68a}.bad{background:#7f1d1d;color:#fecaca}.neutral{background:#123858;color:#dff6ff}.dataBar{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.dataPill{background:#071a2c;border:1px solid var(--line);border-radius:16px;padding:10px}.dataPill span,.kpi span,.mini span,.box span{display:block;color:#b9d8ef;font-size:11px;font-weight:950}.dataPill b,.kpi b,.mini b,.box b{display:block;color:#fff;font-size:18px;line-height:1.15;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.kpis,.miniGrid,.adsGrid,.problemGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.kpi,.mini,.adsCard,.rowItem,.box,.sellerBox{background:#071a2c;border:1px solid var(--line);border-radius:16px;padding:10px}.kpi b{font-size:clamp(19px,5.2vw,27px)}.kpi small,.mini small,.box small{display:block;color:var(--muted);font-size:11px;margin-top:3px;overflow-wrap:anywhere}.meter{height:12px;background:#16334d;border-radius:999px;overflow:hidden;margin-top:10px}.fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--red),var(--amber),var(--green))}.gap{font-size:12px;color:#c4d7e9;margin-top:6px;overflow-wrap:anywhere}.deltaUp{color:#86efac!important}.deltaDown{color:#fecaca!important}.mono{font-family:ui-monospace,SFMono-Regular,Consolas,monospace}.adsGrid{grid-template-columns:repeat(2,minmax(0,1fr))}.adsCard{cursor:pointer}.adsTop{display:flex;justify-content:space-between;gap:8px}.adsTop b{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.adsTop em{font-style:normal;font-size:12px;font-weight:950;white-space:nowrap}.rowList{display:grid;gap:8px}.rowItem{display:grid;grid-template-columns:32px minmax(0,1fr) 76px;gap:8px;align-items:center;cursor:pointer}.rankNo{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:#123f63;color:#bdefff;font-weight:950}.rowText b{display:block;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.rowText span{display:block;color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.right{text-align:right;font-size:13px;font-weight:950;white-space:nowrap}.sellerGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.sellerBox b{display:block;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sellerBox span{display:block;color:var(--muted);font-size:12px;margin-top:3px;overflow-wrap:anywhere}.tabs{display:flex;gap:6px;overflow-x:auto;margin:10px -2px 12px;padding:0 2px 4px}.tab{height:36px;border-radius:999px;border:1px solid var(--line);background:#071a2c;color:#d8efff;font-weight:950;font-size:12px;padding:0 12px;white-space:nowrap}.tab.on{background:linear-gradient(135deg,#0ea5e9,#22c55e);border-color:transparent}.section{display:none}.section.on{display:block}.raw{display:grid;gap:6px;max-height:440px;overflow:auto}.rawItem{display:grid;grid-template-columns:minmax(0,42%) minmax(0,1fr);gap:8px;background:#071a2c;border:1px solid var(--line);border-radius:12px;padding:8px}.rawItem b{font-size:11px;color:var(--muted);overflow-wrap:anywhere}.rawItem span{font-size:12px;font-weight:850;overflow-wrap:anywhere}.empty{border:1px dashed var(--line);border-radius:16px;color:var(--muted);padding:14px;background:#071a2c;overflow-wrap:anywhere}.tech{margin-top:8px}.tech summary{cursor:pointer;color:#8bdcff;font-weight:950;font-size:12px}.techBox{margin-top:8px;background:#071a2c;border:1px solid var(--line);border-radius:14px;padding:10px;color:var(--muted);font-size:11px;line-height:1.55;overflow-wrap:anywhere}.loading{text-align:center;color:#8be7ff;font-weight:950;padding:28px}@media(max-width:900px){.layout{grid-template-columns:1fr}.adsGrid,.dataBar,.kpis,.miniGrid,.problemGrid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:560px){.topbar{grid-template-columns:48px 1fr 0}.wrap{padding:8px}.card{border-radius:18px;padding:11px}.filters,.adsGrid,.dataBar,.kpis,.miniGrid,.problemGrid,.sellerGrid{grid-template-columns:1fr}.rowItem{grid-template-columns:30px minmax(0,1fr) 62px}.rawItem{grid-template-columns:1fr}}
</style>

<body>
<header class="top"><div class="topbar"><a class="back" href="/pro.html?t=1028">← Pro</a><div class="brand">Performance Dashboard</div><span></span></div></header>
<main class="wrap" id="app"><section class="card"><div class="loading">กำลังโหลดข้อมูลจริง...</div></section></main>
<script>
(()=>{'use strict';
const BUCKET='doit-files',DEFAULT_URL='https://saodmeoilixfdqentofp.supabase.co';
const $=s=>document.querySelector(s),T=v=>String(v??'').trim(),N=v=>Number(String(v??0).replace(/,/g,'').replace(/%/g,'').replace(/[^0-9.\-]/g,''))||0,esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),money=v=>N(v).toLocaleString('th-TH',{maximumFractionDigits:0}),pct=v=>N(v).toLocaleString('th-TH',{minimumFractionDigits:1,maximumFractionDigits:1})+'%',today=()=>new Date().toISOString().slice(0,10);
function cfg(){let s={};try{s=JSON.parse(localStorage.getItem('doit-cloud-cfg')||'{}')}catch{}return{u:T(s.url||DEFAULT_URL).replace(/\/$/,''),k:T(s.key||'')}}
function headers(c,x={}){return{apikey:c.k,authorization:'Bearer '+c.k,...x}}
async function fx(url,opt={},ms=15000){const ac=new AbortController(),timer=setTimeout(()=>ac.abort(),ms);try{return await fetch(url,{...opt,cache:'no-store',signal:ac.signal})}finally{clearTimeout(timer)}}
async function readJson(path,ms=15000){const c=cfg();if(!c.k)throw Error('ยังไม่ได้ตั้งค่า Cloud key ในหน้า Admin');const r=await fx(`${c.u}/storage/v1/object/${BUCKET}/${encodeURIComponent(path).replace(/%2F/g,'/')}`,{headers:headers(c)},ms),txt=await r.text();if(!r.ok)throw Error(txt||r.statusText);return JSON.parse(txt)}
async function listPrefix(prefix){const c=cfg();if(!c.k)return[];try{const r=await fx(`${c.u}/storage/v1/object/list/${BUCKET}`,{method:'POST',headers:headers(c,{'Content-Type':'application/json'}),body:JSON.stringify({prefix,limit:1000,offset:0,sortBy:{column:'updated_at',order:'desc'}})},15000);if(!r.ok)return[];const a=await r.json();return(Array.isArray(a)?a:[]).map(x=>({name:x.name,path:T(x.name).startsWith(prefix+'/')?x.name:prefix.replace(/\/$/,'')+'/'+x.name,updated_at:x.updated_at||x.created_at||'',size:N(x.metadata?.size||x.size)})).filter(x=>/\.json$/i.test(x.path))}catch(e){console.warn('[list]',e);return[]}}
function pathDate(p){const m=T(p).match(/(20\d{2}-\d{2}-\d{2})/);return m?m[1]:''}function reportDate(d,p,active){return T(d?.reportDate||active?.reportDate||d?.date||pathDate(p)||T(d?.updatedAt).slice(0,10)||today()).slice(0,10)}function fileDate(f){return pathDate(f.path)||T(f.updated_at).slice(0,10)}function latestByDate(files){const m=new Map();files.filter(f=>!/active\.json$|index\.json$/i.test(f.path)).forEach(f=>{const d=fileDate(f);if(!d)return;const old=m.get(d);if(!old||T(f.updated_at||f.path)>T(old.updated_at||old.path))m.set(d,f)});return m}
async function safeRead(path){try{return await readJson(path,18000)}catch(e){console.warn('[safeRead]',path,e);return null}}
async function load(){const meta={activeOk:false,currentOk:false,previousOk:false,currentPath:'',previousPath:'',currentDate:'',previousDate:'',sameDayRevisions:0,source:'Cloud',errors:[]};let active=null,current=null,previous=null;try{active=await readJson('performance/active.json',12000);meta.activeOk=true}catch(e){meta.errors.push('active.json: '+e.message)}const files=await listPrefix('performance');const byDate=latestByDate(files);let currentPath=T(active?.dataPath||active?.currentDataPath||active?.latestPath||active?.path||'');if(!currentPath&&byDate.size)currentPath=[...byDate.entries()].sort((a,b)=>b[0].localeCompare(a[0]))[0][1].path;meta.currentPath=currentPath;if(currentPath){current=await safeRead(currentPath);meta.currentOk=!!(current?.ps?.length||current?.ads?.length);if(meta.currentOk)localStorage.setItem('doit-performance-data-v1',JSON.stringify(current))}if(!current){try{current=JSON.parse(localStorage.getItem('doit-performance-data-v1')||'null');if(current?.ps?.length||current?.ads?.length){meta.currentOk=true;meta.currentPath='Cache เครื่องนี้';meta.source='Cache'}}catch{}}
meta.currentDate=current?reportDate(current,meta.currentPath,active):'';meta.sameDayRevisions=files.filter(f=>fileDate(f)===meta.currentDate&&!/active\.json$|index\.json$/i.test(f.path)).length;let prevPath=T(active?.previousDataPath||active?.prevDataPath||active?.previous?.dataPath||'');if(prevPath){const pd=pathDate(prevPath);if(meta.currentDate&&pd&&pd>=meta.currentDate)prevPath=''}if(!prevPath&&meta.currentDate){const dates=[...byDate.keys()].filter(d=>d<meta.currentDate).sort().reverse();if(dates[0])prevPath=byDate.get(dates[0]).path}meta.previousPath=prevPath;if(prevPath){previous=await safeRead(prevPath);meta.previousOk=!!(previous?.ps?.length||previous?.ads?.length);meta.previousDate=previous?reportDate(previous,prevPath,active):pathDate(prevPath)}let history=[];const histDates=[...byDate.keys()].filter(d=>!meta.currentDate||d<=meta.currentDate).sort().slice(-31);if(histDates.length){const reads=await Promise.all(histDates.map(d=>safeRead(byDate.get(d).path)));history=reads.map((d,i)=>d?{date:reportDate(d,byDate.get(histDates[i]).path,active),data:d}:null).filter(Boolean)}return{current,previous,history,meta,src:active?.reportDate?`active.json · ${active.reportDate}`:meta.source}}
function indexOf(r){return N(r?.target)?N(r.actual)/N(r.target)*100:N(r?.index)}function addIndex(r){return{...r,index:indexOf(r)}}function rows(d){return{ps:(d?.ps||[]).map(addIndex),ads:(d?.ads||[]).map(addIndex),ms:Array.isArray(d?.ms)?d.ms:[],sellerRows:Array.isArray(d?.sellerReportRows)?d.sellerReportRows:[],fields:Array.isArray(d?.sellerReportFields)?d.sellerReportFields:[]}}function sum(rs){return addIndex(rs.reduce((a,r)=>{a.target+=N(r.target);a.actual+=N(r.actual);a.dgp+=N(r.dgp);a.bills+=N(r.bills);return a},{target:0,actual:0,dgp:0,bills:0}))}
function cls(i){i=N(i);return i>=100?'ok':i>=80?'warn':'bad'}function state(i){i=N(i);return i>=100?'เกินเป้า':i>=80?'ตามงาน':'ต้องเร่ง'}function delta(v){v=N(v);return(v>=0?'+':'')+money(v)}function dcls(v,up=true){v=N(v);return(up?v>=0:v<=0)?'deltaUp':'deltaDown'}function deltaPct(v){v=N(v);return(v>=0?'+':'')+v.toFixed(1)+'%'}
function kpi(a,b,c){return`<div class="kpi"><span>${esc(a)}</span><b>${esc(b)}</b><small>${esc(c||'')}</small></div>`}function mini(a,b,c,ok){return`<div class="mini"><span>${esc(a)}</span><b class="${ok===false?'deltaDown':ok===true?'deltaUp':''}">${esc(b)}</b><small>${esc(c||'')}</small></div>`}function bar(a,t){const i=N(t)?N(a)/N(t)*100:0;return`<div class="meter"><div class="fill" style="width:${Math.min(140,i)}%"></div></div><div class="gap">${pct(i)} · ${N(a)>=N(t)?'เกิน '+money(N(a)-N(t)):'ขาด '+money(N(t)-N(a))}</div>`}
function dataBanner(meta,d,prev){const r=rows(d||{});return`<section class="card"><h3>ข้อมูลล่าสุด</h3><div class="dataBar">${mini('วันที่ข้อมูล',meta.currentDate||'—',meta.source,!!meta.currentDate)}${mini('ข้อมูลเทียบ',meta.previousDate||'—',meta.previousOk?'พร้อมเทียบ':'ยังไม่มีวันก่อนหน้า',meta.previousOk)}${mini('จำนวนทีม',`${r.ads.length} ADS / ${r.ps.length} PS`,`${r.ms.length} MS`,r.ps.length>0)}${mini('สถานะ',meta.currentOk?'พร้อมใช้งาน':'ไม่พร้อม',meta.errors[0]||'อ่านข้อมูลหลัก',meta.currentOk)}</div><details class="tech"><summary>รายละเอียดเทคนิค</summary><div class="techBox">current: ${esc(meta.currentPath||'—')}<br>previous: ${esc(meta.previousPath||'—')}<br>sameDayRevisions: ${esc(meta.sameDayRevisions)}<br>${meta.errors.length?esc(meta.errors.join(' | ')):'ไม่มี error จากการโหลด'}</div></details></section>`}
function compare(d,prev){const cur=sum((d?.ps||[]).map(addIndex)),old=sum((prev?.ps||[]).map(addIndex));if(!prev)return`<section class="card"><h3>Smart Compare วันต่อวัน</h3><div class="miniGrid">${mini('ยอดขายเปลี่ยน','—','ยังไม่มีไฟล์ก่อนหน้า')}${mini('Index เปลี่ยน','—','ยังไม่มีไฟล์ก่อนหน้า')}${mini('PS ดีขึ้น','—','')}${mini('PS แย่ลง','—','')}</div></section>`;const om=new Map((prev.ps||[]).map(p=>[p.psCode,addIndex(p)]));let better=0,worse=0;(d.ps||[]).map(addIndex).forEach(p=>{const o=om.get(p.psCode);if(!o)return;const di=p.index-o.index;if(di>0.01)better++;else if(di<-0.01)worse++});return`<section class="card"><h3>Smart Compare วันต่อวัน</h3><div class="miniGrid">${mini('ยอดขายเปลี่ยน',delta(N(cur.actual)-N(old.actual)),'เทียบวันก่อน',N(cur.actual)>=N(old.actual))}${mini('Index เปลี่ยน',deltaPct(indexOf(cur)-indexOf(old)),'เทียบวันก่อน',indexOf(cur)>=indexOf(old))}${mini('PS ดีขึ้น',better+' คน','index ดีขึ้น',true)}${mini('PS แย่ลง',worse+' คน','ต้องดูเพิ่ม',worse===0)}</div></section>`}
function monthTrend(history){if(!history.length)return'';const rows=history.slice(-10).map(x=>{const s=sum((x.data.ps||[]).map(addIndex));return`<div class="rowItem"><div class="rankNo">${x.date.slice(8)}</div><div class="rowText"><b>${esc(x.date)}</b><span>ยอด ${money(s.actual)} / เป้า ${money(s.target)}</span></div><div class="right ${cls(indexOf(s))}">${pct(indexOf(s))}</div></div>`}).join('');return`<section class="card"><h3>Month Trend Dashboard</h3><div class="rowList">${rows}</div></section>`}
function adsCards(rs){return rs.map(a=>`<div class="adsCard" data-ads="${esc(a.adsCode)}"><div class="adsTop"><b>${esc(a.adsCode)}</b><em class="${cls(a.index)}">${pct(a.index)}</em></div><div class="sellerGrid"><div class="box"><span>เป้า</span><b>${money(a.target)}</b></div><div class="box"><span>ทำแล้ว</span><b>${money(a.actual)}</b></div></div>${bar(a.actual,a.target)}<div class="gap">DGP ${money(a.dgp)} · บิล ${money(a.bills)}</div></div>`).join('')||'<div class="empty">ไม่มีข้อมูล ADS</div>'}
function psList(rs,n,prevMap=null){return rs.slice(0,n).map((r,i)=>{const p=prevMap?.get(r.psCode),diff=p?N(r.actual)-N(p.actual):0;return`<div class="rowItem" data-ads="${esc(r.adsCode)}" data-ps="${esc(r.psCode)}"><div class="rankNo">${i+1}</div><div class="rowText"><b>${esc(r.psCode)} · ${esc(r.psName)}</b><span>${p?'เทียบก่อนหน้า '+delta(diff):'เป้า '+money(r.target)+' / ทำแล้ว '+money(r.actual)}</span></div><div class="right ${p?dcls(diff,true):cls(r.index)}">${p?delta(diff):pct(r.index)}</div></div>`}).join('')||'<div class="empty">ไม่มีข้อมูล</div>'}
function sellerData(d,ps){return(d?.sellerReportRows||[]).find(r=>r.psCode===ps)?.sellerReport||(d?.ps||[]).find(p=>p.psCode===ps)?.sellerReport||null}function field(sr,terms,ex=[]){const keys=Object.keys(sr||{}),ts=terms.map(x=>T(x).replace(/\s+/g,'').toLowerCase()),xs=ex.map(x=>T(x).replace(/\s+/g,'').toLowerCase());const k=keys.find(key=>ts.every(t=>T(key).replace(/\s+/g,'').toLowerCase().includes(t))&&!xs.some(x=>T(key).replace(/\s+/g,'').toLowerCase().includes(x)));return k?{key:k,value:sr[k]}:null}function pair(title,t,a){if(!t&&!a)return'';return`<div class="sellerBox"><b>${esc(title)}</b><span>${t?'เป้า '+money(t.value)+' · ':''}${a?'ทำแล้ว '+money(a.value):''}</span>${t&&a?bar(a.value,t.value):''}</div>`}function raw(sr,fields){return`<div class="raw">${fields.map(f=>`<div class="rawItem"><b>${esc(f)}</b><span>${esc(sr[f]??'')}</span></div>`).join('')}</div>`}
function sellerDetail(d,psCode){const sr=sellerData(d,psCode),fields=Object.keys(sr||{});if(!psCode)return`<section class="card"><h3>Seller Report Detail</h3><div class="empty">เลือก PS เพื่อดูรายละเอียดรายคน</div></section>`;if(!sr)return`<section class="card"><h3>Seller Report Detail</h3><div class="empty">ไม่พบ Seller Report ของ ${esc(psCode)}</div></section>`;return`<section class="card" id="seller"><h3>Seller Report Detail · ${esc(psCode)}</h3><div class="tabs"><button class="tab on" data-tab="sales">Sales</button><button class="tab" data-tab="cd">CD</button><button class="tab" data-tab="raw">Raw</button></div><div id="sales" class="section on"><div class="sellerGrid">${pair('ยอดขาย DOIT',field(sr,['เป้าหมาย','ยอดขาย']),field(sr,['ยอดขาย','doit'],['เฉลี่ย']))}${pair('บิลซื้อทั้งหมด',field(sr,['เป้าหมาย','บิลซื้อ','ทั้งหมด']),field(sr,['จำนวนบิลซื้อ','ทั้งหมด']))}${pair('Productivity 50Bath',field(sr,['เป้าหมาย','productivity','50bath']),field(sr,['จำนวน','productivity','50bath']))}${pair('Golden Point',field(sr,['เป้าหมาย','golden']),field(sr,['goldenpoint'],['เป้าหมาย','index']))}</div></div><div id="cd" class="section"><div class="sellerGrid">${[1,2,3,4,5,6,7].map(i=>pair('CD'+i,field(sr,['เป้าหมาย','cd'+i],['cd1+cd3']),field(sr,['การกระจาย','cd'+i],['cd1+cd3']))).join('')}</div></div><div id="raw" class="section">${raw(sr,fields)}</div></section>`}
function go(a,p,h=''){const u=new URL(location.href);a?u.searchParams.set('ads',a):u.searchParams.delete('ads');p?u.searchParams.set('ps',p):u.searchParams.delete('ps');location.href=u.pathname+u.search+(h?'#'+h:'')}function bind(){document.body.onclick=e=>{const p=e.target.closest('[data-ps]');if(p)return go(p.dataset.ads,p.dataset.ps,'seller');const a=e.target.closest('[data-ads]');if(a&&a.dataset.ads)return go(a.dataset.ads,'','ads')};document.querySelectorAll('.tab[data-tab]').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab,.section').forEach(x=>x.classList.remove('on'));t.classList.add('on');$('#'+t.dataset.tab).classList.add('on')})}
function skeleton(msg){$('#app').innerHTML=`<section class="card"><h3>ยังไม่มีข้อมูล Performance</h3><div class="empty">${esc(msg||'ต้องอัปโหลดจากหน้า Admin ก่อน')}</div></section>`}
function render(d,prev,history,meta,src){if(!d)return skeleton(src);const q=new URLSearchParams(location.search),ads=q.get('ads')||'',ps=q.get('ps')||'',r=rows(d),psAll=r.ps,adsAll=r.ads;if(!psAll.length&&!adsAll.length)return skeleton('ไม่พบ ADS/PS ในข้อมูล');const chosen=psAll.filter(x=>(!ads||x.adsCode===ads)&&(!ps||x.psCode===ps)),summary=ps&&chosen[0]?chosen[0]:sum(chosen.length?chosen:psAll),i=indexOf(summary),gap=N(summary.actual)-N(summary.target),rank=psAll.filter(x=>!ads||x.adsCode===ads).sort((a,b)=>b.index-a.index),urgent=[...rank].sort((a,b)=>a.index-b.index),below=psAll.filter(x=>x.index<80).length,over=psAll.filter(x=>x.index>=100).length,worst=[...adsAll].sort((a,b)=>a.index-b.index)[0]||{},prevMap=new Map((prev?.ps||[]).map(p=>[p.psCode,p]));const adsOpts=adsAll.map(a=>`<option value="${esc(a.adsCode)}" ${a.adsCode===ads?'selected':''}>${esc(a.adsCode)}</option>`).join(''),psOpts=psAll.filter(p=>!ads||p.adsCode===ads).map(p=>`<option value="${esc(p.psCode)}" ${p.psCode===ps?'selected':''}>${esc(p.psCode)}</option>`).join('');$('#app').innerHTML=`${dataBanner(meta,d,prev)}<section class="card"><div class="filters grid"><div class="field"><label>ADS</label><select id="adsSel"><option value="">รวมทุก ADS</option>${adsOpts}</select></div><div class="field"><label>PS</label><select id="psSel"><option value="">รวมทุก PS</option>${psOpts}</select></div><button id="reset" class="btn">ล้าง</button></div></section><section class="layout"><div class="card hero"><div class="heroHead"><div><div class="scope">${esc(ps||ads||'รวมผลงานทั้งหมด')}</div><div class="muted" style="color:#dff6ff">${esc(meta.currentDate||'-')} · ${esc(src)}</div></div><span class="badge ${cls(i)}">${state(i)}</span></div><div class="kpis" style="margin-top:12px">${kpi('เป้าหมาย',money(summary.target),'')}${kpi('ทำแล้ว',money(summary.actual),'DOIT')}${kpi('Index',pct(i),gap>=0?'เกิน '+money(gap):'ขาด '+money(Math.abs(gap)))}${kpi('บิลซื้อ',money(summary.bills),'ทำแล้ว')}</div>${bar(summary.actual,summary.target)}</div><div class="card"><h3>Executive Summary</h3><div class="miniGrid">${mini('PS ต่ำกว่า 80%',below+' คน','จาก '+psAll.length,below===0)}${mini('PS เกินเป้า',over+' คน','index ≥ 100%',over>0)}${mini('ADS ต่ำสุด',worst.adsCode||'—',pct(worst.index||0),false)}${mini('ข้อมูลเทียบ',meta.previousDate||'—',meta.previousOk?'พร้อม':'ยังไม่มี',meta.previousOk)}</div></div></section>${compare(d,prev)}${monthTrend(history)}<section class="card" id="ads"><h3>ADS Board</h3><div class="adsGrid">${adsCards(adsAll.filter(a=>!ads||a.adsCode===ads))}</div></section><section class="layout"><div class="card"><h3>Top PS</h3><div class="rowList">${psList(rank,8,prevMap)}</div></div><div class="card"><h3>ต้องเร่งก่อน</h3><div class="rowList">${psList(urgent,8,prevMap)}</div></div></section>${sellerDetail(d,ps)}`;$('#adsSel').onchange=()=>go($('#adsSel').value,'','ads');$('#psSel').onchange=()=>{const p=$('#psSel').value;if(p)go($('#adsSel').value,p,'seller')};$('#reset').onclick=()=>go('','','');bind()}
(async()=>{const {current,previous,history,meta,src}=await load();render(current,previous,history,meta,src)})().catch(e=>skeleton(e.message||e));
})();
</script>
</body>
