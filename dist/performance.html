t;');function dl(){return N(data?.meta?.daysLeft)||Math.max(N(data?.meta?.totalWorkdays)-N(data?.meta?.workdayNo),0)}function pc(v){const d=N(v?.daysLeft)||dl(),r=Math.max(N(v?.remaining)||(N(v?.target)-N(v?.actual)),0),p=N(v?.perDay)||(d>0?r/d:r);return{d,r,p}}function pct(v){const x=pc(v);return'เหลือ '+M(x.r)+' / วันละ '+M(x.p)}function oldLabel(p){return p?.reportKey||(p?.period&&p?.workdayNo?String(p.period)+'-WD'+String(p.workdayNo).padStart(2,'0'):'ก่อนหน้า')}function st(){const q=new URLSearchParams(location.search),lv=q.get('level')||'',md=q.get('mode')||({compare:'compare','compare-detail':'compare',ads:'ads',ps:'ps',person:'person',ms:'ms',ds:'ds'}[lv]||'ds');return{mode:md,cat:q.get('cat')||'',ads:q.get('ads')||'',ps:q.get('ps')||''}}function go(s,push=true){state={mode:s.mode||state.mode||'ds',cat:s.cat??'',ads:s.ads??'',ps:s.ps??''};if(push){const q=new URLSearchParams();q.set('mode',state.mode);if(state.cat)q.set('cat',state.cat);if(state.ads)q.set('ads',state.ads);if(state.ps)q.set('ps',state.ps);history.pushState(state,'',location.pathname+'?'+q.toString())}render();requestAnimationFrame(()=>scrollTo({top:0,behavior:'smooth'}))}window.onpopstate=()=>{state=st();render()};document.addEventListener('click',e=>{const b=e.target.closest('[data-mode]');if(!b)return;e.preventDefault();go({mode:b.dataset.mode,cat:b.dataset.cat||'',ads:b.dataset.ads||'',ps:b.dataset.ps||''})});function btn(t,s,cls='chip'){const on=state.mode===s.mode&&(s.cat===undefined||state.cat===s.cat)&&(s.ads===undefined||state.ads===s.ads);return `<button class='${cls}${on?' on':''}' data-mode='${E(s.mode)}' data-cat='${E(s.cat||'')}' data-ads='${E(s.ads||'')}' data-ps='${E(s.ps||'')}'>${E(t)}</button>`}function nav(){return `<div class='nav'>${btn('DS',{mode:'ds'})}${btn('ADS',{mode:'ads'})}${btn('เทียบย้อนหลัง',{mode:'compare'})}${btn('MS แยก',{mode:'ms'})}</div>`}async function jf(p,ms=8000){const ac=new AbortController(),t=setTimeout(()=>ac.abort(),ms);try{const r=await fetch(SB+' evious:N(ov.actual),remaining:rem,perDay:per,diff:N(cv.actual)-N(ov.actual),indexNow:N(cv.index),indexOld:N(ov.index),indexDiff:N(cv.index)-N(ov.index)}})}function drow(r,i,s=null){const cls=r.diff>=0?'up':'dn',tag=s?'button':'div',attr=s?` data-mode='${E(s.mode||'compare')}' data-cat='${E(s.cat||'')}' data-ads='${E(s.ads||'')}'`:'';return `<${tag} class='row'${attr}><div class='no'>${i+1}</div><div><b>${E(r.ps||r.ads||r.code)} · ${E(r.name||'')}</b><span>ล่าสุด ${M(r.current)} / ก่อนหน้า ${M(r.previous)} / เหลือ ${M(r.remaining)} / วันละ ${M(r.perDay)} / Index ${P(r.indexNow)}</span></div><div class='right ${cls}'>${r.diff>=0?'+':''}${M(r.diff)}</div></${tag}>`}function chipCat(cat,ad){return `<div class='chips'>${Object.entries(C).map(([k,n])=>btn(n,{mode:'compare',cat:k,ads:ad||''},'chip')).join('')}</div>`}function chipAds(list,cat,ad){return `<div class='chips'>${(list||[]).map(a=>btn(a,{mode:'compare',cat,ads:a},'chip')).join('')}</div>`}async function screenCompare(){let p;try{p=await oldPack()}catch(e){app.innerHTML=nav()+`<section class='panel'><div class='empty'>${E(e.message)}</div></section>`;return}const prev=oldLabel(p.pick),cat=state.cat in C?state.cat:'';if(!cat){app.innerHTML=nav()+hero('เทียบย้อนหลัง','ล่าสุด '+(data.meta?.reportKey||'')+' เทียบกับ '+prev,data.ds)+`<section class='panel'><h3>DS Compare</h3><div class='rank'>${Object.keys(C).map((k,i)=>diffBtn(data.ds,p.old.ds||{},k,i)).join('')}</div></section>`;return}const adsRows=deltas(data.ads,p.old.ads,cat,'ads').sort((a,b)=>b.diff-a.diff),adsList=adsRows.map(x=>x.ads||x.code).filter(Boolean),sel=state.ads&&adsList.includes(state.ads)?state.ads:'',dsNow=data.ds?.[cat]||{},dsOld=p.old.ds?.[cat]||{},dsDiff=N(dsNow.actual)-N(dsOld.actual),x=pc(dsNow);if(sel){const curPs=(data.ps||[]).filter(x=>x.ads===sel),oldPs=(p.old.ps||[]).filter(x=>x.ads===sel),rows=deltas(curPs,oldPs,cat,'ps'),up=[...rows].sort((a,b)=>b.diff-a.diff),down=[...rows].sort((a,b)=>a.diff-b.diff),curAds=(data.ads||[]).find(x=>(x div><div class='empty'>${E(e.message)}<br><br>ให้ไป Admin → เลือกไฟล์ Tracking → อัปโหลด Performance JSON + ตั้งล่าสุด</div></section>`});})();</script></body></html>
