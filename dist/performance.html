<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="Cache-Control" content="no-store"><title>Performance Board</title><style>*{box-sizing:border-box}body{margin:0;background:#041431;color:#eef7ff;font-family:system-ui,-apple-system,'Segoe UI',Tahoma,sans-serif}.top{position:sticky;top:0;z-index:10;background:#061f4c;border-bottom:1px solid #1e68b8}.top>div{height:56px;max-width:1220px;margin:auto;display:flex;align-items:center;justify-content:space-between;padding:0 12px}.wrap{max-width:1220px;margin:auto;padding:12px}.top a,.nav a,.card,.row,.chip{color:#dff3ff;text-decoration:none}.nav,.chips{display:flex;gap:8px;overflow:auto;margin-bottom:12px}.nav a,.chip{background:#061c43;border:1px solid #2b83d9;border-radius:999px;padding:10px 13px;font-weight:900;white-space:nowrap}.nav .on,.chip.on{background:linear-gradient(135deg,#38bdf8,#2563eb);color:#fff}.panel{background:linear-gradient(180deg,#0b3b85,#072960);border:1px solid #1f7ad8;border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 16px 38px #0006}.title{font-size:25px;font-weight:950}.muted{color:#a8d2ff;font-size:12px;line-height:1.5}.kpis,.grid{display:grid;gap:8px}.kpis{grid-template-columns:repeat(6,1fr);margin-top:10px}.grid{grid-template-columns:repeat(4,1fr)}.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}.kpi,.card,.row{background:#061c43;border:1px solid #1d67b8;border-radius:14px;padding:10px}.kpi span,.card span{display:block;color:#93c5fd;font-size:11px;font-weight:900}.kpi b,.card b{display:block;font-size:21px;color:#fff;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.kpi small,.card small{display:block;color:#9fc9f4;font-size:10.5px}.meter{height:9px;background:#12396f;border-radius:99px;overflow:hidden;margin-top:8px}.fill{height:100%;background:linear-gradient(90deg,#ef4444,#f59e0b,#22c55e)}.rank{display:grid;gap:8px}.row{display:grid;grid-template-columns: ontroller(),t=setTimeout(()=>ac.abort(),ms);try{const r=await fetch(SB+'/storage/v1/object/'+B+'/'+p,{headers:{apikey:KEY,authorization:'Bearer '+KEY},cache:'no-store',signal:ac.signal}),txt=await r.text();if(!r.ok)throw Error(r.status+' '+txt);return JSON.parse(txt)}finally{clearTimeout(t)}}function nav(on=L){return'<div class="nav"><a class="'+(on==='ds'?'on':'')+'" href="'+U('ds')+'">DS</a><a class="'+(on==='ads'?'on':'')+'" href="'+U('ads')+'">ADS</a><a class="'+(['compare','compare-detail'].includes(on)?'on':'')+'" href="'+U('compare')+'">เทียบย้อนหลัง</a><a class="'+(on==='ms'?'on':'')+'" href="'+U('ms')+'">MS แยก</a></div>'}function meter(v){return'<div class="meter"><div class="fill" style="width:'+Math.max(0,Math.min(140,N(v)))+'%"></div></div>'}function kpis(r){const s=r.sales||{};return'<div class="kpis"><div class="kpi"><span>Target</span><b>'+M(s.target)+'</b><small>ยอดขาย</small></div><div class="kpi"><span>Actual</span><b>'+M(s.actual)+'</b><small>ยอดขาย</small></div><div class="kpi"><span>Index</span><b>'+P(s.index)+'</b><small>ตามชีท</small></div><div class="kpi"><span>GIV</span><b>'+M(r.giv?.actual)+'</b><small>'+P(r.giv?.index)+'</small></div><div class="kpi"><span>MOQ</span><b>'+M(r.moq?.actual)+'</b><small>'+P(r.moq?.index)+'</small></div><div class="kpi"><span>บิล</span><b>'+M(r.bills?.actual)+'</b><small>'+P(r.bills?.index)+'</small></div></div>'}function hero(t,sub,r){return'<section class="panel"><div class="title">'+E(t)+'</div><div class="muted">'+E(sub)+'</div>'+kpis(r)+'</section>'}function sum(rows,code){const r={code,name:code};Object.keys(C).forEach(k=>{let t=0,a=0,ix=0,c=0;rows.forEach(x=>{t+=N(x[k]?.target);a+=N(x[k]?.actual);ix+=N(x[k]?.index);c++});r[k]={target:t,actual:a,index:t?a/t*100:(c?ix/c:0)}});return r}function row(r,i,k,link){const v=r[k]||{};return'<a class="row" href="'+link+'"><div class="no">'+(i+1)+'</div><div><b>'+E(r.ps||r.code)+' · '+E(r.name||'')+'</b><span>Target '+M(v.target)+' / Actual '+M(v.actual)+'</span>'+meter(v.index)+'</div><div class="right">'+P(v.index)+'</div></a>'}function rank(rows,k,next){return'<div class="rank">'+rows.map((r,i)=>row(r,i,k,next==='ads'?U('ps',{ads:r.code||r.ads}):next==='ps'?U('person',{ads:r.ads,ps:r.ps}):'#')).join('')+'</div>'}function cats(rows,title,next='ps'){return'<section class="panel"><h3>'+E(title)+'</h3><div class="catgrid">'+Object.entries(C).map(([k,n])=>{const rr=[...rows].sort((a,b)=>N(b[k]?.index)-N(a[k]?.index)).slice(0,5);return'<div class="panel"><h3>'+E(n)+'</h3>'+rank(rr,k,next)+'</div>'}).join('')+'</div></section>'}function screenDs(d){const m=d.meta||{};app.innerHTML=nav('ds')+hero('DS ภาพรวม','ไฟล์ '+(m.reportKey||'')+' · WD '+(m.workdayNo||'-')+'/'+(m.totalWorkdays||'-'),d.ds)+'<section class="panel"><div class="grid"><a class="card" href="'+U('ads')+'"><b>ADS ทั้ง 4</b><span>ดู ADS → PS</span></a><a class="card" href="'+U('compare')+'"><b>เทียบย้อนหลัง</b><span>Flow เดียว DS → หมวด → ADS → PS</span></a></div></section>'+cats(d.ads||[],'จัดอันดับ ADS','ads')+cats(d.ps||[],'จัดอันดับ PS','ps')}function screenAds(d){app.innerHTML=nav('ads')+hero('ADS ทั้ง 4','จัดตาม Seller Report',sum(d.ps||[],'ADS'))+'<section class="panel"><h3>ADS Rank</h3>'+rank(d.ads||[],'sales','ads')+'</section>'+cats(d.ads||[],'จัดอันดับ ADS แต่ละหมวด','ads')}function screenPs(d){const rows=(d.ps||[]).filter(x=>x.ads===(AD||'AYAADS01'));app.innerHTML=nav('ads')+hero((AD||'AYAADS01')+' · PS','ข้อมูลเฉพาะ ADS นี้',sum(rows,AD||'AYAADS01'))+'<section class="panel"><h3>PS Rank</h3>'+rank(rows.sort((a,b)=>N(b.sales?.index)-N(a.sales?.index)),'sales','ps')+'</section>'+cats(rows,'จัดอันดับ PS แต่ละหมวด','ps')}function screenPerson(d){const p=(d.ps||[]).find(x=>x.ps===PS)||(d.ps||[])[0];app.innerHTML=nav('ads')+hero((p?.ps||'-')+' · '+(p?.name||''),'รายละเอียดตามชีท',p||{})+'<section class="panel"><h3>หมวดทั้งหมด</h3><div class="grid">'+Object.entries(C).map(([k,n])=>'<div class="card"><b>'+E(n)+'</b><span>Target '+M(p?.[k]?.target)+' / Actual '+M(p?.[k]?.actual)+'</span>'+meter(p?.[k]?.index)+'<small>'+P(p?.[k]?.index)+'</small></div>').join('')+'</div></section>'}async function oldPack(d){const hist=await jf('performance/history-index.json',8000),cur=d.meta||{},pick=hist.find(x=>x.path&&x.path!==cur.comparePath&&x.reportKey!==cur.reportKey);if(!pick)throw Error('ยังไม่มีไฟล์วันทำงานก่อนหน้าให้เทียบ');return{pick,old:await jf(pick.path,12000)}}function drow(r,i,link=''){const cls=r.diff>=0?'up':'dn',tag=link?'a':'div',href=link?' href="'+link+'"':'';return'<'+tag+' class="row"'+href+'><div class="no">'+(i+1)+'</div><div><b>'+E(r.ps||r.ads||r.code)+' · '+E(r.name||'')+'</b><span>ล่าสุด '+M(r.current)+' / ก่อนหน้า '+M(r.previous)+' / Index '+P(r.indexNow)+' ('+(r.indexDiff>=0?'+':'')+P(r.indexDiff).replace('%',' จุด')+')</span></div><div class="right '+cls+'">'+(r.diff>=0?'+':'')+M(r.diff)+'</div></'+tag+'>'}function by(a,k){const m=new Map();(a||[]).forEach(x=>m.set(x[k]||x.code,x));return m}function deltas(cur,old,k,id){const om=by(old,id);return(cur||[]).map(x=>{const o=om.get(x[id]||x.code)||{},cv=x[k]||{},ov=o[k]||{};return{...x,current:N(cv.actual),previous:N(ov.actual),diff:N(cv.actual)-N(ov.actual),indexNow:N(cv.index),indexOld:N(ov.index),indexDiff:N(cv.index)-N(ov.index)}})}function chipCat(cat,ad=''){return'<div class="chips">'+Object.entries(C).map(([k,n])=>'<a class="chip '+(k===cat?'on':'')+'" href="'+U('compare-detail',{cat:k,ads:ad})+'">'+E(n)+'</a>').join('')+'</div>'}function chipAds(list,cat,ad){return'<div class="chips">'+list.map(a=>'<a class="chip '+(a===ad?'on':'')+'" href="'+U('compare-detail',{cat,ads:a})+'">'+E(a)+'</a>').join('')+'</div>'}function dsDiffLink(cur,old,k,i){const a=N(cur[k]?.actual),b=N(old?.[k]?.actual),d=a-b,cls=d>=0?'up':'dn';return'<a class="row" href="'+U('compare-detail',{cat:k})+'"><div class="no">'+(i+1)+'</div><div><b>'+E(C[k])+'</b><span>ล่าสุด '+M(a)+' / ก่อนหน้า '+M(b)+' · กดเพื่อดู ADS/PS</span></div><div class="right '+cls+'">'+(d>=0?'+':'')+M(d)+'</div></a>'}async function screenCompare(d){app.innerHTML=nav('compare')+'<section class="panel"><div class="empty">กำลังโหลดข้อมูลย้อนหลัง...</div></section>';let p;try{p=await oldPack(d)}catch(e){app.innerHTML=nav('compare')+'<section class="panel"><div class="empty">'+E(e.message)+'</div></section>';return}app.innerHTML=nav('compare')+hero('เทียบย้อนหลัง','ล่าสุด '+(d.meta?.reportKey||'')+' เทียบกับ '+(p.pick.reportKey||'')+' · Flow เดียว: กดหมวด → เลือก ADS → ดู PS',d.ds)+'<section class="panel"><h3>DS Compare</h3><div class="rank">'+Object.keys(C).map((k,i)=>dsDiffLink(d.ds,p.old.ds||{},k,i)).join('')+'</div></section>'}async function screenCompareDetail(d){const cat=CAT in C?CAT:'sales';app.innerHTML=nav('compare-detail')+'<section class="panel"><div class="empty">กำลังโหลด Flow รายละเอียด...</div></section>';let p;try{p=await oldPack(d)}catch(e){app.innerHTML=nav('compare-detail')+'<section class="panel"><div class="empty">'+E(e.message)+'</div></section>';return}const old=p.old,adsRows=deltas(d.ads,old.ads,cat,'ads').sort((a,b)=>b.diff-a.diff),adsList=adsRows.map(x=>x.ads||x.code).filter(Boolean),sel=AD&&adsList.includes(AD)?AD:(adsList[0]||''),curPs=(d.ps||[]).filter(x=>x.ads===sel),oldPs=(old.ps||[]).filter(x=>x.ads===sel),psRows=deltas(curPs,oldPs,cat,'ps'),up=[...psRows].sort((a,b)=>b.diff-a.diff),down=[...psRows].sort((a,b)=>a.diff-b.diff),dsNow=d.ds?.[cat]||{},dsOld=old.ds?.[cat]||{},dsDiff=N(dsNow.actual)-N(dsOld.actual),curAds=(d.ads||[]).find(x=>(x.ads||x.code)===sel)||sum(curPs,sel),oldAds=(old.ads||[]).find(x=>(x.ads||x.code)===sel)||sum(oldPs,sel),aNow=curAds[cat]||{},aOld=oldAds[cat]||{},aDiff=N(aNow.actual)-N(aOld.actual);app.innerHTML=nav('compare-detail')+'<section class="panel"><a class="chip" href="'+U('compare')+'">← กลับ DS Compare</a><div class="title">Flow รายละเอียด: '+E(C[cat])+'</div><div class="muted">ล่าสุด '+E(d.meta?.reportKey||'')+' เทียบกับ '+E(p.pick.reportKey||'')+' · DS → ADS → PS ในหน้าเดียว ไม่ทับซ้อน</div>'+chipCat(cat,sel)+'<div class="kpis"><div class="kpi"><span>DS ล่าสุด</span><b>'+M(dsNow.actual)+'</b><small>'+E(C[cat])+'</small></div><div class="kpi"><span>DS ก่อนหน้า</span><b>'+M(dsOld.actual)+'</b><small>'+E(C[cat])+'</small></div><div class="kpi"><span>DS เพิ่ม/ลด</span><b class="'+(dsDiff>=0?'up':'dn')+'">'+(dsDiff>=0?'+':'')+M(dsDiff)+'</b><small>รวมทั้งหมด</small></div><div class="kpi"><span>Index ล่าสุด</span><b>'+P(dsNow.index)+'</b><small>ตามชีท</small></div><div class="kpi"><span>Index ก่อนหน้า</span><b>'+P(dsOld.index)+'</b><small>ตามชีท</small></div><div class="kpi"><span>Index ต่าง</span><b>'+((N(dsNow.index)-N(dsOld.index))>=0?'+':'')+P(N(dsNow.index)-N(dsOld.index))+'</b><small>จุด</small></div></div></section><section class="panel"><h3>1) ADS เปลี่ยนแปลง · กดเพื่อเลือกทีม</h3><div class="rank">'+adsRows.map((r,i)=>drow(r,i,U('compare-detail',{cat,ads:r.ads||r.code}))).join('')+'</div></section><section class="panel"><h3>2) ทีมที่เลือก: '+E(sel)+' · '+E(C[cat])+'</h3>'+chipAds(adsList,cat,sel)+'<div class="kpis"><div class="kpi"><span>ADS ล่าสุด</span><b>'+M(aNow.actual)+'</b><small>'+E(sel)+'</small></div><div class="kpi"><span>ADS ก่อนหน้า</span><b>'+M(aOld.actual)+'</b><small>'+E(sel)+'</small></div><div class="kpi"><span>ADS เพิ่ม/ลด</span><b class="'+(aDiff>=0?'up':'dn')+'">'+(aDiff>=0?'+':'')+M(aDiff)+'</b><small>รวมทีม</small></div><div class="kpi"><span>Index ล่าสุด</span><b>'+P(aNow.index)+'</b><small>ADS</small></div><div class="kpi"><span>Index ก่อนหน้า</span><b>'+P(aOld.index)+'</b><small>ADS</small></div><div class="kpi"><span>จำนวน PS</span><b>'+psRows.length+'</b><small>ในทีม</small></div></div></section><div class="two"><section class="panel"><h3>3) PS ดีขึ้นใน '+E(sel)+'</h3><div class="rank">'+up.map((r,i)=>drow(r,i)).join('')+'</div></section><section class="panel"><h3>4) PS ตกลงใน '+E(sel)+'</h3><div class="rank">'+down.map((r,i)=>drow(r,i)).join('')+'</div></section></div>'}async function load(){return await jf('performance/current.min.json',5000)}load().then(d=>{if(L==='ads')screenAds(d);else if(L==='ps')screenPs(d);else if(L==='person')screenPerson(d);else if(L==='compare')screenCompare(d);else if(L==='compare-detail')screenCompareDetail(d);else if(L==='ms')app.innerHTML=nav('ms')+'<section class="panel"><div class="title">MS แยกโหมด</div><div class="empty">MS ไม่รวม DS/ADS/PS</div></section>';else screenDs(d)}).catch(e=>{app.innerHTML=nav()+'<section class="panel"><div class="title">ยังไม่พบข้อมูลแบบเร็ว</div><div class="empty">'+E(e.message)+'<br><br>ให้ไป Admin → เลือกไฟล์ Tracking → อัปโหลด Performance JSON + ตั้งล่าสุด</div></section>'});})();</script></body></html>
