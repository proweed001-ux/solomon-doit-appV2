function render(data,sourceMode){const q=new URLSearchParams(location.search),adsCode=q.get('ads')||'',psCode=q.get('ps')||'';const psAll=(data.ps||[]).map(withIndex),filtered=psAll.filter(r=>(!adsCode||r.adsCode===adsCode)&&(!psCode||r.psCode===psCode));const summary=psCode&&filtered[0]?filtered[0]:sumRows(filtered.length?filtered:psAll);const st=statusFor(summary.index),deg=Math.min(360,summary.index/100*360);const rankRows=psAll.filter(r=>!adsCode||r.adsCode===adsCode).sort((a,b)=>b.index-a.index);const bottomRows=psAll.filter(r=>!adsCode||r.adsCode===adsCode).sort((a,b)=>a.index-b.index);const all=psAll,over=all.filter(r=>r.index>=100),below80=all.filter(r=>r.index<80).length,worst=(data.ads||[]).map(withIndex).sort((a,b)=>a.index-b.index)[0]||{};const adsAll=(data.ads&&data.ads.length?data.ads:[]).map(withIndex),adsShown=adsAll.filter(a=>!adsCode||a.adsCode===adsCode);const gap=N(summary.actual)-N(summary.target);const ms=msRows(data).sort((a,b)=>N(b.sbdCompliance)-N(a.sbdCompliance));const msTotal=ms.reduce((s,r)=>{s.store+=N(r.storeCount);s.target+=N(r.sbdTargetSku);s.actual+=N(r.sbdActualSku);s.amount+=N(r.sbdAmount);s.npAmt+=N(r.newProduct?.totalAmount);s.npCnt+=N(r.newProduct?.totalCount);return s},{store:0,target:0,actual:0,amount:0,npAmt:0,npCnt:0});const msComp=msTotal.target?msTotal.actual/msTotal.target*100:0;const adsOpts=adsAll.map(a=>`<option value="${esc(a.adsCode)}" ${a.adsCode===adsCode?'selected':''}>${esc(a.adsCode)}</option>`).join('');const psOpts=(data.ps||[]).filter(p=>!adsCode||p.adsCode===adsCode).map(p=>`<option value="${esc(p.psCode)}" ${p.psCode===psCode?'selected':''}>${esc(p.psCode)}</option>`).join('');const seller=sellerRecord(data,psCode);const fields=Array.isArray(data.sellerReportFields)?data.sellerReportFields:Object.keys(seller||{});const sellerSection=seller?`<div class="muted">PS ที่เลือก: ${esc(psCode)} · แสดง Seller Report ${fields.length} หัวข้อ</div><div class="sellerFullList" style="margin-top:10px">${fields.map(f=>`<div class="sellerFullItem"><b>${esc(f)}</b><span>${esc(seller[f]??'')}</span></div>`).join('')}</div>`:`<div class="muted">เลือก PS แล้วกด “ดูผลงาน” หรือแตะรายชื่อ PS เพื่อเปิด Seller Report</div><div class="rankList" style="margin-top:10px">${sellerPreviewRows(data).map((r,i)=>`<div class="rankItem" data-ads="${esc(r.adsCode)}" data-ps="${esc(r.psCode)}"><div class="rankNo">${i+1}</div><div class="rankName"><b>${esc(r.psCode)} · ${esc(r.psName)}</b><span>${esc(r.adsCode)} · มีข้อมูล ${fields.length} หัวข้อ</span></div><div class="rankPct">ดู</div></div>`).join('')}</div>`;
$('#app').innerHTML=`<div class="mobileNote panel muted">มือถือ: แสดงเป็น Dashboard แบบ compact ไม่ใช่ report ยาว</div><section class="board" id="dash"><div class="panel"><div class="bigTitle">${esc(psCode||adsCode||'รวมผลงานทั้งหมด')}</div><div class="muted">${esc(sourceMode)} · อัปเดต ${esc(data.updatedAtText||data.updatedAt||'-')}</div><div class="miniGrid" style="margin-top:10px">${mini('เป้าหมาย',money(summary.target),'ยอดขาย')}${mini('ทำแล้ว',money(summary.actual),'DOIT')}${mini('Index',pct(summary.index),gap>=0?'เกิน '+money(gap):'ขาด '+money(Math.abs(gap)))}${mini('DGP',money(summary.dgp),'ทำแล้ว')}${mini('บิลซื้อ',money(summary.bills),'ทำแล้ว')}${mini('PS < 80%',below80+' คน','จาก '+all.length+' PS')}</div><div class="targetPair"><div class="pairBox"><span>เป้าหมาย</span><strong>${money(summary.target)}</strong></div><div class="pairBox"><span>ทำแล้ว</span><strong>${money(summary.actual)}</strong></div></div>${progress(summary.actual,summary.target)}<span class="pill ${st.cls}" style="margin-top:9px">${esc(st.text)}</span></div><div class="panel" id="chart"><h3>Sales Trend by ADS</h3><div class="chartWrap"><div class="chartTitle">ทำแล้ว vs เป้าหมาย</div><div class="chartLegend"><span><i class="dot"></i>ทำแล้ว</span><span><i class="dot target"></i>เป้าหมาย</span></div>${chart(adsShown.length?adsShown:adsAll)}</div><div class="hint">แตะจุดหรือชื่อ ADS ในกราฟเพื่อกรอง ADS</div></div><div class="panel controlsPanel"><div class="gaugeBox"><div class="gauge" style="--deg:${deg}deg;--gauge:${st.color}"><div class="gaugeInner"><strong>${pct(summary.index)}</strong><span>INDEX</span></div></div></div><div class="controls" style="margin-top:10px"><div class="field"><label>เลือก ADS</label><select id="adsSel"><option value="">รวมทุก ADS</option>${adsOpts}</select></div><div class="field"><label>เลือก PS</label><select id="psSel"><option value="">รวมทุก PS</option>${psOpts}</select></div><button class="btn" id="applyBtn">ดูผลงาน</button><button class="btn ghost" id="resetBtn">ล้างตัวกรอง</button></div></div></section><section class="section compactGrid"><div class="panel"><h3>Action Alerts</h3><div class="alerts"><div class="alert ${worst.index<80?'bad':'warn'}" data-ads="${esc(worst.adsCode||'')}">ADS ต่ำสุด: ${esc(worst.adsCode||'-')} · ${pct(worst.index||0)}</div><div class="alert ${below80?'bad':''}">PS ต่ำกว่า 80% ${below80} คน</div><div class="alert warn">MS SBD รวม ${pct(msComp)}</div></div></div><div class="panel"><h3>MS Snapshot</h3><div class="miniGrid">${mini('SBD เป้า',money(msTotal.target),'SKU')}${mini('SBD ทำแล้ว',money(msTotal.actual),'SKU')}${mini('SBD %',pct(msComp),'Compliance')}${mini('Store',money(msTotal.store),'ร้าน')}${mini('New Product',money(msTotal.npCnt),'ชิ้น')}${mini('NP Amount',money(msTotal.npAmt),'บาท')}</div>${progress(msTotal.actual,msTotal.target)}</div></section><section class="section panel" id="ads"><h3>ADS Performance Board</h3><div class="adsGrid">${adsMini(adsShown)}</div></section><section class="section compactGrid"><div class="panel" id="rank"><h3>Top PS</h3><div class="rankList">${psRank(rankRows,8)}</div></div><div class="panel"><h3>ต้องเร่งก่อน</h3><div class="rankList">${psRank(bottomRows,8)}</div></div></section><section class="section panel" id="ms"><h3>MS / MAS SBD</h3><div class="rankList">${ms.slice(0,12).map((r,i)=>`<div class="rankItem"><div class="rankNo">${i+1}</div><div class="rankName"><b>${esc(r.msCode)} · ${esc(r.msName||'')}</b><span>เป้า SBD ${money(r.sbdTargetSku)} / ทำแล้ว ${money(r.sbdActualSku)} · Store ${money(r.storeCount)} · New ${money(r.newProduct?.totalCount)}</span><div class="meter"><div class="fill" style="width:${Math.min(100,N(r.sbdCompliance))}%"></div></div></div><div class="rankPct ${clsByIndex(N(r.sbdCompliance))}">${pct(r.sbdCompliance||0)}</div></div>`).join('')||'<div class="muted">ไม่มีข้อมูล MS</div>'}</div></section><section class="section panel" id="seller"><h3>Seller Report Detail</h3>${sellerSection}</section>`;
$('#adsSel').onchange=()=>{const a=$('#adsSel').value;go(a,'','dash')};$('#psSel').onchange=()=>{const a=$('#adsSel').value,p=$('#psSel').value;if(p)go(a,p,'seller')};$('#applyBtn').onclick=()=>{const a=$('#adsSel').value,p=$('#psSel').value;go(a,p,p?'seller':'dash')};$('#resetBtn').onclick=()=>go('','','dash');bindAfterRender();}
(async()=>{try{const {data,sourceMode}=await loadData();render(data,sourceMode)}catch(e){$('#app').innerHTML=`<section class="panel err"><b>โหลด Dashboard ไม่สำเร็จ</b><div class="muted">${esc(e.message||e)}</div></section>`}})();
})();
</script>
</body>
</html>
