(()=>{'use strict';

function idx(r){return N(r.target)?N(r.actual)/N(r.target)*100:0}function addIdx(r){return{...r,index:idx(r)}}function cls(v){return v>=100?'good':v>=80?'warn':'bad'}function status(v){return v>=100?'เกินเป้า':v>=80?'ใกล้เป้า':'ต้องเร่ง'}function sum(rows){return addIdx(rows.reduce((s,r)=>{s.target+=N(r.target);s.actual+=N(r.actual);s.dgp+=N(r.dgp);s.bills+=N(r.bills);return s},{target:0,actual:0,dgp:0,bills:0}))}
function field(o,terms,exclude=[]){const keys=Object.keys(o||{}),ts=terms.map(norm),xs=exclude.map(norm);const k=keys.find(key=>ts.every(t=>norm(key).includes(t))&&!xs.some(x=>norm(key).includes(x)));return k?{key:k,value:o[k]}:null}function smartPct(v){const n=N(v);return pct(Math.abs(n)<=2?n*100:n)}
function sellerRecord(data,ps){const rows=Array.isArray(data.sellerReportRows)?data.sellerReportRows:[];return rows.find(r=>r.psCode===ps)?.sellerReport || data.ps.find(p=>p.psCode===ps)?.sellerReport || null}
function msRows(data){const ms=Array.isArray(data.ms)?data.ms:[];if(ms.length)return ms;const m=new Map();(data.msSbd||[]).forEach(r=>m.set(r.msCode,{...r,msName:r.msCode}));(data.msNewProduct||[]).forEach(r=>m.set(r.msCode,{...(m.get(r.msCode)||{msCode:r.msCode,msName:r.msCode}),newProduct:r}));return[...m.values()]}

function render(data,source){const q=new URLSearchParams(location.search),adsCode=q.get('ads')||'',psCode=q.get('ps')||'',psAll=(data.ps||[]).map(addIdx),adsAll=(data.ads||[]).map(addIdx);const psFiltered=psAll.filter(r=>(!adsCode||r.adsCode===adsCode)&&(!psCode||r.psCode===psCode));const summary=psCode&&psFiltered[0]?psFiltered[0]:sum(psFiltered.length?psFiltered:psAll);const i=idx(summary),gap=N(summary.actual)-N(summary.target),rank=psAll.filter(r=>!adsCode||r.adsCode===adsCode).sort((a,b)=>b.index-a.index),bottom=[...rank].sort((a,b)=>a.index-b.index);const worst=[...adsAll].sort((a,b)=>a.index-b.index)[0]||{},below=psAll.filter(r=>r.index<80).length,over=psAll.filter(r=>r.index>=100).length;const adsShown=adsAll.filter(a=>!adsCode||a.adsCode===adsCode);const ms=msRows(data),msTotal=ms.reduce((s,r)=>{s.target+=N(r.sbdTargetSku);s.actual+=N(r.sbdActualSku);s.store+=N(r.storeCount);s.np+=N(r.newProduct?.totalCount);return s},{target:0,actual:0,store:0,np:0}),msPct=msTotal.target?msTotal.actual/msTotal.target*100:0;const adsOpts=adsAll.map(a=>`<option value="${esc(a.adsCode)}" ${a.adsCode===adsCode?'selected':''}>${esc(a.adsCode)}</option>`).join('');const psOpts=psAll.filter(p=>!adsCode||p.adsCode===adsCode).map(p=>`<option value="${esc(p.psCode)}" ${p.psCode===psCode?'selected':''}>${esc(p.psCode)}</option>`).join('');const seller=sellerRecord(data,psCode);const fields=Array.isArray(data.sellerReportFields)?data.sellerReportFields:Object.keys(seller||{});const sellerHtml=seller?`<div class="sellerHeader"><div><div class="sellerCode">${esc(psCode)}</div><div class="muted">จัดเป็นหมวด อ่านง่ายขึ้น · ข้อมูลดิบยังอยู่ครบ</div></div><span class="status ${cls(i)}">${status(i)}</span></div><div class="tabs"><button class="tab on" data-tab="sSales">ยอดขาย</button><button class="tab" data-tab="sBills">บิล/บรรทัด</button><button class="tab" data-tab="sCd">CD</button><button class="tab" data-tab="sQuality">SBD/Point</button><button class="tab" data-tab="sMetric">คะแนน</button><button class="tab" data-tab="sRaw">ข้อมูลดิบ</button></div><div id="sSales" class="sellerSection on"><div class="pairGrid">${salesPairs(seller)}</div></div><div id="sBills" class="sellerSection"><div class="pairGrid">${billPairs(seller)}</div></div><div id="sCd" class="sellerSection"><div class="pairGrid">${cdPairs(seller)}</div></div><div id="sQuality" class="sellerSection"><div class="pairGrid">${qualityPairs(seller)}</div></div><div id="sMetric" class="sellerSection"><div class="metricGrid">${metrics(seller)}</div></div><div id="sRaw" class="sellerSection">${raw(seller,fields)}</div>`:`<div class="empty">เลือก PS จากรายการ หรือ dropdown เพื่อดู Seller Report แบบจัดหมวด</div>`;
$('#app').innerHTML=`<section class="card"><div class="controls"><div class="field"><label>ADS</label><select id="adsSel"><option value="">รวมทุก ADS</option>${adsOpts}</select></div><div class="field"><label>PS</label><select id="psSel"><option value="">รวมทุก PS</option>${psOpts}</select></div><button class="btn ghost" id="resetBtn">ล้าง</button></div></section><section class="card hero"><div class="heroTop"><div><div class="name">${esc(psCode||adsCode||'รวมผลงานทั้งหมด')}</div><div class="muted" style="color:#dbeafe">${esc(source)} · อัปเดต ${esc(data.updatedAtText||data.updatedAt||'-')}</div></div><span class="status ${cls(i)}">${status(i)}</span></div><div class="kpiGrid">${kpi('เป้าหมาย',money(summary.target),'ยอดขาย')}${kpi('ทำแล้ว',money(summary.actual),'DOIT')}${kpi('Index',pct(i),gap>=0?'เกิน '+money(gap):'ขาด '+money(Math.abs(gap)))}${kpi('DGP',money(summary.dgp),'ทำแล้ว')}${kpi('บิลซื้อ',money(summary.bills),'ทำแล้ว')}${kpi('PS ต่ำกว่า 80%',below+' คน','จาก '+psAll.length)}${kpi('PS เกินเป้า',over+' คน','100%+')}${kpi('MS SBD',pct(msPct),'ทำแล้ว '+money(msTotal.actual))}</div>${bar(summary.actual,summary.target)}</section><section class="quickGrid"><div class="quick ${worst.index<80?'bad':'warn'}" data-ads="${esc(worst.adsCode||'')}"><b>ADS ต่ำสุด: ${esc(worst.adsCode||'-')}</b><span>${pct(worst.index||0)} · แตะเพื่อดูทีมนี้</span></div><div class="quick ${below?'bad':'good'}"><b>ต้องเร่ง: ${below} PS</b><span>ต่ำกว่า 80%</span></div></section><section class="card" id="ads"><h3>ADS Board</h3><div class="adsGrid">${adsCards(adsShown)}</div></section><section class="twoGrid"><div class="card"><h3>Top PS</h3><div class="rowList">${psRows(rank,8)}</div></div><div class="card"><h3>ต้องเร่งก่อน</h3><div class="rowList">${psRows(bottom,8)}</div></div></section><section class="card"><h3>MS Snapshot</h3><div class="metricGrid">${mini('SBD เป้า',money(msTotal.target),'SKU')}${mini('SBD ทำแล้ว',money(msTotal.actual),'SKU')}${mini('SBD %',pct(msPct),'Compliance')}${mini('Store',money(msTotal.store),'ร้าน')}${mini('New Product',money(msTotal.np),'ชิ้น')}</div>${bar(msTotal.actual,msTotal.target)}</section><section class="card" id="seller"><h3>Seller Report Detail</h3>${sellerHtml}</section>`;
$('#adsSel').onchange=()=>go($('#adsSel').value,'','ads');$('#psSel').onchange=()=>{const p=$('#psSel').value;if(p)go($('#adsSel').value,p,'seller')};$('#resetBtn').onclick=()=>go('','','');bind();}
(async()=>{try{const {data,sourceMode}=await loadData();render(data,sourceMode)}catch(e){$('#app').innerHTML=`<section class="card"><b>โหลดข้อมูลไม่สำเร็จ</b><div class="muted">${esc(e.message||e)}</div></section>`}})();
})();
</script>
</body>
</html>
