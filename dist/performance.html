<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="Cache-Control" content="no-store"><title>Performance Board</title><style>*{box-sizing:border-box}body{margin:0;background:#041431;color:#eef7ff;font-family:system-ui,-apple-system,'Segoe UI',Tahoma,sans-serif}.top{position:sticky;top:0;z-index:10;background:#061f4c;border-bottom:1px solid #1e68b8}.top>div{height:56px;max-width:1220px;margin:auto;display:flex;align-items:center;justify-content:space-between;padding:0 12px}.wrap{max-width:1220px;margin:auto;padding:12px}button{font:inherit}.top a,.card{color:#dff3ff;text-decoration:none}.nav,.chips{display:flex;gap:8px;overflow:auto;margin-bottom:12px}.nav button,.chip{background:#061c43;border:1px solid #2b83d9;border-radius:999px;padding:10px 13px;font-weight:900;white-space:nowrap;color:#dff3ff}.nav .on,.chip.on{background:linear-gradient(135deg,#38bdf8,#2563eb);color:#fff}.panel{background:linear-gradient(180deg,#0b3b85,#072960);border:1px solid #1f7ad8;border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 16px 38px #0006}.title{font-size:25px;font-weight:950}.muted{color:#a8d2ff;font-size:12px;line-height:1.5}.kpis,.grid,.catgrid{display:grid;gap:8px}.kpis{grid-template-columns:repeat(6,1fr);margin-top:10px}.grid{grid-template-columns:repeat(4,1fr)}.catgrid{grid-template-columns:repeat(2,1fr)}.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}.kpi,.card,.row{background:#061c43;border:1px solid #1d67b8;border-radius:14px;padding:10px}.kpi span,.card span{display:block;color:#93c5fd;font-size:11px;font-weight:900}.kpi b,.card b{display:block;font-size:21px;color:#fff;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.kpi small,.card small{display:block;color:#9fc9f4;font-size:10.5px}.meter{height:9px;background:#12396f;border-radius:99px;overflow:hidden;margin-top:8px}.fill{height:100%;background:linear-gradient(90deg,#ef4444,#f59e0b,#22c55e)}.rank{display:grid;gap:8px}.row{width:100%;display:grid;grid-template-columns:30px 1fr auto;gap:8px;align-items:center;text-align:left;color:#dff3ff}.row:hover,.card:hover,.chip:hover{outline:2px solid #38bdf8}.no{width:28px;height:28px;border-radius:50%;background:#0d74df;display:grid;place-items:center;font-weight:950}.row b{display:block;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.row span{display:block;font-size:11px;color:#9fc9f4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.right{font-weight:950;text-align:right;min-width:64px}.empty{border:1px dashed #2b83d9;border-radius:14px;background:#061c43;color:#a8d2ff;padding:14px}.up{color:#86efac}.dn{color:#fca5a5}.fade{animation:f .16s ease-out}@keyframes f{from{opacity:.55;transform:translateY(3px)}to{opacity:1;transform:none}}@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}.grid,.catgrid,.two{grid-template-columns:1fr}.wrap{padding:8px}.title{font-size:22px}}</style></head><body><header class="top"><div><a href="/pro.html?t=1028">← Pro</a><b>Performance Board</b><span></span></div></header><main class="wrap" id="app"><section class="panel"><div class="empty">กำลังโหลดข้อมูล...</div></section></main><script>(()=>{'use strict';const app=document.getElementById('app'),SB='https://saodmeoilixfdqentofp.supabase.co',KEY='sb_publishable_JThYwAl_-askk_cIaCd75w_TCWK2BTT',B='doit-files',STORE='perf-current-spa-v1';const C={sales:'ยอดขาย',giv:'ยอด GIV',moq:'MOQ',dc1:'DC1 / CD1',dc2:'DC2 / CD2',dc3:'DC3 / CD3',cd13:'CD1+CD3',bills:'บิลซื้อ',gps:'GPS',dgp:'Golden Point'};let data=null,oldCache=null,state=stateFromUrl();const N=x=>+x||0,M=x=>N(x).toLocaleString('th-TH',{maximumFractionDigits:0}),P=x=>N(x).toLocaleString('th-TH',{maximumFractionDigits:1,minimumFractionDigits:1})+'%',E=x=>String(x??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');function stateFromUrl(){const q=new URLSearchParams(location.search),lv=q.get('level')||'',md=q.get('mode')||({compare:'compare','compare-detail':'compare',ads:'ads',ps:'ps',person:'person',ms:'ms',ds:'ds'}[lv]||'ds');return{mode:md,cat:q.get('cat')||'',ads:q.get('ads')||'',ps:q.get('ps')||''}}function go(s,push=true){state={mode:s.mode||state.mode||'ds',cat:s.cat??'',ads:s.ads??'',ps:s.ps??''};if(push){const q=new URLSearchParams();q.set('mode',state.mode);if(state.cat)q.set('cat',state.cat);if(state.ads)q.set('ads',state.ads);if(state.ps)q.set('ps',state.ps);history.pushState(state,'',location.pathname+'?'+q.toString())}render()}window.onpopstate=()=>{state=stateFromUrl();render()};document.addEventListener('click',e=>{const b=e.target.closest('[data-mode]');if(!b)return;e.preventDefault();go({mode:b.dataset.mode,cat:b.dataset.cat||'',ads:b.dataset.ads||'',ps:b.dataset.ps||''})});function btn(txt,s,cls='chip'){const on=(state.mode===s.mode&&(s.cat===undefined||state.cat===s.cat)&&(s.ads===undefined||state.ads===s.ads));return'<button class="'+cls+(on?' on':'')+'" data-mode="'+E(s.mode)+'" data-cat="'+E(s.cat||'')+'" data-ads="'+E(s.ads||'')+'" data-ps="'+E(s.ps||'')+'">'+E(txt)+'</button>'}function nav(){return'<div class="nav">'+btn('DS',{mode:'ds'})+btn('ADS',{mode:'ads'})+btn('เทียบย้อนหลัง',{mode:'compare'})+btn('MS แยก',{mode:'ms'})+'</div>'}async function jf(p,ms=8000){const ac=new AbortController(),t=setTimeout(()=>ac.abort(),ms);try{const r=await fetch(SB+'/storage/v1/object/'+B+'/'+p,{headers:{apikey:KEY,authorization:'Bearer '+KEY},cache:'no-store',signal:ac.signal}),txt=await r.text();if(!r.ok)throw Error(r.status+' '+txt);return JSON.parse(txt)}finally{clearTimeout(t)}}async function load(){try{const c=sessionStorage.getItem(STORE);if(c){data=JSON.parse(c);render()}}catch{}data=await jf('performance/current.min.json',5000);sessionStorage.setItem(STORE,JSON.stringify(data));render()}async function oldPack(){if(oldCache)return oldCache;const key='perf-old-'+(data?.meta?.reportKey||'');try{const c=sessionStorage.getItem(key);if(c){oldCache=JSON.parse(c);return oldCache}}catch{}const hist=await jf('performance/history-index.json',8000),cur=data.meta||{},pick=hist.find(x=>x.path&&x.path!==cur.comparePath&&x.reportKey!==cur.reportKey);if(!pick)throw Error('ยังไม่มีไฟล์วันทำงานก่อนหน้าให้เทียบ');oldCache={pick,old:await jf(pick.path,12000)};try{sessionStorage.setItem(key,JSON.stringify(oldCache))}catch{}return oldCache}function meter(v){return'<div class="meter"><div class="fill" style="width:'+Math.max(0,Math.min(140,N(v)))+'%"></div></div>'}function kpis(r){const s=r?.sales||{};return'<div class="kpis"><div class="kpi"><span>Target</span><b>'+M(s.target)+'</b><small>ยอดขาย</small></div><div class="kpi"><span>Actual</span><b>'+M(s.actual)+'</b><small>ยอดขาย</small></div><div class="kpi"><span>Index</span><b>'+P(s.index)+'</b><small>ตามชีท</small></div><div class="kpi"><span>GIV</span><b>'+M(r?.giv?.actual)+'</b><small>'+P(r?.giv?.index)+'</small></div><div class="kpi"><span>MOQ</span><b>'+M(r?.moq?.actual)+'</b><small>'+P(r?.moq?.index)+'</small></div><div class="kpi"><span>บิล</span><b>'+M(r?.bills?.actual)+'</b><small>'+P(r?.bills?.index)+'</small></div></div>'}function hero(t,sub,r){return'<section class="panel"><div class="title">'+E(t)+'</div><div class="muted">'+E(sub)+'</div>'+kpis(r||{})+'</section>'}function sum(rows,code){const r={code,name:code};Object.keys(C).forEach(k=>{let t=0,a=0,ix=0,c=0;(rows||[]).forEach(x=>{t+=N(x[k]?.target);a+=N(x[k]?.actual);ix+=N(x[k]?.index);c++});r[k]={target:t,actual:a,index:t?a/t*100:(c?ix/c:0)}});return r}function normalRow(r,i,k,s){const v=r[k]||{};return'<button class="row" data-mode="'+E(s.mode)+'" data-cat="'+E(s.cat||'')+'" data-ads="'+E(s.ads||'')+'" data-ps="'+E(s.ps||'')+'"><div class="no">'+(i+1)+'</div><div><b>'+E(r.ps||r.code)+' · '+E(r.name||'')+'</b><span>Target '+M(v.target)+' / Actual '+M(v.actual)+'</span>'+meter(v.index)+'</div><div class="right">'+P(v.index)+'</div></button>'}function rank(rows,k,next){return'<div class="rank">'+(rows||[]).map((r,i)=>normalRow(r,i,k,next==='ads'?{mode:'ps',ads:r.code||r.ads}:next==='ps'?{mode:'person',ads:r.ads,ps:r.ps}:{mode:'ds'})).join('')+'</div>'}function cats(rows,title,next){return'<section class="panel"><h3>'+E(title)+'</h3><div class="catgrid">'+Object.entries(C).map(([k,n])=>{const rr=[...(rows||[])].sort((a,b)=>N(b[k]?.index)-N(a[k]?.index)).slice(0,5);return'<div class="panel"><h3>'+E(n)+'</h3>'+rank(rr,k,next)+'</div>'}).join('')+'</div></section>'}function screenDs(){const m=data.meta||{};return nav()+hero('DS ภาพรวม','ไฟล์ '+(m.reportKey||'')+' · WD '+(m.workdayNo||'-')+'/'+(m.totalWorkdays||'-'),data.ds)+'<section class="panel"><div class="grid">'+btn('ดู ADS ทั้ง 4',{mode:'ads'},'chip')+btn('เทียบย้อนหลัง',{mode:'compare'},'chip')+'</div></section>'+cats(data.ads,'จัดอันดับ ADS','ads')+cats(data.ps,'จัดอันดับ PS','ps')}function screenAds(){return nav()+hero('ADS ทั้ง 4','จัดตาม Seller Report',sum(data.ps,'ADS'))+'<section class="panel"><h3>ADS Rank</h3>'+rank(data.ads,'sales','ads')+'</section>'+cats(data.ads,'จัดอันดับ ADS','ads')}function screenPs(){const rows=(data.ps||[]).filter(x=>x.ads===(state.ads||'AYAADS01'));return nav()+hero((state.ads||'AYAADS01')+' · PS','ข้อมูลเฉพาะ ADS นี้',sum(rows,state.ads||'AYAADS01'))+'<section class="panel"><h3>PS Rank</h3>'+rank(rows.sort((a,b)=>N(b.sales?.index)-N(a.sales?.index)),'sales','ps')+'</section>'+cats(rows,'จัดอันดับ PS','ps')}function screenPerson(){const p=(data.ps||[]).find(x=>x.ps===state.ps)||(data.ps||[])[0];return nav()+hero((p?.ps||'-')+' · '+(p?.name||''),'รายละเอียดตามชีท',p)+'<section class="panel"><h3>หมวดทั้งหมด</h3><div class="grid">'+Object.entries(C).map(([k,n])=>'<div class="card"><b>'+E(n)+'</b><span>Target '+M(p?.[k]?.target)+' / Actual '+M(p?.[k]?.actual)+'</span>'+meter(p?.[k]?.index)+'<small>'+P(p?.[k]?.index)+'</small></div>').join('')+'</div></section>'}function diffButton(cur,old,k,i){const a=N(cur[k]?.actual),b=N(old?.[k]?.actual),d=a-b,cls=d>=0?'up':'dn';return'<button class="row" data-mode="compare" data-cat="'+E(k)+'"><div class="no">'+(i+1)+'</div><div><b>'+E(C[k])+'</b><span>ล่าสุด '+M(a)+' / ก่อนหน้า '+M(b)+' · กดเพื่อดู ADS/PS</span></div><div class="right '+cls+'">'+(d>=0?'+':'')+M(d)+'</div></button>'}function by(a,k){const m=new Map();(a||[]).forEach(x=>m.set(x[k]||x.code,x));return m}function deltas(cur,old,k,id){const om=by(old,id);return(cur||[]).map(x=>{const o=om.get(x[id]||x.code)||{},cv=x[k]||{},ov=o[k]||{};return{...x,current:N(cv.actual),previous:N(ov.actual),diff:N(cv.actual)-N(ov.actual),indexNow:N(cv.index),indexOld:N(ov.index),indexDiff:N(cv.index)-N(ov.index)}})}function drow(r,i,s={}){const cls=r.diff>=0?'up':'dn';return'<button class="row" data-mode="'+E(s.mode||'compare')+'" data-cat="'+E(s.cat||'')+'" data-ads="'+E(s.ads||'')+'"><div class="no">'+(i+1)+'</div><div><b>'+E(r.ps||r.ads||r.code)+' · '+E(r.name||'')+'</b><span>ล่าสุด '+M(r.current)+' / ก่อนหน้า '+M(r.previous)+' / Index '+P(r.indexNow)+' ('+(r.indexDiff>=0?'+':'')+P(r.indexDiff).replace('%',' จุด')+')</span></div><div class="right '+cls+'">'+(r.diff>=0?'+':'')+M(r.diff)+'</div></button>'}function chipCat(cat,ad){return'<div class="chips">'+Object.entries(C).map(([k,n])=>btn(n,{mode:'compare',cat:k,ads:ad||''},'chip')).join('')+'</div>'}function chipAds(list,cat,ad){return'<div class="chips">'+(list||[]).map(a=>btn(a,{mode:'compare',cat,ads:a},'chip')).join('')+'</div>'}async function screenCompareAsync(){let p;try{p=await oldPack()}catch(e){app.innerHTML=nav()+'<section class="panel"><div class="empty">'+E(e.message)+'</div></section>';return}const cat=state.cat in C?state.cat:'';if(!cat){app.innerHTML=nav()+hero('เทียบย้อนหลัง','ล่าสุด '+(data.meta?.reportKey||'')+' เทียบกับ '+(p.pick.reportKey||'')+' · กดหมวดเดียว แล้วไหลต่อในหน้าเดียว',data.ds)+'<section class="panel"><h3>DS Compare</h3><div class="rank">'+Object.keys(C).map((k,i)=>diffButton(data.ds,p.old.ds||{},k,i)).join('')+'</div></section>';return}const adsRows=deltas(data.ads,p.old.ads,cat,'ads').sort((a,b)=>b.diff-a.diff),adsList=adsRows.map(x=>x.ads||x.code).filter(Boolean),sel=state.ads&&adsList.includes(state.ads)?state.ads:'',dsNow=data.ds?.[cat]||{},dsOld=p.old.ds?.[cat]||{},dsDiff=N(dsNow.actual)-N(dsOld.actual),allPs=deltas(data.ps,p.old.ps,cat,'ps'),allUp=[...allPs].sort((a,b)=>b.diff-a.diff).slice(0,12),allDown=[...allPs].sort((a,b)=>a.diff-b.diff).slice(0,12);let html=nav()+'<section class="panel fade"><button class="chip" data-mode="compare">← กลับ DS Compare</button><div class="title">Flow เดียว: '+E(C[cat])+'</div><div class="muted">ล่าสุด '+E(data.meta?.reportKey||'')+' เทียบกับ '+E(p.pick.reportKey||'')+' · ไม่โหลดหน้าใหม่ ไม่เปิดชั้นซ้อน</div>'+chipCat(cat,sel)+'<div class="kpis"><div class="kpi"><span>DS ล่าสุด</span><b>'+M(dsNow.actual)+'</b><small>'+E(C[cat])+'</small></div><div class="kpi"><span>DS ก่อนหน้า</span><b>'+M(dsOld.actual)+'</b><small>'+E(C[cat])+'</small></div><div class="kpi"><span>DS เพิ่ม/ลด</span><b class="'+(dsDiff>=0?'up':'dn')+'">'+(dsDiff>=0?'+':'')+M(dsDiff)+'</b><small>รวมทั้งหมด</small></div><div class="kpi"><span>Index ล่าสุด</span><b>'+P(dsNow.index)+'</b><small>ตามชีท</small></div><div class="kpi"><span>Index ก่อนหน้า</span><b>'+P(dsOld.index)+'</b><small>ตามชีท</small></div><div class="kpi"><span>Index ต่าง</span><b>'+((N(dsNow.index)-N(dsOld.index))>=0?'+':'')+P(N(dsNow.index)-N(dsOld.index))+'</b><small>จุด</small></div></div></section><section class="panel fade"><h3>1) ADS เปลี่ยนแปลง · เลือก 1 ทีม</h3><div class="rank">'+adsRows.map((r,i)=>drow(r,i,{mode:'compare',cat,ads:r.ads||r.code})).join('')+'</div></section><div class="two fade"><section class="panel"><h3>2) PS ดีขึ้นมากสุด</h3><div class="rank">'+allUp.map((r,i)=>drow(r,i,{})).join('')+'</div></section><section class="panel"><h3>3) PS ต่ำลงมากสุด</h3><div class="rank">'+allDown.map((r,i)=>drow(r,i,{})).join('')+'</div></section></div>';if(sel){const curPs=(data.ps||[]).filter(x=>x.ads===sel),oldPs=(p.old.ps||[]).filter(x=>x.ads===sel),rows=deltas(curPs,oldPs,cat,'ps'),up=[...rows].sort((a,b)=>b.diff-a.diff),down=[...rows].sort((a,b)=>a.diff-b.diff),curAds=(data.ads||[]).find(x=>(x.ads||x.code)===sel)||sum(curPs,sel),oldAds=(p.old.ads||[]).find(x=>(x.ads||x.code)===sel)||sum(oldPs,sel),aNow=curAds[cat]||{},aOld=oldAds[cat]||{},aDiff=N(aNow.actual)-N(aOld.actual);html+='<section class="panel fade"><h3>4) ทีมที่เลือก: '+E(sel)+'</h3>'+chipAds(adsList,cat,sel)+'<div class="kpis"><div class="kpi"><span>ADS ล่าสุด</span><b>'+M(aNow.actual)+'</b><small>'+E(sel)+'</small></div><div class="kpi"><span>ADS ก่อนหน้า</span><b>'+M(aOld.actual)+'</b><small>'+E(sel)+'</small></div><div class="kpi"><span>ADS เพิ่ม/ลด</span><b class="'+(aDiff>=0?'up':'dn')+'">'+(aDiff>=0?'+':'')+M(aDiff)+'</b><small>รวมทีม</small></div><div class="kpi"><span>Index ล่าสุด</span><b>'+P(aNow.index)+'</b><small>ADS</small></div><div class="kpi"><span>Index ก่อนหน้า</span><b>'+P(aOld.index)+'</b><small>ADS</small></div><div class="kpi"><span>จำนวน PS</span><b>'+rows.length+'</b><small>ในทีม</small></div></div></section><div class="two fade"><section class="panel"><h3>5) PS ดีขึ้นใน '+E(sel)+'</h3><div class="rank">'+up.map((r,i)=>drow(r,i,{})).join('')+'</div></section><section class="panel"><h3>6) PS ต่ำลงใน '+E(sel)+'</h3><div class="rank">'+down.map((r,i)=>drow(r,i,{})).join('')+'</div></section></div>'}else{html+='<section class="panel fade"><div class="empty">เลือก ADS ด้านบน 1 ทีม เพื่อดู PS ของทีมนั้น หน้านี้จะไม่โหลดใหม่</div></section>'}app.innerHTML=html}function render(){if(!data){app.innerHTML='<section class="panel"><div class="empty">กำลังโหลดข้อมูล...</div></section>';return}if(state.mode==='ads')app.innerHTML=screenAds();else if(state.mode==='ps')app.innerHTML=screenPs();else if(state.mode==='person')app.innerHTML=screenPerson();else if(state.mode==='compare')screenCompareAsync();else if(state.mode==='ms')app.innerHTML=nav()+'<section class="panel"><div class="title">MS แยกโหมด</div><div class="empty">MS ไม่รวม DS/ADS/PS</div></section>';else app.innerHTML=screenDs()}load().catch(e=>{app.innerHTML=nav()+'<section class="panel"><div class="title">ยังไม่พบข้อมูลแบบเร็ว</div><div class="empty">'+E(e.message)+'<br><br>ให้ไป Admin → เลือกไฟล์ Tracking → อัปโหลด Performance JSON + ตั้งล่าสุด</div></section>'});})();</script></body></html>
