<script>
(()=>{'use strict';
const BUCKET='doit-files',DEFAULT_URL='https://saodmeoilixfdqentofp.supabase.co';
const $=s=>document.querySelector(s),T=v=>String(v??'').trim(),N=v=>Number(String(v??0).replace(/,/g,'').replace(/%/g,'').replace(/[^0-9.\-]/g,''))||0,esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),money=v=>N(v).toLocaleString('th-TH',{maximumFractionDigits:0}),pct=v=>N(v).toLocaleString('th-TH',{minimumFractionDigits:1,maximumFractionDigits:1})+'%',norm=v=>T(v).replace(/\s+/g,'').toLowerCase();
const mock={updatedAtText:'mock preview',source:'ตัวอย่างเมื่อยังไม่มีข้อมูลจริง',sellerReportFields:['Seller code','Sales Name','เป้าหมายยอดขาย','ยอดขายใน Doit','เป้าหมาย CD1','การกระจาย CD1'],sellerReportRows:[],ads:[{adsCode:'AYAADS01',adsName:'ตัวอย่าง',target:1775000,actual:1405279,dgp:39240,bills:1288}],ps:[{adsCode:'AYAADS01',psCode:'AYAPS011',psName:'PS ตัวอย่าง',target:333000,actual:361898,dgp:3533,bills:629,sellerReport:{'Seller code':'AYAPS011','Sales Name':'PS ตัวอย่าง','เป้าหมายยอดขาย':333000,'ยอดขายใน Doit':361898,'เป้าหมาย CD1':35,'การกระจาย CD1':28}}],ms:[{msCode:'MS001',msName:'MS ตัวอย่าง',storeCount:18.85,sbdTargetSku:2293,sbdActualSku:1947,sbdCompliance:84.9,newProduct:{totalCount:42,totalAmount:128000}}]};
function cfg(){let s={};try{s=JSON.parse(localStorage.getItem('doit-cloud-cfg')||'{}')}catch{}return{u:T(s.url||DEFAULT_URL).replace(/\/$/,''),k:T(s.key||'')}}
async function j(path,ms=15000){const c=cfg();if(!c.k)throw Error('no cloud key');const ac=new AbortController(),timer=setTimeout(()=>ac.abort(),ms);try{const r=await fetch(`${c.u}/storage/v1/object/${BUCKET}/${encodeURIComponent(path).replace(/%2F/g,'/')}`,{headers:{apikey:c.k,authorization:'Bearer '+c.k},cache:'no-store',signal:ac.signal}),txt=await r.text();if(!r.ok)throw Error(txt||r.statusText);return JSON.parse(txt)}finally{clearTimeout(timer)}}
async function load(){try{const active=await j('performance/active.json',12000);if(active?.dataPath){const d=await j(active.dataPath,22000);if(d?.ps?.length){localStorage.setItem('doit-performance-data-v1',JSON.stringify(d));return{d,src:'Supabase'}}}}catch(e){console.warn('[performance]',e)}try{const d=JSON.parse(localStorage.getItem('doit-performance-data-v1')||'null');if(d?.ps?.length)return{d,src:'Cache เครื่องนี้'}}catch{}return{d:mock,src:'Mock'}}
function index(r){return N(r.target)?N(r.actual)/N(r.target)*100:0}function addIndex(r){return{...r,index:index(r)}}function c(v){return v>=100?'good':v>=80?'warn':'bad'}function s(v){return v>=100?'เกินเป้า':v>=80?'ใกล้เป้า':'ต้องเร่ง'}
function sum(rows){return addIndex(rows.reduce((a,r)=>{a.target+=N(r.target);a.actual+=N(r.actual);a.dgp+=N(r.dgp);a.bills+=N(r.bills);return a},{target:0,actual:0,dgp:0,bills:0}))}
function field(o,terms,ex=[]){const keys=Object.keys(o||{}),ts=terms.map(norm),xs=ex.map(norm);const k=keys.find(key=>ts.every(t=>norm(key).includes(t))&&!xs.some(x=>norm(key).includes(x)));return k?{key:k,value:o[k]}:null}
function smart(v){const n=N(v);return pct(Math.abs(n)<=2?n*100:n)}
function seller(d,psCode){const rows=Array.isArray(d.sellerReportRows)?d.sellerReportRows:[];return rows.find(r=>r.psCode===psCode)?.sellerReport || d.ps.find(p=>p.psCode===psCode)?.sellerReport || null}
function msRows(d){if(Array.isArray(d.ms)&&d.ms.length)return d.ms;const m=new Map();(d.msSbd||[]).forEach(r=>m.set(r.msCode,{...r,msName:r.msCode}));(d.msNewProduct||[]).forEach(r=>m.set(r.msCode,{...(m.get(r.msCode)||{msCode:r.msCode,msName:r.msCode}),newProduct:r}));return[...m.values()]}
function bar(a,t){const i=N(t)?N(a)/N(t)*100:0;return `<div class="meter"><div class="fill" style="width:${Math.min(140,i)}%"></div></div><div class="gap">${pct(i)} · ${N(a)>=N(t)?'เกิน '+money(N(a)-N(t)):'ขาด '+money(N(t)-N(a))}</div>`}
function kpi(label,value,sub){return `<div class="kpi"><span>${esc(label)}</span><strong>${esc(value)}</strong><small>${esc(sub||'')}</small></div>`}
function metric(label,value,sub){return `<div class="metric"><span>${esc(label)}</span><strong>${esc(value)}</strong><div class="gap">${esc(sub||'')}</div></div>`}
function pairCard(title,t,a){if(!t&&!a)return'';if(t&&a)return `<div class="pairCard"><h4>${esc(title)}</h4><div class="pairMini"><div class="miniBox"><span>เป้าหมาย</span><strong>${money(t.value)}</strong></div><div class="miniBox"><span>ทำแล้ว</span><strong>${money(a.value)}</strong></div></div>${bar(a.value,t.value)}</div>`;const x=t||a;return `<div class="pairCard"><h4>${esc(title)}</h4><div class="miniBox"><span>${t?'เป้าหมาย':'ทำแล้ว'}</span><strong>${money(x.value)}</strong></div><div class="gap">${esc(x.key)}</div></div>`}
function sales(sr){return [pairCard('ยอดขาย DOIT',field(sr,['เป้าหมาย','ยอดขาย']),field(sr,['ยอดขาย','doit'],['เฉลี่ย'])),pairCard('ยอดที่คีย์ PDA',null,field(sr,['ยอดที่คีย์','pda']))].join('')||'<div class="empty">ไม่มีข้อมูลยอดขาย</div>'}
function bills(sr){return [pairCard('บรรทัดทั้งหมด',field(sr,['เป้าหมาย','บรรทัด']),field(sr,['จำนวนบรรทัด'],['เพิ่ม'])),pairCard('บิลซื้อทั้งหมด',field(sr,['เป้าหมาย','บิลซื้อ','ทั้งหมด']),field(sr,['จำนวนบิลซื้อ','ทั้งหมด'])),pairCard('Productivity 50Bath',field(sr,['เป้าหมาย','productivity','50bath']),field(sr,['จำนวน','productivity','50bath'])),pairCard('บรรทัดที่ต้องเพิ่ม',null,field(sr,['จำนวนบรรทัด','เพิ่ม']))].join('')||'<div class="empty">ไม่มีข้อมูลบิล/บรรทัด</div>'}
function cdTitle(i,t,a){const raw=T((a&&a.key)||(t&&t.key)||'');let name=raw.replace(new RegExp('.*?(CD|DC)\\s*'+i,'i'),'').replace(/เป้าหมาย|การกระจาย|target|actual|จำนวน|[:：\-_/]+/gi,'').replace(/\s+/g,' ').trim();return 'CD'+i+(name?' '+name:'')}
function cds(sr){let out='';for(let i=1;i<=7;i++){const t=field(sr,['เป้าหมาย','cd'+i],['cd1+cd3']),a=field(sr,['การกระจาย','cd'+i],['cd1+cd3']);out+=pairCard(cdTitle(i,t,a),t,a)}out+=pairCard('CD1 + CD3',field(sr,['target','cd1+cd3']),field(sr,['การกระจาย','cd1+cd3']));return out||'<div class="empty">ไม่มีข้อมูล CD</div>'}
function quality(sr){return [pairCard('Golden Point',field(sr,['เป้าหมาย','golden']),field(sr,['goldenpoint'],['เป้าหมาย','index'])),pairCard('SBD กระจาย',field(sr,['เป้าหมาย','การกระจาย','sbd']),field(sr,['การกระจาย','sbd'],['เป้าหมาย','moq','index'])),pairCard('Visibility Points',field(sr,['เป้าหมาย','visibility']),field(sr,['visibilitypoints'],['เป้าหมาย','index'])),pairCard('Volume GIV',field(sr,['target','volume','giv']),field(sr,['volume','giv'],['target','index']))].join('')||'<div class="empty">ไม่มีข้อมูล SBD/Point</div>'}
function metrics(sr){return [['GPS Compliance',['gps','compliance'],smart],['%Prod.iTAS',['prod.itas'],smart],['%CD',['%cd'],smart],['%RHR',['rhr'],smart],['SBD MOQ',['การกระจาย','sbd','moq'],money],['Total Point',['total','point'],money],['วันทำงาน',['จำนวนวันทำงาน'],money],['วันหยุดงาน',['จำนวนวันที่หยุดงาน'],money]].map(([n,t,f])=>{const v=field(sr,t);return v?metric(n,f(v.value),v.key):''}).join('')||'<div class="empty">ไม่มีข้อมูลคะแนน</div>'}
function raw(sr,fields){return `<div class="raw">${fields.map(f=>`<div class="rawItem"><b>${esc(f)}</b><span>${esc(sr[f]??'')}</span></div>`).join('')}</div>`}
function adsCards(rows){return rows.map(a=>{const i=index(a);return `<div class="adsCard" data-ads="${esc(a.adsCode)}"><div class="adsTop"><b>${esc(a.adsCode)}</b><em class="${c(i)}">${pct(i)}</em></div><div class="pairMini"><div class="miniBox"><span>เป้า</span><strong>${money(a.target)}</strong></div><div class="miniBox"><span>ทำแล้ว</span><strong>${money(a.actual)}</strong></div></div>${bar(a.actual,a.target)}<div class="tag">DGP ${money(a.dgp)} · บิล ${money(a.bills)}</div></div>`}).join('')||'<div class="empty">ไม่มีข้อมูล ADS</div>'}
function psList(rows,n){return rows.slice(0,n).map((r,i)=>`<div class="rowItem" data-ads="${esc(r.adsCode)}" data-ps="${esc(r.psCode)}"><div class="rankNo">${i+1}</div><div class="rowText"><b>${esc(r.psCode)} · ${esc(r.psName)}</b><span>เป้า ${money(r.target)} / ทำแล้ว ${money(r.actual)}</span></div><div class="pct ${c(r.index)}">${pct(r.index)}</div></div>`).join('')||'<div class="empty">ไม่มีข้อมูล PS</div>'}
function go(a,p,h=''){const u=new URL(location.href);a?u.searchParams.set('ads',a):u.searchParams.delete('ads');p?u.searchParams.set('ps',p):u.searchParams.delete('ps');u.hash=h;location.href=u.pathname+u.search+u.hash}
function bind(){document.body.onclick=e=>{const ps=e.target.closest('[data-ps]');if(ps)return go(ps.dataset.ads,ps.dataset.ps,'seller');const ads=e.target.closest('[data-ads]');if(ads)return go(ads.dataset.ads,'','ads')};document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab,.section').forEach(x=>x.classList.remove('on'));t.classList.add('on');$('#'+t.dataset.tab).classList.add('on')})}
function render(d,src){const q=new URLSearchParams(location.search),ads=q.get('ads')||'',ps=q.get('ps')||'';const psAll=(d.ps||[]).map(addIndex),adsAll=(d.ads||[]).map(addIndex);const chosen=psAll.filter(r=>(!ads||r.adsCode===ads)&&(!ps||r.psCode===ps));const summary=ps&&chosen[0]?chosen[0]:sum(chosen.length?chosen:psAll);const i=index(summary),gap=N(summary.actual)-N(summary.target),rank=psAll.filter(r=>!ads||r.adsCode===ads).sort((a,b)=>b.index-a.index),urgent=[...rank].sort((a,b)=>a.index-b.index);const below=psAll.filter(r=>r.index<80).length,over=psAll.filter(r=>r.index>=100).length,worst=[...adsAll].sort((a,b)=>a.index-b.index)[0]||{};const ms=msRows(d),mt=ms.reduce((a,r)=>{a.target+=N(r.sbdTargetSku);a.actual+=N(r.sbdActualSku);a.store+=N(r.storeCount);a.np+=N(r.newProduct?.totalCount);return a},{target:0,actual:0,store:0,np:0}),msPct=mt.target?mt.actual/mt.target*100:0;const adsOpts=adsAll.map(a=>`<option value="${esc(a.adsCode)}" ${a.adsCode===ads?'selected':''}>${esc(a.adsCode)}</option>`).join('');const psOpts=psAll.filter(p=>!ads||p.adsCode===ads).map(p=>`<option value="${esc(p.psCode)}" ${p.psCode===ps?'selected':''}>${esc(p.psCode)}</option>`).join('');const sr=seller(d,ps),fields=Array.isArray(d.sellerReportFields)?d.sellerReportFields:Object.keys(sr||{});const sellerHtml=sr?`<div class="sellerTitle"><div><div class="sellerName">${esc(ps)}</div></div><span class="status ${c(i)}">${s(i)}</span></div><div class="tabs"><button class="tab on" data-tab="tabSales">Sales</button><button class="tab" data-tab="tabBills">Bill</button><button class="tab" data-tab="tabCd">CD</button><button class="tab" data-tab="tabQuality">SBD</button><button class="tab" data-tab="tabMetrics">Point</button><button class="tab" data-tab="tabRaw">Raw</button></div><div id="tabSales" class="section on"><div class="pairGrid">${sales(sr)}</div></div><div id="tabBills" class="section"><div class="pairGrid">${bills(sr)}</div></div><div id="tabCd" class="section"><div class="pairGrid">${cds(sr)}</div></div><div id="tabQuality" class="section"><div class="pairGrid">${quality(sr)}</div></div><div id="tabMetrics" class="section"><div class="metrics">${metrics(sr)}</div></div><div id="tabRaw" class="section">${raw(sr,fields)}</div>`:`<div class="empty">เลือก PS เพื่อดู Seller Report</div>`;
$('#app').innerHTML=`<section class="card"><div class="controls"><div class="field"><label>ADS</label><select id="adsSel"><option value="">รวมทุก ADS</option>${adsOpts}</select></div><div class="field"><label>PS</label><select id="psSel"><option value="">รวมทุก PS</option>${psOpts}</select></div><button id="reset" class="btn">ล้าง</button></div></section><section class="hero"><div class="card heroMain"><div class="heroHead"><div><div class="scope">${esc(ps||ads||'รวมผลงานทั้งหมด')}</div><div class="muted" style="color:#dff6ff">${esc(src)} · ${esc(d.updatedAtText||d.updatedAt||'-')}</div></div><span class="status ${c(i)}">${s(i)}</span></div><div class="kpis">${kpi('เป้าหมาย',money(summary.target),'ยอดขาย')}${kpi('ทำแล้ว',money(summary.actual),'DOIT')}${kpi('Index',pct(i),gap>=0?'เกิน '+money(gap):'ขาด '+money(Math.abs(gap)))}${kpi('บิลซื้อ',money(summary.bills),'ทำแล้ว')}</div><div class="pairWide"><div class="miniBox"><span>Target</span><strong>${money(summary.target)}</strong></div><div class="miniBox"><span>Actual</span><strong>${money(summary.actual)}</strong></div></div>${bar(summary.actual,summary.target)}</div><div class="card"><h3>Executive Summary</h3><div class="summaryGrid"><div class="summaryItem"><b>PS ต่ำกว่า 80%</b><span>${below} คน จาก ${psAll.length}</span></div><div class="summaryItem"><b>PS เกินเป้า</b><span>${over} คน</span></div><div class="summaryItem" data-ads="${esc(worst.adsCode||'')}"><b>ADS ต่ำสุด</b><span>${esc(worst.adsCode||'-')} · ${pct(worst.index||0)}</span></div><div class="summaryItem"><b>MS SBD</b><span>${pct(msPct)} · ${money(mt.actual)}/${money(mt.target)} SKU</span></div></div></div></section><section class="card" id="ads"><h3>ADS Board</h3><div class="adsGrid">${adsCards(adsAll.filter(a=>!ads||a.adsCode===ads))}</div></section><section class="layout"><div class="card"><h3>Top PS</h3><div class="rowList">${psList(rank,8)}</div></div><div class="card"><h3>ต้องเร่งก่อน</h3><div class="rowList">${psList(urgent,8)}</div></div></section><section class="card"><h3>MS Snapshot</h3><div class="metrics">${metric('SBD เป้า',money(mt.target),'SKU')}${metric('SBD ทำแล้ว',money(mt.actual),'SKU')}${metric('SBD %',pct(msPct),'Compliance')}${metric('Store',money(mt.store),'ร้าน')}${metric('New Product',money(mt.np),'ชิ้น')}</div>${bar(mt.actual,mt.target)}</section><section class="card" id="seller"><h3>Seller Report Detail</h3>${sellerHtml}</section>`;
$('#adsSel').onchange=()=>go($('#adsSel').value,'','ads');$('#psSel').onchange=()=>{const p=$('#psSel').value;if(p)go($('#adsSel').value,p,'seller')};$('#reset').onclick=()=>go('','','');bind()}
(async()=>{try{const {d,src}=await load();render(d,src)}catch(e){$('#app').innerHTML=`<section class="card"><b>โหลดข้อมูลไม่สำเร็จ</b><div class="muted">${esc(e.message||e)}</div></section>`}})();
})();
</script>
</body>
</html>
