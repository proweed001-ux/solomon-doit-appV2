t(3,1fr);gap:8px;margin-top:10px}.sellerPair,.sellerMetric{background:#061c43;border:1px solid #1d67b8;border-radius:13px;padding:9px}.sellerPair b,.sellerMetric b{display:block;font-size:12px;color:#d9efff;margin-bottom:7px}.sellerMetric span{display:block;color:#93c5fd;font-size:11px;font-weight:900}.sellerMetric strong{display:block;color:#fff;font-size:18px}.sellerFullList{display:grid;gap:6px;max-height:430px;overflow:auto}.sellerFullItem{display:grid;grid-template-columns:42% 1fr;gap:8px;border:1px solid #1d67b8;background:#061c43;border-radius:10px;padding:8px}.sellerFullItem b{font-size:11.5px;color:#9fc9f4;word-break:break-word}.sellerFullItem span{font-size:12.5px;font-weight:850;color:#fff;word-break:break-word}.loading{padding:34px;text-align:center;color:#7dd3fc;font-weight:950}.err{background:#351225;border-color:#ef4444}.mobileNote{display:none}.clickable,[data-ads],[data-ps],.adsMini,.rankItem{cursor:pointer}.clickable:hover,.adsMini:hover,.rankItem:hover{outline:2px solid #38bdf8;box-shadow:0 0 18px #38bdf855}.hint{font-size:10px;color:#7dd3fc;margin-top:4px}@media(max-width:1180px){.board{grid-template-columns:1fr 1fr}.board .controlsPanel{grid-column:1/-1}.adsGrid{grid-template-columns:repeat(2,1fr)}.sellerPairGrid{grid-template-columns:repeat(2,1fr)}}@media(max-width:760px){.shell{grid-template-columns:1fr}.side{display:none}.wrap{padding:8px}.top{height:54px;padding:0 10px}.title{font-size:15px}.board,.compactGrid{grid-template-columns:1fr}.panel{border-radius:16px;padding:10px}.miniGrid{grid-template-columns:repeat(3,1fr);gap:6px}.mini{padding:8px;min-height:68px}.mini strong{font-size:16px}.mini span{font-size:10px}.chartWrap{height:180px}.adsGrid{grid-template-columns:repeat(2,1fr);gap:8px}.mobileNote{display:block}.bigTitle{font-size:20px}.sellerFullItem{grid-template-columns:1fr}.rankItem{grid-template-columns:28px 1fr auto}}@media(max-width:520px){.sellerPairGrid{grid-template-columns:1fr}}@media(max-width:420px){.miniGrid{grid-template-co <div class="shell"><aside class="side"><div class="logo">P</div><nav class="nav"><a class="on" href="#dash">Board</a><a href="#chart">Chart</a><a href="#ads">ADS</a><a href="#rank">Rank</a><a href="#ms">MS</a><a href="#seller">Report</a></nav></aside><div class="main"><header class="top"><a href="/pro.html?t=1028">← กลับหน้า Pro</a><div class="title">Performance Board</div><span></span></header><main class="wrap" id="app"><section class="panel"><div class="loading">กำลังโหลด Dashboard...</div></section></main></div></div>
<script>
(()=>{'use strict';
const EDGE='https://saodmeoilixfdqentofp.supabase.co/functions/v1/performance-active';
const $=s=>document.querySelector(s),T=v=>String(v??'').trim(),N=v=>Number(String(v??0).replace(/,/g,'').replace(/%/g,'').replace(/[^0-9.\-]/g,''))||0,money=v=>N(v).toLocaleString('th-TH',{maximumFractionDigits:0}),pct=v=>N(v).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2})+'%',esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),norm=v=>T(v).replace(/\s+/g,'').toLowerCase();
async function loadData(){const r=await fetch(EDGE+'?t='+Date.now(),{cache:'no-store'}),txt=await r.text();if(!r.ok)throw Error(txt||r.statusText);const d=JSON.parse(txt);if(d.error)throw Error(d.detail||d.error);return{data:d.current||{},sourceMode:d.src||'performance-active',meta:d.meta||{}}}
function code(r){return T(r.code||r.psCode||r.ps||r.msCode||r.ms||r.adsCode||r.ads||r.name)}function name(r){return T(r.name||r.psName||r.msName||r.adsName||r.sellerName||code(r)||'-')}function ads(r){return T(r.ads||r.adsCode||'')}function withIndex(row){const target=N(row.target);return{...row,code:code(row),name:name(row),ads:ads(row),target:N(row.target),actual:N(row.actual),dgp:N(row.dgp),bills:N(row.bills),index:target?(N(row.actual)/target)*100:N(row.index)}}
function statusFor(index){if(index>=100)return{text:'เกินเป้า',cls:'good',color:'#22c55e'};if(index>=80)return{text:'ใกล้เป้า',cls:'warn',color:'#f59e0b'};return{text:'ต่ำกว่าเป้า ต้องเร่ง',cls:'bad',color:'#ef4444'}}function clsByIndex(v){return v>=100?'good':v>=80?'warn':'bad'}function sumRows(rows){return withIndex(rows.reduce((s,r)=>{s.target+=N(r.target);s.actual+=N(r.actual);s.dgp+=N(r.dgp);s.bills+=N(r.bills);return s},{target:0,actual:0,dgp:0,bills:0}))}
function mini(label,value,sub=''){return `<div class="mini"><span>${esc(label)}</span><strong>${esc(value)}</strong><small>${esc(sub)}</small></div>`}function progress(actual,target){const idx=N(target)?N(actual)/N(target)*100:0,cap=Math.min(140,idx);return `<div class="meter"><div class="fill" style="width:${cap}%"></div></div><div class="gap">${pct(idx)} · ${N(actual)>=N(target)?'เกิน '+money(N(actual)-N(target)):'ขาด '+money(N(target)-N(actual))}</div>`}
function adsMini(rows){return rows.map(a=>{const r=withIndex(a);return `<div class="adsMini ${clsByIndex(r.index)}" data-ads="${esc(r.code)}"><b>${esc(r.code)}</b><small>${esc(r.name)}</small><div class="adsNums"><div><span>เป้าหมาย</span><strong>${money(r.target)}</strong></div><div><span>ทำแล้ว</span><strong>${money(r.actual)}</strong></div></div>${progress(r.actual,r.target)}<div class="gap">DGP ${money(r.dgp)} · บิล ${money(r.bills)}</div><div class="hint">แตะเพื่อกรอง ADS นี้</div></div>`}).join('')}
function psRank(rows,limit=10){return rows.slice(0,limit).map((r,i)=>`<div class="rankItem" data-ads="${esc(r.ads)}" data-ps="${esc(r.code)}"><div class="rankNo">${i+1}</div><div class="rankName"><b>${esc(r.code)} · ${esc(r.name)}</b><span>${esc(r.ads)} · เป้า ${money(r.target)} / ทำแล้ว ${money(r.actual)}</span><div class="meter"><div class="fill" style="width:${Math.min(140,r.index)}%"></div></div></div><div class="rankPct ${clsByIndex(r.index)}">${pct(r.index)}</div></div>`).join('')||'<div class="muted">ไม่มีข้อมูล</div>'}
function chart(rows){const data=(rows&&rows.length?rows:[]).slice(0,8).map(withIndex);if(!data.length)return '<div class="muted">ไม่มีข้อมูลกราฟ</div>';const max=Math.max(...data.map(r=>Math.max(N(r.target),N(r.actual))),1),w=360,h=160,p=18,step=data.length>1?(w-p*2)/(data.length-1):0;const ptsActual=data.map((r,i)=>`${p+i*step},${h-p-(N(r.actual)/max)*(h-p*2)}`).join(' ');const ptsTarget=data.map((r,i)=>`${p+i*step},${h-p-(N(r.target)/max)*(h-p*2)}`).join(' ');const dots=data.map((r,i)=>{const x=p+i*step,y=h-p-(N(r.actual)/max)*(h-p*2);return `<circle data-ads="${esc(r.code)}" cx="${x}" cy="${y}" r="4.8" fill="#38bdf8"><title>${esc(r.code)} ทำแล้ว ${money(r.actual)}</title></circle>`}).join('');const labels=data.map((r,i)=>`<text data-ads="${esc(r.code)}" x="${p+i*step}" y="154" fill="#9fc9f4" font-size="9" text-anchor="middle">${esc(r.code.replace('AYA',''))}</text>`).join('');return `<svg class="chartSvg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><defs><linearGradient id="lineA" x1="0" x2="1"><stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#22c55e"/></linearGradient></defs><path d="M18 20 H342 M18 60 H342 M18 100 H342 M18 140 H342" stroke="#1f65b4" stroke-width="1" opacity=".55"/><polyline points="${ptsTarget}" fill="none" stroke="#f59e0b" stroke-width="3" stroke-dasharray="6 5"/><polyline points="${ptsActual}" fill="none" stroke="url(#lineA)" stroke-width="4"/>${dots}${labels}</svg>`}
function findField(o,terms,ex=[]){const keys=Object.keys(o||{}),ts=terms.map(norm),xs=ex.map(norm);const k=keys.find(key=>ts.every(t=>norm(key).includes(t))&&!xs.some(x=>norm(key).includes(x)));return k?{key:k,value:o[k]}:null}function pctSmart(v){const n=N(v);return pct(Math.abs(n)<=2?n*100:n)}function sellerPair(title,t,a){const idx=N(t.value)?N(a.value)/N(t.value)*100:0;return `<div class="sellerPair ${clsByIndex(idx)}"><b>${esc(title)}</b><div class="targetPair"><div class="pairBox"><span>เป้าหมาย</span><strong>${money(t.value)}</strong></div><div class="pairBox"><span>ทำแล้ว</span><strong>${money(a.value)}</strong></div></div>${progress(a.value,t.value)}</div>`}function sellerMetric(title,val,fmt=money,note='ทำแล้ว / ไม่มีเป้าคู่ชัดเจน'){return val?`<div class="sellerMetric"><b>${esc(title)}</b><span>ค่าในรายงาน</span><strong>${esc(fmt(val.value))}</strong><div class="gap">${esc(val.key)} · ${esc(note)}</div></div>`:''}
function sellerPairBoard(seller){const pairs=[],metrics=[];const add=(title,tTerms,aTerms,tEx=[],aEx=[])=>{const t=findField(seller,tTerms,tEx),a=findField(seller,aTerms,aEx);if(t&&a)pairs.push(sellerPair(title,t,a));else{if(t)metrics.push(sellerMetric(title+' เป้าหมาย',t));if(a)metrics.push(sellerMetric(title+' ทำแล้ว',a));}};add('ยอดขาย DOIT',['เป้าหมาย','ยอดขาย'],['ยอดขาย','doit'],[],['เฉลี่ย']);add('บิลซื้อทั้งหมด',['เป้าหมาย','บิลซื้อ','ทั้งหมด'],['จำนวนบิลซื้อ','ทั้งหมด']);add('Golden Point',['เป้าหมาย','golden'],['goldenpoint'],[],['เป้าหมาย','index']);add('SBD กระจาย',['เป้าหมาย','การกระจาย','sbd'],['การกระจาย','sbd'],[],['เป้าหมาย','moq','index']);for(let i=1;i<=7;i++)add('CD'+i,['เป้าหมาย','cd'+i],['การกระจาย','cd'+i],['cd1+cd3'],['cd1+cd3']);[['GPS Compliance',['gps','compliance'],pctSmart],['%CD',['%cd'],pctSmart],['Total Point',['total','point'],money]].forEach(([title,terms,fmt])=>{const v=findField(seller,terms);if(v)metrics.push(sellerMetric(title,v,fmt));});return `<div class="sellerPairGrid">${pairs.join('')}${metrics.join('')}</div>`}
function go(ads,ps,hash=''){const u=new URL(location.href);if(ads)u.searchParams.set('ads',ads);else u.searchParams.delete('ads');if(ps)u.searchParams.set('ps',ps);else u.searchParams.delete('ps');u.hash=hash;location.href=u.pathname+u.search+u.hash}
function render(payload){const data=payload.data,q=new URLSearchParams(location.search),adsCode=q.get('ads')||'',psCode=q.get('ps')||'';const psAll=(Array.isArray(data.ps)?data.ps:[]).map(withIndex),adsAll=(Array.isArray(data.ads)?data.ads:[]).map(withIndex);const filtered=psAll.filter(r=>(!adsCode||r.ads===adsCode||r.adsCode===adsCode)&&(!psCode||r.code===psCode));const summary=psCode&&filtered[0]?filtered[0]:sumRows(filtered.length?filtered:psAll);const st=statusFor(summary.index),deg=Math.min(360,summary.index/100*360);const rankRows=psAll.filter(r=>!adsCode||r.ads===adsCode||r.adsCode===adsCode).sort((a,b)=>b.index-a.index);const bottomRows=[...rankRows].sort((a,b)=>a.index-b.index);const below80=psAll.filter(r=>r.index<80).length,worst=[...adsAll].sort((a,b)=>a.index-b.index)[0]||{};const adsShown=adsAll.filter(a=>!adsCode||a.code===adsCode);const gap=N(summary.actual)-N(summary.target);const ms=(Array.isArray(data.ms)?data.ms:[]).map(withIndex);const msTotal=sumRows(ms);const msComp=msTotal.index;const adsOpts=adsAll.map(a=>`<option value="${esc(a.code)}" ${a.code===adsCode?'selected':''}>${esc(a.code)}</option>`).join('');const psOpts=psAll.filter(p=>!adsCode||p.ads===adsCode).map(p=>`<option value="${esc(p.code)}" ${p.code===psCode?'selected':''}>${esc(p.code)}</option>`).join('');const seller=(psAll.find(p=>p.code===psCode)||{}).sellerReport||null;const fields=Object.keys(seller||{});const sellerSection=seller?`<div class="muted">PS ที่เลือก: ${esc(psCode)} · จับคู่ Target/Actual จาก Seller Report แล้ว · ด้านล่างยังมีข้อมูลดิบครบ ${fields.length} หัวข้อ</div>${sellerPairBoard(seller)}<h3 style="margin-top:14px">ข้อมูลดิบทุกหัวข้อ</h3><div class="sellerFullList" style="margin-top:10px">${fields.map(f=>`<div class="sellerFullItem"><b>${esc(f)}</b><span>${esc(seller[f]??'')}</span></div>`).join('')}</div>`:`<div class="muted">เลือก PS แล้วกด ดูผลงาน หรือแตะรายชื่อ PS เพื่อเปิด Seller Report แบบจับคู่เป้าหมาย/ทำแล้ว</div>`;$('#app').innerHTML=`<div class="mobileNote panel muted">มือถือ: แสดงเป็น Dashboard แบบ compact ไม่ใช่ report ยาว</div><section class="board" id="dash"><div class="panel"><div class="bigTitle">${esc(psCode||adsCode||'รวมผลงานทั้งหมด')}</div><div class="muted">${esc(payload.sourceMode)} · อัปเดต ${esc(data.updatedAtText||data.updatedAt||payload.meta?.currentDate||'-')}</div><div class="miniGrid" style="margin-top:10px">${mini('เป้าหมาย',money(summary.target),'ยอดขาย')}${mini('ทำแล้ว',money(summary.actual),'DOIT')}${mini('Index',pct(summary.index),gap>=0?'เกิน '+money(gap):'ขาด '+money(Math.abs(gap)))}${mini('DGP',money(summary.dgp),'ทำแล้ว')}${mini('บิลซื้อ',money(summary.bills),'ทำแล้ว')}${mini('PS < 80%',below80+' คน','จาก '+psAll.length+' PS')}</div><div class="targetPair"><div class="pairBox"><span>เป้าหมาย</span><strong>${money(summary.target)}</strong></div><div class="pairBox"><span>ทำแล้ว</span><strong>${money(summary.actual)}</strong></div></div>${progress(summary.actual,summary.target)}<span class="pill ${st.cls}" style="margin-top:9px">${esc(st.text)}</span></div><div class="panel" id="chart"><h3>Sales Trend by ADS</h3><div class="chartWrap"><div class="chartTitle">ทำแล้ว vs เป้าหมาย</div><div class="chartLegend"><span><i class="dot"></i>ทำแล้ว</span><span><i class="dot target"></i>เป้าหมาย</span></div>${chart(adsShown.length?adsShown:adsAll)}</div><div class="hint">แตะจุดหรือชื่อ ADS ในกราฟเพื่อกรอง ADS</div></div><div class="panel controlsPanel"><div class="gaugeBox"><div class="gauge" style="--deg:${deg}deg;--gauge:${st.color}"><div class="gaugeInner"><strong>${pct(summary.index)}</strong><span>INDEX</span></div></div></div><div class="controls" style="margin-top:10px"><div class="field"><label>เลือก ADS</label><select id="adsSel"><option value="">รวมทุก ADS</option>${adsOpts}</select></div><div class="field"><label>เลือก PS</label><select id="psSel"><option value="">รวมทุก PS</option>${psOpts}</select></div><button class="btn" id="applyBtn">ดูผลงาน</button><button class="btn ghost" id="resetBtn">ล้างตัวกรอง</button></div></div></section><section class="section compactGrid"><div class="panel"><h3>Action Alerts</h3><div class="alerts"><div class="alert ${worst.index<80?'bad':'warn'}" data-ads="${esc(worst.code||'')}">ADS ต่ำสุด: ${esc(worst.code||'-')} · ${pct(worst.index||0)}</div><div class="alert ${below80?'bad':''}">PS ต่ำกว่า 80% ${below80} คน</div><div class="alert warn">MS SBD รวม ${pct(msComp)}</div></div></div><div class="panel"><h3>MS Snapshot</h3><div class="miniGrid">${mini('SBD เป้า',money(msTotal.target),'SKU')}${mini('SBD ทำแล้ว',money(msTotal.actual),'SKU')}${mini('SBD %',pct(msComp),'Compliance')}${mini('Store',money(msTotal.bills),'ร้าน')}${mini('DGP',money(msTotal.dgp),'คะแนน')}${mini('Amount',money(msTotal.actual),'บาท')}</div>${progress(msTotal.actual,msTotal.target)}</div></section><section class="section panel" id="ads"><h3>ADS Performance Board</h3><div class="adsGrid">${adsMini(adsShown.length?adsShown:adsAll)}</div></section><section class="section compactGrid"><div class="panel" id="rank"><h3>Top PS</h3><div class="rankList">${psRank(rankRows,8)}</div></div><div class="panel"><h3>ต้องเร่งก่อน</h3><div class="rankList">${psRank(bottomRows,8)}</div></div></section><section class="section panel" id="ms"><h3>MS / MAS SBD</h3><div class="rankList">${ms.slice(0,12).map((r,i)=>`<div class="rankItem"><div class="rankNo">${i+1}</div><div class="rankName"><b>${esc(r.code)} · ${esc(r.name||'')}</b><span>เป้า ${money(r.target)} / ทำแล้ว ${money(r.actual)} · บิล ${money(r.bills)}</span><div class="meter"><div class="fill" style="width:${Math.min(100,N(r.index))}%"></div></div></div><div class="rankPct ${clsByIndex(N(r.index))}">${pct(r.index||0)}</div></div>`).join('')||'<div class="muted">ไม่มีข้อมูล MS</div>'}</div></section><section class="section panel" id="seller"><h3>Seller Report Detail</h3>${sellerSection}</section>`;$('#adsSel').onchange=()=>go($('#adsSel').value,'','dash');$('#psSel').onchange=()=>{const p=$('#psSel').value;if(p)go($('#adsSel').value,p,'seller')};$('#applyBtn').onclick=()=>go($('#adsSel').value,$('#psSel').value,$('#psSel').value?'seller':'dash');$('#resetBtn').onclick=()=>go('','','dash');document.body.addEventListener('click',e=>{const psEl=e.target.closest('[data-ps]');if(psEl){go(psEl.getAttribute('data-ads'),psEl.getAttribute('data-ps'),'seller');return}const adsEl=e.target.closest('[data-ads]');if(adsEl)go(adsEl.getAttribute('data-ads'),'','ads')},{once:true});}
loadData().then(render).catch(e=>{$('#app').innerHTML=`<section class="panel err"><b>โหลด Dashboard ไม่สำเร็จ</b><div class="muted">${esc(e.message||e)}</div></section>`});
})();
</script>
</body>
