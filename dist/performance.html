<style>
*{box-sizing:border-box}html{background:#06162f}body{margin:0;background:radial-gradient(circle at 20% 0,#123d8a 0,#071e46 34%,#06162f 100%);color:#eaf2ff;font-family:system-ui,-apple-system,'Segoe UI',Tahoma,sans-serif;min-height:100vh}.shell{display:grid;grid-template-columns:84px 1fr;min-height:100vh}.side{background:linear-gradient(180deg,#061a3a,#04265c);border-right:1px solid #1e5baa;padding:12px 8px;position:sticky;top:0;height:100vh}.logo{width:44px;height:44px;border-radius:14px;margin:0 auto 16px;display:grid;place-items:center;background:linear-gradient(145deg,#35e7ff,#0d7aff);box-shadow:0 0 24px #22d3ee80;color:#001e3d;font-weight:950}.nav{display:grid;gap:8px}.nav a{height:46px;border-radius:12px;color:#b9d8ff;text-decoration:none;display:grid;place-items:center;font-size:11px;font-weight:850;border:1px solid transparent}.nav a.on,.nav a:hover{background:#0d4fb280;border-color:#2ea8ff;color:#fff}.main{min-width:0}.top{min-height:62px;background:linear-gradient(90deg,#071d42cc,#0a4c98aa);backdrop-filter:blur(10px);border-bottom:1px solid #1d5ca3;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:5}.top a{color:#d7ecff;text-decoration:none;font-weight:950}.title{font-size:20px;font-weight:950;text-shadow:0 0 14px #4fc3ff99}.wrap{max-width:1280px;margin:auto;padding:16px}.hero{display:grid;grid-template-columns:minmax(0,1.3fr) 340px;gap:14px}.panel{background:linear-gradient(180deg,#0b3a82cc,#082b65cc);border:1px solid #1f78d4;border-radius:22px;box-shadow:0 18px 40px #0006, inset 0 1px 0 #86d7ff33;padding:16px}.panel h2,.panel h3{margin:0 0 10px}.muted{color:#9cc4ef;font-size:12px;line-height:1.55}.bigName{font-size:26px;font-weight:950;margin-bottom:4px}.indexHero{display:grid;grid-template-columns:150px 1fr;gap:16px;align-items:center}.gauge{width:148px;height:148px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--gauge,#34d399) var(--deg,0deg),#153a6e 0);box-shadow:0 0 28px #22d3ee55}.gaugeInner{width:108px;height:108px;border-radius:50%;background:#071d42;display:grid;place-items:center;text-align:center;border:1px solid #2b83d9}.gaugeInner strong{display:block;font-size:24px}.gaugeInner span{font-size:11px;color:#9cc4ef}.pairGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px}.pairCard{background:linear-gradient(180deg,#0c4fa8,#073a82);border:1px solid #2b8df0;border-radius:18px;padding:13px;box-shadow:0 10px 24px #001b3d66}.pairTitle{font-size:12px;color:#b9d8ff;font-weight:950;margin-bottom:10px}.pairNums{display:grid;grid-template-columns:1fr 1fr;gap:8px}.pairBox{background:#061b3f;border:1px solid #1b64b4;border-radius:12px;padding:9px}.pairBox span{display:block;color:#8fbce9;font-size:11px;font-weight:850}.pairBox strong{display:block;color:#fff;font-size:18px;margin-top:2px}.meter{height:10px;background:#153a6e;border-radius:999px;overflow:hidden;margin-top:10px}.fill{height:100%;width:0;background:linear-gradient(90deg,#ef4444,#f59e0b,#22c55e);border-radius:999px}.gap{margin-top:7px;font-size:11px;color:#b9d8ff}.statusPill{display:inline-flex;min-height:32px;align-items:center;border-radius:999px;padding:0 12px;font-weight:950;margin-top:10px}.good{background:#0b8f4a;color:#dcfce7}.warn{background:#a16207;color:#fff7d6}.bad{background:#b91c1c;color:#ffe4e6}.controls{display:grid;gap:10px}.field label{display:block;color:#b9d8ff;font-size:12px;font-weight:950;margin-bottom:6px}.field select{width:100%;height:44px;border:1px solid #2b83d9;background:#061b3f;color:#fff;border-radius:12px;padding:0 10px;font-weight:900}.btn{height:44px;border:0;border-radius:12px;background:linear-gradient(180deg,#38bdf8,#2563eb);color:#fff;font-weight:950;box-shadow:0 0 20px #38bdf855}.section{margin-top:14px}.dashGrid{display:grid;grid-template-columns:1.25fr .75fr;gap:14px}.adsGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.adsCard{background:linear-gradient(180deg,#0b3477,#07275d);border:1px solid #1f78d4;border-radius:18px;padding:12px}.adsCard b{font-size:14px}.adsCard small{display:block;color:#8fbce9;margin-top:3px}.rankList{display:grid;gap:8px}.rankItem{display:grid;grid-template-columns:34px minmax(0,1fr) auto;gap:8px;align-items:center;background:#071f4a;border:1px solid #1f65b4;border-radius:14px;padding:10px}.rankNo{width:30px;height:30px;border-radius:999px;background:#0d6ed6;display:grid;place-items:center;font-weight:950}.rankName b{display:block;font-size:13px}.rankName span{display:block;font-size:11px;color:#9cc4ef}.rankPct{font-weight:950}.alertList{display:grid;gap:8px}.alert{border-left:4px solid #22c55e;background:#071f4a;border-radius:12px;padding:10px;font-size:13px;font-weight:850;color:#d7ecff}.alert.bad{border-left-color:#ef4444;background:#3a1020}.alert.warn{border-left-color:#f59e0b;background:#382707}.sellerFullList{display:grid;gap:7px;max-height:460px;overflow:auto;padding-right:2px}.sellerFullItem{display:grid;grid-template-columns:42% 1fr;gap:8px;border:1px solid #1f65b4;background:#071f4a;border-radius:10px;padding:8px}.sellerFullItem b{font-size:12px;color:#9cc4ef;word-break:break-word}.sellerFullItem span{font-size:13px;font-weight:850;color:#fff;word-break:break-word}.loading{padding:36px;text-align:center;color:#7dd3fc;font-weight:950}.err{background:#3a1020;border-color:#ef4444;color:#ffe4e6}.mobileNote{display:none}@media(max-width:980px){.shell{grid-template-columns:1fr}.side{display:none}.hero,.dashGrid{grid-template-columns:1fr}.adsGrid,.pairGrid{grid-template-columns:1fr 1fr}.mobileNote{display:block}.top{top:0}}@media(max-width:560px){.wrap{padding:10px}.top{padding:0 10px}.title{font-size:16px}.hero,.dashGrid{gap:10px}.indexHero{grid-template-columns:1fr;text-align:center}.gauge{margin:auto}.adsGrid,.pairGrid{grid-template-columns:1fr}.pairNums{grid-template-columns:1fr 1fr}.panel{border-radius:18px;padding:12px}.bigName{font-size:21px}.sellerFullItem{grid-template-columns:1fr}.rankItem{grid-template-columns:30px 1fr auto}}
</style>

<body>
<div class="shell">
<aside class="side"><div class="logo">P</div><nav class="nav"><a class="on" href="#dash">Board</a><a href="#ads">ADS</a><a href="#rank">Rank</a><a href="#ms">MS</a><a href="#seller">Report</a></nav></aside>
<div class="main">
<header class="top"><a href="/pro.html?t=1028">← กลับหน้า Pro</a><div class="title">Performance Board</div><span></span></header>
<main class="wrap" id="app"><section class="panel"><div class="loading">กำลังโหลด Performance Board...</div></section></main>
</div>
</div>
<script>
(()=>{'use strict';
const DEFAULT_URL='https://saodmeoilixfdqentofp.supabase.co',DEFAULT_KEY='sb_publishable_JThYwAl_-askk_cIaCd75w_TCWK2BTT',BUCKET='doit-files';
const $=s=>document.querySelector(s),T=v=>String(v??'').trim(),N=v=>Number(v)||0,money=v=>N(v).toLocaleString('th-TH',{maximumFractionDigits:0}),pct=v=>N(v).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2})+'%',esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const mockData={updatedAtText:'mock preview',source:'ยังไม่มี JSON จาก Supabase จึงแสดงข้อมูลตัวอย่าง',sellerReportFields:['Type','ADS/DS Name','Branch','Seller code','Sales Name','CD1','CD2','CD3'],sellerReportRows:[],ads:[{adsCode:'AYAADS01',adsName:'ทีมตัวอย่าง 1',target:1775000,actual:1405279,dgp:39240,bills:1288}],ps:[{adsCode:'AYAADS01',psCode:'AYAPS011',psName:'PS ตัวอย่าง 011',target:333000,actual:361898,dgp:3533,bills:629,sellerReport:{'Seller code':'AYAPS011','Sales Name':'PS ตัวอย่าง 011','CD1':'10','CD2':'8','CD3':'7'}}],ms:[{msCode:'MS001',msName:'MS ตัวอย่าง 001',storeCount:18.85,sbdTargetSku:2293,sbdActualSku:1947,sbdCompliance:84.9,newProduct:{totalCount:42,totalAmount:128000},sbdAmount:51200}],msSbd:[],msNewProduct:[],msSbdDetail:[]};
function cloudCfg(){let saved={};try{saved=JSON.parse(localStorage.getItem('doit-cloud-cfg')||'{}')}catch{}return{u:T(saved.url||DEFAULT_URL).replace(/\/$/,''),k:T(saved.key||DEFAULT_KEY)}}
function headers(c){return{apikey:c.k,authorization:'Bearer '+c.k}}
async function fetchStorageJson(path,timeoutMs=15000){const c=cloudCfg(),ac=new AbortController(),timer=setTimeout(()=>ac.abort(),timeoutMs);try{const res=await fetch(`${c.u}/storage/v1/object/${BUCKET}/${encodeURIComponent(path).replace(/%2F/g,'/')}`,{headers:headers(c),cache:'no-store',signal:ac.signal}),text=await res.text();if(!res.ok)throw new Error(text||res.statusText);return JSON.parse(text)}finally{clearTimeout(timer)}}
async function loadData(){try{const active=await fetchStorageJson('performance/active.json',12000);if(active?.dataPath){const data=await fetchStorageJson(active.dataPath,20000);if(Array.isArray(data?.ps)&&data.ps.length){localStorage.setItem('doit-performance-data-v1',JSON.stringify(data));return{data,sourceMode:'supabase',active}}}}catch(err){console.warn('[performance] Supabase active JSON load failed',err)}try{const saved=JSON.parse(localStorage.getItem('doit-performance-data-v1')||'null');if(saved&&Array.isArray(saved.ps)&&saved.ps.length)return{data:saved,sourceMode:'localStorage fallback'}}catch{}return{data:mockData,sourceMode:'mock'}}
function withIndex(row){const target=N(row.target);return{...row,index:target?(N(row.actual)/target)*100:0}}
function statusFor(index){if(index>=100)return{text:'เกินเป้า',cls:'good',color:'#22c55e'};if(index>=80)return{text:'ใกล้เป้า',cls:'warn',color:'#f59e0b'};return{text:'ต่ำกว่าเป้า ต้องเร่ง',cls:'bad',color:'#ef4444'}}
function sumRows(rows){return withIndex(rows.reduce((s,r)=>{s.target+=N(r.target);s.actual+=N(r.actual);s.dgp+=N(r.dgp);s.bills+=N(r.bills);return s},{target:0,actual:0,dgp:0,bills:0}))}
function msRows(data){const ms=Array.isArray(data.ms)?data.ms:[],sbd=Array.isArray(data.msSbd)?data.msSbd:[],np=Array.isArray(data.msNewProduct)?data.msNewProduct:[];if(ms.length)return ms;const m=new Map();sbd.forEach(r=>m.set(r.msCode,{...r,msName:r.msCode}));np.forEach(r=>m.set(r.msCode,{...(m.get(r.msCode)||{msCode:r.msCode,msName:r.msCode}),newProduct:r}));return[...m.values()]}
function sellerRecord(data,psCode){if(!psCode)return null;const rows=Array.isArray(data.sellerReportRows)?data.sellerReportRows:[];return rows.find(r=>r.psCode===psCode)?.sellerReport || data.ps.find(p=>p.psCode===psCode)?.sellerReport || null}
function sellerPreviewRows(data){const rows=Array.isArray(data.sellerReportRows)?data.sellerReportRows:[];return rows.slice(0,5)}
function clsByIndex(v){return v>=100?'good':v>=80?'warn':'bad'}
function pairCard(title,target,actual,unit='บาท'){const t=N(target),a=N(actual),idx=t?a/t*100:0,remain=Math.max(0,t-a),cap=Math.min(140,idx);return `<div class="pairCard"><div class="pairTitle">${esc(title)}</div><div class="pairNums"><div class="pairBox"><span>เป้าหมาย</span><strong>${money(t)}</strong></div><div class="pairBox"><span>ทำแล้ว</span><strong>${money(a)}</strong></div></div><div class="meter"><div class="fill" style="width:${cap}%"></div></div><div class="gap">${pct(idx)} · ${remain>0?'ขาดอีก '+money(remain)+' '+esc(unit):'เกินเป้า '+money(a-t)+' '+esc(unit)}</div></div>`}
function adsCards(rows){return rows.map(a=>{const r=withIndex(a),c=clsByIndex(r.index);return `<div class="adsCard"><b>${esc(r.adsCode)}</b><small>${esc(r.adsName||'')}</small>${pairCard('ยอดขาย ADS',r.target,r.actual).replace('pairCard','pairCard '+c)}<div class="gap">DGP ${money(r.dgp)} · บิล ${money(r.bills)}</div></div>`}).join('')}
function psRank(rows,limit=12){return rows.slice(0,limit).map((r,i)=>`<div class="rankItem"><div class="rankNo">${i+1}</div><div class="rankName"><b>${esc(r.psCode)} · ${esc(r.psName)}</b><span>${esc(r.adsCode)} · เป้า ${money(r.target)} / ทำแล้ว ${money(r.actual)}</span><div class="meter"><div class="fill" style="width:${Math.min(140,r.index)}%"></div></div></div><div class="rankPct ${clsByIndex(r.index)}">${pct(r.index)}</div></div>`).join('')||'<div class="muted">ไม่มีข้อมูล</div>'}
function render(data,sourceMode){const q=new URLSearchParams(location.search),adsCode=q.get('ads')||'',psCode=q.get('ps')||'';const psAll=(data.ps||[]).map(withIndex),filtered=psAll.filter(r=>(!adsCode||r.adsCode===adsCode)&&(!psCode||r.psCode===psCode));const summary=psCode&&filtered[0]?filtered[0]:sumRows(filtered.length?filtered:psAll);const st=statusFor(summary.index),deg=Math.min(360,summary.index/100*360);const rankRows=psAll.filter(r=>!adsCode||r.adsCode===adsCode).sort((a,b)=>b.index-a.index);const bottomRows=psAll.filter(r=>!adsCode||r.adsCode===adsCode).sort((a,b)=>a.index-b.index);const all=psAll,over=all.filter(r=>r.index>=100),below80=all.filter(r=>r.index<80).length,worst=(data.ads||[]).map(withIndex).sort((a,b)=>a.index-b.index)[0]||{};const adsAll=(data.ads&&data.ads.length?data.ads:[]).map(withIndex);const adsShown=adsAll.filter(a=>!adsCode||a.adsCode===adsCode);const ms=msRows(data).sort((a,b)=>N(b.sbdCompliance)-N(a.sbdCompliance));const msTotal=ms.reduce((s,r)=>{s.store+=N(r.storeCount);s.target+=N(r.sbdTargetSku);s.actual+=N(r.sbdActualSku);s.amount+=N(r.sbdAmount);s.npAmt+=N(r.newProduct?.totalAmount);s.npCnt+=N(r.newProduct?.totalCount);return s},{store:0,target:0,actual:0,amount:0,npAmt:0,npCnt:0});const msComp=msTotal.target?msTotal.actual/msTotal.target*100:0;const adsOpts=adsAll.map(a=>`<option value="${esc(a.adsCode)}" ${a.adsCode===adsCode?'selected':''}>${esc(a.adsCode)}</option>`).join('');const psOpts=(data.ps||[]).filter(p=>!adsCode||p.adsCode===adsCode).map(p=>`<option value="${esc(p.psCode)}" ${p.psCode===psCode?'selected':''}>${esc(p.psCode)}</option>`).join('');const seller=sellerRecord(data,psCode);const fields=Array.isArray(data.sellerReportFields)?data.sellerReportFields:Object.keys(seller||{});const sellerSection=seller?`<div class="muted">PS ที่เลือก: ${esc(psCode)} · แสดงทุกหัวข้อจาก Seller Report ${fields.length} หัวข้อ รวม CD/DC1-7</div><div class="sellerFullList" style="margin-top:10px">${fields.map(f=>`<div class="sellerFullItem"><b>${esc(f)}</b><span>${esc(seller[f]??'')}</span></div>`).join('')}</div>`:`<div class="muted">Seller Report มี ${fields.length} หัวข้อ · เลือก PS ด้านบนแล้วกด “ดูผลงาน” เพื่อแสดงทุกหัวข้อของ PS นั้น</div><div class="rankList" style="margin-top:10px">${sellerPreviewRows(data).map((r,i)=>`<div class="rankItem"><div class="rankNo">${i+1}</div><div class="rankName"><b>${esc(r.psCode)} · ${esc(r.psName)}</b><span>${esc(r.adsCode)} · มีข้อมูล Seller Report ครบ ${fields.length} หัวข้อ</span></div><div class="rankPct">ดู</div></div>`).join('')}</div>`;
$('#app').innerHTML=`<div class="mobileNote panel muted">มือถือจะแสดงเป็นบอร์ดการ์ดแนวตั้ง ส่วนจอใหญ่จะแสดง Sidebar + Grid Dashboard</div><section class="hero" id="dash"><div class="panel"><div class="bigName">${esc(psCode||adsCode||'รวมผลงานทั้งหมด')}</div><div class="muted">แหล่งข้อมูล ${esc(sourceMode)} · อัปเดต ${esc(data.updatedAtText||data.updatedAt||'-')}<br>${esc(data.source||'')}</div><div class="indexHero" style="margin-top:14px"><div class="gauge" style="--deg:${deg}deg;--gauge:${st.color}"><div class="gaugeInner"><strong>${pct(summary.index)}</strong><span>INDEX</span></div></div><div><h2>เป้าหมาย vs ทำแล้ว</h2><div class="muted">จับคู่ตัวเลขในชุดเดียวกัน เพื่อเห็นทันทีว่าขาดหรือเกินเท่าไร</div><div class="statusPill ${st.cls}">${esc(st.text)}</div></div></div><div class="pairGrid">${pairCard('ยอดขายรวม',summary.target,summary.actual)}${pairCard('DGP / คะแนน',summary.dgp,summary.dgp,'คะแนน')}<div class="pairCard"><div class="pairTitle">สถานะ PS</div><div class="pairNums"><div class="pairBox"><span>PS เกินเป้า</span><strong>${over.length}</strong></div><div class="pairBox"><span>ต่ำกว่า 80%</span><strong>${below80}</strong></div></div><div class="meter"><div class="fill" style="width:${all.length?Math.min(100,over.length/all.length*100):0}%"></div></div><div class="gap">ทั้งหมด ${all.length} PS</div></div></div></div><div class="panel"><h3>ตัวกรองผลงาน</h3><div class="controls"><div class="field"><label>เลือก ADS</label><select id="adsSel"><option value="">รวมทุก ADS</option>${adsOpts}</select></div><div class="field"><label>เลือก PS</label><select id="psSel"><option value="">รวมทุก PS</option>${psOpts}</select></div><button class="btn" id="applyBtn">ดูผลงาน</button></div><div class="alertList" style="margin-top:14px"><div class="alert">ADS ต่ำสุด: ${esc(worst.adsCode||'-')} · ${pct(worst.index||0)}</div><div class="alert ${below80?'bad':''}">PS ต่ำกว่า 80% ${below80} คน</div><div class="alert warn">MS SBD รวม ${pct(msComp)}</div></div></div></section><section class="section panel" id="ads"><h3>ADS Performance Board</h3><div class="adsGrid">${adsCards(adsShown)}</div></section><section class="section dashGrid"><div class="panel" id="rank"><h3>PS Ranking — เป้าหมายคู่ทำแล้ว</h3><div class="rankList">${psRank(rankRows,12)}</div></div><div class="panel"><h3>ต้องเร่งก่อน</h3><div class="rankList">${psRank(bottomRows,8)}</div></div></section><section class="section panel" id="ms"><h3>MS / MAS SBD / New Product</h3><div class="pairGrid">${pairCard('MAS SBD SKU',msTotal.target,msTotal.actual,'SKU')}${pairCard('New Product',msTotal.npCnt,msTotal.npCnt,'ชิ้น')}<div class="pairCard"><div class="pairTitle">SBD Compliance</div><div class="pairNums"><div class="pairBox"><span>เป้าหมาย</span><strong>100%</strong></div><div class="pairBox"><span>ทำแล้ว</span><strong>${pct(msComp)}</strong></div></div><div class="meter"><div class="fill" style="width:${Math.min(100,msComp)}%"></div></div><div class="gap">Store ${money(msTotal.store)} · Amount ${money(msTotal.amount)}</div></div></div><div class="rankList" style="margin-top:12px">${ms.slice(0,15).map((r,i)=>`<div class="rankItem"><div class="rankNo">${i+1}</div><div class="rankName"><b>${esc(r.msCode)} · ${esc(r.msName||'')}</b><span>เป้า SBD ${money(r.sbdTargetSku)} / ทำแล้ว ${money(r.sbdActualSku)} · Store ${money(r.storeCount)} · New ${money(r.newProduct?.totalCount)}</span><div class="meter"><div class="fill" style="width:${Math.min(100,N(r.sbdCompliance))}%"></div></div></div><div class="rankPct ${clsByIndex(N(r.sbdCompliance))}">${pct(r.sbdCompliance||0)}</div></div>`).join('')||'<div class="muted">ไม่มีข้อมูล MS</div>'}</div></section><section class="section panel" id="seller"><h3>Seller Report Detail</h3>${sellerSection}</section>`;
$('#adsSel').onchange=()=>{const u=new URL(location.href);const a=$('#adsSel').value;if(a)u.searchParams.set('ads',a);else u.searchParams.delete('ads');u.searchParams.delete('ps');location.href=u.pathname+u.search};$('#applyBtn').onclick=()=>{const u=new URL(location.href);const a=$('#adsSel').value,p=$('#psSel').value;if(a)u.searchParams.set('ads',a);else u.searchParams.delete('ads');if(p)u.searchParams.set('ps',p);else u.searchParams.delete('ps');location.href=u.pathname+u.search};}
(async()=>{try{const {data,sourceMode}=await loadData();render(data,sourceMode)}catch(e){$('#app').innerHTML=`<section class="panel err"><b>โหลด Performance Board ไม่สำเร็จ</b><div class="muted">${esc(e.message||e)}</div></section>`}})();
})();
</script>
</body>
</html>
