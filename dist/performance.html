<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store">
<title>Performance Dashboard</title>
<style>
:root{--bg:#061321;--panel:#0d2741;--panel2:#071d31;--line:#234d6d;--text:#ecf8ff;--muted:#9db9d3;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--blue:#38bdf8}*{box-sizing:border-box;min-width:0}html,body{margin:0;max-width:100%;overflow-x:hidden}body{background:radial-gradient(circle at top left,#155386 0,#061321 42%,#020812 100%);color:var(--text);font-family:system-ui,-apple-system,'Segoe UI',Tahoma,sans-serif}.top{position:sticky;top:0;z-index:20;background:rgba(6,19,33,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}.topbar{max-width:1180px;margin:auto;display:grid;grid-template-columns:64px 1fr 64px;align-items:center;gap:8px;padding:10px 12px}.back{color:#dff6ff;text-decoration:none;font-weight:950}.brand{text-align:center;font-weight:950;font-size:17px}.wrap{max-width:1180px;margin:auto;padding:12px}.card{background:linear-gradient(180deg,rgba(13,39,65,.96),rgba(7,29,49,.96));border:1px solid var(--line);border-radius:22px;box-shadow:0 18px 48px #0007;padding:14px;margin-bottom:12px;overflow:hidden}.hero{background:linear-gradient(135deg,#0d61a8,#087b59)}h2,h3{margin:0 0 10px}.muted{color:var(--muted);font-size:12px;line-height:1.55;overflow-wrap:anywhere}.modeBar{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}.mode{height:40px;border-radius:999px;border:1px solid var(--line);background:#071a2c;color:#d8efff;font-weight:950;padding:0 14px;white-space:nowrap}.mode.on{background:linear-gradient(135deg,#0ea5e9,#22c55e);border-color:transparent;color:white}.grid{display:grid;gap:8px}.kpis{grid-template-columns:repeat(4,minmax(0,1fr))}.cards{grid-template-columns:repeat(2,minmax(0,1fr))}.kpi,.box,.adsCard{background:#071a2c;border:1px solid var(--line);border-radius:16px;padding:10px}.kpi span,.box span,.adsCard span{display:block;color:#b9d8ef;font-size:11px;font-weight:950}.kpi b,.box b,.adsCard b{display:block;color:#fff;font-size:clamp(19px,5vw,27px);line-height:1.15;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.box b,.adsCard b{font-size:18px}.box small,.kpi small,.adsCard small{display:block;color:var(--muted);font-size:11px;margin-top:4px;overflow-wrap:anywhere}.meter{height:11px;background:#16334d;border-radius:999px;overflow:hidden;margin-top:9px}.fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--red),var(--amber),var(--green));width:0}.badge{display:inline-flex;align-items:center;min-height:28px;border-radius:999px;padding:0 10px;font-size:12px;font-weight:950}.ok{background:#064e3b;color:#bbf7d0}.warn{background:#78350f;color:#fde68a}.bad{background:#7f1d1d;color:#fecaca}.neutral{background:#123858;color:#dff6ff}.adsTop{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.adsCard{cursor:pointer}.adsCard.on{outline:2px solid var(--blue)}.table{width:100%;border-collapse:separate;border-spacing:0 8px}.table th{font-size:11px;color:#b9d8ef;text-align:left;padding:0 8px}.table td{background:#071a2c;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:10px 8px;font-size:13px;font-weight:850}.table td:first-child{border-left:1px solid var(--line);border-radius:14px 0 0 14px}.table td:last-child{border-right:1px solid var(--line);border-radius:0 14px 14px 0;text-align:right}.name{font-weight:950}.right{text-align:right}.empty{border:1px dashed var(--line);border-radius:16px;color:var(--muted);padding:14px;background:#071a2c;overflow-wrap:anywhere}.barRow{display:grid;grid-template-columns:90px minmax(0,1fr) 64px;gap:8px;align-items:center;margin:7px 0}.barName{font-size:12px;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.barTrack{height:12px;border-radius:999px;background:#143149;overflow:hidden}.barFill{height:100%;background:linear-gradient(90deg,#0ea5e9,#22c55e);border-radius:999px}.mono{font-family:ui-monospace,SFMono-Regular,Consolas,monospace}.loading{text-align:center;color:#8be7ff;font-weight:950;padding:28px}.sectionNote{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:space-between}.select{width:100%;height:42px;border-radius:14px;border:1px solid var(--line);background:#071a2c;color:white;font-weight:900;padding:0 10px}.split{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(300px,.9fr);gap:12px}@media(max-width:900px){.split{grid-template-columns:1fr}.cards,.kpis{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:560px){.topbar{grid-template-columns:48px 1fr 0}.wrap{padding:8px}.card{border-radius:18px;padding:11px}.cards,.kpis{grid-template-columns:1fr}.table th:nth-child(3),.table td:nth-child(3),.table th:nth-child(5),.table td:nth-child(5){display:none}.barRow{grid-template-columns:72px minmax(0,1fr) 54px}}
</style>
</head>
<body>
<header class="top"><div class="topbar"><a class="back" href="/pro.html?t=1028">← Pro</a><div class="brand">Performance Dashboard</div><span></span></div></header>
<main class="wrap" id="app"><section class="card"><div class="loading">กำลังโหลดข้อมูลจริง...</div></section></main>
<script>
(()=>{'use strict';
const PROJECT_URL='https://saodmeoilixfdqentofp.supabase.co';
const PUBLIC_EDGE=PROJECT_URL+'/functions/v1/performance-active';
const ADS_MAP={AYAADS01:['011','012','013','014','015','016'],AYAADS02:['021','022','023','071','072','073'],AYAADS03:['031','032','033','061','062','063'],AYAADS04:['041','042','043','051','052']};
let DATA=null,MODE='ads',ACTIVE_ADS='',ACTIVE_PS='',ACTIVE_MS='';
const $=s=>document.querySelector(s),T=v=>String(v??'').trim(),N=v=>Number(String(v??0).replace(/,/g,'').replace(/%/g,'').replace(/[^0-9.\-]/g,''))||0,esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money=v=>N(v).toLocaleString('th-TH',{maximumFractionDigits:0}),num=v=>N(v).toLocaleString('th-TH',{maximumFractionDigits:0}),pct=v=>N(v).toLocaleString('th-TH',{minimumFractionDigits:1,maximumFractionDigits:1})+'%';
async function fx(url,opt={},ms=15000){const ac=new AbortController(),tm=setTimeout(()=>ac.abort(),ms);try{return await fetch(url,{...opt,cache:'no-store',signal:ac.signal})}finally{clearTimeout(tm)}}
async function loadData(){const r=await fx(PUBLIC_EDGE,{},22000);const txt=await r.text();if(!r.ok)throw Error(txt||r.statusText);const d=JSON.parse(txt);if(d.error)throw Error(d.detail||d.error);return{current:normalize(d.current||{}),previous:normalize(d.previous||{}),history:Array.isArray(d.history)?d.history:[],meta:d.meta||{},src:d.src||'performance-active'}}
function first(r,keys){for(const k of keys){const v=r?.[k];if(T(v))return T(v)}return''}
function rowName(r){return first(r,['name','ps','code','seller','sellerName','salesperson','label','title','id','ms','ads'])||'ไม่ระบุ'}
function codeOf(r){const s=[r?.code,r?.ps,r?.name,r?.seller,r?.id,r?.label].map(T).join(' ');let m=s.match(/AYA\s*PS\s*0*(\d{2,3})/i)||s.match(/\bPS\s*0*(\d{2,3})\b/i);return m?'AYAPS'+m[1].padStart(3,'0'):''}
function adsOfPs(r){const code=codeOf(r),n=code.replace(/\D/g,'').slice(-3);for(const [ads,arr] of Object.entries(ADS_MAP))if(arr.includes(n))return ads;return 'ไม่ระบุ ADS'}
function metric(r,k){if(k==='target')return N(r.target??r.goal??r.plan??r.quota??r.Target);if(k==='actual')return N(r.actual??r.sales??r.amount??r.total??r.done??r.Actual);if(k==='dgp')return N(r.dgp??r.DGP);if(k==='bills')return N(r.bills??r.bill??r.billCount??r.Bills);return 0}
function addIndex(r){const target=metric(r,'target'),actual=metric(r,'actual');return{...r,name:rowName(r),code:codeOf(r),ads:adsOfPs(r),target,actual,dgp:metric(r,'dgp'),bills:metric(r,'bills'),index:target?actual/target*100:N(r.index)}}
function sumRows(rs,name='รวม'){const a=rs.reduce((x,r)=>{x.target+=N(r.target);x.actual+=N(r.actual);x.dgp+=N(r.dgp);x.bills+=N(r.bills);return x},{name,target:0,actual:0,dgp:0,bills:0});a.index=a.target?a.actual/a.target*100:0;return a}
function normalize(d){const ps=(Array.isArray(d.ps)?d.ps:[]).map(addIndex);const ms=(Array.isArray(d.ms)?d.ms:[]).map(r=>({...addIndex(r),mode:'MS'}));const ads=[...Object.keys(ADS_MAP),'ไม่ระบุ ADS'].map(name=>{const children=ps.filter(p=>p.ads===name);return{...sumRows(children,name),children}}).filter(a=>a.children.length||a.name!=='ไม่ระบุ ADS');return{raw:d,ps,ms,ads}}
function statusBadge(i){i=N(i);return i>=100?'<span class="badge ok">เกินเป้า</span>':i>=80?'<span class="badge warn">ตามงาน</span>':'<span class="badge bad">ต้องเร่ง</span>'}
function meter(i){return `<div class="meter"><div class="fill" style="width:${Math.max(0,Math.min(130,N(i)))}%"></div></div>`}
function kpis(total,label){return `<div class="grid kpis"><div class="kpi"><span>มุมมอง</span><b>${esc(label)}</b><small>ข้อมูลเฉพาะโหมดนี้</small></div><div class="kpi"><span>เป้า</span><b>${money(total.target)}</b><small>Target</small></div><div class="kpi"><span>ทำได้</span><b>${money(total.actual)}</b><small>Actual</small></div><div class="kpi"><span>% สำเร็จ</span><b>${pct(total.index)}</b><small>${statusBadge(total.index)}</small></div><div class="kpi"><span>DGP</span><b>${money(total.dgp)}</b><small>DGP รวม</small></div><div class="kpi"><span>บิล</span><b>${num(total.bills)}</b><small>จำนวนบิล</small></div><div class="kpi"><span>ขาด/เกิน</span><b>${money(total.actual-total.target)}</b><small>Actual - Target</small></div><div class="kpi"><span>จำนวนรายการ</span><b>${num(total.count||0)}</b><small>แถวที่นับในโหมดนี้</small></div></div>`}
function table(rows,type='ps'){if(!rows.length)return '<div class="empty">ไม่มีข้อมูลในโหมดนี้</div>';return `<table class="table"><thead><tr><th>${type==='ads'?'ADS':type==='ms'?'MS':'PS'}</th><th class="right">เป้า</th><th class="right">ทำได้</th><th class="right">%</th><th class="right">DGP</th><th class="right">บิล</th></tr></thead><tbody>${rows.map(r=>`<tr><td><div class="name">${esc(r.name)}</div><div class="muted">${type==='ps'?esc(r.ads||''):type==='ads'?('PS '+num((r.children||[]).length)+' คน'):'MS mode'}</div></td><td class="right">${money(r.target)}</td><td class="right">${money(r.actual)}</td><td class="right">${pct(r.index)}${meter(r.index)}</td><td class="right">${money(r.dgp)}</td><td class="right">${num(r.bills)}</td></tr>`).join('')}</tbody></table>`}
function rankBars(rows){const top=[...rows].sort((a,b)=>N(b.index)-N(a.index)).slice(0,8);if(!top.length)return '<div class="empty">ไม่มีข้อมูลจัดอันดับ</div>';return top.map(r=>`<div class="barRow"><div class="barName">${esc(r.name)}</div><div class="barTrack"><div class="barFill" style="width:${Math.max(0,Math.min(130,N(r.index)))}%"></div></div><div class="right">${pct(r.index)}</div></div>`).join('')}
function insight(rows,label){if(!rows.length)return '<div class="empty">ไม่มีข้อมูล insight</div>';const sorted=[...rows].sort((a,b)=>N(b.index)-N(a.index)),best=sorted[0],low=[...rows].sort((a,b)=>N(a.index)-N(b.index))[0],under=rows.filter(r=>N(r.index)<80).length,over=rows.filter(r=>N(r.index)>=100).length;return `<div class="grid cards"><div class="box"><span>ดีที่สุด</span><b>${esc(best.name)}</b><small>${pct(best.index)} ใน ${esc(label)}</small></div><div class="box"><span>ต้องเร่งที่สุด</span><b>${esc(low.name)}</b><small>${pct(low.index)} ใน ${esc(label)}</small></div><div class="box"><span>เกินเป้า</span><b>${num(over)}</b><small>รายการที่ทำได้ 100% ขึ้นไป</small></div><div class="box"><span>ต่ำกว่า 80%</span><b>${num(under)}</b><small>รายการที่ต้องตามงาน</small></div></div>`}
function header(){const m=DATA.meta||{};return `<section class="card hero"><div class="sectionNote"><div><h2>Performance Dashboard</h2><div class="muted">ADS = หัวหน้าของ PS · PS = ลูกทีมใต้ ADS · MS = โหมดเฉพาะแยกต่างหาก</div></div><div class="badge neutral">${esc(m.currentDate||'ไม่พบวันที่')}</div></div><div class="muted mono">source: ${esc(DATA.src)} · current: ${esc(m.currentPath||'-')} · previous: ${esc(m.previousPath||'-')} · sameDayRevisions: ${num(m.sameDayRevisions)}</div></section><section class="card"><div class="modeBar"><button class="mode ${MODE==='ads'?'on':''}" data-mode="ads">ADS</button><button class="mode ${MODE==='ps'?'on':''}" data-mode="ps">PS</button><button class="mode ${MODE==='ms'?'on':''}" data-mode="ms">MS</button></div></section>`}
function detailBox(r,label){if(!r)return '<div class="empty">ไม่มีข้อมูล</div>';return `<div class="grid"><div class="box"><span>${esc(label)}</span><b>${esc(r.name)}</b><small>${esc(r.ads||'')}</small></div><div class="box"><span>ทำได้ / เป้า</span><b>${money(r.actual)} / ${money(r.target)}</b><small>${pct(r.index)} ${statusBadge(r.index)}</small>${meter(r.index)}</div><div class="box"><span>DGP</span><b>${money(r.dgp)}</b><small>บิล ${num(r.bills)}</small></div><div class="box"><span>ขาด/เกิน</span><b>${money(r.actual-r.target)}</b><small>Actual - Target</small></div></div>`}
function compareBox(kind,name){const cur=DATA.current,prev=DATA.previous;if(!prev||(!prev.ps.length&&!prev.ads.length&&!prev.ms.length))return '<div class="empty">ยังไม่มีข้อมูลวันก่อนหน้าให้เทียบ</div>';let c,p;if(kind==='ads'){c=cur.ads.find(x=>x.name===name);p=prev.ads.find(x=>x.name===name)}else if(kind==='ps'){c=sumRows(cur.ps,'PS');p=sumRows(prev.ps,'PS')}else{c=sumRows(cur.ms,'MS');p=sumRows(prev.ms,'MS')}if(!c||!p)return '<div class="empty">ไม่มีคู่ข้อมูลสำหรับเทียบ</div>';const d=N(c.actual)-N(p.actual),di=N(c.index)-N(p.index);return `<div class="grid cards"><div class="box"><span>ทำได้วันนี้</span><b>${money(c.actual)}</b><small>ก่อนหน้า ${money(p.actual)}</small></div><div class="box"><span>เปลี่ยนแปลง</span><b>${money(d)}</b><small>${di>=0?'+':''}${pct(di)} จุด</small></div><div class="box"><span>% วันนี้</span><b>${pct(c.index)}</b><small>ก่อนหน้า ${pct(p.index)}</small></div><div class="box"><span>สถานะ</span><b>${d>=0?'ดีขึ้น':'ลดลง'}</b><small>เทียบไฟล์ก่อนหน้า</small></div></div>`}
function trendBox(kind){const h=DATA.history||[];if(!h.length)return '<div class="empty">ยังไม่มีประวัติรายเดือน</div>';const rows=h.map(x=>{const d=normalize(x.data);const t=kind==='ads'?sumRows(d.ads,'ADS'):kind==='ps'?sumRows(d.ps,'PS'):sumRows(d.ms,'MS');return{date:x.date,index:t.index,actual:t.actual}}).slice(-12);return rows.map(r=>`<div class="barRow"><div class="barName">${esc(r.date)}</div><div class="barTrack"><div class="barFill" style="width:${Math.max(0,Math.min(130,N(r.index)))}%"></div></div><div class="right">${pct(r.index)}</div></div>`).join('')}
function renderAds(){const ads=DATA.current.ads,active=ACTIVE_ADS||ads[0]?.name||'',sel=ads.find(a=>a.name===active)||ads[0]||{children:[]};ACTIVE_ADS=sel.name||'';const total=sumRows(ads,'ADS ทั้งหมด');total.count=ads.length;return `${kpis(total,'ADS Mode')}<section class="card"><h3>ADS Board</h3><div class="grid cards">${ads.map(a=>`<div class="adsCard ${a.name===ACTIVE_ADS?'on':''}" data-ads="${esc(a.name)}"><div class="adsTop"><b>${esc(a.name)}</b>${statusBadge(a.index)}</div><span>ทำได้</span><b>${money(a.actual)}</b><small>เป้า ${money(a.target)} · ${pct(a.index)} · PS ${(a.children||[]).length} คน</small>${meter(a.index)}</div>`).join('')||'<div class="empty">ไม่มี ADS</div>'}</div></section><section class="split"><div class="card"><h3>รายละเอียด PS ใต้ ${esc(ACTIVE_ADS||'-')}</h3>${table((sel.children||[]).sort((a,b)=>N(b.index)-N(a.index)),'ps')}</div><div class="card"><h3>Insight ADS</h3>${insight(sel.children||[],'ADS นี้')}<h3 style="margin-top:12px">อันดับใน ADS</h3>${rankBars(sel.children||[])}</div></section><section class="card"><h3>Smart Compare วันต่อวัน</h3>${compareBox('ads',ACTIVE_ADS)}</section><section class="card"><h3>Month Trend Dashboard</h3>${trendBox('ads')}</section>`}
function renderPs(){const ps=[...DATA.current.ps].sort((a,b)=>N(b.index)-N(a.index));const total=sumRows(ps,'PS ทั้งหมด');total.count=ps.length;const selected=ps.find(p=>p.code===ACTIVE_PS||p.name===ACTIVE_PS)||ps[0];ACTIVE_PS=selected?.code||selected?.name||'';return `${kpis(total,'PS Mode')}<section class="split"><div class="card"><div class="sectionNote"><h3>PS Ranking</h3><select class="select" id="psPick">${ps.map(p=>`<option value="${esc(p.code||p.name)}" ${(p.code||p.name)===ACTIVE_PS?'selected':''}>${esc(p.name)}</option>`).join('')}</select></div>${table(ps,'ps')}</div><div class="card"><h3>เจาะราย PS</h3>${detailBox(selected,'PS')}</div></section><section class="card"><h3>Insight PS</h3>${insight(ps,'PS ทั้งหมด')}</section><section class="card"><h3>Month Trend Dashboard</h3>${trendBox('ps')}</section>`}
function renderMs(){const ms=[...DATA.current.ms].sort((a,b)=>N(b.index)-N(a.index));const total=sumRows(ms,'MS ทั้งหมด');total.count=ms.length;const selected=ms.find(m=>m.name===ACTIVE_MS)||ms[0];ACTIVE_MS=selected?.name||'';return `${kpis(total,'MS Mode')}<section class="card"><div class="badge neutral">MS Mode · ข้อมูลชุดนี้ไม่เกี่ยวกับ ADS / PS</div></section><section class="split"><div class="card"><div class="sectionNote"><h3>MS Ranking</h3><select class="select" id="msPick">${ms.map(m=>`<option value="${esc(m.name)}" ${m.name===ACTIVE_MS?'selected':''}>${esc(m.name)}</option>`).join('')}</select></div>${table(ms,'ms')}</div><div class="card"><h3>เจาะราย MS</h3>${detailBox(selected,'MS')}</div></section><section class="card"><h3>Insight MS</h3>${insight(ms,'MS ทั้งหมด')}</section>`}
function bind(){document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{MODE=b.dataset.mode;render()});document.querySelectorAll('.adsCard').forEach(b=>b.onclick=()=>{ACTIVE_ADS=b.dataset.ads;render()});const ps=$('#psPick');if(ps)ps.onchange=()=>{ACTIVE_PS=ps.value;render()};const ms=$('#msPick');if(ms)ms.onchange=()=>{ACTIVE_MS=ms.value;render()}}
function render(){if(!DATA)return;$('#app').innerHTML=header()+(MODE==='ads'?renderAds():MODE==='ps'?renderPs():renderMs());bind()}
loadData().then(d=>{DATA=d;render()}).catch(e=>{$('#app').innerHTML=`<section class="card"><h2>โหลด Dashboard ไม่สำเร็จ</h2><div class="empty">${esc(e.message||e)}</div><div class="muted">โหลดผ่าน public edge function ไม่สำเร็จ ให้ตรวจ performance/active.json หรือ edge function performance-active</div></section>`;console.error(e)});
})();
</script>
</body>
</html>
