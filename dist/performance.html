<script>
(()=>{'use strict';
const BUCKET='doit-files',DEFAULT_URL='https://saodmeoilixfdqentofp.supabase.co';
const $=s=>document.querySelector(s),T=v=>String(v??'').trim(),N=v=>Number(String(v??0).replace(/,/g,'').replace(/%/g,'').replace(/[^0-9.\-]/g,''))||0,esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),money=v=>N(v).toLocaleString('th-TH',{maximumFractionDigits:0}),pct=v=>N(v).toLocaleString('th-TH',{minimumFractionDigits:1,maximumFractionDigits:1})+'%',norm=v=>T(v).replace(/\s+/g,'').toLowerCase(),today=()=>new Date().toISOString().slice(0,10);
function cfg(){let s={};try{s=JSON.parse(localStorage.getItem('doit-cloud-cfg')||'{}')}catch{}return{u:T(s.url||DEFAULT_URL).replace(/\/$/,''),k:T(s.key||'')}}function headers(c,x={}){return{apikey:c.k,authorization:'Bearer '+c.k,...x}}
async function fx(url,opt={},ms=15000){const ac=new AbortController(),timer=setTimeout(()=>ac.abort(),ms);try{return await fetch(url,{...opt,cache:'no-store',signal:ac.signal})}finally{clearTimeout(timer)}}
async function readJson(path,ms=15000){const c=cfg();if(!c.k)throw Error('no cloud key');const r=await fx(`${c.u}/storage/v1/object/${BUCKET}/${encodeURIComponent(path).replace(/%2F/g,'/')}`,{headers:headers(c)},ms),txt=await r.text();if(!r.ok)throw Error(txt||r.statusText);return JSON.parse(txt)}
async function listPrefix(prefix){const c=cfg();if(!c.k)return[];try{const r=await fx(`${c.u}/storage/v1/object/list/${BUCKET}`,{method:'POST',headers:headers(c,{'Content-Type':'application/json'}),body:JSON.stringify({prefix,limit:1000,offset:0,sortBy:{column:'updated_at',order:'desc'}})},15000);if(!r.ok)return[];const a=await r.json();return (Array.isArray(a)?a:[]).map(x=>({name:x.name,path:T(x.name).startsWith(prefix+'/')?x.name:prefix.replace(/\/$/,'')+'/'+x.name,updated_at:x.updated_at||x.created_at||'',size:N(x.metadata?.size||x.size)})).filter(x=>/\.json$/i.test(x.path))}catch(e){console.warn('[list]',e);return[]}}
function pathDate(p){const m=T(p).match(/(20\d{2}-\d{2}-\d{2})/);return m?m[1]:''}function reportDate(d,p,active){return T(d?.reportDate||active?.reportDate||d?.date||pathDate(p)||T(d?.updatedAt).slice(0,10)||today()).slice(0,10)}function samePath(a,b){return T(a).replace(/^\/+|\/+$/g,'')===T(b).replace(/^\/+|\/+$/g,'')}function fileDate(f){return pathDate(f.path)||T(f.updated_at).slice(0,10)}function latestByDate(files){const m=new Map();files.filter(f=>!/active\.json$|index\.json$/i.test(f.path)).forEach(f=>{const d=fileDate(f);if(!d)return;const old=m.get(d);if(!old||T(f.updated_at||f.path)>T(old.updated_at||old.path))m.set(d,f)});return m}
async function safeRead(path){try{return await readJson(path,18000)}catch(e){console.warn('[safeRead]',path,e);return null}}
async function load(){const meta={activeOk:false,currentOk:false,previousOk:false,indexOk:false,currentPath:'',previousPath:'',currentDate:'',previousDate:'',sameDayRevisions:0,fileList:0,totalJsonMb:0,oldJsonCount:0,revisionOverflow:0,errors:[]};let active=null,current=null,previous=null,index=null;try{active=await readJson('performance/active.json',12000);meta.activeOk=true}catch(e){meta.errors.push('active.json: '+e.message)}try{index=await readJson('performance/index.json',12000);meta.indexOk=true}catch(e){}
const files=await listPrefix('performance');meta.fileList=files.length;meta.totalJsonMb=files.reduce((s,f)=>s+N(f.size),0)/1048576;const byDate=latestByDate(files);const activeCurrent=T(active?.dataPath||active?.currentDataPath||active?.latest?.dataPath||active?.path||'');let currentPath=activeCurrent;if(!currentPath&&byDate.size)currentPath=[...byDate.entries()].sort((a,b)=>b[0].localeCompare(a[0]))[0][1].path;meta.currentPath=currentPath;
if(currentPath){current=await safeRead(currentPath);meta.currentOk=!!(current?.ps?.length||current?.ads?.length);if(meta.currentOk)localStorage.setItem('doit-performance-data-v1',JSON.stringify(current))}
if(!current){try{current=JSON.parse(localStorage.getItem('doit-performance-data-v1')||'null');if(current?.ps?.length||current?.ads?.length){meta.currentOk=true;meta.currentPath='Cache เครื่องนี้'}}catch{}}
meta.currentDate=current?reportDate(current,meta.currentPath,active):'';const sameDay=files.filter(f=>fileDate(f)===meta.currentDate&&!/active\.json$|index\.json$/i.test(f.path));meta.sameDayRevisions=sameDay.length;meta.revisionOverflow=Math.max(0,sameDay.length-4);const cutoff=new Date();cutoff.setDate(cutoff.getDate()-30);meta.oldJsonCount=files.filter(f=>fileDate(f)&&new Date(fileDate(f))<cutoff).length;
let prevPath=T(active?.previousDataPath||active?.prevDataPath||active?.yesterdayDataPath||active?.compareDataPath||active?.previous?.dataPath||active?.history?.[1]?.dataPath||active?.files?.previous||'');if(prevPath){const pd=pathDate(prevPath);if(meta.currentDate&&pd&&pd>=meta.currentDate)prevPath=''}if(!prevPath&&meta.currentDate){const dates=[...byDate.keys()].filter(d=>d<meta.currentDate).sort().reverse();if(dates[0])prevPath=byDate.get(dates[0]).path}meta.previousPath=prevPath;if(prevPath){previous=await safeRead(prevPath);meta.previousOk=!!(previous?.ps?.length||previous?.ads?.length);meta.previousDate=previous?reportDate(previous,prevPath,active):pathDate(prevPath)}
let history=[];const histDates=[...byDate.keys()].filter(d=>!meta.currentDate||d<=meta.currentDate).sort().slice(-31);const histPaths=histDates.map(d=>byDate.get(d).path).filter(Boolean);if(histPaths.length){const reads=await Promise.all(histPaths.map(p=>safeRead(p)));history=reads.map((d,i)=>d?{date:reportDate(d,histPaths[i],active),path:histPaths[i],data:d}:null).filter(Boolean)}else if(current){history=[{date:meta.currentDate||today(),path:meta.currentPath,data:current}]}return{current,previous,history,meta,index,src:meta.currentPath||'none'}}
function indexOf(r){return N(r?.target)?N(r.actual)/N(r.target)*100:0}function addIndex(r){return{...r,index:indexOf(r)}}function cls(v){return v>=100?'good':v>=80?'warn':'bad'}function state(v){return v>=100?'เกินเป้า':v>=80?'ใกล้เป้า':'ต้องเร่ง'}function delta(v){return (N(v)>0?'+':'')+money(v)}function deltaPct(v){return (N(v)>0?'+':'')+N(v).toLocaleString('th-TH',{minimumFractionDigits:1,maximumFractionDigits:1})+'%'}function dcls(v,goodUp=true){if(!N(v))return'ghost';return (N(v)>0)===goodUp?'deltaUp':'deltaDown'}
function rows(d){const ps=(d?.ps||[]).map(addIndex),ads=(d?.ads||[]).map(addIndex),ms=msRows(d||{});return{ps,ads,ms,sellerRows:Array.isArray(d?.sellerReportRows)?d.sellerReportRows:[],fields:Array.isArray(d?.sellerReportFields)?d.sellerReportFields:[]}}function sum(rs){return addIndex(rs.reduce((a,r)=>{a.target+=N(r.target);a.actual+=N(r.actual);a.dgp+=N(r.dgp);a.bills+=N(r.bills);return a},{target:0,actual:0,dgp:0,bills:0}))}
function field(o,terms,ex=[]){const keys=Object.keys(o||{}),ts=terms.map(norm),xs=ex.map(norm);const k=keys.find(key=>ts.every(t=>norm(key).includes(t))&&!xs.some(x=>norm(key).includes(x)));return k?{key:k,value:o[k]}:null}function smart(v){const n=N(v);return pct(Math.abs(n)<=2?n*100:n)}function seller(d,ps){const rs=Array.isArray(d?.sellerReportRows)?d.sellerReportRows:[];return rs.find(r=>r.psCode===ps)?.sellerReport||(d?.ps||[]).find(p=>p.psCode===ps)?.sellerReport||null}function msRows(d){if(Array.isArray(d.ms)&&d.ms.length)return d.ms;const m=new Map();(d.msSbd||[]).forEach(r=>m.set(r.msCode,{...r,msName:r.msCode}));(d.msNewProduct||[]).forEach(r=>m.set(r.msCode,{...(m.get(r.msCode)||{msCode:r.msCode,msName:r.msCode}),newProduct:r}));return[...m.values()]}
function bar(a,t){const i=N(t)?N(a)/N(t)*100:0;return `<div class="meter"><div class="fill" style="width:${Math.min(140,i)}%"></div></div><div class="gap">${pct(i)} · ${N(a)>=N(t)?'เกิน '+money(N(a)-N(t)):'ขาด '+money(N(t)-N(a))}</div>`}function kpi(a,b,c){return `<div class="kpi"><span>${esc(a)}</span><strong>${esc(b)}</strong><small>${esc(c||'')}</small></div>`}function metric(a,b,c){return `<div class="metric"><span>${esc(a)}</span><strong>${esc(b)}</strong><div class="gap">${esc(c||'')}</div></div>`}function statusCard(a,b,c,ok){return `<div class="statusCard"><span>${esc(a)}</span><strong class="${ok===false?'deltaDown':ok===true?'deltaUp':''}">${esc(b)}</strong><div class="gap mono">${esc(c||'')}</div></div>`}function compareCard(a,b,c,up=true){return `<div class="compareCard"><span>${esc(a)}</span><strong class="${dcls(b,up)}">${esc(c||delta(b))}</strong><div class="gap">เทียบคนละ reportDate</div></div>`}
function pairCard(title,t,a){if(!t&&!a)return'';if(t&&a)return `<div class="pairCard"><h4>${esc(title)}</h4><div class="pair"><div class="box"><span>เป้าหมาย</span><strong>${money(t.value)}</strong></div><div class="box"><span>ทำแล้ว</span><strong>${money(a.value)}</strong></div></div>${bar(a.value,t.value)}</div>`;const x=t||a;return `<div class="pairCard"><h4>${esc(title)}</h4><div class="box"><span>${t?'เป้าหมาย':'ทำแล้ว'}</span><strong>${money(x.value)}</strong></div><div class="gap">${esc(x.key)}</div></div>`}
function sales(sr){return [pairCard('ยอดขาย DOIT',field(sr,['เป้าหมาย','ยอดขาย']),field(sr,['ยอดขาย','doit'],['เฉลี่ย'])),pairCard('ยอดที่คีย์ PDA',null,field(sr,['ยอดที่คีย์','pda']))].join('')||'<div class="empty">ไม่มีข้อมูล</div>'}function bills(sr){return [pairCard('บรรทัดทั้งหมด',field(sr,['เป้าหมาย','บรรทัด']),field(sr,['จำนวนบรรทัด'],['เพิ่ม'])),pairCard('บิลซื้อทั้งหมด',field(sr,['เป้าหมาย','บิลซื้อ','ทั้งหมด']),field(sr,['จำนวนบิลซื้อ','ทั้งหมด'])),pairCard('Productivity 50Bath',field(sr,['เป้าหมาย','productivity','50bath']),field(sr,['จำนวน','productivity','50bath'])),pairCard('บรรทัดที่ต้องเพิ่ม',null,field(sr,['จำนวนบรรทัด','เพิ่ม']))].join('')||'<div class="empty">ไม่มีข้อมูล</div>'}
function cdTitle(i,t,a){const raw=T((a&&a.key)||(t&&t.key)||'');let name=raw.replace(new RegExp('.*?(CD|DC)\\s*'+i,'i'),'').replace(/เป้าหมาย|การกระจาย|target|actual|จำนวน|[:：\-_/]+/gi,'').replace(/\s+/g,' ').trim();return 'CD'+i+(name?' '+name:'')}function cds(sr){let out='';for(let i=1;i<=7;i++){const t=field(sr,['เป้าหมาย','cd'+i],['cd1+cd3']),a=field(sr,['การกระจาย','cd'+i],['cd1+cd3']);out+=pairCard(cdTitle(i,t,a),t,a)}out+=pairCard('CD1 + CD3',field(sr,['target','cd1+cd3']),field(sr,['การกระจาย','cd1+cd3']));return out||'<div class="empty">ไม่มีข้อมูล</div>'}function quality(sr){return [pairCard('Golden Point',field(sr,['เป้าหมาย','golden']),field(sr,['goldenpoint'],['เป้าหมาย','index'])),pairCard('SBD กระจาย',field(sr,['เป้าหมาย','การกระจาย','sbd']),field(sr,['การกระจาย','sbd'],['เป้าหมาย','moq','index'])),pairCard('Visibility Points',field(sr,['เป้าหมาย','visibility']),field(sr,['visibilitypoints'],['เป้าหมาย','index'])),pairCard('Volume GIV',field(sr,['target','volume','giv']),field(sr,['volume','giv'],['target','index']))].join('')||'<div class="empty">ไม่มีข้อมูล</div>'}function points(sr){return [['GPS Compliance',['gps','compliance'],smart],['%Prod.iTAS',['prod.itas'],smart],['%CD',['%cd'],smart],['%RHR',['rhr'],smart],['SBD MOQ',['การกระจาย','sbd','moq'],money],['Total Point',['total','point'],money],['วันทำงาน',['จำนวนวันทำงาน'],money],['วันหยุดงาน',['จำนวนวันที่หยุดงาน'],money]].map(([n,t,f])=>{const v=field(sr,t);return v?metric(n,f(v.value),v.key):''}).join('')||'<div class="empty">ไม่มีข้อมูล</div>'}function raw(sr,fields){return `<div class="raw">${fields.map(f=>`<div class="rawItem"><b>${esc(f)}</b><span>${esc(sr[f]??'')}</span></div>`).join('')}</div>`}
function adsCards(rs){return rs.map(a=>{const i=indexOf(a);return `<div class="adsCard" data-ads="${esc(a.adsCode)}"><div class="adsTop"><b>${esc(a.adsCode)}</b><em class="${cls(i)}">${pct(i)}</em></div><div class="pair"><div class="box"><span>เป้า</span><strong>${money(a.target)}</strong></div><div class="box"><span>ทำแล้ว</span><strong>${money(a.actual)}</strong></div></div>${bar(a.actual,a.target)}<div class="tag">DGP ${money(a.dgp)} · บิล ${money(a.bills)}</div></div>`}).join('')||'<div class="empty">ไม่มีข้อมูล</div>'}function psList(rs,n,showDelta=false,prevMap=new Map()){return rs.slice(0,n).map((r,i)=>{const pr=prevMap.get(r.psCode),diff=pr?N(r.actual)-N(pr.actual):0;return `<div class="rowItem" data-ads="${esc(r.adsCode)}" data-ps="${esc(r.psCode)}"><div class="rankNo">${i+1}</div><div class="rowText"><b>${esc(r.psCode)} · ${esc(r.psName)}</b><span>${showDelta?'เทียบก่อนหน้า '+delta(diff):'เป้า '+money(r.target)+' / ทำแล้ว '+money(r.actual)}</span></div><div class="pct ${showDelta?dcls(diff,true):cls(r.index)}">${showDelta?delta(diff):pct(r.index)}</div></div>`}).join('')||'<div class="empty">ไม่มีข้อมูล</div>'}
function cdRisk(d){let c=0;(d?.ps||[]).forEach(p=>{const sr=seller(d,p.psCode)||{};for(let i=1;i<=7;i++){const t=field(sr,['เป้าหมาย','cd'+i],['cd1+cd3']),a=field(sr,['การกระจาย','cd'+i],['cd1+cd3']);if(t&&a&&N(a.value)<N(t.value))c++}});return c}function sbdRisk(d){let c=0;(d?.ps||[]).forEach(p=>{const sr=seller(d,p.psCode)||{},t=field(sr,['เป้าหมาย','การกระจาย','sbd']),a=field(sr,['การกระจาย','sbd'],['เป้าหมาย','moq','index']);if(t&&a&&N(a.value)<N(t.value))c++});return c}
function dataStatus(meta,d,prev){const r=rows(d||{});return `<section class="card"><h3>Data Status</h3><div class="statusGrid">${statusCard('active.json',meta.activeOk?'พบ':'ไม่พบ',meta.activeOk?'พร้อมอ่าน':'ต้องอัปโหลดจาก Admin',meta.activeOk)}${statusCard('reportDate ปัจจุบัน',meta.currentDate||'—',meta.currentPath,meta.currentOk)}${statusCard('reportDate เทียบ',meta.previousDate||'—',meta.previousPath||'ไม่มีไฟล์ก่อนหน้า',meta.previousOk)}${statusCard('ไฟล์ซ้ำวันเดียวกัน',meta.sameDayRevisions,'นับเป็น revision ไม่ใช่เมื่อวาน',meta.sameDayRevisions>=0)}${statusCard('ADS',r.ads.length,'ข้อมูลปัจจุบัน',r.ads.length>0)}${statusCard('PS',r.ps.length,'ข้อมูลปัจจุบัน',r.ps.length>0)}${statusCard('Seller Report',r.sellerRows.length,'แถวที่จับคู่ได้',r.sellerRows.length>0)}${statusCard('MS',r.ms.length,'ข้อมูลปัจจุบัน',r.ms.length>0)}</div>${meta.errors.length?`<div class="empty" style="margin-top:10px">${esc(meta.errors.join(' | '))}</div>`:''}</section>`}
function retention(meta){return `<section class="card"><h3>Storage Retention</h3><div class="statusGrid">${statusCard('Performance JSON',meta.fileList,'ไฟล์ใน performance/',meta.fileList>=0)}${statusCard('ขนาด JSON โดยประมาณ',meta.totalJsonMb.toFixed(2)+' MB','เก็บ JSON 30 วันเป็นหลัก',true)}${statusCard('เกิน 30 วัน',meta.oldJsonCount,'ควรล้างด้วย Admin Cleanup',meta.oldJsonCount===0)}${statusCard('Revision เกินกฎ',meta.revisionOverflow,'เก็บ latest + revision ล่าสุด 3 ไฟล์/วัน',meta.revisionOverflow===0)}</div></section>`}
function comparison(d,prev){const cur=sum((d?.ps||[]).map(addIndex)),old=sum((prev?.ps||[]).map(addIndex));if(!prev)return `<section class="card"><h3>Smart Compare วันต่อวัน</h3><div class="compareGrid">${compareCard('ยอดขายเปลี่ยน',0,'—')}${compareCard('Index เปลี่ยน',0,'—')}${compareCard('PS ดีขึ้น',0,'—')}${compareCard('PS แย่ลง',0,'—')}</div><div class="empty" style="margin-top:10px">ยังไม่มีไฟล์คนละ reportDate สำหรับเทียบ ระบบจะไม่เอา revision วันเดียวกันมาเป็น “เมื่อวาน”</div></section>`;const om=new Map((prev.ps||[]).map(p=>[p.psCode,addIndex(p)]));let better=0,worse=0;(d.ps||[]).map(addIndex).forEach(p=>{const o=om.get(p.psCode);if(!o)return;const di=p.index-o.index;if(di>0.01)better++;else if(di<-0.01)worse++});return `<section class="card"><h3>Smart Compare วันต่อวัน</h3><div class="compareGrid">${compareCard('ยอดขายเปลี่ยน',N(cur.actual)-N(old.actual))}${compareCard('Index เปลี่ยน',indexOf(cur)-indexOf(old),deltaPct(indexOf(cur)-indexOf(old)))}${compareCard('PS ดีขึ้น',better,String(better)+' คน')}${compareCard('PS แย่ลง',-worse,String(worse)+' คน',false)}</div></section>`}
function cause(d,prev){if(!prev)return'';const cur=sum((d.ps||[]).map(addIndex)),old=sum((prev.ps||[]).map(addIndex)),om=new Map((prev.ps||[]).map(p=>[p.psCode,addIndex(p)]));let actualDown=0,targetUp=0,billDown=0,indexDown=0;(d.ps||[]).map(addIndex).forEach(p=>{const o=om.get(p.psCode);if(!o)return;if(N(p.actual)<N(o.actual))actualDown++;if(N(p.target)>N(o.target))targetUp++;if(N(p.bills)<N(o.bills))billDown++;if(N(p.index)<N(o.index))indexDown++});return `<section class="card"><h3>Cause Dashboard</h3><div class="problemGrid"><div class="problemCard"><b>Actual รวม</b><span class="${dcls(N(cur.actual)-N(old.actual),true)}">${delta(N(cur.actual)-N(old.actual))}</span></div><div class="problemCard"><b>Target รวม</b><span class="${dcls(N(cur.target)-N(old.target),false)}">${delta(N(cur.target)-N(old.target))}</span></div><div class="problemCard"><b>ยอดตก</b><span>${actualDown} PS</span></div><div class="problemCard"><b>เป้าเพิ่ม</b><span>${targetUp} PS</span></div><div class="problemCard"><b>Bill ลด</b><span>${billDown} PS</span></div><div class="problemCard"><b>Index ลด</b><span>${indexDown} PS</span></div><div class="problemCard"><b>CD ต่ำกว่าเป้า</b><span>${cdRisk(d)} รายการ</span></div><div class="problemCard"><b>SBD ต่ำกว่าเป้า</b><span>${sbdRisk(d)} รายการ</span></div></div></section>`}
function problems(d,prev){const ps=(d?.ps||[]).map(addIndex),ads=(d?.ads||[]).map(addIndex),missing=ps.filter(p=>!seller(d,p.psCode)),low=ps.filter(p=>p.index<80),gaps=ps.map(p=>({...p,gap:N(p.target)-N(p.actual)})).filter(p=>p.gap>0).sort((a,b)=>b.gap-a.gap),risk={};low.forEach(p=>risk[p.adsCode]=(risk[p.adsCode]||0)+1);const riskAds=Object.entries(risk).sort((a,b)=>b[1]-a[1])[0];return `<section class="card"><h3>Problem Dashboard</h3><div class="problemGrid"><div class="problemCard"><b>PS ต่ำกว่า 80%</b><span>${low.length} คน</span></div><div class="problemCard"><b>ขาดเป้ามากสุด</b><span>${gaps[0]?esc(gaps[0].psCode)+' · '+money(gaps[0].gap):'—'}</span></div><div class="problemCard"><b>Seller Report ไม่ครบ</b><span>${missing.length} คน</span></div><div class="problemCard"><b>ADS เสี่ยงสุด</b><span>${riskAds?esc(riskAds[0])+' · '+riskAds[1]+' PS':'—'}</span></div><div class="problemCard"><b>CD ยังไม่ถึง</b><span>${cdRisk(d)} รายการ</span></div><div class="problemCard"><b>SBD ยังไม่ถึง</b><span>${sbdRisk(d)} รายการ</span></div><div class="problemCard"><b>ADS ต่ำกว่า 80%</b><span>${ads.filter(a=>a.index<80).length} ADS</span></div><div class="problemCard"><b>ข้อมูลเทียบ</b><span>${prev?'พร้อมเทียบ':'ยังไม่มีไฟล์ก่อนหน้า'}</span></div></div></section>`}
function monthTrend(history){const h=history.filter(x=>x?.data?.ps?.length).sort((a,b)=>a.date.localeCompare(b.date));if(!h.length)return'';const first=sum(h[0].data.ps.map(addIndex)),last=sum(h[h.length-1].data.ps.map(addIndex)),low=h.map(x=>rows(x.data).ps.filter(p=>p.index<80).length);return `<section class="card"><h3>Month Trend Dashboard</h3><div class="compareGrid">${compareCard('ข้อมูลสะสม',h.length,String(h.length)+' วัน')}${compareCard('ยอดเพิ่มจากวันแรก',N(last.actual)-N(first.actual))}${compareCard('Index จากวันแรก',indexOf(last)-indexOf(first),deltaPct(indexOf(last)-indexOf(first)))}${compareCard('PS ต่ำกว่า 80 ล่าสุด',-(low[low.length-1]||0),String(low[low.length-1]||0)+' คน',false)}</div><div class="empty" style="margin-top:10px">ช่วงข้อมูล: ${esc(h[0].date)} ถึง ${esc(h[h.length-1].date)} · ใช้ latest ของแต่ละ reportDate ไม่ใช้ revision ซ้ำวันเดียวกัน</div></section>`}
function skeleton(src){$('#app').innerHTML=`<section class="card"><div class="controls grid"><div class="field"><label>ADS</label><select disabled><option></option></select></div><div class="field"><label>PS</label><select disabled><option></option></select></div><button class="btn" disabled>ล้าง</button></div></section><section class="hero"><div class="card heroMain"><div class="heroHead"><div><div class="scope">Performance Dashboard</div><div class="muted" style="color:#dff6ff">${esc(src)}</div></div><span class="status neutral">รอข้อมูล</span></div><div class="kpis">${kpi('เป้าหมาย','—','')}${kpi('ทำแล้ว','—','')}${kpi('Index','—','')}${kpi('บิลซื้อ','—','')}</div><div class="pair"><div class="box"><span>Target</span><strong class="ghost">—</strong></div><div class="box"><span>Actual</span><strong class="ghost">—</strong></div></div><div class="meter"><div class="fill" style="width:0%"></div></div><div class="gap">—</div></div><div class="card"><h3>Executive Summary</h3><div class="summaryGrid"><div class="summaryItem"><b>PS ต่ำกว่า 80%</b><span>—</span></div><div class="summaryItem"><b>PS เกินเป้า</b><span>—</span></div><div class="summaryItem"><b>ADS ต่ำสุด</b><span>—</span></div><div class="summaryItem"><b>MS SBD</b><span>—</span></div></div></div></section><section class="card"><h3>Data Status</h3><div class="statusGrid">${statusCard('active.json','—','',false)}${statusCard('reportDate','—','',false)}${statusCard('ไฟล์เทียบ','—','',false)}${statusCard('ข้อมูลจริง','—','',false)}</div></section><section class="card"><h3>Smart Compare วันต่อวัน</h3><div class="compareGrid">${compareCard('ยอดขายเปลี่ยน',0,'—')}${compareCard('Index เปลี่ยน',0,'—')}${compareCard('PS ดีขึ้น',0,'—')}${compareCard('PS แย่ลง',0,'—')}</div></section><section class="card"><h3>Problem Dashboard</h3><div class="problemGrid"><div class="problemCard"><b>PS ต่ำกว่า 80%</b><span>—</span></div><div class="problemCard"><b>ขาดเป้ามากสุด</b><span>—</span></div><div class="problemCard"><b>Seller Report ไม่ครบ</b><span>—</span></div><div class="problemCard"><b>ADS เสี่ยงสุด</b><span>—</span></div></div></section><section class="card"><h3>ADS Board</h3><div class="adsGrid"><div class="adsCard"><div class="adsTop"><b>ADS</b><em class="ghost">—</em></div><div class="pair"><div class="box"><span>เป้า</span><strong class="ghost">—</strong></div><div class="box"><span>ทำแล้ว</span><strong class="ghost">—</strong></div></div><div class="meter"><div class="fill" style="width:0%"></div></div></div></div></section>`}
function render(d,prev,history,meta,src){if(!d)return skeleton(src);const q=new URLSearchParams(location.search),ads=q.get('ads')||'',ps=q.get('ps')||'',r=rows(d),psAll=r.ps,adsAll=r.ads;if(!psAll.length&&!adsAll.length)return skeleton(src);const chosen=psAll.filter(x=>(!ads||x.adsCode===ads)&&(!ps||x.psCode===ps)),summary=ps&&chosen[0]?chosen[0]:sum(chosen.length?chosen:psAll),i=indexOf(summary),gap=N(summary.actual)-N(summary.target),rank=psAll.filter(x=>!ads||x.adsCode===ads).sort((a,b)=>b.index-a.index),urgent=[...rank].sort((a,b)=>a.index-b.index),below=psAll.filter(x=>x.index<80).length,over=psAll.filter(x=>x.index>=100).length,worst=[...adsAll].sort((a,b)=>a.index-b.index)[0]||{},mt=r.ms.reduce((a,x)=>{a.target+=N(x.sbdTargetSku);a.actual+=N(x.sbdActualSku);a.store+=N(x.storeCount);a.np+=N(x.newProduct?.totalCount);return a},{target:0,actual:0,store:0,np:0}),msPct=mt.target?mt.actual/mt.target*100:0,adsOpts=adsAll.map(a=>`<option value="${esc(a.adsCode)}" ${a.adsCode===ads?'selected':''}>${esc(a.adsCode)}</option>`).join(''),psOpts=psAll.filter(p=>!ads||p.adsCode===ads).map(p=>`<option value="${esc(p.psCode)}" ${p.psCode===ps?'selected':''}>${esc(p.psCode)}</option>`).join(''),sr=seller(d,ps),fields=r.fields.length?r.fields:Object.keys(sr||{}),prevMap=new Map((prev?.ps||[]).map(p=>[p.psCode,p]));const sellerHtml=sr?`<div class="heroHead"><div class="scope">${esc(ps)}</div><span class="status ${cls(i)}">${state(i)}</span></div><div class="tabs"><button class="tab on" data-tab="tabSales">Sales</button><button class="tab" data-tab="tabBills">Bill</button><button class="tab" data-tab="tabCd">CD</button><button class="tab" data-tab="tabQuality">SBD</button><button class="tab" data-tab="tabPoints">Point</button><button class="tab" data-tab="tabRaw">Raw</button></div><div id="tabSales" class="section on"><div class="pairGrid">${sales(sr)}</div></div><div id="tabBills" class="section"><div class="pairGrid">${bills(sr)}</div></div><div id="tabCd" class="section"><div class="pairGrid">${cds(sr)}</div></div><div id="tabQuality" class="section"><div class="pairGrid">${quality(sr)}</div></div><div id="tabPoints" class="section"><div class="metrics">${points(sr)}</div></div><div id="tabRaw" class="section">${raw(sr,fields)}</div>`:`<div class="empty">เลือก PS เพื่อดู Seller Report</div>`;$('#app').innerHTML=`<section class="card"><div class="controls grid"><div class="field"><label>ADS</label><select id="adsSel"><option value="">รวมทุก ADS</option>${adsOpts}</select></div><div class="field"><label>PS</label><select id="psSel"><option value="">รวมทุก PS</option>${psOpts}</select></div><button id="reset" class="btn">ล้าง</button></div></section><section class="hero"><div class="card heroMain"><div class="heroHead"><div><div class="scope">${esc(ps||ads||'รวมผลงานทั้งหมด')}</div><div class="muted" style="color:#dff6ff">${esc(meta.currentDate||'-')} · ${esc(src)}</div></div><span class="status ${cls(i)}">${state(i)}</span></div><div class="kpis">${kpi('เป้าหมาย',money(summary.target),'')}${kpi('ทำแล้ว',money(summary.actual),'DOIT')}${kpi('Index',pct(i),gap>=0?'เกิน '+money(gap):'ขาด '+money(Math.abs(gap)))}${kpi('บิลซื้อ',money(summary.bills),'ทำแล้ว')}</div><div class="pair"><div class="box"><span>Target</span><strong>${money(summary.target)}</strong></div><div class="box"><span>Actual</span><strong>${money(summary.actual)}</strong></div></div>${bar(summary.actual,summary.target)}</div><div class="card"><h3>Executive Summary</h3><div class="summaryGrid"><div class="summaryItem"><b>PS ต่ำกว่า 80%</b><span>${below} คน จาก ${psAll.length}</span></div><div class="summaryItem"><b>PS เกินเป้า</b><span>${over} คน</span></div><div class="summaryItem clickable" data-ads="${esc(worst.adsCode||'')}"><b>ADS ต่ำสุด</b><span>${esc(worst.adsCode||'-')} · ${pct(worst.index||0)}</span></div><div class="summaryItem"><b>MS SBD</b><span>${pct(msPct)} · ${money(mt.actual)}/${money(mt.target)} SKU</span></div></div></div></section>${dataStatus(meta,d,prev)}${retention(meta)}${comparison(d,prev)}${cause(d,prev)}${problems(d,prev)}${monthTrend(history)}<section class="card" id="ads"><h3>ADS Board</h3><div class="adsGrid">${adsCards(adsAll.filter(a=>!ads||a.adsCode===ads))}</div></section><section class="layout"><div class="card"><h3>Top PS</h3><div class="rowList">${psList(rank,8,false,prevMap)}</div></div><div class="card"><h3>ต้องเร่งก่อน</h3><div class="rowList">${psList(urgent,8,false,prevMap)}</div></div></section><section class="layout"><div class="card"><h3>ยอดขึ้นมากสุด</h3><div class="rowList">${prev?psList([...psAll].sort((a,b)=>(N(b.actual)-N(prevMap.get(b.psCode)?.actual))-(N(a.actual)-N(prevMap.get(a.psCode)?.actual))),8,true,prevMap):'<div class="empty">ยังไม่มีไฟล์ก่อนหน้า</div>'}</div></div><div class="card"><h3>ยอดตกมากสุด</h3><div class="rowList">${prev?psList([...psAll].sort((a,b)=>(N(a.actual)-N(prevMap.get(a.psCode)?.actual))-(N(b.actual)-N(prevMap.get(b.psCode)?.actual))),8,true,prevMap):'<div class="empty">ยังไม่มีไฟล์ก่อนหน้า</div>'}</div></div></section><section class="card"><h3>MS Snapshot</h3><div class="metrics">${metric('SBD เป้า',money(mt.target),'SKU')}${metric('SBD ทำแล้ว',money(mt.actual),'SKU')}${metric('SBD %',pct(msPct),'Compliance')}${metric('Store',money(mt.store),'ร้าน')}${metric('New Product',money(mt.np),'ชิ้น')}</div>${bar(mt.actual,mt.target)}</section><section class="card" id="seller"><h3>Seller Report Detail</h3>${sellerHtml}</section>`;$('#adsSel').onchange=()=>go($('#adsSel').value,'','ads');$('#psSel').onchange=()=>{const p=$('#psSel').value;if(p)go($('#adsSel').value,p,'seller')};$('#reset').onclick=()=>go('','','');bind()}
function go(a,p,h=''){const u=new URL(location.href);a?u.searchParams.set('ads',a):u.searchParams.delete('ads');p?u.searchParams.set('ps',p):u.searchParams.delete('ps');u.hash=h;location.href=u.pathname+u.search+u.hash}function bind(){document.body.onclick=e=>{const p=e.target.closest('[data-ps]');if(p)return go(p.dataset.ads,p.dataset.ps,'seller');const a=e.target.closest('[data-ads]');if(a&&a.dataset.ads)return go(a.dataset.ads,'','ads')};document.querySelectorAll('.tab[data-tab]').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab,.section').forEach(x=>x.classList.remove('on'));t.classList.add('on');$('#'+t.dataset.tab).classList.add('on')})}
(async()=>{const {current,previous,history,meta,src}=await load();render(current,previous,history,meta,src)})().catch(e=>{$('#app').innerHTML=`<section class="card"><h3>โหลดข้อมูลไม่สำเร็จ</h3><div class="empty">${esc(e.message||e)}</div></section>`});
})();
