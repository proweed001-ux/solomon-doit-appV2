<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="Cache-Control" content="no-store"><title>Performance Hierarchy</title><style>*{box-sizing:border-box}body{margin:0;background:#041431;color:#eef7ff;font-family:system-ui,-apple-system,'Segoe UI',Tahoma,sans-serif}.top{position:sticky;top:0;background:#061f4c;border-bottom:1px solid #1e68b8;z-index:9}.top div{max-width:1220px;margin:auto;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 12px}.top a,.nav a,.row,.card{color:#dff3ff;text-decoration:none}.wrap{max-width:1220px;margin:auto;padding:12px}.nav{display:flex;gap:8px;overflow:auto;margin-bottom:12px}.nav a{background:#061c43;border:1px solid #2b83d9;border-radius:999px;padding:10px 13px;font-weight:900;white-space:nowrap}.nav .on{background:linear-gradient(135deg,#38bdf8,#2563eb);color:#fff}.panel{background:linear-gradient(180deg,#0b3b85,#072960);border:1px solid #1f7ad8;border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 16px 38px #0006}.muted{color:#a8d2ff;font-size:12px;line-height:1.5}.crumb{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}.crumb a,.crumb span{background:#061c43;border:1px solid #2b83d9;border-radius:999px;color:#dff3ff;text-decoration:none;font-size:12px;font-weight:900;padding:7px 10px}.title{font-size:25px;font-weight:950}.kpis,.grid{display:grid;gap:8px}.kpis{grid-template-columns:repeat(6,1fr);margin-top:10px}.grid{grid-template-columns:repeat(4,1fr)}.kpi,.card,.raw,.row{background:#061c43;border:1px solid #1d67b8;border-radius:14px;padding:10px}.kpi span,.card span,.raw b{display:block;color:#93c5fd;font-size:11px;font-weight:900}.kpi b,.card b{display:block;font-size:21px;color:#fff;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.kpi small,.card small{display:block;color:#9fc9f4;font-size:10.5px}.meter{height:9px;background:#12396f;border-radius:99px;overflow:hidden;margin-top:8px}.fill{height:100%;background:linear-gradient(90deg,#ef4444,#f59e0b,#22c55e)}.badge{border-radius:999px;padding:3px 8px;font-size:12px;font-weight:900}.good{background:#0d8b4b}.warn{background:#a16207}.bad{background:#b91c1c}.rank{display:grid;gap:8px}.row{display:grid;grid-template-columns:34px 1fr auto;gap:8px;align-items:center}.row:hover,.card:hover{outline:2px solid #38bdf8}.no{width:30px;height:30px;border-radius:50%;background:#0d74df;display:grid;place-items:center;font-weight:950}.row b{display:block;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.row span{display:block;font-size:11px;color:#9fc9f4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.right{font-weight:950;text-align:right;min-width:60px}.rawgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.raw span{display:block;font-weight:850;margin-top:4px;word-break:break-word}.empty{border:1px dashed #2b83d9;border-radius:14px;background:#061c43;color:#a8d2ff;padding:14px}@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}.grid,.rawgrid{grid-template-columns:1fr}.wrap{padding:8px}.title{font-size:22px}}</style></head><body><header class="top"><div><a href="/pro.html?t=1028">← Pro</a><b>Performance Hierarchy</b><span></span></div></header><main class="wrap" id="app"><section class="panel"><div class="empty">กำลังโหลดข้อมูล...</div></section></main><script>(()=>{'use strict';const app=document.getElementById('app');const URL='https://saodmeoilixfdqentofp.supabase.co',KEY='sb_publishable_JThYwAl_-askk_cIaCd75w_TCWK2BTT',BUCKET='doit-files';const ADSMAP={AYAADS01:['011','012','013','014','015','016'],AYAADS02:['021','022','023','071','072','073'],AYAADS03:['031','032','033','061','062','063'],AYAADS04:['041','042','043','051','052']};const T=v=>String(v??'').trim(),N=v=>Number(String(v??0).replace(/,/g,'').replace(/%/g,'').replace(/[^0-9.-]/g,''))||0,M=v=>N(v).toLocaleString('th-TH',{maximumFractionDigits:0}),P=v=>N(v).toLocaleString('th-TH',{minimumFractionDigits:1,maximumFractionDigits:1})+'%',E=v=>String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;'),K=v=>T(v).replace(/\s/g,'').toLowerCase();function H(l,a='',p=''){let q='?level='+l;if(a)q+='&ads='+encodeURIComponent(a);if(p)q+='&ps='+encodeURIComponent(p);return location.pathname+q}async function jf(path){let r=await fetch(URL+'/storage/v1/object/'+BUCKET+'/'+path,{headers:{apikey:KEY,authorization:'Bearer '+KEY},cache:'no-store'}),txt=await r.text();if(!r.ok)throw Error(txt);return JSON.parse(txt)}async function load(){let active=await jf('performance/active.json');if(!active.dataPath)throw Error('active.json ไม่มี dataPath');return await jf(active.dataPath)}function codePS(r){let s=T(r.psCode||r.code||r.ps||r.seller||r.id).toUpperCase(),m=s.match(/(\d{2,3})/);return s.includes('PS')&&m?'AYAPS'+m[1].padStart(3,'0'):s}function adsof(r){let a=T(r.adsCode||r.ads||r.adsName).toUpperCase();if(a)return a;let n=codePS(r).replace(/\D/g,'').slice(-3);for(let k in ADSMAP)if(ADSMAP[k].includes(n))return k;return'ไม่ระบุ ADS'}function pick(o,words,ban=[]){o=o||{};let ks=Object.keys(o);let k=ks.find(x=>words.every(w=>K(x).includes(K(w)))&&!ban.some(b=>K(x).includes(K(b))));return k?o[k]:''}function psn(r){let rep=r.sellerReport||{},target=N(r.target||pick(rep,['เป้าหมาย','ยอดขาย'])),actual=N(r.actual||pick(rep,['ยอดขาย','doit'])||pick(rep,['ยอดขาย'],['เฉลี่ย'])),dgp=N(r.dgp||pick(rep,['dgp'])||pick(rep,['golden'])),bills=N(r.bills||pick(rep,['บิลซื้อ','ทั้งหมด'])),code=codePS(r);return{code,name:T(r.psName||r.name||r.sellerName||pick(rep,['Sales Name'])||code),ads:adsof(r),target,actual,dgp,bills,index:target?actual/target*100:N(r.index),gap:actual-target,rep}}function msn(r){let target=N(r.target||r.sbdTargetSku),actual=N(r.actual||r.sbdActualSku||r.sbdAmount||r.newProduct?.totalAmount),dgp=N(r.dgp||r.sbdDetailCount||r.sbdActualSku),bills=N(r.bills||r.storeCount||r.stores?.total),code=T(r.msCode||r.code||r.ms||r.slpCode||r.id);return{code,name:T(r.msName||r.name||r.lastName||code),ads:'MS',target,actual,dgp,bills,index:target?actual/target*100:N(r.index||r.sbdCompliance),gap:actual-target,rep:r}}function sum(rows,name){let s={code:name,name,target:0,actual:0,dgp:0,bills:0};rows.forEach(r=>{s.target+=r.target;s.actual+=r.actual;s.dgp+=r.dgp;s.bills+=r.bills});s.index=s.target?s.actual/s.target*100:0;s.gap=s.actual-s.target;return s}function agg(reps){let o={};reps.forEach(r=>Object.entries(r.rep||{}).forEach(([k,v])=>{let n=N(v);if(n)o[k]=(o[k]||0)+n}));return o}function stat(v){v=N(v);return v>=100?['good','เกินเป้า']:v>=80?['warn','ตามงาน']:['bad','ต้องเร่ง']}function meter(v){return'<div class="meter"><div class="fill" style="width:'+Math.max(0,Math.min(140,N(v)))+'%"></div></div>'}function badge(v){let s=stat(v);return'<span class="badge '+s[0]+'">'+s[1]+'</span>'}function nav(l){return'<div class="nav"><a class="'+(l==='ds'?'on':'')+'" href="'+H('ds')+'">DS ภาพรวม</a><a class="'+(l==='ads'?'on':'')+'" href="'+H('ads')+'">ADS ทั้ง 4</a><a class="'+(l==='ms'?'on':'')+'" href="'+H('ms')+'">MS แยกโหมด</a></div>'}function crumb(xs){return'<div class="crumb">'+xs.map(x=>x.href?'<a href="'+x.href+'">'+E(x.t)+'</a>':'<span>'+E(x.t)+'</span>').join('')+'</div>'}function kpis(t){let a=[['Target',M(t.target),'เป้าหมาย'],['Actual',M(t.actual),'ทำได้'],['Index',P(t.index),badge(t.index)],['Gap',M(t.gap),'ขาด/เกิน'],['DGP',M(t.dgp),'คะแนน'],['บิล',M(t.bills),'บิลซื้อ']];return'<div class="kpis">'+a.map(x=>'<div class="kpi"><span>'+x[0]+'</span><b>'+x[1]+'</b><small>'+x[2]+'</small></div>').join('')+'</div>'}function hero(t,sub,total){return'<section class="panel"><div class="title">'+E(t)+'</div><div class="muted">'+E(sub)+'</div>'+kpis(total)+'</section>'}function rank(rows,next){return'<div class="rank">'+rows.map((r,i)=>{let link=next==='ps'?H('person',r.ads,r.code):next==='ads'?H('ps',r.code):'';return'<a class="row" href="'+link+'"><div class="no">'+(i+1)+'</div><div><b>'+E(r.code)+' · '+E(r.name)+'</b><span>'+E(r.ads||'')+' Target '+M(r.target)+' / Actual '+M(r.actual)+' / DGP '+M(r.dgp)+' / บิล '+M(r.bills)+'</span>'+meter(r.index)+'</div><div class="right">'+P(r.index)+'</div></a>'}).join('')+'</div>'}function pairs(o,title){let defs=[['ยอดขาย DOIT',['เป้าหมาย','ยอดขาย'],['ยอดขาย','doit']],['บิลซื้อทั้งหมด',['เป้าหมาย','บิลซื้อ','ทั้งหมด'],['จำนวนบิลซื้อ','ทั้งหมด']],['Golden Point',['เป้าหมาย','golden'],['goldenpoint']],['SBD กระจาย',['เป้าหมาย','การกระจาย','sbd'],['การกระจาย','sbd']],['Volume GIV',['target','volume','giv'],['volume','giv']],['SBD MOQ',['target','sbd','moq'],['sbd','moq']]];for(let i=1;i<=7;i++)defs.push(['CD'+i,['เป้าหมาย','cd'+i],['การกระจาย','cd'+i]]);let html=defs.map(d=>{let t=N(pick(o,d[1])),a=N(pick(o,d[2],['เป้าหมาย','target','index']));if(!t&&!a)return'';let idx=t?a/t*100:0;return'<div class="card"><b>'+E(d[0])+'</b><span>Target '+M(t)+' / Actual '+M(a)+'</span>'+meter(idx)+'<small>'+P(idx)+'</small></div>'}).join('');return'<section class="panel"><h3>'+E(title)+'</h3><div class="grid">'+(html||'<div class="empty">ไม่พบคู่ Target/Actual</div>')+'</div></section>'}function raw(o,title){let rows=Object.entries(o||{}).filter(x=>N(x[1])).sort((a,b)=>N(b[1])-N(a[1]));return'<section class="panel"><h3>'+E(title)+'</h3><div class="rawgrid">'+(rows.map(([k,v])=>'<div class="raw"><b>'+E(k)+'</b><span>'+M(v)+'</span></div>').join('')||'<div class="empty">ไม่มีข้อมูล</div>')+'</div></section>'}function build(d){let ps=(d.ps||[]).map(psn),ms=(d.ms||[]).map(msn),reps=[];(d.sellerReportRows||[]).forEach(x=>{if(x.sellerReport)reps.push({ps:codePS(x),ads:T(x.adsCode||x.ads)||adsof(x),rep:x.sellerReport})});ps.forEach(p=>{if(p.rep&&Object.keys(p.rep).length&&!reps.find(x=>x.ps===p.code))reps.push({ps:p.code,ads:p.ads,rep:p.rep})});return{ps,ms,reps}}function ds(c){let total=sum(c.ps,'DS'),a=agg(c.reps);app.innerHTML=nav('ds')+crumb([{t:'DS'}])+hero('DS ภาพรวมใหญ่สุด','รวม ADS และ PS ทั้งหมดจาก Report Sale ไม่รวม MS',total)+'<section class="panel"><h3>กด DS เพื่อแตกย่อยไปหน้า ADS</h3><div class="grid"><a class="card" href="'+H('ads')+'"><b>DS</b><span>เปิด ADS ทั้ง 4</span>'+meter(total.index)+'<small>'+P(total.index)+'</small></a><a class="card" href="'+H('ms')+'"><b>MS</b><span>แยกโหมด ไม่รวมใน DS</span></a></div></section>'+pairs(a,'DS · Rank แต่ละเป้าหมาย')+raw(a,'DS · ข้อมูลทั้งหมดจาก Excel Sheet Report Sale')}function adsPage(c){let rows=Object.keys(ADSMAP).map(k=>{let ch=c.ps.filter(p=>p.ads===k);return Object.assign(sum(ch,k),{code:k,name:k,children:ch})}).filter(x=>x.children.length).sort((a,b)=>b.index-a.index);app.innerHTML=nav('ads')+crumb([{t:'DS',href:H('ds')},{t:'ADS ทั้ง 4'}])+hero('ADS ทั้ง 4','เฉพาะข้อมูลของ ADS จาก PS ใต้สังกัด ไม่รวม MS',sum(c.ps,'ADS'))+'<section class="panel"><h3>กด ADS เพื่อแตกย่อยไปหน้า PS</h3><div class="grid">'+rows.map(a=>'<a class="card" href="'+H('ps',a.code)+'"><b>'+E(a.code)+'</b><span>PS '+a.children.length+' คน</span>'+meter(a.index)+'<small>Target '+M(a.target)+' / Actual '+M(a.actual)+'</small></a>').join('')+'</div></section><section class="panel"><h3>Rank ADS</h3>'+rank(rows,'ads')+'</section>'}function psList(c,ad){let rows=c.ps.filter(p=>p.ads===ad).sort((a,b)=>b.index-a.index),a=agg(c.reps.filter(r=>r.ads===ad));app.innerHTML=nav('ads')+crumb([{t:'DS',href:H('ds')},{t:'ADS',href:H('ads')},{t:ad}])+hero(ad+' · หน้า PS','เฉพาะข้อมูลของ ADS นี้และ PS ใต้สังกัด',sum(rows,ad))+'<section class="panel"><h3>กด PS เพื่อดูรายละเอียดรายบุคคล</h3>'+rank(rows,'ps')+'</section>'+pairs(a,ad+' · Rank แต่ละเป้าหมาย')+raw(a,ad+' · ข้อมูล Report Sale เฉพาะ ADS')}function person(c,ad,ps){let p=c.ps.find(x=>x.code===ps)||c.ps.find(x=>x.ads===ad);if(!p){app.innerHTML=nav('ads')+'<section class="panel"><div class="empty">ไม่พบ PS</div></section>';return}app.innerHTML=nav('ads')+crumb([{t:'DS',href:H('ds')},{t:'ADS',href:H('ads')},{t:p.ads,href:H('ps',p.ads)},{t:p.code}])+hero(p.code+' · '+p.name,'ข้อมูลเฉพาะ PS รายบุคคล',p)+pairs(p.rep,p.code+' · เป้าหมาย/ทำได้')+raw(p.rep,p.code+' · ข้อมูลทั้งหมดของ PS นี้')}function msPage(c){let rows=c.ms.sort((a,b)=>b.index-a.index);app.innerHTML=nav('ms')+crumb([{t:'MS แยกโหมด'}])+hero('MS แยกโหมด','MS ไม่อยู่ใต้ DS / ADS / PS และไม่ถูกนำไปรวม',sum(rows,'MS'))+'<section class="panel"><h3>Rank MS</h3>'+rank(rows,'')+'</section>'+raw(agg(rows.map(m=>({rep:m.rep}))), 'ข้อมูล MS ทั้งหมด')}function render(d){let c=build(d),q=new URLSearchParams(location.search),l=q.get('level')||'ds',ad=q.get('ads')||'',ps=q.get('ps')||'';if(l==='ads')return adsPage(c);if(l==='ps')return psList(c,ad||'AYAADS01');if(l==='person')return person(c,ad,ps);if(l==='ms')return msPage(c);return ds(c)}load().then(render).catch(e=>{app.innerHTML='<section class="panel"><div class="empty">โหลดไม่สำเร็จ: '+E(e.message||e)+'</div></section>'});})();</script></body></html>
