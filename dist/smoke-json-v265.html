<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DOIT JSON v265 Smoke Test</title><style>*{box-sizing:border-box}body{font-family:system-ui,Tahoma,sans-serif;margin:0;background:#f6f7f8;color:#111827}.topbar{background:#087b34;color:#fff;padding:12px 16px;display:flex;justify-content:space-between}.wrap{padding:14px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:12px;margin-bottom:12px}.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.tab,.outline,.clear,.searchBtn,.undo,.reset,.autosave,.fileBtn,.page{border:1px solid #d1d5db;border-radius:8px;background:#fff;height:36px;font-weight:900}.tab.on{background:#087b34;color:#fff}.filterGrid,.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.field label{display:block;font-size:12px;font-weight:900}.field input,.field select{width:100%;height:34px;border:1px solid #d1d5db;border-radius:8px}.summary{grid-template-columns:repeat(4,1fr)}.sum{background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px;padding:10px}.sum b,.sum strong{display:block}.actions,.leftBtns{display:flex;gap:8px;flex-wrap:wrap}.tableWrap{overflow:auto}.tbl{width:100%;min-width:900px;border-collapse:collapse}.tbl th,.tbl td{border:1px solid #e5e7eb;padding:6px}.tbl input{width:80px}.pagination{padding:8px}.ok{color:#166534}.bad{color:#dc2626}.log{font-family:ui-monospace,Menlo,monospace;white-space:pre-wrap;background:#0f172a;color:#e5e7eb;border-radius:10px;padding:10px;line-height:1.5}.mobileHint{color:#6b7280}.barline{height:4px;background:#ddd}.barline i{display:block;height:100%;background:#087b34}.teleShade,.teleDrawer{display:none}@media(max-width:720px){.filterGrid,.summary,.tabs{grid-template-columns:1fr}}</style></head><body><header class="topbar"><b>DOIT JSON v265 Smoke Test</b><a style="color:#fff" href="/pro.html?v=265">Pro</a></header><main class="wrap"><section id="upload" class="card"><div class="card"><h3>Mock upload area</h3><div><button id="choose" class="fileBtn">เลือกไฟล์</button><span id="fileLabel">ยังไม่ได้เลือกไฟล์</span><input id="file" type="file" hidden></div><div id="msg" class="mobileHint">พร้อมทดสอบ</div></div></section><section id="work"><div class="tabs"><button class="tab on" id="modePick">ถอดของ Pro</button><button class="tab" id="distTab">กระจายสินค้า</button><button class="tab" id="shipTab">ใบส่งร้านจริง</button><button class="tab" id="doneTab">จัดแล้ว</button><button class="tab" id="rawTab">รายการดิบ</button></div><section class="card filters"><h3>ตัวกรองข้อมูล</h3><div class="filterGrid"><div class="field"><label>ช่วงวันที่</label><input id="startDate" type="date"><input id="endDate" type="date"></div><div class="field"><label>PS</label><select id="psSelect"></select></div><div class="field"><label>ร้านจริงที่จะใส่ออเดอร์</label><select id="storeSelect"></select></div><div class="field"><label>แบรนด์</label><select id="brandSelect"></select></div><div class="field"><label>ประเภทสินค้า</label><select id="typeSelect"></select></div><div class="field"><label>ค้นหา</label><input id="q"></div></div><p id="datePreview" class="mobileHint">-</p><button id="clearFilter" class="clear">ล้างตัวกรอง</button><button id="searchBtn" class="searchBtn">ค้นหา</button></section><div class="card"><div class="actions"><button id="copySummary" class="outline">Copy</button><button id="exportCsv" class="outline">Export</button></div></div><section class="summary"><div class="sum"><b>ยอดรวม</b><strong id="amount">-</strong></div><div class="sum"><b>จัดแล้ว</b><strong id="doneAmount">0</strong></div><div class="sum"><b>คงเหลือ</b><strong id="remainAmount">0</strong></div><div class="sum"><b>%</b><strong id="donePct">0%</strong><div class="barline"><i id="doneBar"></i></div></div></section><section class="card tableCard"><div><h3>รายการ</h3><small id="tableCount">0</small><button id="displayBtn" class="outline">ปรับจำนวนแสดง</button></div><div class="tableWrap"><table class="tbl" id="table"><tbody><tr><td>empty</td></tr></tbody></table></div><div class="pagination" id="pager"></div></section><div class="card"><div class="leftBtns"><button id="undo" class="undo">Undo</button><button id="redo" class="undo">Redo</button><button id="resetDone" class="reset">Reset</button></div><button id="autosaveBtn" class="autosave">Autosave</button></div></section><section class="card"><h3>Smoke result</h3><button id="runSmoke" class="outline">Run smoke test</button><div id="smokeLog" class="log">รอทดสอบ</div></section></main><script src="/assets/telesale-drawer-v262.js?v=262"></script><script src="/assets/pro-json-app-v265.js?v=265"></script><script>
(function(){
const logEl=document.getElementById('smokeLog');let failures=0,errors=[];
window.addEventListener('error',e=>{errors.push(e.message||String(e.error||e));failures++;write('ERROR '+(e.message||e.error));});
function write(s){logEl.textContent+=(logEl.textContent==='รอทดสอบ'?'':'\n')+s}
function ok(name,cond){if(cond){write('PASS '+name)}else{failures++;write('FAIL '+name)}}
function click(id){document.getElementById(id)?.click()}
function change(el){el.dispatchEvent(new Event('change',{bubbles:true}))}
function sample(){return{schema:'doit-json-v1',version_id:'smoke-v265',created_at:new Date().toISOString(),rows:[
{date:'2026-05-10',inv:'INV-001',type:'INVC',ps:'PS01 Demo',store:'ร้านจริง A',tele:'',isTele:false,code:'SKU-A',sku:'สินค้า A',brand:'Brand A',size:'S',qty:10,unit:20,amt:200},
{date:'2026-05-10',inv:'INV-002',type:'INVC',ps:'PS01 Demo',store:'ร้านคีย์ B',tele:'',isTele:false,code:'SKU-A',sku:'สินค้า A',brand:'Brand A',size:'S',qty:5,unit:20,amt:100},
{date:'2026-05-10',inv:'INV-003',type:'INVC',ps:'PS01 Demo',store:'ร้านคีย์ C',tele:'',isTele:false,code:'SKU-B',sku:'สินค้า B',brand:'Brand B',size:'M',qty:7,unit:30,amt:210},
{date:'2026-05-11',inv:'TEL-001',type:'INVC',ps:'PS02 Tele',store:'ร้านเทเล 1',tele:'T01 Nui',isTele:true,code:'SKU-T',sku:'สินค้า T',brand:'Brand T',size:'L',qty:3,unit:50,amt:150}
]}}
async function run(){failures=0;errors=[];logEl.textContent='';localStorage.removeItem('doit-json:smoke-v265');ok('DOIT_JSON_APP exists',!!window.DOIT_JSON_APP);ok('DOIT_JSON_APP version v265',window.DOIT_JSON_APP?.version==='v265');ok('Telesale drawer API exists',!!window.DOIT_TELESALE_DRAWER?.loadRows);window.DOIT_JSON_APP.load(sample(),{id:'smoke-v265',file_name:'smoke.json'});await new Promise(r=>setTimeout(r,150));ok('table rendered',document.getElementById('table').textContent.includes('สินค้า A'));ok('filters filled',document.getElementById('psSelect').options.length>=3);document.getElementById('storeSelect').value='ร้านจริง A';change(document.getElementById('storeSelect'));await new Promise(r=>setTimeout(r,50));const inp=document.querySelector('input.jdata[data-map="send"]');ok('send input exists',!!inp);if(inp){inp.value='2';change(inp)}await new Promise(r=>setTimeout(r,100));ok('done amount updated',document.getElementById('doneAmount').textContent.includes('2'));click('undo');await new Promise(r=>setTimeout(r,80));ok('undo works',!document.getElementById('doneAmount').textContent.includes('2'));click('redo');await new Promise(r=>setTimeout(r,80));ok('redo works',document.getElementById('doneAmount').textContent.includes('2'));click('rawTab');await new Promise(r=>setTimeout(r,50));ok('raw tab works',document.getElementById('tableCount').textContent.includes('รายการดิบ'));click('distTab');await new Promise(r=>setTimeout(r,50));ok('dist tab works',document.getElementById('tableCount').textContent.includes('ตรวจร้านที่คีย์'));window.DOIT_TELESALE_DRAWER.open();await new Promise(r=>setTimeout(r,50));ok('telesale drawer opens',document.body.textContent.includes('TEL-001')||document.body.textContent.includes('ร้านเทเล 1'));window.DOIT_TELESALE_DRAWER.close();ok('no uncaught errors',errors.length===0);write(failures?'SUMMARY FAIL '+failures:'SUMMARY PASS');}
document.getElementById('runSmoke').onclick=run;setTimeout(run,300);
})();
</script></body></html>
