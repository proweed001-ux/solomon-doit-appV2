<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Promo JUL26 Live</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f6f7fb;color:#172033}.hero{position:sticky;top:0;z-index:2;padding:18px 14px 12px;color:#fff;background:linear-gradient(135deg,#0756c8,#149ee8);box-shadow:0 8px 24px #0002}.row{display:flex;gap:10px;align-items:center;justify-content:space-between}.eyebrow{font-size:11px;letter-spacing:.12em;opacity:.75;font-weight:800}.hero h1{margin:2px 0 0;font-size:28px;line-height:1;font-weight:950}.sub{font-size:12px;opacity:.82;margin-top:5px}.badge{width:58px;height:58px;border-radius:18px;background:#fff2;border:1px solid #fff4;display:grid;place-items:center;font-weight:950}.tabs{display:flex;gap:8px;overflow:auto;margin:14px -14px 0;padding:0 14px 2px}.tab{border:0;border-radius:14px;padding:10px 12px;background:#fff2;color:#fff;font-weight:850;white-space:nowrap}.tab.on{background:#fff;color:#0756c8}.wrap{padding:14px;max-width:960px;margin:auto}.notice{background:#fff;border:1px solid #e6e8ef;border-radius:18px;padding:12px 14px;margin-bottom:12px;box-shadow:0 4px 18px #0000000a}.notice b{display:block}.notice span{font-size:13px;color:#697386}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.card{border:1px solid #e6e8ef;background:#fff;border-radius:18px;padding:12px;text-align:left;box-shadow:0 6px 20px #131f420f}.card h3{font-size:14px;line-height:1.25;margin:0 0 8px}.pill{display:inline-block;border-radius:8px;background:#eef4ff;color:#0756c8;padding:4px 7px;font-size:11px;font-weight:900}.price{margin-top:8px;font-size:13px;color:#697386}.empty{text-align:center;margin-top:28px;padding:34px 18px;background:#fff;border:1px solid #e6e8ef;border-radius:26px}.sheet{position:fixed;inset:0;z-index:10;background:#111827aa;display:none;align-items:flex-end}.sheet.on{display:flex}.panel{background:#fff;width:100%;max-height:90vh;overflow:auto;border-radius:26px 26px 0 0;padding:16px}.panel h2{font-size:19px;line-height:1.25;margin:0 0 8px}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}.m{border:1px solid #e6e8ef;border-radius:14px;padding:9px;background:#fbfcff}.m span{display:block;font-size:11px;color:#697386;font-weight:800}.m b{display:block;font-size:16px}.qty{display:flex;gap:8px;align-items:center}.qty button{width:44px;height:44px;border:0;border-radius:14px;background:#eef4ff;color:#0756c8;font-size:24px;font-weight:900}.qty input{flex:1;border:1px solid #e6e8ef;border-radius:14px;padding:12px;font-size:18px;font-weight:900}.tier{border:1px solid #e6e8ef;border-radius:14px;padding:9px 10px;margin-top:8px;display:flex;justify-content:space-between;font-size:13px}.tier.on{background:#eefaf4;border-color:#1fa56f}.result{background:linear-gradient(135deg,#0f9c68,#20c28b);color:#fff;border-radius:18px;padding:14px;margin-top:12px}.result span{display:block;font-size:12px;opacity:.82}.result b{font-size:27px}.close{width:100%;margin-top:12px;border:0;border-radius:16px;padding:14px;background:#111827;color:#fff;font-weight:900}.warn{margin-top:10px;background:#fff6db;border:1px solid #ffe4a3;border-radius:14px;padding:10px;color:#7a4c00;font-size:13px}.err{padding:18px;border-radius:18px;background:#fff2f2;color:#9b1c1c;border:1px solid #ffd0d0}@media(min-width:720px){.grid{grid-template-columns:repeat(3,1fr)}.panel{max-width:520px;margin:auto;border-radius:26px}.sheet{align-items:center}}
  </style>
</head>
<body>
<header class="hero"><div class="row"><div><div class="eyebrow">โปรโมชัน กรกฎาคม 2569</div><h1>คุ้มเวอร์!</h1><div class="sub">หน้า live ดึงข้อมูลจาก Supabase</div></div><div class="badge" id="badge">HFS-S</div></div><nav class="tabs" id="tabs"></nav></header>
<main class="wrap"><div class="notice"><b id="head">กำลังโหลด</b><span id="sum">รอสักครู่</span></div><section id="content">กำลังโหลด...</section></main>
<div class="sheet" id="sheet"><div class="panel"><div id="detail"></div></div></div>
<script>
const URL='https://saodmeoilixfdqentofp.supabase.co';
const KEY='sb_publishable_JThYwAl_-askk_cIaCd75w_TCWK2BTT';
const CL=[['HFSS','HFS-S'],['HFSM','HFS-M'],['HFSL','HFS-L'],['HFSXL','HFS-XL'],['HFSWSS','HFS-WS-S'],['HFSWSL','HFS-WS-L']];
let active='HFSS',counts={},cards=[],sel=null;
const el=id=>document.getElementById(id);const money=n=>Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});
function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
async function api(q){const r=await fetch(URL+'/rest/v1/'+q,{headers:{apikey:KEY,Authorization:'Bearer '+KEY}});if(!r.ok)throw Error(await r.text());return r.json();}
function label(id){return (CL.find(x=>x[0]===id)||CL[0])[1]}
function tabs(){el('tabs').innerHTML=CL.map(c=>`<button class="tab ${c[0]===active?'on':''}" onclick="setClass('${c[0]}')">${c[1]} ${counts[c[0]]?'<small>'+counts[c[0]]+'</small>':''}</button>`).join('');el('badge').textContent=label(active)}
window.setClass=async id=>{active=id;tabs();await load()}
async function init(){const rows=await api('promo_cards?promo_month_id=eq.JUL26&status=eq.ready&select=class_id');counts={};rows.forEach(r=>counts[r.class_id]=(counts[r.class_id]||0)+1);tabs();await load()}
async function load(){el('content').innerHTML='กำลังโหลด...';el('head').textContent='กำลังโหลด '+label(active);el('sum').textContent='แสดงเฉพาะรายการที่ status=ready';cards=await api(`promo_cards?promo_month_id=eq.JUL26&class_id=eq.${active}&status=eq.ready&select=*,promo_tiers(*)&order=sort_order.asc`);render()}
function render(){if(!cards.length){el('head').textContent=label(active)+' กำลังตรวจสอบ';el('sum').textContent='คลาสนี้ยังไม่เปิดราคาเพื่อกันคำนวณผิด';el('content').innerHTML='<div class="empty"><h2>🛠️ กำลังตรวจสอบข้อมูล</h2><p>มีการ์ดในฐานข้อมูลแล้ว แต่ยังไม่ปล่อยให้คำนวณจนกว่าตรวจราคาและเงื่อนไขครบ</p></div>';return}el('head').textContent=label(active)+' พร้อมใช้ '+cards.length+' ใบ';el('sum').textContent='กดการ์ดเพื่อคำนวณราคา';el('content').className='grid';el('content').innerHTML=cards.map((c,i)=>`<button class="card" onclick="openCard(${i})"><h3>${esc(c.promo_title)}</h3><span class="pill">แตะดูราคา</span><div class="price">ฐาน ฿${money(c.base_unit_price)} / ${esc(c.unit_label||'หน่วย')}</div></button>`).join('')}
function pick(q,tiers){const s=[...(tiers||[])].filter(t=>t.min_qty!=null).sort((a,b)=>Number(a.min_qty)-Number(b.min_qty));let a=null,n=null;for(const t of s){const min=Number(t.min_qty||0),max=t.max_qty==null?Infinity:Number(t.max_qty);if(q>=min&&q<=max)a=t;else if(q<min&&!n)n=t}return{a,n,s}}
function calc(c,q){const base=Number(c.base_unit_price||0);const p=pick(q,c.promo_tiers||[]);const d=Number(p.a?.discount_percent||0);const unit=base*(1-d/100);return{...p,base,d,unit,total:unit*q,save:(base-unit)*q}}
window.openCard=i=>{sel=cards[i];draw(1);el('sheet').classList.add('on')}
window.draw=q=>{q=Math.max(1,Math.floor(q||1));const c=sel,r=calc(c,q),u=c.unit_label||'หน่วย';el('detail').innerHTML=`<h2>${esc(c.promo_title)}</h2><div class="metrics"><div class="m"><span>ฐาน</span><b>฿${money(r.base)}</b></div><div class="m"><span>หน่วย</span><b>${esc(u)}</b></div><div class="m"><span>ส่วนลด</span><b>${r.a?r.d+'%':'-'}</b></div></div><div class="qty"><button onclick="draw(${q-1})">−</button><input type="number" min="1" value="${q}" oninput="draw(Number(this.value||1))"><button onclick="draw(${q+1})">+</button></div>${r.s.map(t=>`<div class="tier ${r.a&&r.a.tier_id===t.tier_id?'on':''}"><span>${esc(t.min_qty_text||'')}</span><b>${Number(t.discount_percent||0)}%</b></div>`).join('')}${!r.a&&r.n?`<div class="warn">ซื้ออีก ${Math.max(0,Number(r.n.min_qty)-q)} ${esc(u)} ถึงขั้น ${esc(r.n.min_qty_text||'')}</div>`:''}<div class="result"><span>ยอดหลังส่วนลด</span><b>฿${money(r.total)}</b><span>ประหยัด ฿${money(r.save)} | ราคา/${esc(u)} ฿${money(r.unit)}</span></div><button class="close" onclick="closeSheet()">ปิด</button>`}
window.closeSheet=()=>el('sheet').classList.remove('on');el('sheet').onclick=e=>{if(e.target.id==='sheet')closeSheet()};init().catch(e=>{el('content').className='err';el('content').textContent='โหลดข้อมูลไม่สำเร็จ: '+e.message});
</script>
</body>
</html>
