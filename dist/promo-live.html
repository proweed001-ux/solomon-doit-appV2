<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Promo JUL26 Live</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Tahoma,sans-serif;background:#f6f7fb;color:#172033}.hero{position:sticky;top:0;z-index:2;padding:18px 14px 12px;color:#fff;background:linear-gradient(135deg,#0756c8,#149ee8);box-shadow:0 8px 24px #0002}.row{display:flex;gap:10px;align-items:center;justify-content:space-between}.eyebrow{font-size:11px;letter-spacing:.12em;opacity:.75;font-weight:800}.hero h1{margin:2px 0 0;font-size:28px;line-height:1;font-weight:950}.sub{font-size:12px;opacity:.82;margin-top:5px}.badge{width:70px;height:58px;border-radius:18px;background:#fff2;border:1px solid #fff4;display:grid;place-items:center;font-weight:950}.tabs{display:flex;gap:8px;overflow:auto;margin:14px -14px 0;padding:0 14px 2px}.tab{border:0;border-radius:14px;padding:10px 12px;background:#fff2;color:#fff;font-weight:850;white-space:nowrap}.tab.on{background:#fff;color:#0756c8}.wrap{padding:14px;max-width:1060px;margin:auto}.notice{background:#fff;border:1px solid #e6e8ef;border-radius:18px;padding:12px 14px;margin-bottom:12px;box-shadow:0 4px 18px #0000000a}.notice b{display:block}.notice span{font-size:13px;color:#697386}.filters{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:12px}.filters input{height:42px;border:1px solid #d7dce8;border-radius:14px;padding:0 12px;font-weight:800}.filters button{border:0;border-radius:14px;background:#172033;color:#fff;padding:0 14px;font-weight:900}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.card{border:1px solid #e6e8ef;background:#fff;border-radius:18px;padding:0;text-align:left;box-shadow:0 6px 20px #131f420f;overflow:hidden}.cardImg{width:100%;aspect-ratio:1.28/1;object-fit:contain;background:#fff;border-bottom:1px solid #edf0f7}.noImg{height:180px;display:grid;place-items:center;background:#eef2f7;color:#64748b;font-weight:900;border-bottom:1px solid #edf0f7}.body{padding:12px}.card h3{font-size:14px;line-height:1.25;margin:0 0 8px}.pill{display:inline-block;border-radius:8px;background:#eef4ff;color:#0756c8;padding:4px 7px;font-size:11px;font-weight:900}.pill.ok{background:#dcfce7;color:#166534}.pill.wait{background:#ffedd5;color:#9a3412}.pill.bad{background:#fee2e2;color:#991b1b}.price{margin-top:8px;font-size:13px;color:#697386}.func{margin-top:8px;padding:8px;border-radius:12px;background:#fff7ed;color:#7c2d12;font-size:12px;font-weight:850;line-height:1.35}.empty{text-align:center;margin-top:28px;padding:34px 18px;background:#fff;border:1px solid #e6e8ef;border-radius:26px}.sheet{position:fixed;inset:0;z-index:10;background:#111827aa;display:none;align-items:flex-end}.sheet.on{display:flex}.panel{background:#fff;width:100%;max-height:92vh;overflow:auto;border-radius:26px 26px 0 0;padding:16px}.panel img{width:100%;max-height:420px;object-fit:contain;border:1px solid #e6e8ef;border-radius:16px;background:#fff}.panel h2{font-size:18px;line-height:1.3;margin:12px 0 8px}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}.m{border:1px solid #e6e8ef;border-radius:14px;padding:9px;background:#fbfcff}.m span{display:block;font-size:11px;color:#697386;font-weight:800}.m b{display:block;font-size:16px}.qty{display:flex;gap:8px;align-items:center}.qty button{width:44px;height:44px;border:0;border-radius:14px;background:#eef4ff;color:#0756c8;font-size:24px;font-weight:900}.qty input{flex:1;border:1px solid #e6e8ef;border-radius:14px;padding:12px;font-size:18px;font-weight:900}.tier{border:1px solid #e6e8ef;border-radius:14px;padding:9px 10px;margin-top:8px;display:flex;justify-content:space-between;font-size:13px;gap:8px}.tier.on{background:#eefaf4;border-color:#1fa56f}.result{background:linear-gradient(135deg,#0f9c68,#20c28b);color:#fff;border-radius:18px;padding:14px;margin-top:12px}.result span{display:block;font-size:12px;opacity:.82}.result b{font-size:27px}.close{width:100%;margin-top:12px;border:0;border-radius:16px;padding:14px;background:#111827;color:#fff;font-weight:900}.warn{margin-top:10px;background:#fff6db;border:1px solid #ffe4a3;border-radius:14px;padding:10px;color:#7a4c00;font-size:13px}.err{padding:18px;border-radius:18px;background:#fff2f2;color:#9b1c1c;border:1px solid #ffd0d0}@media(min-width:720px){.grid{grid-template-columns:repeat(3,1fr)}.panel{max-width:620px;margin:auto;border-radius:26px}.sheet{align-items:center}}@media(min-width:980px){.grid{grid-template-columns:repeat(4,1fr)}}
  </style>
</head>
<body>
<header class="hero"><div class="row"><div><div class="eyebrow">โปรโมชัน กรกฎาคม 2569</div><h1>คุ้มเวอร์!</h1><div class="sub">หน้า live ดึงรูป + เงื่อนไขโปรจาก Supabase</div></div><div class="badge" id="badge">HFS-S</div></div><nav class="tabs" id="tabs"></nav></header>
<main class="wrap"><div class="notice"><b id="head">กำลังโหลด</b><span id="sum">รอสักครู่</span></div><div class="filters"><input id="q" placeholder="ค้นหาชื่อโปร / เงื่อนไข / รหัสการ์ด"><button id="clear">ล้าง</button></div><section id="content">กำลังโหลด...</section></main>
<div class="sheet" id="sheet"><div class="panel"><div id="detail"></div></div></div>
<script>
const URL='https://saodmeoilixfdqentofp.supabase.co';
const KEY='sb_publishable_JThYwAl_-askk_cIaCd75w_TCWK2BTT';
const CL=[['HFSS','HFS-S'],['HFSM','HFS-M'],['HFSL','HFS-L'],['HFSXL','HFS-XL'],['HFSWSS','HFS-WS-S'],['HFSWSL','HFS-WS-L']];
let active='HFSS',counts={},cards=[],tiersByCard={},sel=null;
const el=id=>document.getElementById(id);const money=n=>Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});
function esc(s){return String(s||'').replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m]));}
async function api(q){const r=await fetch(URL+'/rest/v1/'+q,{headers:{apikey:KEY,Authorization:'Bearer '+KEY}});if(!r.ok)throw Error(await r.text());return r.json();}
function label(id){return (CL.find(x=>x[0]===id)||CL[0])[1]}
function tabs(){el('tabs').innerHTML=CL.map(c=>`<button class="tab ${c[0]===active?'on':''}" onclick="setClass('${c[0]}')">${c[1]} ${counts[c[0]]?'<small>'+counts[c[0]]+'</small>':''}</button>`).join('');el('badge').textContent=label(active)}
window.setClass=async id=>{active=id;tabs();await load()}
async function init(){
  const [rows,tiers]=await Promise.all([
    api('promo_cards_with_functions?promo_month_id=eq.JUL26&select=class_id'),
    api('promo_tiers?select=*')
  ]);
  counts={};rows.forEach(r=>counts[r.class_id]=(counts[r.class_id]||0)+1);
  tiersByCard={};(tiers||[]).filter(t=>String(t.card_id||'').startsWith('JUL26-')).forEach(t=>{(tiersByCard[t.card_id] ||= []).push(t)});
  Object.values(tiersByCard).forEach(a=>a.sort((x,y)=>Number(x.tier_no||0)-Number(y.tier_no||0)));
  tabs();await load()
}
async function load(){el('content').className='';el('content').innerHTML='กำลังโหลด...';el('head').textContent='กำลังโหลด '+label(active);el('sum').textContent='แสดงทุกใบ ทั้ง ready และ need_review';cards=await api(`promo_cards_with_functions?promo_month_id=eq.JUL26&class_id=eq.${active}&select=card_id,class_id,page_no,card_no,promo_title,status,image_url,image_name,base_unit_price,unit_label,function_label,function_type,function_payload,function_review_status&order=card_no.asc`);cards.forEach(c=>c.tiers=tiersByCard[c.card_id]||[]);render()}
function statusText(c){if(c.status==='ready'&&Number(c.base_unit_price)>0)return ['พร้อมคำนวณ','ok'];if(c.image_url)return ['มีรูป/รอราคา','wait'];return ['ยังไม่มีรูป','bad']}
function hasBenefitText(t){return /ลด|ฟรี|%/.test(String(t||''))}
function tierMin(t){return Number(t.min_qty||t.qty_min||t.qty||t.buy_qty||1)}
function tierMax(t){return t.max_qty!=null?Number(t.max_qty):(t.qty_max!=null?Number(t.qty_max):Infinity)}
function tierDiscount(t){return Number(t.discount_percent||t.effective_percent||0)}
function tierLabel(t,unitLabel){
  const text=String(t.min_qty_text||t.text||'').trim();
  const min=tierMin(t),max=tierMax(t),unit=t.unit||unitLabel||'ชิ้น',d=tierDiscount(t),free=Number(t.free_qty||t.free||0);
  if(text){
    if(/^ลด\s*\d/.test(text)&&min>1)return `เมื่อซื้อ ${min} ${unit} ${text}`;
    if(/^ฟรี/.test(text)&&min>1)return `เมื่อซื้อ ${min} ${unit} ${text}`;
    return text;
  }
  if(free>0&&min>0)return `เมื่อซื้อ ${min} ${unit} ฟรี ${free} ${unit}${d?` (${d}%)`:''}`;
  if(d>0&&min>1)return `เมื่อซื้อ ${min}${max!==Infinity?'-'+max:''} ${unit} ลด ${d}%`;
  if(d>0)return `ลด ${d}%`;
  return '-';
}
function tiersFrom(c){
  if(Array.isArray(c.tiers)&&c.tiers.length)return c.tiers;
  let p=c.function_payload;if(typeof p==='string'){try{p=JSON.parse(p)}catch{p=null}}
  return Array.isArray(p?.tiers)?p.tiers:[];
}
function promoText(c){const ts=tiersFrom(c);if(ts.length)return ts.map(t=>tierLabel(t,c.unit_label)).filter(Boolean).join('; ');return c.function_label||'ยังไม่มีเงื่อนไขโปร'}
function render(){const q=el('q').value.trim().toLowerCase();let rows=cards.filter(c=>!q||[c.card_id,c.promo_title,promoText(c),c.status].join(' ').toLowerCase().includes(q));if(!rows.length){el('head').textContent=label(active)+' ไม่มีรายการ';el('sum').textContent='ลองล้างคำค้นหา';el('content').className='';el('content').innerHTML='<div class="empty"><h2>ไม่พบรายการ</h2></div>';return}const ready=rows.filter(c=>c.status==='ready'&&Number(c.base_unit_price)>0).length,img=rows.filter(c=>c.image_url).length;el('head').textContent=`${label(active)} แสดง ${rows.length} ใบ`;el('sum').textContent=`มีรูป ${img}/${rows.length} | คำนวณได้ ${ready}/${rows.length}`;el('content').className='grid';el('content').innerHTML=rows.map((c)=>{const st=statusText(c);return `<button class="card" onclick="openCard('${c.card_id}')">${c.image_url?`<img class="cardImg" src="${c.image_url}" loading="lazy" alt="${esc(c.card_id)}">`:`<div class="noImg">ยังไม่มีรูป</div>`}<div class="body"><h3>${esc(c.promo_title||c.card_id)}</h3><span class="pill ${st[1]}">${st[0]}</span><span class="pill">${esc(c.card_id)}</span><div class="func">${esc(promoText(c))}</div><div class="price">${Number(c.base_unit_price)>0?'ฐาน ฿'+money(c.base_unit_price)+' / '+esc(c.unit_label||'หน่วย'):'รอใส่ราคา จึงยังคำนวณไม่ได้'}</div></div></button>`}).join('')}
function pick(q,tiers){const s=[...tiers].sort((a,b)=>tierMin(a)-tierMin(b));let a=null,n=null;for(const t of s){const min=tierMin(t),max=tierMax(t);if(q>=min&&q<=max)a=t;else if(q<min&&!n)n=t}return{a,n,s}}
function calc(c,q){const base=Number(c.base_unit_price||0);const p=pick(q,tiersFrom(c));const d=tierDiscount(p.a||{});const unit=base*(1-d/100);return{...p,base,d,unit,total:unit*q,save:(base-unit)*q}}
window.openCard=id=>{sel=cards.find(c=>c.card_id===id);draw(1);el('sheet').classList.add('on')}
window.draw=q=>{q=Math.max(1,Math.floor(q||1));const c=sel,r=calc(c,q),u=c.unit_label||'หน่วย',can=Number(c.base_unit_price)>0;el('detail').innerHTML=`${c.image_url?`<img src="${c.image_url}" alt="${esc(c.card_id)}">`:'<div class="noImg">ยังไม่มีรูป</div>'}<h2>${esc(c.promo_title||c.card_id)}</h2><span class="pill">${esc(c.card_id)}</span> <span class="pill ${statusText(c)[1]}">${statusText(c)[0]}</span><div class="func">${esc(promoText(c))}</div><div class="metrics"><div class="m"><span>ฐาน</span><b>${can?'฿'+money(r.base):'-'}</b></div><div class="m"><span>หน่วย</span><b>${esc(u)}</b></div><div class="m"><span>ส่วนลด</span><b>${r.a?r.d+'%':'-'}</b></div></div>${can?`<div class="qty"><button onclick="draw(${q-1})">−</button><input type="number" min="1" value="${q}" oninput="draw(Number(this.value||1))"><button onclick="draw(${q+1})">+</button></div>`:''}${r.s.map(t=>`<div class="tier ${r.a&&tierLabel(r.a,u)===tierLabel(t,u)?'on':''}"><span>${esc(tierLabel(t,u))}</span><b>${tierDiscount(t)}%</b></div>`).join('')}${!can?'<div class="warn">ใบนี้ยังไม่มีราคาฐาน จึงยังคำนวณยอดไม่ได้ แต่รูปและเงื่อนไขโปรแสดงได้แล้ว</div>':(!r.a&&r.n?`<div class="warn">ซื้ออีก ${Math.max(0,tierMin(r.n)-q)} ${esc(u)} ถึงขั้น ${esc(tierLabel(r.n,u))}</div>`:'')}${can?`<div class="result"><span>ยอดหลังส่วนลด</span><b>฿${money(r.total)}</b><span>ประหยัด ฿${money(r.save)} | ราคา/${esc(u)} ฿${money(r.unit)}</span></div>`:''}<button class="close" onclick="closeSheet()">ปิด</button>`}
window.closeSheet=()=>el('sheet').classList.remove('on');el('sheet').onclick=e=>{if(e.target.id==='sheet')closeSheet()};el('q').oninput=render;el('clear').onclick=()=>{el('q').value='';render()};init().catch(e=>{el('content').className='err';el('content').textContent='โหลดข้อมูลไม่สำเร็จ: '+e.message});
</script>
</body>
</html>
