0 8px}.pill{display:inline-block;border-radius:8px;background:#eef4ff;color:#0756c8;padding:4px 7px;font-size:11px;font-weight:900}.pill.ok{background:#dcfce7;color:#166534}.pill.wait{background:#ffedd5;color:#9a3412}.pill.bad{background:#fee2e2;color:#991b1b}.price{margin-top:8px;font-size:13px;color:#697386}.func{margin-top:8px;padding:8px;border-radius:12px;background:#fff7ed;color:#7c2d12;font-size:12px;font-weight:850;line-height:1.35}.packing{margin-top:8px;padding:8px;border-radius:12px;background:#eff6ff;color:#1e3a8a;font-size:12px;font-weight:850;line-height:1.4}.empty{text-align:center;margin-top:28px;padding:34px 18px;background:#fff;border:1px solid #e6e8ef;border-radius:26px}.sheet{position:fixed;inset:0;z-index:10;background:#111827aa;display:none;align-items:flex-end}.sheet.on{display:flex}.panel{background:#fff;width:100%;max-height:92vh;overflow:auto;border-radius:26px 26px 0 0;padding:16px}.panel img{width:100%;max-height:420px;object-fit:contain;border:1px solid #e6e8ef;border-radius:16px;background:#fff}.panel h2{font-size:18px;line-height:1.3;margin:12px 0 8px}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}.m{border:1px solid #e6e8ef;border-radius:14px;padding:9px;background:#fbfcff}.m span{display:block;font-size:11px;color:#697386;font-weight:800}.m b{display:block;font-size:16px}.qtyWrap{display:grid;grid-template-columns:1fr 130px;gap:8px;margin-top:10px}.qty{display:flex;gap:8px;align-items:center}.qty button{width:44px;height:44px;border:0;border-radius:14px;background:#eef4ff;color:#0756c8;font-size:24px;font-weight:900}.qty input,.qtyWrap select{width:100%;height:44px;border:1px solid #e6e8ef;border-radius:14px;padding:0 12px;font-size:17px;font-weight:900;background:#fff}.qty input{flex:1}.tier{border:1px solid #e6e8ef;border-radius:14px;padding:9px 10px;margin-top:8px;display:flex;justify-content:space-between;font-size:13px;gap:8px}.tier.on{background:#eefaf4;border-color:#1fa56f}.result{background:linear-gradient(135deg,#0f9c68,#20c28b);color:#fff;border-radius:18px;padding:14px;margin-top:12px}.result span{display:block;font-size:12px;opacity:.86}.result b{font-size:27px}.close{width:100%;margin-top:12px;border:0;border-radius:16px;padding:14px;background:#111827;color:#fff;font-weight:900}.warn{margin-top:10px;background:#fff6db;border:1px solid #ffe4a3;border-radius:14px;padding:10px;color:#7a4c00;font-size:13px}.err{padding:18px;border-radius:18px;background:#fff2f2;color:#9b1c1c;border:1px solid #ffd0d0}@media(max-width:480px){.qtyWrap{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}}@media(min-width:720px){.grid{grid-template-columns:repeat(3,1fr)}.panel{max-width:620px;margin:auto;border-radius:26px}.sheet{align-items:center}}@media(min-width:980px){.grid{grid-template-columns:repeat(4,1fr)}}

<body>
<header class="hero"><div class="row"><div><div class="eyebrow" id="monthLabel">กำลังหาเดือนล่าสุด</div><h1>คุ้มเวอร์!</h1><div class="sub">แสดงเฉพาะโปรโมชันเดือนล่าสุดที่เผยแพร่แล้ว</div></div><div class="badge" id="badge">HFS-S</div></div><nav class="tabs" id="tabs"></nav></header>
<main class="wrap"><div class="notice"><b id="head">กำลังโหลด</b><span id="sum">รอสักครู่</span></div><div class="filters"><input id="q" placeholder="ค้นหาชื่อโปร / เงื่อนไข / รหัสการ์ด"><button id="clear">ล้าง</button></div><section id="content">กำลังโหลด...</section></main>
<div class="sheet" id="sheet"><div class="panel"><div id="detail"></div></div></div>
<script src="/assets/promo-packing-master.js?v=20260713-2"></script>
<script>
const URL='https://saodmeoilixfdqentofp.supabase.co';
const KEY='sb_publishable_JThYwAl_-askk_cIaCd75w_TCWK2BTT';
const CL=[['HFSS','HFS-S'],['HFSM','HFS-M'],['HFSL','HFS-L'],['HFSXL','HFS-XL'],['HFSWSS','HFS-WS-S'],['HFSWSL','HFS-WS-L']];
const PACK=window.PromoPacking;
let active='HFSS',activeMonth='',activeMonthLabel='',counts={},cards=[],tiersByCard={},sel=null,inputUnit='',inputQty=1;
const el=id=>document.getElementById(id);
const money=n=>Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmt=n=>Number(n||0).toLocaleString('th-TH',{maximumFractionDigits:2});
function esc(s){return String(s||'').replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m]));}
async function api(q){const r=await fetch(URL+'/rest/v1/'+q,{headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Cache-Control':'no-cache'}});if(!r.ok)throw Error(await r.text());return r.json();}
function label(id){return (CL.find(x=>x[0]===id)||CL[0])[1]}
function tabs(){el('tabs').innerHTML=CL.map(c=>`<button class="tab ${c[0]===active?'on':''}" onclick="setClass('${c[0]}')">${c[1]} ${counts[c[0]]?'<small>'+counts[c[0]]+'</small>':''}</button>`).join('');el('badge').textContent=label(active)}
window.setClass=async id=>{active=id;tabs();await load()}
async function latestMonth(){const rows=await api('promo_months?status=eq.published&select=id,label,year_month,status,published_at,updated_at&order=published_at.desc.nullslast,updated_at.desc&limit=1');if(!rows.length)throw Error('ยังไม่มีเดือนโปรโมชั่นที่เผยแพร่แล้ว');return rows[0]}
async function init(){
  if(!PACK)throw Error('โหลดค่าบรรจุกลางไม่สำเร็จ');
  const month=await latestMonth();activeMonth=month.id;activeMonthLabel=month.label||month.id;el('monthLabel').textContent=activeMonthLabel;
  const [rows,tiers]=await Promise.all([api(`promo_cards_with_functions?promo_month_id=eq.${encodeURIComponent(activeMonth)}&select=class_id`),api(`promo_tiers?card_id=like.${encodeURIComponent(activeMonth+'-*')}&select=*`)]);
  counts={};rows.forEach(r=>counts[r.class_id]=(counts[r.class_id]||0)+1);
  tiersByCard={};(tiers||[]).forEach(t=>{(tiersByCard[t.card_id] ||= []).push(t)});Object.values(tiersByCard).forEach(a=>a.sort((x,y)=>Number(x.tier_no||0)-Number(y.tier_no||0)));
  tabs();await load();
}
async function load(){
  el('content').className='';el('content').innerHTML='กำลังโหลด...';el('head').textContent='กำลังโหลด '+label(active);el('sum').textContent=`เดือน ${activeMonth}`;
  cards=await api(`promo_cards_with_functions?promo_month_id=eq.${encodeURIComponent(activeMonth)}&class_id=eq.${active}&select=card_id,class_id,page_no,card_no,promo_title,status,image_url,image_name,group_id,base_unit_price,unit_label,function_label,function_type,function_payload,function_review_status&order=card_no.asc`);
  cards.forEach(c=>{c.tiers=tiersByCard[c.card_id]||[];c.packingRule=PACK.resolveRule(c)});render();
}
function priceUnit(c){return PACK.normalizeUnit(c.unit_label||c.packingRule?.base_unit||'ชิ้น')}
function tierUnit(t,c){return PACK.normalizeUnit(t.unit||priceUnit(c))}
function tierMin(t){return Number(t.min_qty||t.qty_min||t.qty||t.buy_qty||1)}
function tierMax(t){return t.max_qty!=null?Number(t.max_qty):(t.qty_max!=null?Number(t.qty_max):Infinity)}
function cashDiscount(t){return Number(t.discount_percent||0)}
function tierDiscount(t){return Number(t.discount_percent||t.effective_percent||0)}
function tierFree(t){return Number(t.free_qty||t.free||0)}
function tierLabel(t,unitLabel){const text=String(t.min_qty_text||t.text||'').trim(),min=tierMin(t),max=tierMax(t),unit=t.unit||unitLabel||'ชิ้น',d=tierDiscount(t),free=tierFree(t),freeUnit=t.free_unit||unit;if(text){if(/^ลด\s*\d/.test(text)&&min>1)return`เมื่อซื้อ ${min} ${unit} ${text}`;if(/^ฟรี/.test(text)&&min>1)return`เมื่อซื้อ ${min} ${unit} ${text}`;return text}if(free>0&&min>0)return`เมื่อซื้อ ${min} ${unit} ฟรี ${free} ${freeUnit}${d?` (${d}%)`:''}`;if(d>0&&min>1)return`เมื่อซื้อ ${min}${max!==Infinity?'-'+max:''} ${unit} ลด ${d}%`;if(d>0)return`ลด ${d}%`;return'-'}
function tiersFrom(c){if(Array.isArray(c.tiers)&&c.tiers.length)return c.tiers;let p=c.function_payload;if(typeof p==='string'){try{p=JSON.parse(p)}catch{p=null}}return Array.isArray(p?.tiers)?p.tiers:[]}
function promoText(c){const ts=tiersFrom(c);if(ts.length)return ts.map(t=>tierLabel(t,c.unit_label)).filter(Boolean).join('; ');return c.function_label||'ยังไม่มีเงื่อนไขโปร'}
function convert(q,from,to,rule){return PACK.convert(q,from,to,rule)}
function normalizedTier(t,c){const pu=priceUnit(c),tu=tierUnit(t,c),rule=c.packingRule,min=convert(tierMin(t),tu,pu,rule),rawMax=tierMax(t),max=rawMax===Infinity?Infinity:convert(rawMax,tu,pu,rule),freeUnit=PACK.normalizeUnit(t.free_unit||tu),free=tierFree(t),freeBase=free>0?convert(free,freeUnit,pu,rule):0;return{raw:t,min,max,freeBase,valid:min!=null&&max!=null&&(free===0||freeBase!=null)}}
function unitsReady(c){return tiersFrom(c).every(t=>normalizedTier(t,c).valid)}
function statusText(c){if(c.status==='ready'&&Number(c.base_unit_price)>0&&unitsReady(c))return['พร้อมคำนวณ','ok'];if(Number(c.base_unit_price)>0&&!unitsReady(c))return['รอค่าบรรจุ','wait'];if(c.image_url)return['มีรูป/รอราคา','wait'];return['ยังไม่มีรูป','bad']}
function availableUnits(c){const list=c.packingRule?PACK.units(c.packingRule):[priceUnit(c)];if(!list.includes(priceUnit(c)))list.unshift(priceUnit(c));return[...new Set(list.filter(Boolean))]}
function packingText(c){return c.packingRule?`${c.packingRule.category_th}: ${PACK.describe(c.packingRule)}`:''}
function render(){const q=el('q').value.trim().toLowerCase();let rows=cards.filter(c=>!q||[c.card_id,c.promo_title,promoText(c),packingText(c),c.status].join(' ').toLowerCase().includes(q));if(!rows.length){el('head').textContent=label(active)+' ไม่มีรายการ';el('sum').textContent='ลองล้างคำค้นหา';el('content').className='';el('content').innerHTML='<div class="empty"><h2>ไม่พบรายการ</h2></div>';return}const ready=rows.filter(c=>c.status==='ready'&&Number(c.base_unit_price)>0&&unitsReady(c)).length,img=rows.filter(c=>c.image_url).length,packing=rows.filter(c=>c.packingRule).length;el('head').textContent=`${label(active)} แสดง ${rows.length} ใบ`;el('sum').textContent=`${activeMonthLabel} | มีรูป ${img}/${rows.length} | คำนวณได้ ${ready}/${rows.length} | จับค่าบรรจุ ${packing}/${rows.length}`;el('content').className='grid';el('content').innerHTML=rows.map(c=>{const st=statusText(c),pack=packingText(c);return`<button class="card" onclick="openCard('${c.card_id}')">${c.image_url?`<img class="cardImg" src="${c.image_url}?v=${encodeURIComponent(activeMonth)}" loading="lazy" alt="${esc(c.card_id)}">`:`<div class="noImg">ยังไม่มีรูป</div>`}<div class="body"><h3>${esc(c.promo_title||c.card_id)}</h3><span class="pill ${st[1]}">${st[0]}</span><span class="pill">${esc(c.card_id)}</span><div class="func">${esc(promoText(c))}</div>${pack?`<div class="packing">${esc(pack)}</div>`:''}<div class="price">${Number(c.base_unit_price)>0?'ฐาน ฿'+money(c.base_unit_price)+' / '+esc(priceUnit(c)):'รอใส่ราคา จึงยังคำนวณไม่ได้'}</div></div></button>`}).join('')}
function pick(q,c){const s=tiersFrom(c).map(t=>normalizedTier(t,c)).sort((a,b)=>(a.min??Infinity)-(b.min??Infinity));if(s.some(t=>!t.valid))return{a:null,n:null,s,invalid:true};let a=null,n=null;for(const t of s){if(q>=t.min&&q<=t.max)a=t;else if(q<t.min&&!n)n=t}return{a,n,s,invalid:false}}
function calc(c,q,fromUnit){const base=Number(c.base_unit_price||0),pu=priceUnit(c),rule=c.packingRule,baseQty=convert(q,fromUnit,pu,rule);if(baseQty==null)return{base,priceUnit:pu,baseQty:null,unitError:true,a:null,n:null,s:[]};const p=pick(baseQty,c);if(p.invalid)return{...p,base,priceUnit:pu,baseQty,unitError:true};const tier=p.a?.raw||{},discount=cashDiscount(tier),freeBase=p.a?.freeBase||0,gross=base*baseQty,net=gross*(1-discount/100),discountSave=gross-net,freeValue=base*freeBase,totalBenefit=discountSave+freeValue,totalReceived=baseQty+freeBase,average=totalReceived>0?net/totalReceived:0;return{...p,base,priceUnit:pu,baseQty,unitError:false,discount,effective:tierDiscount(tier),freeBase,gross,net,discountSave,freeValue,totalBenefit,totalReceived,average}}
function optionHtml(c){return availableUnits(c).map(u=>`<option value="${esc(u)}"${u===inputUnit?' selected':''}>${esc(u)}</option>`).join('')}
window.openCard=id=>{sel=cards.find(c=>c.card_id===id);inputUnit=priceUnit(sel);inputQty=1;draw(1);el('sheet').classList.add('on')}
window.setInputUnit=u=>{inputUnit=PACK.normalizeUnit(u);draw(inputQty)}
window.draw=q=>{inputQty=Math.max(1,Math.floor(Number(q)||1));const c=sel,r=calc(c,inputQty,inputUnit),pu=priceUnit(c),can=Number(c.base_unit_price)>0,pack=packingText(c),st=statusText(c),conversion=r.baseQty==null?'แปลงหน่วยไม่ได้':`${fmt(inputQty)} ${inputUnit} = ${fmt(r.baseQty)} ${pu}`;let next='';if(!r.unitError&&!r.a&&r.n){const diffBase=Math.max(0,r.n.min-r.baseQty),diffInput=convert(diffBase,pu,inputUnit,c.packingRule);next=`<div class="warn">ซื้ออีก ${fmt(diffInput==null?diffBase:diffInput)} ${esc(diffInput==null?pu:inputUnit)} ถึงขั้น ${esc(tierLabel(r.n.raw,pu))}</div>`}const tierRows=(r.s||[]).map(t=>`<div class="tier ${r.a===t?'on':''}"><span>${esc(tierLabel(t.raw,pu))}</span><b>${tierDiscount(t.raw)}%</b></div>`).join(''),result=can&&!r.unitError?`<div class="result"><span>ยอดสุทธิหลังโปร</span><b>฿${money(r.net)}</b><span>ยอดก่อนโปร ฿${money(r.gross)} | ประโยชน์รวม ฿${money(r.totalBenefit)}</span><span>รับรวม ${fmt(r.totalReceived)} ${esc(pu)} | เฉลี่ย ฿${money(r.average)} / ${esc(pu)}</span></div>`:'';el('detail').innerHTML=`${c.image_url?`<img src="${c.image_url}?v=${encodeURIComponent(activeMonth)}" alt="${esc(c.card_id)}">`:'<div class="noImg">ยังไม่มีรูป</div>'}<h2>${esc(c.promo_title||c.card_id)}</h2><span class="pill">${esc(c.card_id)}</span> <span class="pill ${st[1]}">${st[0]}</span><div class="func">${esc(promoText(c))}</div>${pack?`<div class="packing"><b>ค่าบรรจุกลาง</b><br>${esc(pack)}</div>`:''}<div class="metrics"><div class="m"><span>ราคาฐาน</span><b>${can?'฿'+money(r.base):'-'}</b></div><div class="m"><span>หน่วยราคา</span><b>${esc(pu)}</b></div><div class="m"><span>แปลงจำนวน</span><b>${esc(conversion)}</b></div><div class="m"><span>ส่วนลดเงินสด</span><b>${r.a?r.discount+'%':'-'}</b></div><div class="m"><span>ของแถม</span><b>${r.a?fmt(r.freeBase)+' '+esc(pu):'-'}</b></div><div class="m"><span>ส่วนลดมีผล</span><b>${r.a?r.effective+'%':'-'}</b></div></div>${can?`<div class="qtyWrap"><div class="qty"><button onclick="draw(${inputQty-1})">−</button><input type="number" min="1" value="${inputQty}" oninput="draw(Number(this.value||1))"><button onclick="draw(${inputQty+1})">+</button></div><select onchange="setInputUnit(this.value)">${optionHtml(c)}</select></div>`:''}${tierRows}${r.unitError?'<div class="warn">หน่วยของราคาและเงื่อนไขโปรไม่ตรงกัน แต่ยังไม่มีค่าบรรจุที่ยืนยัน ระบบจึงไม่เดาและไม่คำนวณยอด</div>':''}${!can?'<div class="warn">ใบนี้ยังไม่มีราคาฐาน จึงยังคำนวณยอดไม่ได้ แต่รูปและเงื่อนไขโปรแสดงได้แล้ว</div>':''}${next}${result}<button class="close" onclick="closeSheet()">ปิด</button>`}
window.closeSheet=()=>el('sheet').classList.remove('on');el('sheet').onclick=e=>{if(e.target.id==='sheet')closeSheet()};el('q').oninput=render;el('clear').onclick=()=>{el('q').value='';render()};init().catch(e=>{el('content').className='err';el('content').textContent='โหลดข้อมูลไม่สำเร็จ: '+e.message});
</script>
</body>
</html>
