<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>เตรียมปริ้นบิลน้ำมัน</title><style>*{box-sizing:border-box}body{margin:0;background:#d9dde3;font-family:Tahoma,Arial,sans-serif;color:#111}.bar{position:sticky;top:0;background:#fff;border-bottom:1px solid #777;padding:6px 8px;z-index:5;display:flex;gap:8px;align-items:center;font-size:13px}.bar b{flex:1}.btn{border:1px solid #222;background:#fff;border-radius:7px;padding:6px 12px;font-weight:700}.page{width:210mm;height:297mm;background:#fff;margin:10px auto;padding:8mm 5mm 5mm;box-shadow:0 0 8px #9ca3af;position:relative;overflow:hidden;background-image:linear-gradient(#e7e7e7 1px,transparent 1px),linear-gradient(90deg,#e7e7e7 1px,transparent 1px);background-size:24mm 7.6mm,24mm 7.6mm}.center{text-align:center}.right{text-align:right}.bold{font-weight:700}.red{color:red;font-weight:700}.title1{font-size:15px;font-weight:700;text-align:center}.title2{font-size:13px;font-weight:700;text-align:center;margin-top:1.5mm}.top1{height:38mm;position:relative}.infoL{position:absolute;left:0;top:16mm;width:93mm;font-size:10.5px}.infoM{position:absolute;left:96mm;top:16mm;width:58mm;font-size:10.5px}.lineRow{display:grid;grid-template-columns:20mm 1fr;height:7.3mm;align-items:end}.lineRow.mid{grid-template-columns:18mm 1fr}.fill{border-bottom:1px dotted #555;padding:0 2px;min-height:5mm}.plateLabel{position:absolute;right:50mm;top:21mm;font-size:10.5px;font-weight:700}.plateBox{position:absolute;right:14mm;top:12.5mm;width:28mm;height:26mm;border:1.4px solid #111;background:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}.tbl{width:100%;border-collapse:collapse;table-layout:fixed;background:#fff}.tbl th{border:1.25px solid #111;text-align:center;vertical-align:middle;font-weight:700;font-size:9.7px;height:7.2mm}.tbl td{border-left:1.25px solid #111;border-right:1.25px solid #111;border-top:1px dotted #555;border-bottom:1px dotted #555;height:5.82mm;padding:0 2px;vertical-align:middle;font-size:9.2px}.tbl .first td{border-top:1.25px solid #111}.tbl .last td{border-bottom:1.25px solid #111}.tbl .sum td{height:7mm;border-top:1.25px solid #111;border-bottom:1.25px solid #111;font-size:9px}.checkSign{position:absolute;right:25mm;bottom:36mm;width:54mm;text-align:center;font-size:9px}.line{border-top:1px solid #111;padding-top:3px}.carCheck{position:absolute;left:5mm;right:5mm;bottom:6mm;font-size:8.7px;line-height:1.7}.page2top{height:28mm}.reportTitle{font-size:13px;text-align:center;font-weight:700;margin-top:1.5mm}.reportInfo{font-size:10.5px;margin-top:2mm;display:grid;grid-template-columns:1fr 84mm;gap:4mm}.under{display:inline-block;border-bottom:2px solid #111;min-width:55mm;padding:0 2px}.exp td{height:6.05mm}.exp .sum td{height:7.2mm}.bottomBox{position:absolute;right:5mm;bottom:39mm;width:58mm}.bottomBox table{width:100%;border-collapse:collapse;background:#fff;font-size:9.4px}.bottomBox td{border:1px solid #111;height:7.5mm;padding:0 3px}.signs{position:absolute;left:5mm;right:76mm;bottom:5mm;display:grid;grid-template-columns:1fr 1fr;gap:16mm;text-align:center;font-size:9.5px}@page{size:A4 portrait;margin:0}@media print{body{background:#fff}.bar{display:none}.page{box-shadow:none;margin:0;width:210mm;height:297mm;page-break-after:always}.page:last-child{page-break-after:auto}}</style></head><body><div class="bar"><b>เตรียมปริ้นบิลน้ำมัน</b><button class="btn" onclick="location.href='/fuel.html?t=1028'">ปิด</button><button class="btn" onclick="window.print()">ปริ้น</button></div><div id="out"></div><script>const months=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];const key='ayaFuelOriginalLayoutV4';function n(v){v=Number(v||0);return isFinite(v)?v:0}function amt(c){return String(c)==='1'?100:String(c)==='2'?200:String(c)==='3'?300:0}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}let saved={};try{saved=JSON.parse(localStorage.getItem(key)||'{}')}catch{}let st=saved.state||{};st.rows=st.rows||[];let y=n(st.year)||2569,m=n(st.month)||new Date().getMonth()+1,days=new Date(y-543,m,0).getDate();function row(i){return st.rows[i]||{}}function redRoute(v){return ['หยุด','ประชุม canvass'].includes(String(v||''))}function calc(){let cur=n(st.start);let out=[];for(let i=0;i<31;i++){let r=row(i),active=i<days,km=active?n(r.km):0,start=cur,end=start+km,money=active?amt(r.fuel):0,price=n(r.price),lit=money&&price?money/price:0;cur=end;out.push({...r,day:i+1,active,km,start,end,money,price,lit})}return out}function mile(){let d=calc(),sumKm=d.reduce((s,r)=>s+r.km,0),sumFuel=d.reduce((s,r)=>s+r.money,0),sumLit=d.reduce((s,r)=>s+r.lit,0),avg=sumLit?sumKm/sumLit:0;let h='<section class="page"><div class="top1"><div class="title1">บริษัท ชินราช เอส.ดี.โอ จำกัด</div><div class="title2">บันทึกค่าใช้จ่ายเกี่ยวกับยานพาหนะ</div><div class="infoL"><div class="lineRow"><b>ประจำเดือน</b><span class="fill">'+esc(months[m-1])+'</span></div><div class="lineRow"><b>ชื่อ/สกุล</b><span class="fill">'+esc(st.name||'')+'</span></div><div class="lineRow"><b>เขตการขาย :</b><span class="fill">'+esc(st.area||'CNRAYA')+'</span></div></div><div class="infoM"><div class="lineRow mid"><b>พ.ศ.</b><span class="fill">'+esc(y)+'</span></div><div class="lineRow mid"><b>ตำแหน่ง</b><span class="fill">'+esc(st.pos||'')+'</span></div><div class="lineRow mid"><b>แผนก</b><span class="fill">'+esc(st.dept||'HFS')+'</span></div></div><div class="plateLabel">ทะเบียนรถ</div><div class="plateBox">'+esc(st.plate||'')+'</div></div><table class="tbl"><colgroup><col style="width:10.5%"><col style="width:18%"><col style="width:17%"><col style="width:14%"><col style="width:7%"><col style="width:8%"><col style="width:8.8%"><col style="width:7%"><col style="width:5.5%"><col style="width:4.2%"></colgroup><tr><th rowspan="2">วันที่</th><th rowspan="2">ตลาด / ที่หมาย</th><th rowspan="2">จุดปลายทาง / ที่พัก</th><th colspan="3">ระยะทางกิโลเมตร</th><th colspan="4">น้ำมัน ดีเซล</th></tr><tr><th>เริ่ม</th><th>สิ้นสุด</th><th>จำนวน กม.</th><th>ลิตร</th><th>บาท/ลิตร</th><th>ยอดเงิน</th><th>เงินสด</th></tr>';d.forEach((r,i)=>{h+='<tr class="'+(i===0?'first ':'')+(i===30?'last ':'')+'"><td class="center">'+(r.active?r.day:'')+'</td><td class="center '+(redRoute(r.route)?'red':'')+'">'+esc(r.route||'')+'</td><td>'+esc(r.dest||'')+'</td><td class="right">'+(r.active&&st.start?r.start.toLocaleString('en-US'):'')+'</td><td class="right">'+(r.active&&st.start?r.end.toLocaleString('en-US'):'')+'</td><td class="right">'+(r.km||'')+'</td><td class="right">'+(r.lit?r.lit.toFixed(3):'')+'</td><td class="right">'+(r.price?r.price.toFixed(2):'')+'</td><td class="right">'+(r.money||'')+'</td><td></td></tr>'});h+='<tr class="sum"><td colspan="3"></td><td colspan="2" class="right bold">ค่าเฉลี่ยรถวิ่ง กม. / ลิตร</td><td class="right bold">'+(sumKm||'-')+'</td><td class="right bold">'+(sumLit?sumLit.toFixed(2):'-')+'</td><td class="right bold">'+(avg?avg.toFixed(2):'-')+'</td><td class="right bold">'+(sumFuel||'-')+'</td><td class="center">-</td></tr></table><div class="checkSign"><div class="line">(ผู้ตรวจสอบ)</div><div>วันที่ ____________________</div></div><div class="carCheck">ทำเครื่องหมาย / เมื่อทำการเปลี่ยนหรือตรวจเช็คแล้วในเดือนนี้<br>( ) น้ำมันเครื่อง &nbsp;&nbsp; ( ) น้ำมันเกียร์ &nbsp;&nbsp; ( ) ไส้กรองอากาศ &nbsp;&nbsp; ( ) ไส้กรองเครื่อง &nbsp;&nbsp; ( ) น้ำมันเฟืองท้าย &nbsp;&nbsp; ( ) อัดจาระบีล้อ<br>( ) ตรวจเช็คน้ำกลั่น &nbsp;&nbsp; ( ) ตรวจเช็คน้ำหม้อน้ำ &nbsp;&nbsp; ( ) ตรวจเช็คลมยางรถ &nbsp;&nbsp; ( ) อื่นๆ ____________________________________________</div></section>';return h}function expense(){let d=calc(),sumFuel=d.reduce((s,r)=>s+r.money,0),adv=n(st.advance||3000),shortName=String(st.name||'').replace(/^(นาย|นางสาว|นาง)\s+/,'');let h='<section class="page"><div class="page2top"><div class="title1">บริษัท ชินราช เอส.ดี.โอ จำกัด</div><div class="reportTitle">รายงานค่าใช้จ่าย ประจำเดือน ____ '+esc(months[m-1])+' ____ พ.ศ._'+esc(y)+'_____</div><div class="reportInfo"><div><b>ชื่อ-สกุล</b>__<span class="under">'+esc(st.name||'')+'</span></div><div><b>ตำแหน่ง</b><span class="under">'+esc(st.pos||'')+'</span></div></div></div><table class="tbl exp"><colgroup><col style="width:7.5%"><col style="width:34.5%"><col style="width:6.8%"><col style="width:8.4%"><col style="width:7.4%"><col style="width:7.7%"><col style="width:18%"><col style="width:9.7%"></colgroup><tr><th>บิลวันที่</th><th>รายละเอียด</th><th>ค่าที่พัก</th><th>ค่าไฟ</th><th>ค่าน้ำ</th><th>ค่าขยะ</th><th>ค่าน้ำมัน</th><th>หมายเหตุ</th></tr>';d.forEach((r,i)=>{h+='<tr class="'+(i===0?'first ':'')+(i===30?'last ':'')+'"><td class="center">'+(r.active?r.day:'')+'</td><td class="center '+(redRoute(r.route)?'red':'')+'">'+esc(r.route||'')+'</td><td></td><td></td><td></td><td></td><td class="right">'+(r.money||'')+'</td><td></td></tr>'});h+='<tr class="sum"><td></td><td class="right bold">รวม</td><td class="center">-</td><td class="center">-</td><td class="center">-</td><td class="center">-</td><td class="center">'+(sumFuel||'-')+'</td><td></td></tr></table><div class="bottomBox"><table><tr><td>เงินโอน คชจ. ล่วงหน้า</td><td class="right">'+adv.toLocaleString('en-US')+'</td></tr><tr><td>รวมยอดค่าใช้จ่าย</td><td class="right">'+(sumFuel||'-')+'</td></tr><tr><td>เงินคงเหลือ/ยอดส่งเงิน</td><td class="right">'+(adv-sumFuel).toLocaleString('en-US')+'</td></tr></table></div><div class="signs"><div><div class="line">'+esc(shortName)+'</div><div>พนักงานขาย</div></div><div><div class="line">ผู้ตรวจสอบ</div></div></div></section>';return h}document.getElementById('out').innerHTML=mile()+expense();</script></body></html>
