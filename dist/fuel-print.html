<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>เตรียมปริ้นบิลน้ำมัน</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#d9dde3;font-family:Tahoma,Arial,sans-serif;color:#111}.bar{position:sticky;top:0;background:#fff;border-bottom:1px solid #777;padding:6px 8px;z-index:5;display:flex;gap:8px;align-items:center;font-size:13px}.bar b{flex:1}.btn{border:1px solid #222;background:#fff;border-radius:7px;padding:6px 12px;font-weight:700}.paper{width:297mm;height:210mm;background:#fff;margin:10px auto;padding:6mm 6mm 4mm;box-shadow:0 0 8px #9ca3af;position:relative;overflow:hidden;background-image:linear-gradient(#e8e8e8 1px,transparent 1px),linear-gradient(90deg,#e8e8e8 1px,transparent 1px);background-size:29.7mm 7.7mm,29.7mm 7.7mm}.pbreak{page-break-before:always}.title{font-weight:700;text-align:center}.company{font-size:15px}.subTitle{font-size:13.5px;margin-top:1.8mm}.topArea{height:33mm;position:relative}.leftInfo{position:absolute;left:0;top:14.6mm;width:132mm;font-size:11px}.midInfo{position:absolute;left:137mm;top:16.2mm;width:78mm;font-size:11px}.plateLabel{position:absolute;right:45mm;top:18mm;font-size:11px;font-weight:700}.plateBox{position:absolute;right:13mm;top:10.2mm;width:36mm;height:27mm;border:1.5px solid #111;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}.lineRow{display:grid;grid-template-columns:25mm 1fr;align-items:end;height:7.5mm}.lineRow.mid{grid-template-columns:21mm 1fr}.fill{border-bottom:1px dotted #555;min-height:5mm;padding:0 3px}.main{width:100%;border-collapse:collapse;table-layout:fixed;background:#fff;font-size:10px}.main th{border:1.3px solid #111;height:7.7mm;text-align:center;font-weight:700;vertical-align:middle}.main td{border-left:1.3px solid #111;border-right:1.3px solid #111;border-top:1px dotted #555;border-bottom:1px dotted #555;height:6.05mm;padding:0 2px;vertical-align:middle}.main tr.data:first-of-type td{border-top:1.3px solid #111}.main tr.lastData td{border-bottom:1.3px solid #111}.center{text-align:center}.right{text-align:right}.bold{font-weight:700}.red{color:red;font-weight:700}.sum td{height:7.5mm;border-top:1.3px solid #111;border-bottom:1.3px solid #111}.signCheck{position:absolute;right:14mm;bottom:25mm;width:70mm;text-align:center;font-size:10px}.signLine{border-top:1px solid #111;height:6mm}.checkText{position:absolute;left:0;right:0;bottom:4mm;font-size:9.7px;line-height:1.8;padding:0 6mm}.reportTop{height:23mm;position:relative}.reportTop .company{padding-top:1mm}.reportTitle{font-size:13.6px;text-align:center;font-weight:700;margin-top:2mm}.reportInfo{font-size:11px;margin-top:1.8mm;display:grid;grid-template-columns:1fr 95mm;gap:10mm}.under{border-bottom:2px solid #111;display:inline-block;min-width:58mm;padding:0 3px}.expense th{height:7mm}.expense td{height:6.0mm}.expense .data td{border-top:1px dotted #555;border-bottom:1px dotted #555}.expense .total td{height:8mm;border-top:1.3px solid #111;border-bottom:1.3px solid #111}.expBottom{position:absolute;right:6mm;bottom:22mm;width:78mm}.expBottom table{width:100%;border-collapse:collapse;background:#fff;font-size:10px}.expBottom td{border:1px solid #111;height:8mm;padding:0 3px}.expSign{position:absolute;left:6mm;right:95mm;bottom:5mm;display:grid;grid-template-columns:1fr 1fr;gap:18mm;text-align:center;font-size:10px}@page{size:A4 landscape;margin:6mm}@media print{body{background:#fff}.bar{display:none}.paper{box-shadow:none;margin:0;width:auto;height:auto;page-break-after:always}.pbreak{page-break-before:always}.paper:last-child{page-break-after:auto}}
</style>
</head>
<body>
<div class="bar"><b>เตรียมปริ้นบิลน้ำมัน</b><button class="btn" onclick="location.href='/fuel.html?t=1028'">ปิด</button><button class="btn" onclick="window.print()">ปริ้น</button></div>
<div id="out"></div>
<script>
const months=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
const key='ayaFuelOriginalLayoutV4';
function q(s){return document.querySelector(s)}
function n(v){v=Number(v||0);return isFinite(v)?v:0}
function amt(c){return String(c)==='1'?100:String(c)==='2'?200:String(c)==='3'?300:0}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
let saved={};try{saved=JSON.parse(localStorage.getItem(key)||'{}')}catch{}
let st=saved.state||{};st.rows=st.rows||[];
let y=n(st.year)||2569,m=n(st.month)||new Date().getMonth()+1,days=new Date(y-543,m,0).getDate();
function row(i){return st.rows[i]||{}}
function redRoute(v){return ['หยุด','ประชุม canvass'].includes(String(v||''))}
function calc(){let cur=n(st.start);let out=[];for(let i=0;i<31;i++){let r=row(i),active=i<days,km=active?n(r.km):0,start=cur,end=start+km,money=active?amt(r.fuel):0,price=n(r.price),lit=money&&price?money/price:0;cur=end;out.push({...r,day:i+1,active,km,start,end,money,price,lit})}return out}
function money(v){return v?Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}):'-'}
function mileage(){let d=calc(),sumKm=d.reduce((s,r)=>s+r.km,0),sumFuel=d.reduce((s,r)=>s+r.money,0),sumLit=d.reduce((s,r)=>s+r.lit,0),avg=sumLit?sumKm/sumLit:0;let h=`<section class="paper"><div class="topArea"><div class="title company">บริษัท ชินราช เอส.ดี.โอ จำกัด</div><div class="title subTitle">บันทึกค่าใช้จ่ายเกี่ยวกับยานพาหนะ</div><div class="leftInfo"><div class="lineRow"><b>ประจำเดือน</b><span class="fill">${esc(months[m-1])}</span></div><div class="lineRow"><b>ชื่อ/สกุล</b><span class="fill">${esc(st.name||'')}</span></div><div class="lineRow"><b>เขตการขาย :</b><span class="fill">${esc(st.area||'CNRAYA')}</span></div></div><div class="midInfo"><div class="lineRow mid"><b>พ.ศ.</b><span class="fill">${esc(y)}</span></div><div class="lineRow mid"><b>ตำแหน่ง</b><span class="fill">${esc(st.pos||'')}</span></div><div class="lineRow mid"><b>แผนก</b><span class="fill">${esc(st.dept||'HFS')}</span></div></div><div class="plateLabel">ทะเบียนรถ</div><div class="plateBox">${esc(st.plate||'')}</div></div><table class="main"><colgroup><col style="width:10.5%"><col style="width:17.8%"><col style="width:16.7%"><col style="width:13.7%"><col style="width:7.0%"><col style="width:7.8%"><col style="width:8.9%"><col style="width:7.4%"><col style="width:5.3%"><col style="width:4.9%"></colgroup><tr><th rowspan="2">วันที่</th><th rowspan="2">ตลาด / ที่หมาย</th><th rowspan="2">จุดปลายทาง / ที่พัก</th><th colspan="3">ระยะทางกิโลเมตร</th><th colspan="4">น้ำมัน ดีเซล</th></tr><tr><th>เริ่ม</th><th>สิ้นสุด</th><th>จำนวน กม.</th><th>ลิตร</th><th>บาท/ลิตร</th><th>ยอดเงิน</th><th>เงินสด</th></tr>`;d.forEach((r,idx)=>{h+=`<tr class="data ${idx===30?'lastData':''}"><td class="center">${r.active?r.day:''}</td><td class="center ${redRoute(r.route)?'red':''}">${esc(r.route||'')}</td><td>${esc(r.dest||'')}</td><td class="right">${r.active&&st.start?r.start.toLocaleString('en-US'):''}</td><td class="right">${r.active&&st.start?r.end.toLocaleString('en-US'):''}</td><td class="right">${r.km||''}</td><td class="right">${r.lit?r.lit.toFixed(3):''}</td><td class="right">${r.price?r.price.toFixed(2):''}</td><td class="right">${r.money||''}</td><td></td></tr>`});h+=`<tr class="sum"><td colspan="3"></td><td colspan="2" class="right bold">ค่าเฉลี่ยรถวิ่ง กม. / ลิตร</td><td class="right bold">${sumKm?sumKm.toLocaleString('en-US'):'-'}</td><td class="right bold">${sumLit?sumLit.toFixed(2):'-'}</td><td class="right bold">${avg?avg.toFixed(2):'-'}</td><td class="right bold">${sumFuel?sumFuel.toLocaleString('en-US'):'-'}</td><td class="center">-</td></tr></table><div class="signCheck"><div class="signLine"></div><div>(ผู้ตรวจสอบ)</div><div>วันที่ ____________________</div></div><div class="checkText">ทำเครื่องหมาย / เมื่อทำการเปลี่ยนหรือตรวจเช็คแล้วในเดือนนี้<br>( ) น้ำมันเครื่อง &nbsp;&nbsp; ( ) น้ำมันเกียร์ &nbsp;&nbsp; ( ) ไส้กรองอากาศ &nbsp;&nbsp; ( ) ไส้กรองเครื่อง &nbsp;&nbsp; ( ) น้ำมันเฟืองท้าย &nbsp;&nbsp; ( ) อัดจาระบีล้อ<br>( ) ตรวจเช็คน้ำกลั่น &nbsp;&nbsp; ( ) ตรวจเช็คน้ำหม้อน้ำ &nbsp;&nbsp; ( ) ตรวจเช็คลมยางรถ &nbsp;&nbsp; ( ) อื่นๆ ____________________________________________</div></section>`;return h}
function expense(){let d=calc(),sumFuel=d.reduce((s,r)=>s+r.money,0),adv=n(st.advance||3000),shortName=String(st.name||'').replace(/^(นาย|นางสาว|นาง)\s+/,'');let h=`<section class="paper pbreak"><div class="reportTop"><div class="title company">บริษัท ชินราช เอส.ดี.โอ จำกัด</div><div class="reportTitle">รายงานค่าใช้จ่าย ประจำเดือน ____ ${esc(months[m-1])} ____ พ.ศ._${esc(y)}_____</div><div class="reportInfo"><div>ชื่อ-สกุล__<span class="under">${esc(st.name||'')}</span></div><div>ตำแหน่ง<span class="under">${esc(st.pos||'')}</span></div></div></div><table class="main expense"><colgroup><col style="width:7.6%"><col style="width:34.4%"><col style="width:6.8%"><col style="width:8.4%"><col style="width:7.4%"><col style="width:7.7%"><col style="width:18%"><col style="width:9.7%"></colgroup><tr><th>บิลวันที่</th><th>รายละเอียด</th><th>ค่าที่พัก</th><th>ค่าไฟ</th><th>ค่าน้ำ</th><th>ค่าขยะ</th><th>ค่าน้ำมัน</th><th>หมายเหตุ</th></tr>`;d.forEach((r,idx)=>{h+=`<tr class="data ${idx===30?'lastData':''}"><td class="center">${r.active?r.day:''}</td><td class="center ${redRoute(r.route)?'red':''}">${esc(r.route||'')}</td><td></td><td></td><td></td><td></td><td class="right">${r.money||''}</td><td></td></tr>`});h+=`<tr class="total"><td></td><td class="right bold">รวม</td><td class="center">-</td><td class="center">-</td><td class="center">-</td><td class="center">-</td><td class="center">${sumFuel?sumFuel.toLocaleString('en-US'):'-'}</td><td></td></tr></table><div class="expBottom"><table><tr><td>เงินโอน คชจ. ล่วงหน้า</td><td class="right">${adv.toLocaleString('en-US')}</td></tr><tr><td>รวมยอดค่าใช้จ่าย</td><td class="right">${sumFuel?sumFuel.toLocaleString('en-US'):'-'}</td></tr><tr><td>เงินคงเหลือ/ยอดส่งเงิน</td><td class="right">${(adv-sumFuel).toLocaleString('en-US')}</td></tr></table></div><div class="expSign"><div><div class="signLine">${esc(shortName)}</div><div>พนักงานขาย</div></div><div><div class="signLine"></div><div>ผู้ตรวจสอบ</div></div></div></section>`;return h}
document.getElementById('out').innerHTML=mileage()+expense();
</script>
</body>
</html>
