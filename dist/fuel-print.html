<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>เตรียมปริ้นบิลน้ำมัน</title><style>*{box-sizing:border-box}body{margin:0;background:#d9dde3;font-family:Arial,'Tahoma',sans-serif;color:#111}.bar{position:sticky;top:0;background:#fff;border-bottom:1px solid #999;padding:8px;z-index:5;display:flex;gap:8px;align-items:center}.bar b{flex:1}.btn{border:1px solid #222;background:#fff;border-radius:7px;padding:7px 13px;font-weight:700}.paper{width:210mm;min-height:297mm;background:white;margin:12px auto;padding:12mm;box-shadow:0 0 8px #999}.title{text-align:center;font-weight:700;font-size:15px}.company{text-align:left;font-weight:700;font-size:14px}.meta{width:100%;border-collapse:collapse;margin-top:4px;font-size:11px}.meta td{border:0;padding:2px 4px}.sheet{width:100%;border-collapse:collapse;margin-top:6px;font-size:10.5px;table-layout:fixed}.sheet th,.sheet td{border:1px solid #111;padding:2px 3px;height:17px;vertical-align:middle}.center{text-align:center}.right{text-align:right}.bold{font-weight:700}.small{font-size:10px}.sign{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-top:18px;text-align:center;font-size:10px}.line{border-top:1px solid #111;padding-top:6px}.pageBreak{page-break-before:always}.noPrintNote{font-size:12px;color:#333}@page{size:A4 portrait;margin:8mm}@media print{body{background:white}.bar{display:none}.paper{box-shadow:none;margin:0;width:auto;min-height:auto;padding:0}.pageBreak{page-break-before:always}}</style></head><body><div class="bar"><b>เตรียมปริ้นบิลน้ำมัน</b><button class="btn" onclick="location.href='/fuel.html?t=1028'">ปิด</button><button class="btn" onclick="window.print()">ปริ้น</button></div><div id="out"></div><script>const months=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];const key='ayaFuelOriginalLayoutV4';function n(v){v=Number(v||0);return isFinite(v)?v:0}function amt(c){return String(c)==='1'?100:String(c)==='2'?200:String(c)==='3'?300:0}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}let saved={};try{saved=JSON.parse(localStorage.getItem(key)||'{}')}catch{}let st=saved.state||{};st.rows=st.rows||[];let y=n(st.year)||2569,m=n(st.month)||new Date().getMonth()+1,days=new Date(y-543,m,0).getDate();function row(i){return st.rows[i]||{}}function calc(){let cur=n(st.start);let a=[];for(let i=0;i<31;i++){let r=row(i),active=i<days,km=active?n(r.km):0,start=cur,end=start+km,money=active?amt(r.fuel):0,price=n(r.price),lit=money&&price?money/price:0;cur=end;a.push({...r,day:i+1,active,km,start,end,money,price,lit})}return a}function milePage(){let d=calc(),sumKm=d.reduce((s,r)=>s+(r.active?r.km:0),0),sumFuel=d.reduce((s,r)=>s+(r.active?r.money:0),0),sumLit=d.reduce((s,r)=>s+(r.active?r.lit:0),0);let h='<section class="paper"><div class="company">บริษัท ชินราช เอส.ดี.โอ จำกัด</div><div class="title">บันทึกค่าใช้จ่ายเกี่ยวกับยานพาหนะ</div><table class="meta"><tr><td>ประจำเดือน</td><td>'+esc(months[m-1])+'</td><td>พ.ศ.</td><td>'+esc(y)+'</td><td>ทะเบียนรถ</td><td>'+esc(st.plate||'')+'</td></tr><tr><td>ชื่อ/สกุล</td><td>'+esc(st.name||'')+'</td><td>ตำแหน่ง</td><td>'+esc(st.pos||'')+'</td><td></td><td></td></tr><tr><td>เขตการขาย</td><td>'+esc(st.area||'CNRAYA')+'</td><td>แผนก</td><td>'+esc(st.dept||'HFS')+'</td><td></td><td></td></tr></table><table class="sheet"><colgroup><col style="width:7%"><col style="width:17%"><col style="width:19%"><col style="width:10%"><col style="width:10%"><col style="width:10%"><col style="width:8%"><col style="width:9%"><col style="width:10%"></colgroup><tr><th rowspan="2">วันที่</th><th rowspan="2">ตลาด / ที่หมาย</th><th rowspan="2">จุดปลายทาง / ที่พัก</th><th colspan="3">ระยะทางกิโลเมตร</th><th colspan="3">น้ำมัน แก๊สโซฮอล์ 95</th></tr><tr><th>เริ่ม</th><th>สิ้นสุด</th><th>จำนวน กม.</th><th>ลิตร</th><th>บาท/ลิตร</th><th>ยอดเงิน</th></tr>';d.forEach(r=>{h+='<tr><td class="center">'+(r.active?r.day:'')+'</td><td>'+esc(r.route||'')+'</td><td>'+esc(r.dest||'')+'</td><td class="right">'+(r.active&&st.start?r.start:'')+'</td><td class="right">'+(r.active&&st.start?r.end:'')+'</td><td class="right">'+(r.km||'')+'</td><td class="right">'+(r.lit?r.lit.toFixed(3):'')+'</td><td class="right">'+(r.price?r.price.toFixed(2):'')+'</td><td class="right">'+(r.money||'')+'</td></tr>'});h+='<tr><td colspan="5" class="right bold">รวม</td><td class="right bold">'+sumKm+'</td><td class="right bold">'+sumLit.toFixed(2)+'</td><td></td><td class="right bold">'+sumFuel+'</td></tr></table><div class="sign"><div><div class="line">พนักงานขาย</div></div><div><div class="line">ผู้ตรวจสอบ</div></div></div></section>';return h}function expensePage(){let d=calc(),sumFuel=d.reduce((s,r)=>s+(r.active?r.money:0),0),adv=n(st.advance);let h='<section class="paper pageBreak"><div class="company">บริษัท ชินราช เอส.ดี.โอ จำกัด</div><div class="title">รายงานค่าใช้จ่าย ประจำเดือน '+esc(months[m-1])+' พ.ศ. '+esc(y)+'</div><table class="meta"><tr><td>ชื่อ-สกุล</td><td>'+esc(st.name||'')+'</td><td>ตำแหน่ง</td><td>'+esc(st.pos||'')+'</td></tr></table><table class="sheet"><colgroup><col style="width:10%"><col style="width:31%"><col style="width:10%"><col style="width:9%"><col style="width:9%"><col style="width:9%"><col style="width:12%"><col style="width:10%"></colgroup><tr><th>บิลวันที่</th><th>รายละเอียด</th><th>ค่าที่พัก</th><th>ค่าไฟ</th><th>ค่าน้ำ</th><th>ค่าขยะ</th><th>ค่าน้ำมัน</th><th>หมายเหตุ</th></tr>';d.forEach(r=>{h+='<tr><td class="center">'+(r.active?r.day:'')+'</td><td>'+esc(r.route||'')+'</td><td></td><td></td><td></td><td></td><td class="right">'+(r.money||'')+'</td><td></td></tr>'});h+='<tr><td></td><td class="center bold">รวม</td><td></td><td></td><td></td><td></td><td class="right bold">'+sumFuel+'</td><td></td></tr><tr><td colspan="6"></td><td>เงินโอน คชจ. ล่วงหน้า</td><td class="right">'+(adv||'')+'</td></tr><tr><td colspan="6"></td><td>รวมยอดค่าใช้จ่าย</td><td class="right">'+sumFuel+'</td></tr><tr><td colspan="6"></td><td>เงินคงเหลือ/ยอดส่งเงิน</td><td class="right">'+(adv-sumFuel)+'</td></tr></table><div class="sign"><div><div class="line">พนักงานขาย</div></div><div><div class="line">ผู้ตรวจสอบ</div></div></div></section>';return h}document.getElementById('out').innerHTML=milePage()+expensePage();</script></body></html>
