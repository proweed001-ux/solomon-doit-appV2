<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>เตรียมปริ้นบิลน้ำมัน</title><style>*{box-sizing:border-box}body{margin:0;background:#d9dde3;font-family:Tahoma,Arial,sans-serif;color:#111}.bar{position:sticky;top:0;background:#fff;border-bottom:1px solid #777;padding:6px 8px;z-index:5;display:flex;gap:8px;align-items:center;font-size:13px}.bar b{flex:1}.btn{border:1px solid #222;background:#fff;border-radius:7px;padding:6px 12px;font-weight:700}.paper{width:297mm;min-height:210mm;background:#fff;margin:10px auto;padding:7mm 8mm;box-shadow:0 0 8px #9ca3af}.pbreak{page-break-before:always}.topgrid{display:grid;grid-template-columns:44% 28% 28%;align-items:start;margin-bottom:3mm}.title{text-align:center;font-weight:700;font-size:15px;line-height:1.45}.info{font-size:11px}.info .r{display:grid;grid-template-columns:26mm 1fr;min-height:6mm;align-items:center}.info .r2{display:grid;grid-template-columns:22mm 1fr;min-height:6mm;align-items:center}.plate{display:grid;grid-template-columns:22mm 1fr;align-items:center;font-size:12px;margin-top:13mm}.plateBox{border:1.6px solid #111;height:18mm;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}.sheet{width:100%;border-collapse:collapse;table-layout:fixed;font-size:10.2px}.sheet th,.sheet td{border:1px solid #111;height:4.55mm;padding:0 2px;vertical-align:middle}.sheet th{font-weight:700}.center{text-align:center}.right{text-align:right}.bold{font-weight:700}.red{color:red;font-weight:700}.sum td{height:6.4mm}.foot{font-size:10px;margin-top:5mm}.repair{font-size:10px;line-height:1.7;margin-top:2mm}.sign{display:grid;grid-template-columns:1fr 1fr;gap:18mm;margin-top:5mm;text-align:center;font-size:10px}.line{border-top:1px solid #111;padding-top:4px}.reportTitle{text-align:center;font-weight:700;font-size:14px}.reportHead{display:grid;grid-template-columns:1fr 35mm 1fr;align-items:center;font-size:11px;margin:2mm 0}.expense td,.expense th{height:5.15mm}.bottomBox{width:48mm;float:right;margin-top:0}.bottomBox td{height:7mm}@page{size:A4 landscape;margin:7mm}@media print{body{background:white}.bar{display:none}.paper{box-shadow:none;margin:0;width:auto;min-height:auto;padding:0}.pbreak{page-break-before:always}}</style></head><body><div class="bar"><b>เตรียมปริ้นบิลน้ำมัน</b><button class="btn" onclick="location.href='/fuel.html?t=1028'">ปิด</button><button class="btn" onclick="window.print()">ปริ้น</button></div><div id="out"></div><script>const months=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];const key='ayaFuelOriginalLayoutV4';function n(v){v=Number(v||0);return isFinite(v)?v:0}function amt(c){return String(c)==='1'?100:String(c)==='2'?200:String(c)==='3'?300:0}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}let saved={};try{saved=JSON.parse(localStorage.getItem(key)||'{}')}catch{}let st=saved.state||{};st.rows=st.rows||[];let y=n(st.year)||2569,m=n(st.month)||new Date().getMonth()+1,days=new Date(y-543,m,0).getDate();function row(i){return st.rows[i]||{}}function redRoute(v){return ['หยุด','ประชุม canvass'].includes(String(v||''))}function calc(){let cur=n(st.start);let out=[];for(let i=0;i<31;i++){let r=row(i),active=i<days,km=active?n(r.km):0,start=cur,end=start+km,money=active?amt(r.fuel):0,price=n(r.price),lit=money&&price?money/price:0;cur=end;out.push({...r,day:i+1,active,km,start,end,money,price,lit})}return out}function mileage(){let d=calc(),sumKm=d.reduce((s,r)=>s+r.km,0),sumFuel=d.reduce((s,r)=>s+r.money,0),sumLit=d.reduce((s,r)=>s+r.lit,0);let h='<section class="paper"><div class="topgrid"><div class="info" style="padding-top:12mm"><div class="r"><b>ประจำเดือน</b><span>'+esc(months[m-1])+'</span></div><div class="r"><b>ชื่อ/สกุล</b><span>'+esc(st.name||'')+'</span></div><div class="r"><b>เขตการขาย :</b><span>'+esc(st.area||'CNRAYA')+'</span></div></div><div><div class="title">บริษัท ชินราช เอส.ดี.โอ จำกัด<br>บันทึกค่าใช้จ่ายเกี่ยวกับยานพาหนะ</div><div class="info" style="margin-top:4mm"><div class="r2"><b>พ.ศ.</b><span>'+esc(y)+'</span></div><div class="r2"><b>ตำแหน่ง</b><span>'+esc(st.pos||'')+'</span></div><div class="r2"><b>แผนก</b><span>'+esc(st.dept||'HFS')+'</span></div></div></div><div class="plate"><b>ทะเบียนรถ</b><div class="plateBox">'+esc(st.plate||'')+'</div></div></div><table class="sheet"><colgroup><col style="width:9%"><col style="width:19%"><col style="width:17.5%"><col style="width:8.5%"><col style="width:8.5%"><col style="width:8.5%"><col style="width:7.4%"><col style="width:6.8%"><col style="width:8%"><col style="width:6.8%"></colgroup><tr><th rowspan="2">วันที่</th><th rowspan="2">ตลาด / ที่หมาย</th><th rowspan="2">จุดปลายทาง / ที่พัก</th><th colspan="3">ระยะทางกิโลเมตร</th><th colspan="4">น้ำมัน แก๊สโซฮอล์ 95</th></tr><tr><th>เริ่ม</th><th>สิ้นสุด</th><th>จำนวน กม.</th><th>ลิตร</th><th>บาท/ลิตร</th><th>ยอดเงิน</th><th>เงินสด</th></tr>';d.forEach(r=>{let rr=esc(r.route||'');h+='<tr><td class="center">'+(r.active?r.day:'')+'</td><td class="center '+(redRoute(r.route)?'red':'')+'">'+rr+'</td><td>'+esc(r.dest||'')+'</td><td class="right">'+(r.active&&st.start?r.start.toLocaleString('en-US'):'')+'</td><td class="right">'+(r.active&&st.start?r.end.toLocaleString('en-US'):'')+'</td><td class="right">'+(r.km||'')+'</td><td class="right">'+(r.lit?r.lit.toFixed(3):'')+'</td><td class="right">'+(r.price?r.price.toFixed(2):'')+'</td><td class="right">'+(r.money||'')+'</td><td></td></tr>'});h+='<tr class="sum"><td colspan="4"></td><td class="right bold">ค่าเฉลี่ยรถวิ่ง กม. / ลิตร</td><td class="right bold">'+sumKm.toLocaleString('en-US')+'</td><td class="right bold">'+sumLit.toFixed(2)+'</td><td></td><td class="right bold">'+sumFuel.toLocaleString('en-US',{minimumFractionDigits:2})+'</td><td class="center">-</td></tr></table><div class="sign"><div></div><div><div class="line">(ผู้ตรวจสอบ)</div><div>วันที่ ____________________</div></div></div><div class="repair">ทำเครื่องหมาย / เมื่อทำการเปลี่ยนหรือตรวจเช็คแล้วในเดือนนี้<br>( ) น้ำมันเครื่อง &nbsp;&nbsp; ( ) น้ำมันเกียร์ &nbsp;&nbsp; ( ) ไส้กรองอากาศ &nbsp;&nbsp; ( ) ไส้กรองเครื่อง &nbsp;&nbsp; ( ) น้ำมันเฟืองท้าย &nbsp;&nbsp; ( ) อัดจาระบีล้อ<br>( ) ตรวจเช็คผ้าเบรก &nbsp;&nbsp; ( ) ตรวจเช็คน้ำหม้อน้ำ &nbsp;&nbsp; ( ) ตรวจเช็คลมยางรถ &nbsp;&nbsp; ( ) อื่นๆ __________________________</div></section>';return h}function expense(){let d=calc(),sumFuel=d.reduce((s,r)=>s+r.money,0),adv=n(st.advance),shortName=String(st.name||'').replace(/^(นาย|นางสาว|นาง)\s+/,'');let h='<section class="paper pbreak"><div class="title">บริษัท ชินราช เอส.ดี.โอ จำกัด</div><div class="reportTitle">รายงานค่าใช้จ่าย ประจำเดือน ____ '+esc(months[m-1])+' ____ พ.ศ._'+esc(y)+'_____</div><div class="reportHead"><div>ชื่อ-สกุล___'+esc(st.name||'')+'____________________</div><div></div><div>ตำแหน่ง____'+esc(st.pos||'')+'____________________</div></div><table class="sheet expense"><colgroup><col style="width:10%"><col style="width:30%"><col style="width:9%"><col style="width:9%"><col style="width:9%"><col style="width:9%"><col style="width:12%"><col style="width:12%"></colgroup><tr><th>บิลวันที่</th><th>รายละเอียด</th><th>ค่าที่พัก</th><th>ค่าไฟ</th><th>ค่าน้ำ</th><th>ค่าขยะ</th><th>ค่าน้ำมัน</th><th>หมายเหตุ</th></tr>';d.forEach(r=>{h+='<tr><td class="center">'+(r.active?r.day:'')+'</td><td class="center '+(redRoute(r.route)?'red':'')+'">'+esc(r.route||'')+'</td><td></td><td></td><td></td><td></td><td class="right">'+(r.money||'')+'</td><td></td></tr>'});h+='<tr><td></td><td class="center bold">รวม</td><td></td><td></td><td></td><td></td><td class="right bold">'+sumFuel.toLocaleString('en-US')+'</td><td></td></tr></table><table class="sheet bottomBox"><tr><td>เงินโอน คชจ. ล่วงหน้า</td><td class="right">'+(adv||'')+'</td></tr><tr><td>รวมยอดค่าใช้จ่าย</td><td class="right">'+sumFuel.toLocaleString('en-US')+'</td></tr><tr><td>เงินคงเหลือ/ยอดส่งเงิน</td><td class="right">'+(adv-sumFuel).toLocaleString('en-US')+'</td></tr></table><div style="clear:both"></div><div class="sign"><div><div class="line">'+esc(shortName)+'</div><div>พนักงานขาย</div></div><div><div class="line">ผู้ตรวจสอบ</div><div>วันที่ ____________________</div></div></div></section>';return h}document.getElementById('out').innerHTML=mileage()+expense();</script></body></html>
