<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store">
<title>Loading Native UI Preview...</title>
<style>
  body{margin:0;background:#f6f7f8;color:#111827;font-family:system-ui,-apple-system,'Segoe UI',Tahoma,sans-serif}
  .boot{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;text-align:center}
  .box{background:#fff;border:1px solid #e5e7eb;border-radius:14px;box-shadow:0 2px 10px #0f172a0d;padding:18px;max-width:420px}
  .box b{display:block;margin-bottom:8px}
</style>
</head>
<body>
<div class="boot"><div class="box"><b>กำลังเปิด Native Core UI Mirror</b><span>โหลดหน้าตาจาก Pro เดิม แล้วสลับเครื่องเป็น native core</span></div></div>
<script>
(async () => {
  'use strict';

  const nativeStack = [
    '<link rel="stylesheet" href="/assets/pro-print.css?v=1027">',
    '<script src="/assets/pro-print-store-bills.js?v=1027"><\/script>',
    '<script src="/assets/pro-native-core.js?v=phase4-ui"><\/script>',
    '<script src="/assets/pro-native-core-overrides.js?v=phase4-ui"><\/script>',
    '<script src="/assets/pro-print-mode-fixes.js?v=1027"><\/script>',
    '<script src="/assets/pro-print-column-widths.js?v=1027"><\/script>',
    '<script src="/assets/pro-print-a4-pro-fix.js?v=1027"><\/script>',
    '<script src="/assets/pro-native-ui-readiness.js?v=phase4-ui"><\/script>'
  ].join('');

  try {
    const response = await fetch('/pro.html?t=1027', { cache: 'no-store' });
    if (!response.ok) throw new Error('โหลด pro.html ไม่สำเร็จ: ' + response.status);
    let html = await response.text();

    const coreScript = /<script\b[^>]*src=["'][^"']*\/assets\/pro-core-v4\.js[^"']*["'][^>]*><\/script>/i;
    if (!coreScript.test(html)) throw new Error('ไม่พบ pro-core-v4.js ใน pro.html');

    html = html.replace(coreScript, nativeStack);
    html = html.replace('<title>AYA By.พี่ฐาสั่งลุยย</title>', '<title>AYA By.พี่ฐาสั่งลุยย</title>');

    document.open();
    document.write(html);
    document.close();
  } catch (error) {
    document.body.innerHTML = '<div class="boot"><div class="box"><b>เปิด Native UI Mirror ไม่สำเร็จ</b><span>' + String(error.message || error).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])) + '</span></div></div>';
  }
})();
</script>
</body>
</html>
