<!doctype html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Solomon DOIT Pro V2.2.1</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box}body{margin:0;background:#020617;color:#e5e7eb;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.page{max-width:980px;margin:auto;min-height:100vh;background:#0f172a}header{position:sticky;top:0;z-index:5;background:rgba(2,6,23,.94);padding:12px;border-bottom:1px solid #334155}.title{font-weight:950;font-size:18px}.sub,.muted{color:#94a3b8;font-size:12px}.content{display:grid;gap:12px;padding:12px}.card{border:1px solid #334155;border-radius:20px;background:#111827;padding:14px}.tabs,.chips,.row{display:flex;gap:8px;overflow-x:auto;padding-top:8px}button{min-height:42px;border-radius:14px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;padding:0 14px;font-weight:850;white-space:nowrap}button.active,.primary{background:linear-gradient(135deg,#2563eb,#059669);border-color:transparent;color:#fff}.danger{background:#7f1d1d}.stats,.filters,.grid{display:grid;gap:8px}.stats{grid-template-columns:repeat(4,1fr)}.filters{grid-template-columns:repeat(5,1fr)}.grid{grid-template-columns:repeat(5,1fr)}.stat,.box{border:1px solid #334155;border-radius:14px;background:#020617;padding:10px}.stat span,.box span{display:block;color:#94a3b8;font-size:11px}.stat b,.box b{display:block;margin-top:4px;font-size:17px}.filters label{display:grid;gap:5px;color:#94a3b8;font-size:11px;font-weight:800}select,input{width:100%;height:40px;border-radius:12px;border:1px solid #334155;background:#020617;color:#e5e7eb;padding:0 10px}.head{display:flex;justify-content:space-between;gap:12px}.name{font-weight:950;line-height:1.35}.meta{color:#94a3b8;font-size:12px;margin-top:4px}.pill{align-self:flex-start;border-radius:999px;background:#1d4ed8;padding:6px 9px;font-size:12px;font-weight:900}.remain{background:rgba(5,150,105,.18)}.store{display:flex;justify-content:space-between;gap:10px;border:1px solid #334155;border-radius:14px;background:#020617;padding:10px;margin-top:6px}.store small{display:block;color:#94a3b8}.err{color:#fecaca;background:#7f1d1d;border-radius:12px;padding:10px}.ok{color:#bbf7d0;background:#064e3b;border-radius:12px;padding:10px}@media(max-width:760px){.stats,.filters,.grid{grid-template-columns:1fr}.head{flex-direction:column}button{width:100%}}
</style>
</head>
<body><div class="page"><header><div class="title">Solomon DOIT Pro V2.2.1</div><div class="sub" id="sub">ถอดของ Pro + กระจายสินค้า</div><div class="tabs" id="tabs" style="display:none"><button class="active" data-tab="pick">ถอดของ Pro</button><button data-tab="dist">กระจายสินค้า</button><button data-tab="raw">รายการดิบ</button></div></header><main class="content"><section class="card" id="up"><h2>อัปไฟล์ DOIT</h2><p class="muted">หน้าแยกสำหรับถอดของและตรวจการกระจายบนมือถือ</p><input id="file" type="file" accept=".xlsx,.xlsm,.xls,.csv" style="display:none"><button class="primary" id="choose">เลือกไฟล์ DOIT</button><p class="muted" id="msg"></p></section><section id="app" style="display:none"></section></main></div><script>
const $=s=>document.querySelector(s),clean=v=>String(v??'').trim(),norm=s=>clean(s).toLowerCase().replace(/\s+|[_\-./()]/g,''),num=v=>{let n=Number(String(v??'').replace(/,/g,''));return Number.isFinite(n)?n:0},fmt=n=>Number(n||0).toLocaleString('th-TH'),money=n=>Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}),esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),uid=s=>encodeURIComponent(String(s??'')),duid=s=>decodeURIComponent(String(s??''));
const uniq=a=>[...new Set(a.map(clean).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'th'));
let rows=[],tab='pick',mode='store',activeStore='',activePerson='',done={},hist=[],f={person:'',store:'',brand:'',type:'',q:''};
function col(o,names){let ks=Object.keys(o),m=new Map(ks.map(k=>[norm(k),k]));for(let n of names){let k=m.get(norm(n));if(k)return k}for(let k of ks){let nk=norm(k);for(let n of names){let nn=norm(n);if(nk.includes(nn)||nn.includes(nk))return k}}return null}
function val(o,names,d=''){let k=col(o,names);return k?clean(o[k])||d:d}function nval(o,names){let k=col(o,names);return k?num(o[k]):0}
function amount(o){for(let names of [['TotInvc','TotalInvoice'],['InvoiceAmt','Invoice Amount'],['LineAmtBeforeDisc','Line Amount Before Disc'],['Correct Amount','Line Amount','Amount','Amt']]){let k=col(o,names);if(k){let v=num(o[k]);if(v!==0)return v}}return 0}
function person(o){let id=val(o,['SalespersonID','SO_SalespersonID']),name=val(o,['Salesperson_Name','Salesperson Name']),tid=val(o,['TelesaleId']),tn=val(o,['TelesaleName']);return id&&name?id+' '+name:name||id||tn||tid||'ไม่ระบุบุคคล'}
function parseRow(o,i){let q=nval(o,['ShipQtyPCS','QtyShipPCS','Qty PCS','Qty','Quantity']),a=amount(o),skuCode=val(o,['SKU_Code','SKU Code','SKUCode']),prod=val(o,['SKU_Desc','SKU Desc','ProductName','Product']);return{rowNo:i+1,type:val(o,['SOTypeID','SO Type ID','Type'],'INVC'),store:val(o,['ShipName','c_Name','Customer Name','CustomerName','Store'],'ไม่ระบุร้าน'),skuCode,sku:prod||skuCode||'ไม่ระบุ SKU',qty:q,amt:a,price:q?a/q:0,person:person(o),brand:val(o,['Brand','TAS_Brand','GroupBrand'],'ไม่ระบุแบรนด์'),cat:val(o,['Category','TAS_Category','GroupCategory'],'ไม่ระบุหมวด'),channel:val(o,['Global_Sub_Channel','Sub Channel','ChannelDescr','Channel'],'-'),inv:val(o,['InvcNbr','InvoiceNo','Invoice No'])}}
function findRows(wb){for(let name of wb.SheetNames){let ws=wb.Sheets[name],aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});for(let i=0;i<Math.min(90,aoa.length);i++){let h=aoa[i].map(clean),score=h.filter(x=>/sku|shipqty|qty|totinvc|salesperson|shipname|customer/i.test(x)).length;if(score>=3){let data=aoa.slice(i+1).map(r=>Object.fromEntries(h.map((k,j)=>[k||'col'+j,r[j]]))).map(parseRow).filter(r=>r.qty!==0||r.amt!==0);if(data.length)return data}}let data=XLSX.utils.sheet_to_json(ws,{defval:''}).map(parseRow).filter(r=>r.qty!==0||r.amt!==0);if(data.length>20)return data}return[]}
function stat(l,v){return`<div class="stat"><span>${esc(l)}</span><b>${esc(v)}</b></div>`}
function filtered(){let q=f.q.toLowerCase();return rows.filter(r=>(!f.person||r.person===f.person)&&(!f.store||r.store===f.store)&&(!f.brand||r.brand===f.brand)&&(!f.type||r.type===f.type)&&(!q||[r.store,r.sku,r.skuCode,r.person,r.inv,r.brand,r.cat,r.type].join(' ').toLowerCase().includes(q)))}
function opt(k,a){return`<select data-f="${esc(k)}"><option value="">ทั้งหมด</option>${a.map(x=>`<option value="${esc(x)}" ${f[k]===x?'selected':''}>${esc(x)}</option>`).join('')}</select>`}
function filters(rs){return`<section class="card"><div class="filters"><label>PS${opt('person',uniq(rows.map(r=>r.person)))}</label><label>ร้าน${opt('store',uniq(rows.map(r=>r.store)))}</label><label>แบรนด์${opt('brand',uniq(rows.map(r=>r.brand)))}</label><label>ประเภท${opt('type',uniq(rows.map(r=>r.type)))}</label><label>ค้นหา<input data-f="q" value="${esc(f.q)}" placeholder="SKU / ร้าน / บิล"></label></div><div class="row"><button data-act="export">Export CSV</button><button data-act="clearfilters">ล้าง filter</button></div><p class="muted">หลังกรอง ${fmt(rs.length)} / ${fmt(rows.length)} แถว</p></section>`}
function pickGroups(rs,scope){let m=new Map();rs.forEach(r=>{let raw=(r.skuCode||r.sku)+'|'+r.type,k=scope+'|'+raw,x=m.get(k)||{key:k,sku:r.sku,skuCode:r.skuCode,type:r.type,brand:r.brand,cat:r.cat,qty:0,amt:0,stores:new Set(),invs:new Set()};x.qty+=r.qty;x.amt+=r.amt;x.stores.add(r.store);if(r.inv)x.invs.add(r.inv);m.set(k,x)});return[...m.values()].sort((a,b)=>Math.abs(b.qty)-Math.abs(a.qty))}
function pick(rs){let stores=uniq(rs.map(r=>r.store));if(!stores.includes(activeStore))activeStore=stores[0]||'';let scope=mode==='store'?'store:'+activeStore:'all',base=mode==='all'?rs:rs.filter(r=>r.store===activeStore),g=pickGroups(base,scope),qty=g.reduce((s,x)=>s+x.qty,0),dn=g.reduce((s,x)=>s+(done[x.key]||0),0);if(!g.length)return`<section class="card"><div class="err">ไม่พบรายการตาม filter นี้</div></section>`;return`<section class="card"><div class="head"><div><div class="title">ถอดของ Pro</div><div class="sub">${esc(mode==='all'?'รวมทุกร้าน':activeStore)} · ${fmt(g.length)} SKU</div></div><span class="pill">PCS ${fmt(qty)}</span></div><div class="row"><button class="${mode==='all'?'active':''}" data-mode="all">รวมทุกร้าน</button><button class="${mode==='store'?'active':''}" data-mode="store">แยกร้าน</button><button data-act="undo">Undo</button><button class="danger" data-act="resetdone">Reset จัดแล้ว</button></div>${mode==='store'?`<div class="chips">${stores.map(s=>`<button class="${s===activeStore?'active':''}" data-store="${esc(s)}">${esc(s)}</button>`).join('')}</div>`:''}<div class="stats">${stat('SKU',fmt(g.length))}${stat('PCS',fmt(qty))}${stat('จัดแล้ว',fmt(dn))}${stat('คงเหลือ',fmt(qty-dn))}</div></section>${g.map(x=>{let d=done[x.key]||0;return`<article class="card"><div class="head"><div><div class="name">${esc(x.sku)}</div><div class="meta">${esc(x.skuCode||'-')} · ${esc(x.type)} · ${esc(x.brand)} · ${esc(x.cat)}</div></div><span class="pill">${esc(x.type)}</span></div><div class="grid">${stat('ชิ้น',fmt(x.qty))}${stat('ยอด',money(x.amt))}${stat('ร้าน',fmt(x.stores.size))}<label class="box"><span>จัดแล้ว</span><input data-done="${uid(x.key)}" value="${esc(d||'')}" inputmode="numeric" placeholder="0"></label><div class="box remain"><span>คงเหลือ</span><b>${fmt(x.qty-d)}</b></div></div></article>`}).join('')}`}
function distGroups(rs){let m=new Map();rs.forEach(r=>{let k=(r.skuCode||r.sku)+'|'+r.type,x=m.get(k)||{sku:r.sku,skuCode:r.skuCode,type:r.type,brand:r.brand,cat:r.cat,qty:0,stores:new Map()};x.qty+=r.qty;let st=x.stores.get(r.store)||{store:r.store,channel:r.channel,qty:0,amt:0};st.qty+=r.qty;st.amt+=r.amt;x.stores.set(r.store,st);m.set(k,x)});return[...m.values()].sort((a,b)=>Math.abs(b.qty)-Math.abs(a.qty))}
function dist(rs){let people=uniq(rs.map(r=>r.person));if(!people.includes(activePerson))activePerson=people[0]||'';let prs=rs.filter(r=>r.person===activePerson),g=distGroups(prs);return`<section class="card"><div class="title">เช็คการกระจายสินค้า</div><div class="sub">${esc(activePerson||'-')} · ${fmt(g.length)} SKU</div><div class="chips">${people.map(p=>`<button class="${p===activePerson?'active':''}" data-person="${esc(p)}">${esc(p)}</button>`).join('')}</div><div class="stats">${stat('SKU',fmt(g.length))}${stat('PCS',fmt(g.reduce((s,x)=>s+x.qty,0)))}${stat('ร้าน',fmt(new Set(prs.map(r=>r.store)).size))}${stat('ยอด',money(prs.reduce((s,r)=>s+r.amt,0)))}</div></section>${g.map(x=>`<article class="card"><div class="head"><div><div class="name">${esc(x.sku)}</div><div class="meta">${esc(x.skuCode||'-')} · ${esc(x.type)} · ${esc(x.brand)} · ${esc(x.cat)}</div></div><span class="pill">${fmt(x.qty)} ชิ้น</span></div>${[...x.stores.values()].sort((a,b)=>Math.abs(b.qty)-Math.abs(a.qty)).map(s=>`<div class="store"><div><b>${esc(s.store)}</b><small>${esc(s.channel)}</small></div><b>${fmt(s.qty)}</b></div>`).join('')}</article>`).join('')}`}
function raw(rs){return rs.slice(0,250).map(r=>`<article class="card"><div class="name">${esc(r.sku)}</div><div class="meta">${esc(r.person)} · ${esc(r.store)} · ${esc(r.type)} · ${esc(r.inv||'-')}</div><div class="stats">${stat('PCS',fmt(r.qty))}${stat('ยอด',money(r.amt))}${stat('ราคา/ชิ้น',money(r.price))}${stat('แบรนด์',r.brand)}</div></article>`).join('')}
function csv(rs){let h=['rowNo','type','person','store','skuCode','sku','qty','amt','price','brand','cat','channel','inv'];let q=x=>'"'+String(x??'').replace(/"/g,'""')+'"';return [h.join(','),...rs.map(r=>h.map(k=>q(r[k])).join(','))].join('\n')}
function download(rs){let b=new Blob(['\ufeff'+csv(rs)],{type:'text/csv;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='doit-pro-distribution.csv';a.click();URL.revokeObjectURL(a.href)}
function render(){let rs=filtered();$('#sub').textContent=`${fmt(rs.length)} / ${fmt(rows.length)} แถว`;$('#app').innerHTML=filters(rs)+(tab==='pick'?pick(rs):tab==='dist'?dist(rs):raw(rs));document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;document.querySelectorAll('[data-tab]').forEach(x=>x.classList.toggle('active',x.dataset.tab===tab));render()});document.querySelectorAll('[data-f]').forEach(e=>e.onchange=e.oninput=ev=>{f[ev.target.dataset.f]=ev.target.value;render()});document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;render()});document.querySelectorAll('[data-store]').forEach(b=>b.onclick=()=>{activeStore=b.dataset.store;render()});document.querySelectorAll('[data-person]').forEach(b=>b.onclick=()=>{activePerson=b.dataset.person;render()});document.querySelectorAll('[data-done]').forEach(i=>i.onchange=e=>{hist.push({...done});done[duid(e.target.dataset.done)]=num(e.target.value);render()});document.querySelectorAll('[data-act]').forEach(b=>b.onclick=()=>{let a=b.dataset.act;if(a==='undo'&&hist.length)done=hist.pop();if(a==='resetdone'){hist.push({...done});done={}}if(a==='clearfilters'){f={person:'',store:'',brand:'',type:'',q:''};activeStore='';activePerson=''}if(a==='export')download(filtered());render()})}
if(!window.XLSX){$('#msg').innerHTML='<div class="err">โหลดตัวอ่าน Excel ไม่สำเร็จ ตรวจอินเทอร์เน็ตแล้วเปิดหน้านี้ใหม่</div>'}$('#choose').onclick=()=>$('#file').click();$('#file').onchange=async e=>{let file=e.target.files[0];if(!file)return;$('#msg').textContent='กำลังอ่าน '+file.name;try{let wb=XLSX.read(await file.arrayBuffer(),{type:'array'});rows=findRows(wb);if(!rows.length)throw Error('ไม่พบตารางข้อมูลในไฟล์นี้');$('#msg').innerHTML='<div class="ok">อ่านไฟล์สำเร็จ '+fmt(rows.length)+' แถว</div>';$('#up').style.display='none';$('#tabs').style.display='flex';$('#app').style.display='grid';activeStore='';activePerson='';render()}catch(err){$('#msg').innerHTML='<div class="err">'+esc(err.message)+'</div>'}};
</script></body></html>
