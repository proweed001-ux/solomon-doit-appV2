 <div class="card"><h3>อัปโหลดไฟล์ DOIT</h3><div class="row"><button class="btn green" id="pick">เลือกไฟล์</button><div class="filebox"><span id="fname">ยังไม่ได้เลือกไฟล์</span><span id="fileok">—</span></div><input id="file" type="file" accept=".xlsx,.xlsm,.xls,.csv" hidden></div><p class="muted" id="msg">รองรับ Excel / CSV และอ่านวันที่จากไฟล์จริงเท่านั้น</p></div>

</main><footer class="foot">Solomon DOIT Pro V2.3.0 | ระบบจัดการและกระจายสินค้า DOIT</footer>
<script>
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)],clean=v=>String(v??'').trim(),norm=s=>clean(s).toLowerCase().replace(/\s+|[_\-./()]/g,''),num=v=>{let n=Number(String(v??'').replace(/,/g,''));return Number.isFinite(n)?n:0},fmt=n=>Number(n||0).toLocaleString('th-TH'),money=n=>Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}),esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),uniq=a=>[...new Set(a.map(clean).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'th'));
let rows=[],tab='pick',done={},fileKey='',f={date:'',person:'',store:'',brand:'',type:'',q:''};
function pad(n){return String(n).padStart(2,'0')}function iso(d){return d&&!isNaN(d)?`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`:''}function dateLabel(s){if(!s)return'ไม่พบวันที่';let p=s.split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:s}
function parseDate(v){if(v instanceof Date)return iso(v);if(typeof v==='number'&&v>20000&&v<90000)return iso(new Date(Date.UTC(1899,11,30)+v*86400000));let s=clean(v);if(!s)return'';let a=s.match(/^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})/);if(a){let y=+a[1];if(y>2400)y-=543;return`${y}-${pad(+a[2])}-${pad(+a[3])}`}let b=s.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{2,4})/);if(b){let y=+b[3];if(y<100)y+=2000;if(y>2400)y-=543;return`${y}-${pad(+b[2])}-${pad(+b[1])}`}let d=new Date(s);return isNaN(d)?'':iso(d)}

function parseRow(o,i){let q=nval(o,['ShipQtyPCS','QtyShipPCS','Qty PCS','Qty','Quantity','PCS']),a=amount(o),skuCode=val(o,['SKU_Code','SKU Code','SKUCode','ItemCode']),prod=val(o,['SKU_Desc','SKU Desc','ProductName','Product','ItemName']),dateRaw=raw(o,['DocDate','Doc Date','DocumentDate','InvoiceDate','Invoice Date','InvcDate','InvDate','BillDate','ShipDate','OrderDate','SODate','DeliveryDate','TransactionDate','PostingDate','Date','วันที่','วัน']);let date=parseDate(dateRaw);return{rowNo:i+1,date,dateRaw:clean(dateRaw),type:val(o,['SOTypeID','SO Type ID','Type','DocType'],'INVC'),store:val(o,['Customer Name','CustomerName','ShipName','c_Name','Store','OutletName','BranchName'],'ไม่ระบุร้าน'),skuCode,sku:prod||skuCode||'ไม่ระบุ SKU',qty:q,amt:a,price:q?a/q:0,person:person(o),brand:val(o,['Brand','TAS_Brand','GroupBrand'],'ไม่ระบุแบรนด์'),size:val(o,['TAS_SizeGroup','SizeGroup','Size Group','Size'],'ไม่ระบุไซซ์'),cat:val(o,['Category','TAS_Category','GroupCategory'],'ไม่ระบุหมวด'),channel:val(o,['Global_Sub_Channel','Sub Channel','ChannelDescr','Channel'],'-'),inv:val(o,['InvcNbr','InvoiceNo','Invoice No','DocNo','BillNo'])}}

function save(){try{localStorage.setItem('doit-v23:'+fileKey,JSON.stringify(done))}catch(e){}}function load(){try{done=JSON.parse(localStorage.getItem('doit-v23:'+fileKey)||'{}')||{}}catch(e){done={}}}

function renderFilters(){let dates=uniq(rows.map(r=>r.date));$('#filters').innerHTML=opt('date','วันที่',dates.map(x=>x))+opt('person','PS',uniq(rows.map(r=>r.person)))+opt('store','ร้านค้า',uniq(rows.map(r=>r.store)))+opt('brand','แบรนด์',uniq(rows.map(r=>r.brand)))+opt('type','ประเภทสินค้า',uniq(rows.map(r=>r.type)))+`<label>ค้นหา SKU / ร้าน / บิล<input data-f="q" value="${esc(f.q)}" placeholder="ค้นหา..."></label>`;$$('[data-f]').forEach(e=>e.oninput=e.onchange=ev=>{f[ev.target.dataset.f]=ev.target.value;render()});let dt=$('#dateTop');dt.disabled=!dates.length;dt.innerHTML=dates.length?`<option value="">ทุกวันที่</option>`+dates.map(x=>`<option value="${esc(x)}" ${f.date===x?'selected':''}>${dateLabel(x)}</option>`).join(''):`<option>ยังไม่มีข้อมูล</option>`;dt.onchange=e=>{f.date=e.target.value;render()}}
function renderSummary(rs){let total=rs.reduce((s,r)=>s+r.amt,0),dn=rs.reduce((s,r)=>s+Math.min(doneOf(r),Math.abs(r.qty))*Math.sign(r.qty),0),qty=rs.reduce((s,r)=>s+r.qty,0),rem=qty-dn,pct=qty?Math.max(0,Math.min(100,dn/qty*100)):0;$('#summary').innerHTML=`<div class="sum blue"><span>ยอดรวมทั้งหมด</span><b>${money(total)}</b><small>บาท</small></div><div class="sum greenbox"><span>จัดแล้ว</span><b>${fmt(dn)}</b><small>PCS</small></div><div class="sum orange"><span>คงเหลือ</span><b>${fmt(rem)}</b><small>PCS</small></div><div class="sum gray"><span>% จัดแล้ว</span><b>${money(pct)}%</b><small>จาก PCS</small></div>`}
function groupPick(rs){let m=new Map();rs.forEach(r=>{let k=[r.brand,r.size,r.skuCode||r.sku,r.type].join('|'),x=m.get(k)||{brand:r.brand,size:r.size,sku:r.sku,skuCode:r.skuCode,type:r.type,qty:0,amt:0,stores:new Set(),rows:[]};x.qty+=r.qty;x.amt+=r.amt;x.stores.add(r.store);x.rows.push(r);m.set(k,x)});return [...m.values()].sort((a,b)=>a.brand.localeCompare(b.brand,'th')||a.size.localeCompare(b.size,'th')||Math.abs(b.qty)-Math.abs(a.qty))}

function toCsv(rs){let h=['date','invoice','type','person','store','brand','size','skuCode','sku','qty','amt','price','done','remain'];let q=x=>'"'+String(x??'').replace(/"/g,'""')+'"';return '\ufeff'+[h.join(','),...rs.map(r=>h.map(k=>q(k==='done'?doneOf(r):k==='remain'?r.qty-doneOf(r):({date:r.date,invoice:r.inv,type:r.type,person:r.person,store:r.store,brand:r.brand,size:r.size,skuCode:r.skuCode,sku:r.sku,qty:r.qty,amt:r.amt,price:r.price})[k])).join(','))].join('\n')}

async function copySummary(){let rs=filtered(),qty=rs.reduce((s,r)=>s+r.qty,0),amt=rs.reduce((s,r)=>s+r.amt,0),stores=new Set(rs.map(r=>r.store)).size,sku=new Set(rs.map(r=>r.skuCode||r.sku)).size,t=`Solomon DOIT Pro V2.3.0\nวันที่: ${f.date?dateLabel(f.date):'ทุกวันที่'}\nแถว: ${fmt(rs.length)}\nSKU: ${fmt(sku)}\nร้าน: ${fmt(stores)}\nPCS: ${fmt(qty)}\nยอด: ${money(amt)}`;try{await navigator.clipboard.writeText(t);alert('Copy สรุปแล้ว')}catch(e){prompt('Copy สรุป',t)}}
$('#pick').onclick=()=>$('#file').click();$('#file').onchange=async e=>{let file=e.target.files[0];if(!file)return;$('#fname').textContent=file.name;$('#msg').textContent='กำลังอ่านไฟล์...';try{if(!window.XLSX)throw Error('โหลดตัวอ่าน Excel ไม่สำเร็จ');fileKey=file.name+':'+file.size+':'+file.lastModified;let wb=XLSX.read(await file.arrayBuffer(),{type:'array',cellDates:true});rows=findRows(wb);if(!rows.length)throw Error('ไม่พบตารางข้อมูลในไฟล์นี้');load();let dates=uniq(rows.map(r=>r.date));$('#fileok').textContent='✓';$('#msg').innerHTML=`<span class="okmsg">อ่านไฟล์สำเร็จ ${fmt(rows.length)} แถว · พบวันที่ ${fmt(dates.length)} วัน</span>`;if(dates.length&&!f.date)f.date=dates[0];render()}catch(err){$('#msg').innerHTML=`<span class="errmsg">${esc(err.message)}</span>`}};
$$('[data-tab]').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render()});$$('[data-act]').forEach(b=>b.onclick=()=>{let a=b.dataset.act;if(a==='clear'){f={date:'',person:'',store:'',brand:'',type:'',q:''}}if(a==='reset'&&confirm('รีเซ็ตค่าจัดแล้วทั้งหมดของไฟล์นี้?')){done={};save()}if(a==='export')download();if(a==='copy')copySummary();render()});$('#help').onclick=()=>alert('1) กดเลือกไฟล์ DOIT\n2) เลือกวันที่/PS/ร้าน/แบรนด์\n3) ดูถอดของ Pro หรือกระจายสินค้า\n4) กรอกจัดแล้วในแท็บจัดแล้ว\n5) Export CSV หรือ Copy สรุป');render();
</script>
</body></html>
