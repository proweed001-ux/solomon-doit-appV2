<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store">
<title>AYA By.พี่ฐาสั่งลุยย</title>
<style>
#fuelBillBtn { display:none!important }
body.fuelSecretOn #fuelBillBtn { display:block!important }
body{margin:0;background:#f6f7f8;color:#111827;font-family:system-ui,-apple-system,'Segoe UI',Tahoma,sans-serif}.loader{min-height:100vh;display:flex;align-items:center;justify-content:center;font-weight:950;color:#087b34}.err{padding:16px;color:#b91c1c;font-weight:900;line-height:1.6}
</style>
</head>
<body>
<div id="proLoader" class="loader">กำลังโหลดหน้า Pro...</div>
<script>
(function(){
  const sourceUrl='https://raw.githubusercontent.com/proweed001-ux/solomon-doit-appV2/6d6f6bbf139de2e62ab63195fb044393e820eca6/dist/pro.html';
  const fuelCss='#fuelBillBtn { display:none!important }body.fuelSecretOn #fuelBillBtn { display:block!important }';
  const fuelScript=`<script id="fuel-secret-v3">
(function(){
  let unlocked=false;
  let count=0;
  let last=0;

  function hide(){
    unlocked=false;
    count=0;
    last=0;
    document.body.classList.remove('fuelSecretOn');
    const b=document.getElementById('fuelBillBtn');
    if(b) b.style.display='none';
  }

  function show(){
    unlocked=true;
    document.body.classList.add('fuelSecretOn');
    const b=document.getElementById('fuelBillBtn');
    if(b) b.style.display='';
  }

  function textOf(el){
    return ((el&&((el.innerText||el.textContent||el.value)||''))+'').trim();
  }

  function isUploadTap(el){
    if(!el||!el.closest) return false;
    const card=el.closest('.uploadCard');
    if(!card) return false;

    const uploadTitle=Array.from(card.querySelectorAll('h1,h2,h3,h4,button,span,label,div'))
      .find(n=>textOf(n).includes('☁')&&textOf(n).includes('อัปโหลด')&&textOf(n).includes('DOIT'));
    if(uploadTitle&&(el===uploadTitle||uploadTitle.contains(el))) return true;

    if(el.closest('#choose,#file,#fileLabel,.uploadRow')) return true;

    return false;
  }

  function onClick(e){
    const ok=isUploadTap(e.target);
    if(!ok){
      if(!unlocked) setTimeout(hide,0);
      return;
    }
    if(unlocked) return;
    const now=Date.now();
    count=(now-last<2500)?count+1:1;
    last=now;
    if(count>=5) show();
  }

  document.addEventListener('DOMContentLoaded',function(){
    hide();
    document.addEventListener('click',onClick,true);
    document.addEventListener('click',function(e){if(!unlocked&&!isUploadTap(e.target)) setTimeout(hide,0);},false);
  });

  if(document.readyState!=='loading') hide();
})();
<\/script>`;

  fetch(sourceUrl,{cache:'no-store'})
    .then(function(r){
      if(!r.ok) throw new Error('โหลดหน้า Pro ไม่สำเร็จ');
      return r.text();
    })
    .then(function(html){
      html=html.replace(/<script\s+id=["']fuel-secret-v[0-9]+["']>[\s\S]*?<\/script>/g,'');
      html=html.replace(/#fuelBillBtn\s*\{\s*display\s*:\s*none\s*!important\s*\}\s*body\.fuelSecretOn\s+#fuelBillBtn\s*\{\s*display\s*:\s*block\s*!important\s*\}/g,'');
      html=html.replace(/#fuelBillBtn\{display:none!important\}body\.fuelSecretOn #fuelBillBtn\{display:block!important\}(?:\.fuelSecretHint\{[^}]*\})?/g,'');
      html=html.replace('</style>',fuelCss+'</style>');
      html=html.replace('</body>',fuelScript+'</body>');
      document.open();
      document.write(html);
      document.close();
    })
    .catch(function(err){
      document.body.innerHTML='<div class="err">โหลดหน้า Pro ไม่สำเร็จ<br>'+String(err.message||err)+'</div>';
    });
})();
</script>
</body>
</html>
