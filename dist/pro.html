<!doctype html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Solomon DOIT Pro V2.2</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box}body{margin:0;background:#020617;color:#e5e7eb;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.page{max-width:920px;margin:auto;min-height:100vh;background:rgba(15,23,42,.82)}header{position:sticky;top:0;z-index:5;background:rgba(2,6,23,.92);padding:12px;border-bottom:1px solid #334155}.title{font-weight:950;font-size:18px}.sub,.muted{color:#94a3b8;font-size:12px}.content{display:grid;gap:12px;padding:12px}.card{border:1px solid #334155;border-radius:20px;background:#0f172a;padding:14px}.tabs,.chips,.row{display:flex;gap:8px;overflow-x:auto}.tabs{padding-top:10px}button{min-height:42px;border-radius:14px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;padding:0 14px;font-weight:850}button.active,.primary{background:linear-gradient(135deg,#2563eb,#059669);border-color:transparent;color:#fff}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.stat{border:1px solid #334155;border-radius:14px;background:#020617;padding:10px}.stat span{display:block;color:#94a3b8;font-size:11px}.stat b{display:block;margin-top:4px;font-size:18px}.filters{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.filters label{display:grid;gap:5px;color:#94a3b8;font-size:11px;font-weight:800}select,input{width:100%;height:40px;border-radius:12px;border:1px solid #334155;background:#020617;color:#e5e7eb;padding:0 10px}.sku{display:grid;gap:10px}.head{display:flex;justify-content:space-between;gap:12px}.name{font-weight:950;line-height:1.35}.meta{color:#94a3b8;font-size:12px;margin-top:4px}.pill{white-space:nowrap;border-radius:999px;background:#1d4ed8;padding:6px 9px;font-size:12px;font-weight:900}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.box{border:1px solid #334155;border-radius:14px;background:#020617;padding:10px}.box span{display:block;color:#94a3b8;font-size:11px}.box b{font-size:16px}.remain{background:rgba(5,150,105,.18)}.store{display:flex;justify-content:space-between;gap:10px;border:1px solid #334155;border-radius:14px;background:#020617;padding:10px;margin-top:6px}.store small{display:block;color:#94a3b8}.err{color:#fecaca;background:#7f1d1d;border-radius:12px;padding:10px}@media(max-width:720px){.stats,.filters,.grid{grid-template-columns:1fr}.row,.head{flex-direction:column}button{width:100%}}
</style>
</head>
<body><div class="page"><header><div class="title">Solomon DOIT Pro V2.2</div><div class="sub" id="sub">ถอดของ Pro + กระจายสินค้า</div><div class="tabs" id="tabs" style="display:none"><button class="active" data-tab="pick">ถอดของ Pro</button><button data-tab="dist">กระจายสินค้า</button><button data-tab="raw">รายการดิบ</button></div></header><main class="content"><section class="card" id="up"><h2>อัปไฟล์ DOIT</h2><p class="muted">หน้าใหม่แยกจาก Dashboard หลัก สำหรับถอดของและตรวจการกระจายบนมือถือ</p><input id="file" type="file" accept=".xlsx,.xlsm,.xls,.csv" style="display:none"><button class="primary" id="choose">เลือกไฟล์ DOIT</button><p class="muted" id="msg"></p></section><section id="app" style="display:none"></section></main></div><script>
const $=s=>document.querySelector(s),fmt=n=>Number(n||0).toLocaleString('th-TH'),money=n=>Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}),num=v=>{let n=Number(String(v??'').replace(/,/g,''));return Number.isFinite(n)?n:0},clean=v=>String(v??'').trim(),norm=s=>clean(s).toLowerCase().replace(/\s+|[_\-./()]/g,''),uniq=a=>[...new Set(a.map(clean).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'th'));
let rows=[],tab='pick',f={person:'',store:'',brand:'',q:''},mode='store',activeStore='',activePerson='',done={},hist=[],bucket='';
function col(obj,names){let ks=Object.keys(obj),m=new Map(ks.map(k=>[norm(k),k]));for(let n of names){let k=m.get(norm(n));if(k)return k}for(let k of ks){let nk=norm(k);for(let n of names){let nn=norm(n);if(nk.includes(nn)||nn.includes(nk))return k}}return null}
function val(o,names,d=''){let k=col(o,names);return k?clean(o[k])||d:d}function nval(o,names){let k=col(o,names);return k?num(o[k]):0}
function amt(o){for(let names of [['TotInvc','TotalInvoice'],['InvoiceAmt','Invoice Amount'],['LineAmtBeforeDisc','Line Amount Before Disc'],['Correct Amount','Line Amount','Amount','Amt']]){let k=col(o,names);if(k&&num(o[k])>0)return num(o[k])}return 0}
function person(o){let id=val(o,['SalespersonID','SO_SalespersonID']),name=val(o,['Salesperson_Name','Salesperson Name']),tid=val(o,['TelesaleId']),tn=val(o,['TelesaleName']);if(id&&name)return id+' '+name;return name||id||tn||tid||'ไม่ระบุบุคคล'}
function row(o,i){let q=nval(o,['ShipQtyPCS','QtyShipPCS','Qty PCS','Qty','Quantity']),a=amt(o),skuCode=val(o,['SKU_Code','SKU Code','SKUCode']),prod=val(o,['SKU_Desc','SKU Desc','ProductName','Product']);return{rowNo:i+1,type:val(o,['SOTypeID','SO Type ID','Type'],'INVC'),store:val(o,['ShipName','c_Name','Customer Name','CustomerName','Store'],'ไม่ระบุร้าน'),skuCode,sku:prod||skuCode||'ไม่ระบุ SKU',qty:q,amt:a,price:q?a/q:0,person:person(o),brand:val(o,['Brand','TAS_Brand','GroupBrand'],'ไม่ระบุแบรนด์'),cat:val(o,['Category','TAS_Category','GroupCategory'],'ไม่ระบุหมวด'),channel:val(o,['Global_Sub_Channel','Sub Channel','ChannelDescr','Channel'],'-'),inv:val(o,['InvcNbr','InvoiceNo','Invoice No'])}}
function findRows(wb){for(let name of wb.SheetNames){let ws=wb.Sheets[name],aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});for(let i=0;i<Math.min(80,aoa.length);i++){let h=aoa[i].map(clean),score=h.filter(x=>/sku|shipqty|totinvc|salesperson|shipname|customer/i.test(x)).length;if(score>=3){let data=aoa.slice(i+1).map(r=>Object.fromEntries(h.map((k,j)=>[k||'col'+j,r[j]]))).map(row).filter(r=>r.qty>0||r.amt>0);if(data.length)return data}}let data=XLSX.utils.sheet_to_json(ws,{defval:''}).map(row).filter(r=>r.qty>0||r.amt>0);if(data.length>20)return data}return[]}
function stat(l,v){return`<div class="stat"><span>${l}</span><b>${v}</b></div>`}function filtered(){let q=f.q.toLowerCase();return rows.filter(r=>(!f.person||r.person===f.person)&&(!f.store||r.store===f.store)&&(!f.brand||r.brand===f.brand)&&(!q||[r.store,r.sku,r.skuCode,r.person,r.inv,r.brand,r.cat].join(' ').toLowerCase().includes(q)))}
function filters(rs){let opt=(k,a)=>`<select data-f="${k}"><option value="">ทั้งหมด</option>${a.map(x=>`<option ${f[k]===x?'selected':''}>${x}</option>`).join('')}</select>`;return`<section class="card"><div class="filters"><label>PS${opt('person',uniq(rows.map(r=>r.person)))}</label><label>ร้าน${opt('store',uniq(rows.map(r=>r.store)))}</label><label>แบรนด์${opt('brand',uniq(rows.map(r=>r.brand)))}</label><label>ค้นหา<input data-f="q" value="${f.q}" placeholder="SKU / ร้าน"></label></div><p class="muted">หลังกรอง ${fmt(rs.length)} / ${fmt(rows.length)} แถว</p></section>`}
function pickGroups(rs){let m=new Map();rs.forEach(r=>{let k=(r.skuCode||r.sku)+'|'+r.type,x=m.get(k)||{key:k,sku:r.sku,skuCode:r.skuCode,type:r.type,brand:r.brand,cat:r.cat,qty:0,amt:0,stores:new Set(),inv:new Set()};x.qty+=r.qty;x.amt+=r.amt;x.stores.add(r.store);if(r.inv)x.inv.add(r.inv);m.set(k,x)});return[...m.values()].sort((a,b)=>b.qty-a.qty)}
function pick(rs){let stores=uniq(rs.map(r=>r.store));if(!activeStore)activeStore=stores[0]||'';let base=mode==='all'?rs:rs.filter(r=>r.store===activeStore),g=pickGroups(base),qty=g.reduce((s,x)=>s+x.qty,0),dn=g.reduce((s,x)=>s+(done[x.key]||0),0);return`<section class="card"><div class="head"><div><div class="title">ถอดของ Pro</div><div class="sub">${fmt(g.length)} SKU · ${mode==='all'?'รวมทุกร้าน':activeStore}</div></div><span class="pill">PCS ${fmt(qty)}</span></div><div class="row"><button class="${mode==='all'?'active':''}" data-mode="all">รวมทุกร้าน</button><button class="${mode==='store'?'active':''}" data-mode="store">แยกร้าน</button><button data-act="undo">Undo</button><button data-act="reset">Reset</button></div>${mode==='store'?`<div class="chips">${stores.map(s=>`<button class="${s===activeStore?'active':''}" data-store="${s}">${s}</button>`).join('')}</div>`:''}<div class="stats">${stat('SKU',fmt(g.length))}${stat('PCS',fmt(qty))}${stat('จัดแล้ว',fmt(dn))}${stat('คงเหลือ',fmt(Math.max(0,qty-dn)))}</div></section>${g.map(x=>{let d=done[x.key]||0;return`<article class="card sku"><div class="head"><div><div class="name">${x.sku}</div><div class="meta">${x.skuCode||'-'} · ${x.type} · ${x.brand} · ${x.cat}</div></div><span class="pill">${x.type}</span></div><div class="grid">${stat('ชิ้น',fmt(x.qty))}${stat('฿ ยอด',money(x.amt))}${stat('ร้าน',fmt(x.stores.size))}<label class="box"><span>จัดแล้ว</span><input data-done="${x.key}" value="${d||''}" placeholder="0"></label><div class="box remain"><span>คงเหลือ</span><b>${fmt(Math.max(0,x.qty-d))}</b></div></div></article>`}).join('')}`}
function distGroups(rs){let m=new Map();rs.forEach(r=>{let k=r.skuCode||r.sku,x=m.get(k)||{sku:r.sku,skuCode:r.skuCode,brand:r.brand,cat:r.cat,qty:0,stores:new Map()};x.qty+=r.qty;let st=x.stores.get(r.store)||{store:r.store,channel:r.channel,qty:0};st.qty+=r.qty;x.stores.set(r.store,st);m.set(k,x)});return[...m.values()].sort((a,b)=>b.qty-a.qty)}
function dist(rs){let people=uniq(rs.map(r=>r.person));if(!activePerson)activePerson=people[0]||'';let prs=rs.filter(r=>r.person===activePerson),g=distGroups(prs);return`<section class="card"><div class="title">เช็คการกระจายสินค้า</div><div class="sub">${activePerson} · ${fmt(g.length)} SKU</div><div class="chips">${people.map(p=>`<button class="${p===activePerson?'active':''}" data-person="${p}">${p}</button>`).join('')}</div><div class="stats">${stat('SKU',fmt(g.length))}${stat('PCS',fmt(g.reduce((s,x)=>s+x.qty,0)))}${stat('ร้าน',fmt(new Set(prs.map(r=>r.store)).size))}${stat('PS',activePerson||'-')}</div></section>${g.map(x=>`<article class="card"><div class="head"><div><div class="name">${x.sku}</div><div class="meta">${x.skuCode||'-'} · ${x.brand} · ${x.cat}</div></div><span class="pill">${fmt(x.qty)} ชิ้น</span></div>${[...x.stores.values()].sort((a,b)=>b.qty-a.qty).map(s=>`<div class="store"><div><b>${s.store}</b><small>${s.channel}</small></div><b>${fmt(s.qty)}</b></div>`).join('')}</article>`).join('')}`}
function raw(rs){return rs.slice(0,200).map(r=>`<article class="card"><div class="name">${r.sku}</div><div class="meta">${r.person} · ${r.store} · ${r.type} · ${r.inv||'-'}</div><div class="stats">${stat('PCS',fmt(r.qty))}${stat('ยอด',money(r.amt))}${stat('ราคา',money(r.price))}${stat('แบรนด์',r.brand)}</div></article>`).join('')}
function render(){let rs=filtered();$('#sub').textContent=`${fmt(rs.length)} / ${fmt(rows.length)} แถว`;$('#app').innerHTML=filters(rs)+(tab==='pick'?pick(rs):tab==='dist'?dist(rs):raw(rs));document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;document.querySelectorAll('[data-tab]').forEach(x=>x.classList.toggle('active',x.dataset.tab===tab));render()});document.querySelectorAll('[data-f]').forEach(e=>e.onchange=e.oninput=ev=>{f[ev.target.dataset.f]=ev.target.value;render()});document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;render()});document.querySelectorAll('[data-store]').forEach(b=>b.onclick=()=>{activeStore=b.dataset.store;render()});document.querySelectorAll('[data-person]').forEach(b=>b.onclick=()=>{activePerson=b.dataset.person;render()});document.querySelectorAll('[data-done]').forEach(i=>i.onchange=e=>{hist.push({...done});done[e.target.dataset.done]=num(e.target.value);render()});document.querySelectorAll('[data-act]').forEach(b=>b.onclick=()=>{if(b.dataset.act==='undo'&&hist.length)done=hist.pop();if(b.dataset.act==='reset'){hist.push({...done});done={}}render()})}
$('#choose').onclick=()=>$('#file').click();$('#file').onchange=async e=>{let file=e.target.files[0];if(!file)return;$('#msg').textContent='กำลังอ่าน '+file.name;try{let buf=await file.arrayBuffer(),wb=XLSX.read(buf,{type:'array'});rows=findRows(wb);if(!rows.length)throw Error('ไม่พบตารางข้อมูลในไฟล์นี้');$('#up').style.display='none';$('#tabs').style.display='flex';$('#app').style.display='grid';render()}catch(err){$('#msg').innerHTML='<div class="err">'+err.message+'</div>'}};
</script></body></html>
