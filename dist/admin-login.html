<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store">
<title>Admin Login · Solomon DOIT</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:20px;background:linear-gradient(145deg,#052e2b,#064e3b 52%,#0f766e);font-family:system-ui,-apple-system,'Segoe UI',Tahoma,sans-serif;color:#111827}.card{width:min(430px,100%);background:#fff;border-radius:22px;padding:26px;box-shadow:0 24px 70px #001a1766}.mark{width:52px;height:52px;border-radius:16px;display:grid;place-items:center;background:#dcfce7;color:#06783d;font-size:25px;font-weight:950}h1{margin:16px 0 6px;font-size:26px}.sub{color:#64748b;font-size:14px;line-height:1.55;margin-bottom:20px}label{display:block;font-size:13px;font-weight:900;margin:12px 0 6px}input{width:100%;height:48px;border:1px solid #cbd5e1;border-radius:12px;padding:0 13px;font:inherit;font-weight:750}input:focus{outline:3px solid #bbf7d0;border-color:#16a34a}button{width:100%;height:48px;border:0;border-radius:12px;background:#087b34;color:#fff;font:inherit;font-weight:950;margin-top:18px;cursor:pointer}button:disabled{background:#94a3b8}.status{min-height:24px;margin-top:12px;color:#b91c1c;font-size:13px}.back{display:block;text-align:center;color:#64748b;text-decoration:none;font-size:13px;margin-top:12px}
</style>
<script src="/assets/admin-auth-v1.js?v=1"></script>
</head>
<body>
<main class="card">
<div class="mark">S</div>
<h1>เข้าสู่ระบบ Admin</h1>
<div class="sub">สถานะเข้าสู่ระบบจะอยู่เฉพาะ session นี้ เมื่อปิด browser ต้องเข้าสู่ระบบใหม่</div>
<form id="loginForm" autocomplete="off">
<label for="adminId">ID</label>
<input id="adminId" name="username" autocomplete="username" autocapitalize="characters" required>
<label for="adminPassword">Password</label>
<input id="adminPassword" name="password" type="password" autocomplete="current-password" required>
<button id="loginButton" type="submit">เข้าสู่ระบบ</button>
<div id="loginStatus" class="status" role="alert"></div>
</form>
<a class="back" href="/">กลับหน้าแรก</a>
</main>
<script>
(()=>{'use strict';
const form=document.querySelector('#loginForm'),button=document.querySelector('#loginButton'),status=document.querySelector('#loginStatus');
AdminAuth.verify().then(result=>{if(result)location.replace('/admin.html')}).catch(()=>{});
form.addEventListener('submit',async event=>{event.preventDefault();button.disabled=true;status.textContent='กำลังตรวจสอบ...';try{const result=await AdminAuth.login(document.querySelector('#adminId').value,document.querySelector('#adminPassword').value);document.querySelector('#adminPassword').value='';if(!result){status.textContent='ID หรือ Password ไม่ถูกต้อง';return}location.replace('/admin.html')}catch{status.textContent='เข้าสู่ระบบไม่สำเร็จ กรุณาลองใหม่'}finally{button.disabled=false}});
})();
</script>
</body>
</html>
