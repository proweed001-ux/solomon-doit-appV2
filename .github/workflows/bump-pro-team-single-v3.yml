name: Bump Pro Team Single V3

on:
  push:
    paths:
      - '.github/workflows/bump-pro-team-single-v3.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bump version
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('dist/pro.html')
          s=p.read_text(encoding='utf-8')
          import re
          s=re.sub(r'/assets/pro-team-single\.js\?v=\d+', '/assets/pro-team-single.js?v=3', s)
          p.write_text(s,encoding='utf-8')
          Path('.github/workflows/bump-pro-team-single-v3.yml').unlink()
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/pro.html .github/workflows/bump-pro-team-single-v3.yml
          git commit -m "Bump Pro team loader cache version [skip ci]" || exit 0
          git push
