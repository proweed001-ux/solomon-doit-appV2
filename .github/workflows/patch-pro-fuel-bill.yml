name: Patch Pro Fuel Secret Unlock

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/patch-pro-fuel-bill.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Make fuel bill button temporary unlock
        run: |
          node <<'NODE'
          const fs=require('fs');
          const p='dist/pro.html';
          let h=fs.readFileSync(p,'utf8');

          h=h.replace(/<script\s+id=["']fuel-secret-v[0-9]+["']>[\s\S]*?<\/script>/g,'');
          h=h.replace(/#fuelBillBtn\s*\{\s*display\s*:\s*none\s*!important\s*\}\s*body\.fuelSecretOn\s+#fuelBillBtn\s*\{\s*display\s*:\s*block\s*!important\s*\}/g,'');
          h=h.replace(/#fuelBillBtn\{display:none!important\}body\.fuelSecretOn #fuelBillBtn\{display:block!important\}(?:\.fuelSecretHint\{[^}]*\})?/g,'');

          const css='#fuelBillBtn { display:none!important }body.fuelSecretOn #fuelBillBtn { display:block!important }';
          if(!h.includes(css)) h=h.replace('</style>',css+'</style>');

          const js=`<script id="fuel-secret-v3">
(function(){
  let unlocked=false;
  let count=0;
  let last=0;

  function hide(){
    unlocked=false;
    count=0;
    last=0;
    document.body.classList.remove('fuelSecretOn');
    const b=document.getElementById('fuelBillBtn');
    if(b) b.style.display='none';
  }

  function show(){
    unlocked=true;
    document.body.classList.add('fuelSecretOn');
    const b=document.getElementById('fuelBillBtn');
    if(b) b.style.display='';
  }

  function textOf(el){
    return ((el&&((el.innerText||el.textContent||el.value)||''))+'').trim();
  }

  function isUploadTap(el){
    if(!el||!el.closest) return false;
    const card=el.closest('.uploadCard');
    if(!card) return false;

    const uploadTitle=Array.from(card.querySelectorAll('h1,h2,h3,h4,button,span,label,div'))
      .find(n=>textOf(n).includes('☁')&&textOf(n).includes('อัปโหลด')&&textOf(n).includes('DOIT'));
    if(uploadTitle&&(el===uploadTitle||uploadTitle.contains(el))) return true;

    if(el.closest('#choose,#file,#fileLabel,.uploadRow')) return true;

    return false;
  }

  function onClick(e){
    const ok=isUploadTap(e.target);
    if(!ok){
      if(!unlocked) setTimeout(hide,0);
      return;
    }
    if(unlocked) return;
    const now=Date.now();
    count=(now-last<2500)?count+1:1;
    last=now;
    if(count>=5) show();
  }

  document.addEventListener('DOMContentLoaded',function(){
    hide();
    document.addEventListener('click',onClick,true);
    document.addEventListener('click',function(e){if(!unlocked&&!isUploadTap(e.target)) setTimeout(hide,0);},false);
  });

  if(document.readyState!=='loading') hide();
})();
</script>`;
          if(!h.includes('fuel-secret-v3')) h=h.replace('</body>',js+'</body>');

          fs.writeFileSync(p,h);
          NODE
      - name: Commit patch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add dist/pro.html
          git commit -m "Make fuel bill button temporary unlock" || exit 0
          git push
