name: Patch Pro Fuel Secret Unlock

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/patch-pro-fuel-bill.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Hide fuel button until upload tapped five times
        run: |
          node <<'NODE'
          const fs=require('fs');
          const p='dist/pro.html';
          let h=fs.readFileSync(p,'utf8');
          if(!h.includes('fuel-secret-v1')){
            h=h.replace('</style>','#fuelBillBtn{display:none!important}body.fuelSecretOn #fuelBillBtn{display:block!important}.fuelSecretHint{font-size:11px;color:#166534;margin-top:4px}</style>');
            const js=`<script id="fuel-secret-v1">
(function(){
  const key='ayaFuelBillSecretUnlocked';
  let count=0,last=0;
  function setVisible(){
    const unlocked=localStorage.getItem(key)==='1';
    document.body.classList.toggle('fuelSecretOn',unlocked);
    const b=document.getElementById('fuelBillBtn');
    if(b){b.style.display=unlocked?'':'none';}
  }
  function isUploadTap(el){
    let n=el;
    for(let i=0;n&&i<5;i++,n=n.parentElement){
      const txt=((n.innerText||n.textContent||n.value||'')+'').trim();
      const id=(n.id||'').toLowerCase();
      const cls=(n.className||'').toString().toLowerCase();
      if(txt.includes('อัปโหลด')||txt.includes('DOIT')||txt.includes('☁')||id.includes('upload')||cls.includes('upload')||cls.includes('filebtn')) return true;
    }
    return false;
  }
  document.addEventListener('click',function(e){
    if(localStorage.getItem(key)==='1') return;
    if(!isUploadTap(e.target)) return;
    const now=Date.now();
    count=(now-last<2500)?count+1:1;
    last=now;
    if(count>=5){localStorage.setItem(key,'1');setVisible();}
  },true);
  document.addEventListener('DOMContentLoaded',setVisible);
  setVisible();
})();
</script>`;
            h=h.replace('</body>',js+'</body>');
          }
          fs.writeFileSync(p,h);
          NODE
      - name: Commit patch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add dist/pro.html
          git commit -m "Hide fuel bill button behind upload secret" || exit 0
          git push
