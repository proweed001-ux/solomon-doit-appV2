name: Set Android icon manifest
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-icon-manifest.yml"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  set-icon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 <<'PY'
          from pathlib import Path
          p=Path('android-apk/app/src/main/AndroidManifest.xml')
          s=p.read_text()
          if 'android:icon="@drawable/ic_launcher"' not in s:
              s=s.replace('android:theme="@style/AppTheme"\n        android:label="AYA DOIT"','android:theme="@style/AppTheme"\n        android:icon="@drawable/ic_launcher"\n        android:roundIcon="@drawable/ic_launcher"\n        android:label="AYA DOIT"')
          p.write_text(s)
          PY
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git rm .github/workflows/apply-icon-manifest.yml
          git add android-apk/app/src/main/AndroidManifest.xml
          git commit -m "Use Android launcher icon" || exit 0
          git push
