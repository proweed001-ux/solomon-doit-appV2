name: Patch Pro Unified Buttons

on:
  push:
    paths:
      - '.github/workflows/patch-pro-unified-buttons.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch Pro page and QR override guard
        run: |
          python3 - <<'PY'
          from pathlib import Path
          pro=Path('dist/pro.html')
          s=pro.read_text(encoding='utf-8')
          css=".resultsModeBtn{position:absolute;right:154px;top:12px;width:112px;height:42px;border:0;background:linear-gradient(180deg,#22c55e 0%,#0b8f3a 58%,#06652b 100%);color:#fff;border-radius:12px;font-size:17px;font-weight:950;box-shadow:0 3px 0 #03451e,0 6px 10px rgba(3,69,30,.22),inset 0 1px 0 rgba(255,255,255,.48);text-shadow:0 1px 2px rgba(0,0,0,.34);cursor:pointer}.uploadCard h3{padding-right:258px}@media(max-width:720px){.resultsModeBtn{right:140px;top:10px;width:96px;height:38px;font-size:15.5px}.uploadCard h3{padding-right:226px}}@media(max-width:390px){.resultsModeBtn{position:static;width:100%;margin:4px 0 8px}.devTeamBtn{position:static!important;width:100%!important;margin-bottom:8px!important}.uploadCard h3{padding-right:0}.uploadCard{display:grid;gap:8px}}"
          if '.resultsModeBtn{' not in s:
              s=s.replace('</style>',css+'</style>',1)
          old='<button class="devTeamBtn" onclick="openDevTeamModal()">ทีมพัฒนา</button>'
          new='<button id="resultsModeBtn" type="button" class="resultsModeBtn" onclick="location.href=\'/performance\'">ผลงาน</button><button class="devTeamBtn" onclick="openDevTeamModal()">ทีมพัฒนา</button>'
          if 'id="resultsModeBtn"' not in s:
              if old not in s: raise SystemExit('dev button marker not found')
              s=s.replace(old,new,1)
          s=s.replace('/assets/pro-team-single.js?v=1','/assets/pro-team-single.js?v=2')
          if '/assets/pro-team-single.js' not in s:
              mark='</script><script src="/assets/pro-core-v4.js?v=358"></script>'
              if mark not in s: raise SystemExit('core marker not found')
              s=s.replace(mark,'</script><script src="/assets/pro-team-single.js?v=2"></script><script src="/assets/pro-core-v4.js?v=358"></script>',1)
          pro.write_text(s,encoding='utf-8')
          ov=Path('dist/assets/pro-native-core-overrides.js')
          o=ov.read_text(encoding='utf-8')
          marker='async function injectDeveloperQr() {'
          repl='async function injectDeveloperQr() {\n    if (window.__PRO_TEAM_QR_SINGLE__) return;'
          if repl not in o:
              if marker not in o: raise SystemExit('inject marker not found')
              o=o.replace(marker,repl,1)
          ov.write_text(o,encoding='utf-8')
          Path('.github/workflows/patch-pro-unified-buttons.yml').unlink()
          PY
      - name: Commit patch and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/pro.html dist/assets/pro-native-core-overrides.js dist/assets/pro-team-single.js .github/workflows/patch-pro-unified-buttons.yml
          git commit -m "Unify Pro buttons and team QR loading [skip ci]" || exit 0
          git push
