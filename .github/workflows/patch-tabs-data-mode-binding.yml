name: Bind Pro mode tabs by data-mode

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/patch-tabs-data-mode-binding.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Patch tab data-mode and binding
        run: |
          node <<'NODE'
          const fs = require('fs');

          const htmlPath = 'dist/pro.html';
          let html = fs.readFileSync(htmlPath, 'utf8');
          const beforeHtml = html;
          const replacements = [
            ['<button class="tab">ถอดของ Pro</button>', '<button class="tab" data-mode="pick">ถอดของ Pro</button>'],
            ['<button class="tab">กระจายสินค้า</button>', '<button class="tab" data-mode="dist">กระจายสินค้า</button>'],
            ['<button class="tab">ใบส่งร้านจริง</button>', '<button class="tab" data-mode="ship">ใบส่งร้านจริง</button>'],
            ['<button class="tab">จัดแล้ว</button>', '<button class="tab" data-mode="done">จัดแล้ว</button>'],
            ['<button class="tab">รายการดิบ</button>', '<button class="tab" data-mode="raw">รายการดิบ</button>'],
            ['<button class="tab orderTab">รวม order</button>', '<button class="tab orderTab" data-mode="order">รวม order</button>']
          ];
          for (const [a,b] of replacements) html = html.replace(a,b);
          if (html === beforeHtml) throw new Error('pro.html tab data-mode patch made no changes');
          for (const mode of ['pick','dist','ship','done','raw','order']) {
            if (!html.includes(`data-mode="${mode}"`)) throw new Error('missing data-mode ' + mode);
          }
          fs.writeFileSync(htmlPath, html);

          const jsPath = 'dist/assets/pro-core-v4.js';
          let js = fs.readFileSync(jsPath, 'utf8');
          const beforeJs = js;
          const oldClick = "$$('.tab').forEach((t,i)=>t.onclick=()=>{push();mode=['pick','dist','ship','done','raw','order'][i]||'pick';page=1;render();msg('เปลี่ยนโหมด: '+T(t.textContent))});";
          const newClick = "$$('.tab').forEach((t,i)=>t.onclick=()=>{push();mode=t.dataset.mode||['pick','dist','ship','done','raw','order'][i]||'pick';page=1;render();msg('เปลี่ยนโหมด: '+T(t.textContent))});";
          if (!js.includes(oldClick) && !js.includes(newClick)) throw new Error('tab click binding not found');
          js = js.replace(oldClick, newClick);
          js = js.replace("['pick','dist','ship','done','raw','order'][i]===mode", "(t.dataset.mode||['pick','dist','ship','done','raw','order'][i])===mode");
          if (js === beforeJs) throw new Error('pro-core-v4.js binding patch made no changes');
          if (!js.includes('t.dataset.mode')) throw new Error('dataset mode binding missing');
          fs.writeFileSync(jsPath, js);
          NODE
          node --check dist/assets/pro-core-v4.js
      - name: Commit data-mode binding patch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add dist/pro.html dist/assets/pro-core-v4.js
          git commit -m "Bind Pro mode tabs by data-mode" || exit 0
          git push