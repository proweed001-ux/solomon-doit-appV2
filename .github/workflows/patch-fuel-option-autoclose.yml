name: Patch Fuel Option Autoclose

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/patch-fuel-option-autoclose.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Patch option popup behavior
        run: |
          node <<'NODE'
          const fs = require('fs');
          const p = 'dist/fuel.html';
          let html = fs.readFileSync(p, 'utf8');
          const oldText = "document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{tempVal=b.dataset.v;document.querySelectorAll('.opt').forEach(x=>x.classList.remove('on'));b.classList.add('on')})";
          const newText = "document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{tempVal=b.dataset.v;if(editing){setPath(editing.path,tempVal);closePop();render()}})";
          html = html.split(oldText).join(newText);
          html = html.replace('ช่อง เริ่ม ของวันที่ 1 เป็นช่องใส่เลขไมล์ตั้งต้น จากนั้นระบบจะบวกต่ออัตโนมัติตามจำนวน กม. ที่กรอกในแต่ละวัน', 'ช่อง เริ่ม ของวันที่ 1 เป็นช่องใส่เลขไมล์ตั้งต้น เลือกจากป๊อบอัพแล้วระบบปิดให้อัตโนมัติ ไม่ต้องกดตกลง');
          fs.writeFileSync(p, html);
          NODE
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/fuel.html
          git commit -m "Make fuel select popups close after choice [skip ci]" || exit 0
          git push
