name: Performance Remove Top Cards
on:
  push:
    paths:
      - '.github/workflows/perf-remove-top-cards.yml'
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          p=Path('dist/performance.html')
          s=p.read_text(encoding='utf-8')
          # 1) disable the problematic top compare-mode card block at the source
          s=re.sub(r"function cmpSlider\(\)\{.*?\}function meter\(v\)", "function cmpSlider(){return ''}function meter(v)", s, count=1)
          # 2) add card style for DS Compare items 1-10 using existing card system
          css=".cmpCatCard{width:100%;text-align:left}.cmpCatCard .diff{display:block;margin-top:8px;font-size:18px;font-weight:920}"
          if '.cmpCatCard{' not in s:
            s=s.replace('@media(max-width:900px){.cmpSlider', css+'@media(max-width:900px){.cmpSlider', 1)
          # 3) convert the existing 1-10 rows into cards instead of row buttons
          old="return `<button class='row' data-mode='compare' data-cat='${E(k)}' data-cmp='${E(state.cmp||'prev')}'><div class='no'>${i+1}</div><div class='rowMain'><div class='rowHead'><b>${E(C[k])}</b><em class='paceMini'>${pct(cur[k])}</em></div><span class='rowSub'>${left}</span></div><div class='right ${cls}'>${r.d>=0?'+':''}${M(r.d)}</div></button>`}"
          new="return `<button class='card cmpCatCard' data-mode='compare' data-cat='${E(k)}' data-cmp='${E(state.cmp||'prev')}'><small>#${i+1}</small><b>${E(C[k])}</b><span>${left}<br>${pct(cur[k])}</span><strong class='diff ${cls}'>${r.d>=0?'+':''}${M(r.d)}</strong></button>`}"
          if old not in s:
            raise SystemExit('diffBtn old row output not found')
          s=s.replace(old,new,1)
          # 4) use grid for DS Compare 1-10 card area
          s=s.replace("<section class='panel'><h3>DS Compare</h3>${cmpSlider()}<div class='rank'>${Object.keys(C).map((k,i)=>diffBtn(data.ds,p.old.ds||{},k,i)).join('')}</div></section>", "<section class='panel'><h3>DS Compare</h3><div class='catgrid'>${Object.keys(C).map((k,i)=>diffBtn(data.ds,p.old.ds||{},k,i)).join('')}</div></section>", 1)
          # 5) remove temporary dump file if it exists
          fp=Path('dist/assets/perf-current-dump.txt')
          if fp.exists(): fp.unlink()
          # verification
          if 'function cmpSlider(){return \'\'}' not in s:
            raise SystemExit('cmpSlider not disabled')
          if "<h3>DS Compare</h3>${cmpSlider()}" in s:
            raise SystemExit('top cards still referenced in DS Compare')
          if "class='row' data-mode='compare' data-cat='${E(k)}'" in s:
            raise SystemExit('old 1-10 row output still present')
          if "card cmpCatCard" not in s or "<div class='catgrid'>${Object.keys(C).map" not in s:
            raise SystemExit('1-10 cards not installed')
          p.write_text(s,encoding='utf-8')
          Path('.github/workflows/perf-remove-top-cards.yml').unlink()
          PY
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add dist/performance.html .github/workflows/perf-remove-top-cards.yml
          git add -u dist/assets/perf-current-dump.txt || true
          git commit -m "Use DS Compare category cards instead of top cards [skip ci]" || exit 0
          git push
