name: Pro Action Dump

on:
  push:
    paths:
      - '.github/workflows/pro-action-dump.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dump snippets
        run: |
          python3 - <<'PY'
          from pathlib import Path
          s=Path('dist/pro.html').read_text(encoding='utf-8')
          keys=['displayBtn','exportCsv','tableTop','displayActionButtons','sendActionButtons','teleBtn','resultsModeBtn','pro-results-mode','pro-team-single']
          out=[]
          out.append('len='+str(len(s)))
          for key in keys:
              i=s.find(key)
              out.append('\n==== '+key+' @ '+str(i)+' ====')
              if i>=0: out.append(s[max(0,i-2500):min(len(s),i+3500)])
          Path('dist/assets/pro-action-dump.txt').write_text('\n'.join(out),encoding='utf-8')
          Path('.github/workflows/pro-action-dump.yml').unlink()
          PY
      - name: Commit dump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/assets/pro-action-dump.txt .github/workflows/pro-action-dump.yml
          git commit -m "Add Pro action dump [skip ci]" || exit 0
          git push
