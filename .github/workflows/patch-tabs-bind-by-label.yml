name: Bind Pro tabs by label

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/patch-tabs-bind-by-label.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Patch tab binding by label
        run: |
          node <<'NODE'
          const fs = require('fs');
          const jsPath = 'dist/assets/pro-core-v4.js';
          let js = fs.readFileSync(jsPath, 'utf8');
          const before = js;
          const old1 = "$$('.tab').forEach((t,i)=>t.onclick=()=>{push();mode=['pick','dist','ship','done','raw','order'][i]||'pick';page=1;render();msg('เปลี่ยนโหมด: '+T(t.textContent))});";
          const neu = "$$('.tab').forEach((t,i)=>t.onclick=()=>{push();const tabMap={'ถอดของ Pro':'pick','กระจายสินค้า':'dist','ใบส่งร้านจริง':'ship','จัดแล้ว':'done','รายการดิบ':'raw','รวม order':'order'};mode=tabMap[T(t.textContent)]||['pick','dist','ship','done','raw','order'][i]||'pick';page=1;render();msg('เปลี่ยนโหมด: '+T(t.textContent))});";
          if (!js.includes(old1) && !js.includes('tabMap={')) throw new Error('old tab binding not found');
          js = js.replace(old1, neu);
          js = js.replace("['pick','dist','ship','done','raw','order'][i]===mode", "({'ถอดของ Pro':'pick','กระจายสินค้า':'dist','ใบส่งร้านจริง':'ship','จัดแล้ว':'done','รายการดิบ':'raw','รวม order':'order'}[T(t.textContent)]||['pick','dist','ship','done','raw','order'][i])===mode");
          if (js === before) throw new Error('no binding change');
          if (!js.includes('tabMap')) throw new Error('tabMap missing');
          fs.writeFileSync(jsPath, js);
          NODE
          node --check dist/assets/pro-core-v4.js
      - name: Commit tab label binding patch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add dist/assets/pro-core-v4.js
          git commit -m "Bind Pro mode tabs by label" || exit 0
          git push