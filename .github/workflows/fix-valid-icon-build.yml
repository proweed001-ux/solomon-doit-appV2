name: Rebuild valid Android icon
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/fix-valid-icon-build.yml"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fix-icon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Rebuild launcher PNGs from uploaded source
        run: |
          python3 <<'PY'
          from pathlib import Path
          import base64
          from PIL import Image
          from io import BytesIO
          src_b64=''''''
          img=Image.open(BytesIO(base64.b64decode(src_b64)))
          img.load()
          sizes={'mdpi':48,'hdpi':72,'xhdpi':96,'xxhdpi':144,'xxxhdpi':192}
          for d,n in sizes.items():
              out=Path(f'android-apk/app/src/main/res/mipmap-{d}')
              out.mkdir(parents=True,exist_ok=True)
              r=img.resize((n,n), Image.Resampling.LANCZOS)
              for name in ['ic_launcher.png','ic_launcher_round.png']:
                  r.save(out/name,'PNG')
          d=Path('android-apk/app/src/main/res/drawable')
          d.mkdir(parents=True,exist_ok=True)
          img.resize((192,192), Image.Resampling.LANCZOS).save(d/'ic_launcher.png','PNG')
          for p in [Path('android-apk/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml'),Path('android-apk/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml')]:
              if p.exists(): p.unlink()
          PY
      - name: Bump APK version
        run: |
          python3 <<'PY'
          from pathlib import Path
          p=Path('android-apk/app/build.gradle')
          s=p.read_text()
          s=s.replace('versionCode 1','versionCode 2')
          s=s.replace("versionName '1.0.0'","versionName '1.0.1'")
          p.write_text(s)
          PY
      - name: Commit fixed valid icon
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git rm --ignore-unmatch .github/workflows/fix-valid-icon-build.yml
          git add android-apk/app/build.gradle android-apk/app/src/main/res
          git commit -m "Rebuild launcher icon with valid PNG resources" || exit 0
          git push

# trigger
