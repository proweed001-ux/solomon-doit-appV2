name: Perf CmpRows Check

on:
  push:
    paths:
      - '.github/workflows/perf-check-cmprows.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check cmpRows
        run: |
          python3 - <<'PY'
          from pathlib import Path
          s=Path('dist/performance.html').read_text(encoding='utf-8')
          out=[]
          for k in ['.cmpRows{','rank cmpRows','DS Compare</h3>${cmpSlider()}']:
              out.append(k+' = '+str(k in s))
          i=s.find('DS Compare</h3>')
          out.append(s[max(0,i-200):i+300] if i>=0 else 'not found')
          Path('dist/assets/perf-cmprows-check.txt').write_text('\n'.join(out),encoding='utf-8')
          Path('.github/workflows/perf-check-cmprows.yml').unlink()
          PY
      - name: Commit check
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/assets/perf-cmprows-check.txt .github/workflows/perf-check-cmprows.yml
          git commit -m "Add cmpRows check [skip ci]" || exit 0
          git push
