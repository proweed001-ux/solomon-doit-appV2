name: Dynamic Performance CD Labels
on:
  push:
    branches: [main]
    paths: ['.github/workflows/performance-dynamic-cd-labels.yml']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Patch Admin converter and Performance labels
        run: |
          python3 - <<'PY'
          from pathlib import Path

          admin=Path('dist/admin.html')
          s=admin.read_text()
          if 'function cdLabels()' not in s:
              anchor="function ix(r){return N(r.target)?N(r.actual)/N(r.target)*100:0}"
              add="""function ix(r){return N(r.target)?N(r.actual)/N(r.target)*100:0}function cdLabels(){const out={sales:'volume NIP',giv:'volume GIV',bills:'Productivity 50'};rows('CD').forEach(r=>{for(let i=0;i<r.length;i++){const code=T(r[i]).toUpperCase(),m=code.match(/^CD([1-9][0-9]*)$/);if(!m)continue;const key='dc'+m[1];if(out[key])continue;const name=T(r[i+1]);out[key]=name&&name.toUpperCase()!==code?code+' '+name:code}});return out}"""
              if anchor not in s:
                  raise SystemExit('admin ix anchor not found')
              s=s.replace(anchor,add,1)
          old="sellerReportRows:s.rows,ads:a,ps:p,...mx"
          new="sellerReportRows:s.rows,labels:cdLabels(),ads:a,ps:p,...mx"
          if new not in s:
              if old not in s:
                  raise SystemExit('admin buildJson anchor not found')
              s=s.replace(old,new,1)
          admin.write_text(s)

          perf=Path('dist/assets/performance-board-v4.js')
          s=perf.read_text()
          if 'function rawMetric(k)' not in s:
              anchor="const K=()=>Object.keys(C),N=x=>Number.isFinite(+x)?+x:0,M=x=>N(x).toLocaleString('th-TH',{maximumFractionDigits:0}),P=x=>N(x).toLocaleString('th-TH',{maximumFractionDigits:1,minimumFractionDigits:1})+'%',E=x=>String(x??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll(String.fromCharCode(34),'&quot;');"
              add=anchor+"function rawMetric(k){const v=data?.labels?.[k];if(v)return v;const m=String(k||'').match(/^dc([1-9][0-9]*)$/);if(m){const cd='CD'+m[1],fs=data?.sellerReportFields||[];for(const x of fs){const t=String(x||'').replace(/\\s+/g,' ').trim(),r=new RegExp('(?:Index\\s*)?'+cd+'\\s+(.+)$','i').exec(t);if(r&&r[1])return cd+' '+r[1].trim()}}return C[k]||k}function metric(k){return E(rawMetric(k))}"
              if anchor not in s:
                  raise SystemExit('performance helper anchor not found')
              s=s.replace(anchor,add,1)
          s=s.replace("E(C[k])","metric(k)")
          s=s.replace("E(C[cat])","metric(cat)")
          s=s.replace("button(C[k],","button(rawMetric(k),")
          perf.write_text(s)
          PY
      - name: Commit patch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add dist/admin.html dist/assets/performance-board-v4.js
          git commit -m "Add dynamic Performance CD labels" || exit 0
          git push
