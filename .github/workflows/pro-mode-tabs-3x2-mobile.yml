name: Pro mode tabs 3x2 mobile
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pro-mode-tabs-3x2-mobile.yml"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          node <<'NODE'
          const fs=require('fs');
          const p='dist/pro.html';
          let s=fs.readFileSync(p,'utf8');
          const old='.modeTop{display:grid!important;grid-template-columns:1fr auto!important;gap:10px!important;align-items:start!important}.modeTop .tabs{grid-column:1/-1!important;display:grid!important;grid-template-columns:repeat(3,1fr)!important;gap:8px!important;margin:8px 0 0!important}.modeTop .tab{height:40px!important}.tableTitleBox{min-width:0}@media(max-width:720px){.modeTop{grid-template-columns:1fr!important}.modeTop #displayBtn{width:100%!important}.modeTop .tabs{grid-template-columns:1fr 1fr!important}}';
          const neu='.modeTop{display:grid!important;grid-template-columns:1fr auto!important;gap:8px!important;align-items:start!important}.modeTop .tabs{grid-column:1/-1!important;display:grid!important;grid-template-columns:repeat(3,minmax(0,1fr))!important;gap:6px!important;margin:8px 0 0!important}.modeTop .tab{height:34px!important;min-width:0!important;padding:0 4px!important;border-radius:10px!important;font-size:12.5px!important;line-height:1.05!important;white-space:normal!important}.tableTitleBox{min-width:0}@media(max-width:720px){.modeTop{grid-template-columns:1fr!important}.modeTop #displayActionButtons{grid-column:1/-1!important}.modeTop .tabs{grid-template-columns:repeat(3,minmax(0,1fr))!important}.modeTop .tab{height:34px!important;font-size:12px!important;padding:0 3px!important}}';
          if(!s.includes(old))throw new Error('target modeTop css not found');
          s=s.replace(old,neu);
          if(!s.includes('repeat(3,minmax(0,1fr))'))throw new Error('3 column tabs css missing');
          fs.writeFileSync(p,s);
          NODE
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git rm .github/workflows/pro-mode-tabs-3x2-mobile.yml
          git add dist/pro.html
          git commit -m "Set Pro mode tabs to compact 3x2 layout" || exit 0
          git push