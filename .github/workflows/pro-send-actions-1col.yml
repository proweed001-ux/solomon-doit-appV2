name: Pro send actions one column
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pro-send-actions-1col.yml"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          node <<'NODE'
          const fs=require('fs');
          let p='dist/assets/pro-core-v4.js';
          let s=fs.readFileSync(p,'utf8');
          s=s.replace(/\.sendActionButtons\{grid-column:1\/-1;display:grid;grid-template-columns:repeat\(2,1fr\);gap:8px;margin-top:0\}\.sendActionButtons button\{width:100%;height:42px\}@media\(max-width:720px\)\{\.sendActionButtons\{grid-template-columns:1fr 1fr\}\}/g,'.sendActionButtons{grid-column:1/-1;display:grid;grid-template-columns:1fr;gap:8px;margin-top:0}.sendActionButtons button{width:100%;height:42px}@media(max-width:720px){.sendActionButtons{grid-template-columns:1fr}}');
          if(!s.includes('.sendActionButtons{grid-column:1/-1;display:grid;grid-template-columns:1fr;gap:8px;margin-top:0}'))throw new Error('one column css missing');
          fs.writeFileSync(p,s);
          p='dist/pro.html';
          s=fs.readFileSync(p,'utf8');
          s=s.replace(/\/assets\/pro-core-v4\.js\?v=\d+/g,'/assets/pro-core-v4.js?v=349');
          fs.writeFileSync(p,s);
          NODE
          node --check dist/assets/pro-core-v4.js
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git rm .github/workflows/pro-send-actions-1col.yml
          git add dist/pro.html dist/assets/pro-core-v4.js
          git commit -m "Set Pro send action buttons to one column" || exit 0
          git push