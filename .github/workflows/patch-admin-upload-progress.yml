name: Patch admin upload progress

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/patch-admin-upload-progress.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch upload UI progress and latest file state
        run: |
          python3 <<'PY'
          from pathlib import Path

          app = Path('src/App.tsx')
          s = app.read_text()

          if 'type UploadProgressState =' not in s:
              marker = "function UploadPage({ rows, fileName, error, loading, onUpload, onGoDashboard, onClear }: {"
              block = r'''
type UploadProgressState = {
  percent: number;
  title: string;
  detail: string;
  state: 'uploading' | 'parsing' | 'activating' | 'done' | 'error';
};

function UploadProgressModal({ progress }: { progress: UploadProgressState | null }) {
  if (!progress) return null;
  const isDone = progress.state === 'done';
  const isError = progress.state === 'error';

  return (
    <div className="upload-modal-backdrop" role="status" aria-live="polite">
      <div className="upload-modal">
        <div className={isError ? 'upload-modal-icon error' : isDone ? 'upload-modal-icon done' : 'upload-modal-icon'}>
          {isError ? '!' : isDone ? '✓' : <UploadCloud size={28} />}
        </div>
        <h2>{progress.title}</h2>
        <p>{progress.detail}</p>
        <div className="progress-head">
          <span>{isError ? 'หยุดทำงาน' : isDone ? 'เสร็จแล้ว' : 'กำลังทำงาน'}</span>
          <b>{Math.max(0, Math.min(100, Math.round(progress.percent)))}%</b>
        </div>
        <div className="progress-track">
          <div className={isError ? 'progress-fill error' : isDone ? 'progress-fill done' : 'progress-fill'} style={{ width: `${Math.max(0, Math.min(100, progress.percent))}%` }} />
        </div>
        <div className="progress-note">
          {isError ? 'ตรวจสอบไฟล์แล้วลองใหม่อีกครั้ง' : isDone ? 'ไฟล์นี้ถูกตั้งเป็นไฟล์ล่าสุดอัตโนมัติ' : 'ห้ามปิดหน้านี้ระหว่างอัปโหลดหรือแปลงไฟล์'}
        </div>
      </div>
    </div>
  );
}

'''
              s = s.replace(marker, block + marker)

          s = s.replace(
              "function UploadPage({ rows, fileName, error, loading, onUpload, onGoDashboard, onClear }: {\n  rows: ParsedRow[];\n  fileName: string;\n  error: string;\n  loading: boolean;",
              "function UploadPage({ rows, fileName, latestFileName, error, loading, onUpload, onGoDashboard, onClear }: {\n  rows: ParsedRow[];\n  fileName: string;\n  latestFileName: string;\n  error: string;\n  loading: boolean;"
          )

          s = s.replace(
              "        {fileName && <div className=\"file-name\">ไฟล์: {fileName}</div>}\n        {error && <div className=\"error-box\">{error}</div>}",
              "        {fileName && <div className=\"file-name\">ไฟล์ที่เลือก: {fileName}</div>}\n        {latestFileName && <div className=\"latest-file-badge\">ไฟล์ล่าสุดอัตโนมัติ: {latestFileName}</div>}\n        {error && <div className=\"error-box\">{error}</div>}"
          )

          s = s.replace(
              "  const [loading, setLoading] = useState(false);",
              "  const [loading, setLoading] = useState(false);\n  const [progress, setProgress] = useState<UploadProgressState | null>(null);\n  const [latestFileName, setLatestFileName] = useState(() => {\n    try {\n      return localStorage.getItem('doit.latestFileName') || '';\n    } catch {\n      return '';\n    }\n  });"
          )

          old_handle = """  const handleUpload = async (file: File) => {
    setLoading(true);
    setError('');
    try {
      const parsed = await parseDataFile(file);
      setRows(parsed);
      setFileName(file.name);
      setFilters(emptyFilters);
      setMode('dashboard');
      if (parsed.length === 0) setError('อ่านไฟล์ได้ แต่ไม่พบแถวที่มีจำนวนหรือยอดเงิน');
    } catch (err) {
      setRows([]);
      setFileName(file.name);
      setError(err instanceof Error ? err.message : 'อ่านไฟล์ไม่ได้');
    } finally {
      setLoading(false);
    }
  };
"""
          new_handle = """  const handleUpload = async (file: File) => {
    setLoading(true);
    setError('');
    setProgress({ percent: 8, title: 'กำลังอัปโหลดไฟล์ DOIT', detail: file.name, state: 'uploading' });

    try {
      await new Promise(resolve => setTimeout(resolve, 120));
      setProgress({ percent: 28, title: 'กำลังแปลงไฟล์', detail: 'กำลังอ่าน Excel/CSV และจัดรูปแบบข้อมูล', state: 'parsing' });

      const parsed = await parseDataFile(file);

      setProgress({ percent: 76, title: 'กำลังตรวจสอบข้อมูล', detail: `${fmt(parsed.length)} แถว · ตั้งค่าไฟล์ล่าสุด`, state: 'activating' });
      await new Promise(resolve => setTimeout(resolve, 120));

      setRows(parsed);
      setFileName(file.name);
      setLatestFileName(file.name);
      try {
        localStorage.setItem('doit.latestFileName', file.name);
      } catch {
        // localStorage can be blocked in some browsers; UI state still updates.
      }
      setFilters(emptyFilters);
      if (parsed.length === 0) setError('อ่านไฟล์ได้ แต่ไม่พบแถวที่มีจำนวนหรือยอดเงิน');

      setProgress({ percent: 100, title: 'อัปโหลดและแปลงไฟล์สำเร็จ', detail: `${file.name} ถูกตั้งเป็นไฟล์ล่าสุดแล้ว`, state: 'done' });
      setTimeout(() => setProgress(null), 900);
      setMode('dashboard');
    } catch (err) {
      const message = err instanceof Error ? err.message : 'อ่านไฟล์ไม่ได้';
      setRows([]);
      setFileName(file.name);
      setError(message);
      setProgress({ percent: 100, title: 'อัปโหลดหรือแปลงไฟล์ไม่สำเร็จ', detail: message, state: 'error' });
    } finally {
      setLoading(false);
    }
  };
"""
          if old_handle in s:
              s = s.replace(old_handle, new_handle)
          else:
              raise SystemExit('handleUpload block not found')

          s = s.replace(
              "          loading={loading}\n          onUpload={handleUpload}",
              "          loading={loading}\n          latestFileName={latestFileName}\n          onUpload={handleUpload}"
          )

          s = s.replace(
              "      )}\n    </div>\n  );",
              "      )}\n      <UploadProgressModal progress={progress} />\n    </div>\n  );"
          )

          app.write_text(s)

          css = Path('src/styles.css')
          c = css.read_text()
          if '.upload-modal-backdrop' not in c:
              c += r'''

.latest-file-badge {
  margin: 10px auto 0;
  width: fit-content;
  max-width: 100%;
  padding: 8px 12px;
  border-radius: 999px;
  color: #bbf7d0;
  background: rgba(34, 197, 94, 0.12);
  border: 1px solid rgba(74, 222, 128, 0.22);
  font-size: 12px;
  font-weight: 850;
  word-break: break-word;
}

.upload-modal-backdrop {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: grid;
  place-items: center;
  padding: 18px;
  background: rgba(2, 6, 23, 0.72);
  backdrop-filter: blur(10px);
}

.upload-modal {
  width: min(420px, 100%);
  border-radius: 26px;
  padding: 22px;
  text-align: center;
  background: rgba(15, 23, 42, 0.98);
  border: 1px solid rgba(148, 163, 184, 0.22);
  box-shadow: 0 28px 120px rgba(0, 0, 0, 0.42);
}

.upload-modal-icon {
  width: 66px;
  height: 66px;
  margin: 0 auto 12px;
  border-radius: 22px;
  display: grid;
  place-items: center;
  color: #dbeafe;
  background: linear-gradient(135deg, #2563eb, #059669);
  font-size: 32px;
  font-weight: 950;
}

.upload-modal-icon.done {
  background: linear-gradient(135deg, #16a34a, #059669);
}

.upload-modal-icon.error {
  background: linear-gradient(135deg, #dc2626, #f97316);
}

.upload-modal h2 {
  margin: 0;
  color: #f8fafc;
  font-size: 20px;
  letter-spacing: -0.03em;
}

.upload-modal p {
  margin: 8px 0 16px;
  color: #cbd5e1;
  line-height: 1.45;
  word-break: break-word;
}

.progress-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  color: #bfdbfe;
  font-size: 12px;
  font-weight: 900;
}

.progress-track {
  height: 12px;
  overflow: hidden;
  border-radius: 999px;
  background: rgba(30, 41, 59, 0.95);
  border: 1px solid rgba(148, 163, 184, 0.18);
}

.progress-fill {
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, #2563eb, #22c55e);
  transition: width 260ms ease;
}

.progress-fill.done {
  background: linear-gradient(90deg, #16a34a, #22c55e);
}

.progress-fill.error {
  background: linear-gradient(90deg, #dc2626, #f97316);
}

.progress-note {
  margin-top: 10px;
  color: #94a3b8;
  font-size: 12px;
}
'''
          css.write_text(c)
          PY
      - name: Commit patch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git rm --ignore-unmatch .github/workflows/patch-admin-upload-progress.yml
          git add src/App.tsx src/styles.css
          git commit -m "Add admin upload progress popup" || exit 0
          git push
