name: Patch Pro print unit price to net plus VAT
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pro-print-net-vat-unit.yml"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          node <<'NODE'
          const fs = require('fs');

          const jsPath = 'dist/assets/pro-core-v4.js';
          let s = fs.readFileSync(jsPath, 'utf8');

          const oldUnit = "out.push({code:g.code||'',name:g.sku,qty,unit:N(g.unit),inserted:g.inserted})";
          const newUnit = "out.push({code:g.code||'',name:g.sku,qty,unit:N(g.netUnit)*1.07,inserted:g.inserted})";
          if (s.includes(oldUnit)) {
            s = s.replace(oldUnit, newUnit);
          } else if (!s.includes(newUnit)) {
            throw new Error('printRowsForPick unit price expression not found');
          }

          const oldHead = "['รหัส','รายการสินค้า','จำนวน','ราคา/หน่วย','รวมเงิน']";
          const newHead = "['รหัส','รายการสินค้า','จำนวน','ราคา/หน่วย (สุทธิ+7%)','รวมเงิน']";
          if (s.includes(oldHead)) {
            s = s.replace(oldHead, newHead);
          } else if (!s.includes(newHead)) {
            throw new Error('printPick table header not found');
          }

          fs.writeFileSync(jsPath, s);

          const htmlPath = 'dist/pro.html';
          let h = fs.readFileSync(htmlPath, 'utf8');
          h = h.replace(/\/assets\/pro-core-v4\.js\?v=\d+/g, '/assets/pro-core-v4.js?v=351');
          fs.writeFileSync(htmlPath, h);
          NODE
          node --check dist/assets/pro-core-v4.js
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git rm .github/workflows/pro-print-net-vat-unit.yml
          git add dist/pro.html dist/assets/pro-core-v4.js
          git commit -m "Use net plus VAT unit price for Pro print" || exit 0
          git push
