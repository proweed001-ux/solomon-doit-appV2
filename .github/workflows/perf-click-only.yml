name: Performance Click Only
on:
  push:
    paths:
      - '.github/workflows/perf-click-only.yml'
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          p=Path('dist/performance.html')
          s=p.read_text(encoding='utf-8')
          for a,b in [
            (".cmpModeSwipe,.cmpModeRows .row,.cmpSlider,.cmpCard{touch-action:pan-y}",""),
            ("<section class='panel cmpModeSwipe'><h3>DS Compare</h3>${cmpSlider()}<div class='rank cmpModeRows'>","<section class='panel'><h3>DS Compare</h3>${cmpSlider()}<div class='rank'>"),
            ("<section class='panel cmpSwipe'><h3>DS Compare</h3>${cmpSlider()}<div class='rank'>","<section class='panel'><h3>DS Compare</h3>${cmpSlider()}<div class='rank'>"),
            ("<div class='rank cmpRows'>","<div class='rank'>"),
            (".rowMain{min-width:0;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;white-space:nowrap}",".rowMain{min-width:0;overflow:hidden;white-space:nowrap}"),
            ("@media(max-width:900px){.cmpCard{flex-basis:72vw}}","")
          ]:
            s=s.replace(a,b)
          s=re.sub(r"\.cmpRows\{[^}]*\}(\.cmpRows [^{]+\{[^}]*\})+", "", s)
          s=re.sub(r"\.cmpSlider\{[^}]*\}\.cmpCard\{[^}]*\}", ".cmpSlider{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;width:100%;max-width:100%;margin-bottom:12px}.cmpCard{min-width:0;background:#202f44;border:1px solid #3a4f68;border-radius:16px;padding:12px;text-align:left;color:#e6edf3}", s, count=1)
          if "@media(max-width:900px){.cmpSlider" not in s:
            s=s.replace("@media(max-width:1100px)","@media(max-width:900px){.cmpSlider{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:1100px)",1)
          s=re.sub(r"<script src=['\"]/assets/perf-compare-swipe\.js\?v=\d+['\"]></script>","",s)
          st=s.find("const CMPS=['prev','same','avg3','pace']")
          if st>=0:
            en=s.find("function btn(",st)
            if en<0: raise SystemExit('marker')
            click="document.addEventListener('click',e=>{const b=e.target.closest('[data-mode]');if(!b)return;e.preventDefault();go({mode:b.dataset.mode,cat:b.dataset.cat||'',ads:b.dataset.ads||'',ps:b.dataset.ps||'',cmp:b.dataset.cmp||state.cmp||'prev'})});"
            s=s[:st]+click+s[en:]
          if "const CMPS" in s or "cmpModeSwipe" in s or "cmpRows" in s or "perf-compare-swipe" in s:
            raise SystemExit('old remains')
          p.write_text(s,encoding='utf-8')
          Path('.github/workflows/perf-click-only.yml').unlink()
          PY
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add dist/performance.html .github/workflows/perf-click-only.yml
          git commit -m "Convert Performance compare to click only [skip ci]" || exit 0
          git push
