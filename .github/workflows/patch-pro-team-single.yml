name: Patch Pro Team Single

on:
  push:
    paths:
      - '.github/workflows/patch-pro-team-single.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add single loader script
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('dist/pro.html')
          s=p.read_text(encoding='utf-8')
          mark='</script><script src="/assets/pro-core-v4.js?v=358"></script>'
          add='</script><script src="/assets/pro-team-single.js?v=1"></script><script src="/assets/pro-core-v4.js?v=358"></script>'
          if '/assets/pro-team-single.js' not in s:
              if mark not in s:
                  raise SystemExit('marker not found')
              s=s.replace(mark,add,1)
          for f in ['dist/assets/pro-diagnostics.txt','dist/assets/pro-tail.txt']:
              fp=Path(f)
              if fp.exists(): fp.unlink()
          Path('.github/workflows/patch-pro-team-single.yml').unlink()
          p.write_text(s,encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/pro.html .github/workflows/patch-pro-team-single.yml dist/assets/pro-team-single.js
          git add -u dist/assets/pro-diagnostics.txt dist/assets/pro-tail.txt || true
          git commit -m "Use single Pro team loader [skip ci]" || exit 0
          git push
