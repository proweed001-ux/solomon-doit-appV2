name: Patch Pro print store continuation

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/patch-pro-print-store-continuation.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch prepare print continuation by store
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          p = Path('dist/assets/pro-core-v4.js')
          s = p.read_text()

          old_build = "function buildBills(){const state=getState();if(!state)return[];const receivers=(state.sel?.receivers||[]).filter(Boolean);if(!receivers.length)return[];const pool=group(sourceRows(state)).concat(insertedGroups(state));const keyed=new Set(keyedStores(state).filter(s=>receivers.includes(s)));const stores=receivers.filter(s=>keyed.has(s));if(!stores.length)return[];const bills=[];stores.forEach(store=>{const rows=rowsForStore(state,store,pool);if(!rows.length)return;for(let i=0;i<rows.length;i+=12){const chunk=rows.slice(i,i+12),total=chunk.reduce((s,x)=>s+x.qty*x.unit,0);bills.push({store,rows:chunk,total,state})}});return bills}"
          new_build = "function buildBills(){const state=getState();if(!state)return[];const receivers=(state.sel?.receivers||[]).filter(Boolean);if(!receivers.length)return[];const pool=group(sourceRows(state)).concat(insertedGroups(state));const keyed=new Set(keyedStores(state).filter(s=>receivers.includes(s)));const stores=receivers.filter(s=>keyed.has(s));if(!stores.length)return[];const bills=[];stores.forEach((store,storeSeq)=>{const rows=rowsForStore(state,store,pool);if(!rows.length)return;const storeTotal=rows.reduce((s,x)=>s+x.qty*x.unit,0),partCount=Math.ceil(rows.length/12);for(let i=0;i<rows.length;i+=12){const chunk=rows.slice(i,i+12),partNo=Math.floor(i/12)+1,pageTotal=chunk.reduce((s,x)=>s+x.qty*x.unit,0);bills.push({store,rows:chunk,pageTotal,storeTotal,total:storeTotal,state,startNo:i+1,partNo,partCount,isLastStorePart:partNo===partCount,storeSeq})}});return bills}"
          if old_build not in s:
              raise SystemExit('buildBills target not found; no change made')
          s = s.replace(old_build, new_build)

          s = s.replace('<td class="c">${i+1}</td>', '<td class="c">${(bill.startNo||1)+i}</td>')

          old_foot = 'const foot=`<tr class="totalRow"><td colspan="${heads.length}" class="r" contenteditable="true">รวมทั้งหมด</td><td class="r" data-page-total>${E(B(bill.total))}</td></tr>`;'
          new_foot = 'const totalLabel=bill.isLastStorePart?\'รวมทั้งหมด\':`ต่อใบถัดไป (${bill.partNo||1}/${bill.partCount||1})`,totalValue=bill.isLastStorePart?B(bill.storeTotal):\'\';const foot=`<tr class="totalRow"><td colspan="${heads.length}" class="r" contenteditable="true">${E(totalLabel)}</td><td class="r" data-page-total="${bill.isLastStorePart?\'1\':\'0\'}">${E(totalValue)}</td></tr>`;'
          if old_foot not in s:
              raise SystemExit('receiptHtml foot target not found; no change made')
          s = s.replace(old_foot, new_foot)

          old_section = 'return `<section class="receiptPage"><div class="receiptTop">'
          new_section = 'return `<section class="receiptPage" data-store-seq="${E(bill.storeSeq??idx)}" data-last-part="${bill.isLastStorePart?\'1\':\'0\'}"><div class="receiptTop">'
          if old_section not in s:
              raise SystemExit('receiptPage section target not found; no change made')
          s = s.replace(old_section, new_section)

          old_pages = "function billPagesHtml(bills){const sorted=[...bills].map((b,i)=>({...b,_srcIndex:i,_itemCount:(b.rows||[]).length})).sort((a,b)=>b._itemCount-a._itemCount||a._srcIndex-b._srcIndex);const pages=[];sorted.forEach(b=>{let best=-1,bestLeft=999;for(let i=0;i<pages.length;i++){const p=pages[i],items=p.reduce((s,x)=>s+(x.rows||[]).length,0),left=24-items-b._itemCount;if(p.length<3&&left>=0&&left<bestLeft){best=i;bestLeft=left}}if(best<0)pages.push([b]);else pages[best].push(b)});return pages.map((page,pi)=>`<div class=\"a4Sheet\">${page.map((b,i)=>receiptHtml(b,pi*3+i)).join('')}${Array.from({length:3-page.length},()=>'<section class=\"receiptPage emptyBill\"></section>').join('')}</div>`).join('')}"
          new_pages = "function billPagesHtml(bills){const sorted=[...bills].map((b,i)=>({...b,_srcIndex:i,_itemCount:(b.rows||[]).length}));const pages=[];for(let i=0;i<sorted.length;i+=3)pages.push(sorted.slice(i,i+3));return pages.map((page,pi)=>`<div class=\"a4Sheet\">${page.map((b,i)=>receiptHtml(b,pi*3+i)).join('')}${Array.from({length:3-page.length},()=>'<section class=\"receiptPage emptyBill\"></section>').join('')}</div>`).join('')}"
          if old_pages not in s:
              raise SystemExit('billPagesHtml target not found; no change made')
          s = s.replace(old_pages, new_pages)

          old_recalc = "function recalcReceiptPage(pg){let total=0;pg.querySelectorAll('tr[data-line]').forEach(tr=>{const q=N(tr.querySelector('.rq')?.textContent),u=N(tr.querySelector('.ru')?.textContent),t=q*u;total+=t;const rt=tr.querySelector('.rt');if(rt)rt.textContent=B(t)});const tt=pg.querySelector('[data-page-total]');if(tt)tt.textContent=B(total)}"
          new_recalc = "function recalcReceiptPage(pg){pg.querySelectorAll('tr[data-line]').forEach(tr=>{const q=N(tr.querySelector('.rq')?.textContent),u=N(tr.querySelector('.ru')?.textContent),t=q*u,rt=tr.querySelector('.rt');if(rt)rt.textContent=B(t)});const tt=pg.querySelector('[data-page-total]');if(!tt)return;if(tt.getAttribute('data-page-total')==='0'){tt.textContent='';return}const root=pg.closest('.printOverlay')||document,seq=pg.dataset.storeSeq;let total=0;root.querySelectorAll(`.receiptPage[data-store-seq=\"${seq}\"] tr[data-line]`).forEach(tr=>{total+=N(tr.querySelector('.rq')?.textContent)*N(tr.querySelector('.ru')?.textContent)});tt.textContent=B(total)}"
          if old_recalc not in s:
              raise SystemExit('recalcReceiptPage target not found; no change made')
          s = s.replace(old_recalc, new_recalc)

          p.write_text(s)

          html_path = Path('dist/pro.html')
          if html_path.exists():
              html = html_path.read_text()
              html = re.sub(r'(pro-core-v4\.js\?v=)(\d+)', lambda m: m.group(1)+str(int(m.group(2))+1), html)
              html_path.write_text(html)
          PY
      - name: Commit patch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git rm --ignore-unmatch .github/workflows/patch-pro-print-store-continuation.yml
          git add dist/assets/pro-core-v4.js dist/pro.html .github/workflows/patch-pro-print-store-continuation.yml
          git commit -m "Fix Pro print continuation totals by store" || exit 0
          git push
