name: Fix Fuel Plate Overlap
on:
  push:
    branches: [main]
    paths: ['.github/workflows/fix-fuel-plate-overlap.yml']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Patch plate label and box spacing
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('dist/fuel-print.html')
          s = p.read_text()
          s = s.replace('.plateLbl{position:absolute;left:158.6mm;top:36.2mm;font-size:10.5px;font-weight:700}', '.plateLbl{position:absolute;left:144.5mm;top:36.1mm;width:18.5mm;text-align:right;font-size:10.5px;font-weight:700;white-space:nowrap}')
          s = s.replace('.plateBox{position:absolute;left:166.7mm;top:30.0mm;width:22.5mm;height:16.6mm;', '.plateBox{position:absolute;left:169.0mm;top:29.4mm;width:23.4mm;height:17.8mm;')
          s = s.replace('เตรียมปริ้นบิลน้ำมัน</b>', 'เตรียมปริ้นบิลน้ำมัน • plate-fix</b>')
          p.write_text(s)
          PY
      - name: Commit patch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add dist/fuel-print.html
          git commit -m "Fix fuel print plate label spacing" || exit 0
          git push
