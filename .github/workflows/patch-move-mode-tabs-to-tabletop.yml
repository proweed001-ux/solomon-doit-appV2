name: Move Pro mode buttons into table header

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/patch-move-mode-tabs-to-tabletop.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch pro.html layout
        run: |
          node <<'NODE'
          const fs = require('fs');
          const p = 'dist/pro.html';
          let html = fs.readFileSync(p, 'utf8');
          const before = html;

          const tabsRegex = /<div class="tabs">[\s\S]*?<button class="tab orderTab">รวม order<\/button><\/div>/;
          const tabsMatch = html.match(tabsRegex);
          if (!tabsMatch) throw new Error('mode tabs block not found');
          const tabsBlock = tabsMatch[0];
          html = html.replace(tabsRegex, '');

          const tableTopRegex = /<div class="tableTop"><div><h3>รายการถอดของ<\/h3><div id="tableCount" class="hint">โหลดไฟล์เพื่อแสดงข้อมูล<\/div><\/div><button class="outline" id="displayBtn">ปรับจำนวนแสดง<\/button><\/div>/;
          const newTableTop = '<div class="tableTop modeTop"><div class="tableTitleBox"><h3>รายการถอดของ</h3><div id="tableCount" class="hint">โหลดไฟล์เพื่อแสดงข้อมูล</div></div><button class="outline" id="displayBtn">ปรับจำนวนแสดง</button>' + tabsBlock + '</div>';
          if (!tableTopRegex.test(html)) throw new Error('tableTop block not found');
          html = html.replace(tableTopRegex, newTableTop);

          html = html.replace('.tableTop{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid #e5e7eb}', '.tableTop{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid #e5e7eb}');
          const css = '.modeTop{display:grid!important;grid-template-columns:1fr auto!important;gap:10px!important;align-items:start!important}.modeTop .tabs{grid-column:1/-1!important;display:grid!important;grid-template-columns:repeat(3,1fr)!important;gap:8px!important;margin:8px 0 0!important}.modeTop .tab{height:40px!important}.tableTitleBox{min-width:0}@media(max-width:720px){.modeTop{grid-template-columns:1fr!important}.modeTop #displayBtn{width:100%!important}.modeTop .tabs{grid-template-columns:1fr 1fr!important}}';
          if (!html.includes('.modeTop{display:grid')) html = html.replace('</style>', css + '</style>');

          if (html === before) throw new Error('pro.html was not changed');
          if (!html.includes('modeTop')) throw new Error('modeTop missing after patch');
          if ((html.match(/<div class="tabs">/g)||[]).length !== 1) throw new Error('expected exactly one tabs block');
          fs.writeFileSync(p, html);
          NODE
      - name: Commit layout patch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add dist/pro.html
          git commit -m "Move mode buttons into table header" || exit 0
          git push