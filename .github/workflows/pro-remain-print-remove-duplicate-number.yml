name: Patch remain print duplicate number column
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pro-remain-print-remove-duplicate-number.yml"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          node <<'NODE'
          const fs = require('fs');
          const jsPath = 'dist/assets/pro-core-v4.js';
          let s = fs.readFileSync(jsPath, 'utf8');

          const oldText = "function printPrep(){if(mode==='pick')return printPick();const title=mode==='ship'?'ใบส่งสินค้า / ใบเสร็จรับเงิน':modeName(),heads=tableHeadsFromDom(),data=tableRowsFromDom();formalPrint(title,heads,data)}";
          const newText = "function printPrep(){if(mode==='pick')return printPick();const title=mode==='ship'?'ใบส่งสินค้า / ใบเสร็จรับเงิน':modeName();let heads=tableHeadsFromDom(),data=tableRowsFromDom();if(mode==='remain'){heads=heads.slice(1);data=data.map(r=>r.slice(1))}formalPrint(title,heads,data)}";

          if (s.includes(oldText)) {
            s = s.replace(oldText, newText);
          } else if (!s.includes(newText)) {
            throw new Error('printPrep block not found');
          }

          if (!s.includes("if(mode==='remain'){heads=heads.slice(1);data=data.map(r=>r.slice(1))}")) {
            throw new Error('remain print duplicate number fix missing');
          }
          if (!s.includes("$$('[data-remain-view]').forEach")) {
            throw new Error('remain filter buttons are not bound correctly; aborting');
          }
          if (!s.includes("unit:N(g.netUnit)*1.07")) {
            throw new Error('net plus VAT unit formula missing; aborting');
          }
          if (!s.includes("['รหัส','รายการสินค้า','จำนวน','ราคา/หน่วย','รวมเงิน']")) {
            throw new Error('print header was not kept as default; aborting');
          }

          fs.writeFileSync(jsPath, s);

          const htmlPath = 'dist/pro.html';
          let h = fs.readFileSync(htmlPath, 'utf8');
          h = h.replace(/\/assets\/pro-core-v4\.js\?v=\d+/g, '/assets/pro-core-v4.js?v=357');
          fs.writeFileSync(htmlPath, h);
          NODE
          node --check dist/assets/pro-core-v4.js
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git rm .github/workflows/pro-remain-print-remove-duplicate-number.yml
          git add dist/pro.html dist/assets/pro-core-v4.js
          git commit -m "Remove duplicate number column from remain print" || exit 0
          git push

# trigger: 1
