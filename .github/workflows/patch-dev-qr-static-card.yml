name: Patch Static Developer QR Card

on:
  push:
    branches:
      - admin-dev-qr-upload
    paths:
      - '.github/workflows/patch-dev-qr-static-card.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: admin-dev-qr-upload
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Add static QR card
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('dist/admin.html')
          s = p.read_text(encoding='utf-8')
          qr = '''\n<section class="card" id="devQrAdminCard"><h3>อัปโหลด QR Code ใต้ทีมผู้พัฒนา</h3><p class="muted">QR Code นี้จะแสดงด้านล่างสุดใน popup ทีมผู้พัฒนาของหน้า Pro</p><div class="grid"><div class="field"><label>หัวข้อ QR</label><input id="devQrTitle" value="QR Code" placeholder="เช่น QR Code ติดต่อ / QR Code กลุ่มไลน์"></div><div class="field"><label>คำอธิบาย</label><input id="devQrNote" value="สแกนเพื่อเปิดข้อมูลเพิ่มเติม" placeholder="ข้อความใต้ QR"></div></div><div class="teamBox" style="margin-top:12px"><h4>เลือกรูป QR Code</h4><input id="devQrFile" class="teamFile" type="file" accept="image/png,image/jpeg,image/jpg,image/webp"><img id="devQrPreview" class="teamPreview" alt="Preview QR Code" style="height:220px;object-fit:contain;background:#fff"></div><div class="row" style="margin-top:12px"><button class="btn" id="uploadDevQr">อัปโหลด QR Code</button><button class="btn2 danger" id="disableDevQr">ปิดการแสดง QR</button><button class="btn2" id="openProAfterQr">เปิดหน้า Pro เพื่อตรวจ</button></div><div id="devQrStatus" class="muted" style="margin-top:10px">ยังไม่ได้เลือกรูป QR Code</div></section>'''
          marker = '<div id="teamPhotoStatus" class="muted" style="margin-top:10px">ยังไม่ได้เลือกรูปทีมพัฒนา</div></section>'
          if 'id="devQrAdminCard"' not in s:
              s = s.replace(marker, marker + qr)
          tag = '<script src="/assets/admin-dev-qr-v1.js?v=1"></script>'
          if tag not in s:
              s = s.replace('<script src="/assets/admin-team-photo-v1.js?v=3"></script>', '<script src="/assets/admin-team-photo-v1.js?v=3"></script>\n' + tag)
              if tag not in s:
                  s = s.replace('</body>', tag + '\n</body>')
          p.write_text(s, encoding='utf-8')
          smoke = Path('scripts/smoke-check.mjs')
          ss = smoke.read_text(encoding='utf-8')
          marker2 = "mustContain('dist/pro.html', 'pro-core-v4.js');\n"
          add = """mustContain('dist/admin.html', 'id="devQrAdminCard"');
mustContain('dist/admin.html', '/assets/admin-dev-qr-v1.js?v=1');
mustContain('dist/assets/admin-dev-qr-v1.js', 'อัปโหลด QR Code แล้ว');
mustContain('dist/assets/pro-native-core-overrides.js', 'developerQr');
"""
          if add not in ss:
              ss = ss.replace(marker2, marker2 + add)
          smoke.write_text(ss, encoding='utf-8')
          Path('.github/workflows/patch-dev-qr-static-card.yml').unlink()
          PY
      - name: Run smoke
        run: npm run smoke
      - name: Commit static QR card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/admin.html scripts/smoke-check.mjs .github/workflows/patch-dev-qr-static-card.yml
          git commit -m "Show developer QR upload card in admin"
          git push origin admin-dev-qr-upload
