name: Patch Fuel Gasohol95 Labels

on:
  push:
    branches: [main]
    paths:
      - 'api/fuel-price.js'
      - '.github/workflows/patch-fuel-gasohol95-label.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Patch labels
        run: |
          node <<'NODE'
          const fs = require('fs');
          const p = 'dist/fuel.html';
          let html = fs.readFileSync(p, 'utf8');
          html = html.replaceAll('ดึงราคาน้ำมันจริง', 'ดึงราคาแก๊สโซฮอล์95');
          html = html.replaceAll('น้ำมันดีเซลจริง', 'แก๊สโซฮอล์ 95 จริง');
          html = html.replaceAll('แหล่งข้อมูล: Bangchak ราคาน้ำมันย้อนหลัง', 'แหล่งข้อมูล: ราคาน้ำมันย้อนหลัง.com / แก๊สโซฮอล์ 95');
          html = html.replaceAll('ปุ่ม “ดึงราคาน้ำมันจริง” จะใส่บาท/ลิตรให้ตามวันจริงของเดือนนั้นจากราคาน้ำมันย้อนหลังบางจาก', 'ปุ่ม “ดึงราคาแก๊สโซฮอล์95” จะใส่บาท/ลิตรให้ตามวันจริงของเดือนนั้นจากเว็บราคาน้ำมันย้อนหลัง.com');
          fs.writeFileSync(p, html);
          NODE
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/fuel.html
          git commit -m "Update fuel page labels to Gasohol 95 [skip ci]" || exit 0
          git push
