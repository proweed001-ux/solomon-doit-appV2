name: Perf Grep Dump

on:
  push:
    paths:
      - '.github/workflows/perf-grep-dump.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dump performance snippets
        run: |
          python3 - <<'PY'
          from pathlib import Path
          s=Path('dist/performance.html').read_text(encoding='utf-8')
          out=['len='+str(len(s))]
          for key in ['DS Compare','cmpSlider()','rank','Object.keys(C)','diffBtn','drow','hero(\'เทียบย้อนหลัง\'']:
              i=s.find(key)
              out.append('\n==== '+key+' @ '+str(i)+' ====')
              if i>=0:
                  out.append(s[max(0,i-1500):min(len(s),i+2500)])
          Path('dist/assets/perf-grep-dump.txt').write_text('\n'.join(out),encoding='utf-8')
          Path('.github/workflows/perf-grep-dump.yml').unlink()
          PY
      - name: Commit dump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/assets/perf-grep-dump.txt .github/workflows/perf-grep-dump.yml
          git commit -m "Add Performance grep dump [skip ci]" || exit 0
          git push
