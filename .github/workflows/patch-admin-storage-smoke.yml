name: Patch Admin Storage Smoke

on:
  push:
    branches:
      - admin-storage-manager
    paths:
      - '.github/workflows/patch-admin-storage-smoke.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: admin-storage-manager
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Patch smoke guards
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('scripts/smoke-check.mjs')
          s = p.read_text(encoding='utf-8')
          s = s.replace("  'dist/pro.html',\n", "  'dist/pro.html',\n  'dist/admin-storage.html',\n")
          s = s.replace("  '.github/workflows/web-ci.yml',\n", "  '.github/workflows/web-ci.yml',\n  'supabase/functions/admin-storage/index.ts',\n  'docs/ADMIN_STORAGE_MANAGER.md',\n")
          marker = "mustContain('dist/pro.html', 'pro-core-v4.js');\n"
          add = """mustContain('dist/admin-storage.html', 'DOIT Admin Storage Manager');
mustContain('dist/admin-storage.html', 'admin-storage');
mustContain('dist/admin-storage.html', 'x-admin-token');
mustContain('dist/admin-storage.html', 'Preview ไฟล์ที่จะล้าง');
mustNotContain('dist/admin-storage.html', 'SUPABASE_SERVICE_ROLE_KEY');
mustContain('supabase/functions/admin-storage/index.ts', 'ADMIN_STORAGE_TOKEN_SHA256');
mustContain('supabase/functions/admin-storage/index.ts', 'doit-files');
mustContain('supabase/functions/admin-storage/index.ts', 'write_disabled_in_safe_preview');
mustContain('supabase/functions/admin-storage/index.ts', 'cleanupOld');
mustContain('supabase/functions/admin-storage/index.ts', 'x-admin-token');
mustNotContain('supabase/functions/admin-storage/index.ts', 'service_role=');
mustContain('docs/ADMIN_STORAGE_MANAGER.md', 'Admin Storage Manager');
mustContain('docs/ADMIN_STORAGE_MANAGER.md', 'Write mode is intentionally disabled');
"""
          if add not in s:
            s = s.replace(marker, marker + add)
          s = s.replace("console.log('Smoke check passed: Pro Stable 1028 Native active-session currentState guardrails are intact.');", "console.log('Smoke check passed: Pro Stable 1028 Native and Admin Storage guardrails are intact.');")
          Path('.github/workflows/patch-admin-storage-smoke.yml').unlink()
          p.write_text(s, encoding='utf-8')
          PY
      - name: Run smoke
        run: npm run smoke
      - name: Commit smoke guards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/smoke-check.mjs .github/workflows/patch-admin-storage-smoke.yml
          git commit -m "Guard admin storage manager files"
          git push origin admin-storage-manager
