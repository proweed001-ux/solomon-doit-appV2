name: Restore Pro send bar
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/fix-pro-sendbar.yml"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          node <<'NODE'
          const fs=require('fs');
          const p='dist/pro.html';
          let s=fs.readFileSync(p,'utf8');
          const send='<div class="sendBar"><div class="sendLabel"><span>ส่งให้ร้าน:</span><button class="pickBtn" data-pick="receivers"><b id="sendText">ยังไม่เลือก</b><span>▾</span></button></div><button id="showDetailBtn" class="outline">แสดงรายละเอียด</button></div>';
          if(!s.includes('data-pick="receivers"')){
            const target='<div class="tableWrap">';
            if(!s.includes(target))throw new Error('tableWrap not found');
            s=s.replace(target,send+target);
          }
          s=s.replace(/<script id="modeTabRebinder">[\s\S]*?<\/script>/,'');
          s=s.replace(/\/assets\/pro-core-v4\.js\?v=\d+/g,'/assets/pro-core-v4.js?v=345');
          if(!s.includes('data-pick="receivers"'))throw new Error('receivers missing');
          if(!s.includes('id="showDetailBtn"'))throw new Error('showDetailBtn missing');
          fs.writeFileSync(p,s);
          NODE
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git rm .github/workflows/fix-pro-sendbar.yml
          git add dist/pro.html
          git commit -m "Restore Pro send-to-store picker" || exit 0
          git push