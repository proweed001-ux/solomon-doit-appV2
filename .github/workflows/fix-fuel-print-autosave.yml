name: Fix Fuel Print Autosave
on:
  push:
    branches: [main]
    paths: ['.github/workflows/fix-fuel-print-autosave.yml']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Patch print button to save first
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('dist/fuel.html')
          s = p.read_text()
          s = s.replace("onclick=\"location.href='/fuel-print.html?t=1052'\"", "onclick=\"saveForPrint()\"")
          s = s.replace("onclick=\"location.href='/fuel-print.html?t=1053'\"", "onclick=\"saveForPrint()\"")
          s = s.replace("onclick=\"location.href='/fuel-print.html?t=1054'\"", "onclick=\"saveForPrint()\"")
          if 'function saveForPrint()' not in s:
              s = s.replace("function save(){localStorage.setItem(key,JSON.stringify({state,names}));alert('บันทึกแล้ว')}", "function save(){localStorage.setItem(key,JSON.stringify({state,names}));alert('บันทึกแล้ว')}function saveForPrint(){localStorage.setItem(key,JSON.stringify({state,names}));location.href='/fuel-print.html?t=1067'}")
          p.write_text(s)
          PY
      - name: Commit patch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add dist/fuel.html
          git commit -m "Save fuel form before opening print preview" || exit 0
          git push
