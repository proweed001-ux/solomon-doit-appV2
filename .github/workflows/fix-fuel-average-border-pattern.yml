name: Fix Fuel Average Border Pattern
on:
  push:
    branches: [main]
    paths: ['.github/workflows/fix-fuel-average-border-pattern.yml']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Patch average row border pattern
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          p=Path('dist/fuel-print.html')
          s=p.read_text()

          css='.tbl tr.avgrow td.noLine{border-color:transparent!important;background:transparent!important}.tbl tr.avgrow td.labelCell{border:0!important;border-bottom:1.15px solid #111!important;background:transparent!important;text-align:right;padding-right:1mm}.tbl tr.avgrow td.keepBox{border:1.15px solid #111!important;background:#fff!important}'
          if 'tr.avgrow td.noLine' not in s:
              s=s.replace('.tbl tr.sum td{border-top:1.15px solid #111;border-bottom:1.15px solid #111;height:5.6mm;font-size:8.5px}', '.tbl tr.sum td{border-top:1.15px solid #111;border-bottom:1.15px solid #111;height:5.6mm;font-size:8.5px}'+css)

          patterns=[
            r"h\+='<tr class=\\\"sum\\\"><td colspan=\\\"2\\\"></td><td class=\\\"r b\\\">ค่าเฉลี่ยรถวิ่ง กม\. / ลิตร</td><td></td><td></td><td class=\\\"r b\\\">'\+\(sumKm\|\|'-'\)\+'</td><td class=\\\"r b\\\">'\+\(sumLit\?sumLit\.toFixed\(2\):'-'\)\+'</td><td class=\\\"r b\\\">'\+\(avg\?avg\.toFixed\(2\):'-'\)\+'</td><td class=\\\"r b\\\">'\+\(sumFuel\|\|'-'\)\+'</td><td class=\\\"c\\\">-</td></tr></table>",
            r"h\+='<tr class=\\\"sum\\\"><td></td><td></td><td class=\\\"r b\\\">ค่าเฉลี่ยรถวิ่ง กม\. / ลิตร</td><td></td><td></td><td class=\\\"r b\\\">'\+\(sumKm\|\|'-'\)\+'</td><td class=\\\"r b\\\">'\+\(sumLit\?sumLit\.toFixed\(2\):'-'\)\+'</td><td class=\\\"r b\\\">'\+\(avg\?avg\.toFixed\(2\):'-'\)\+'</td><td class=\\\"r b\\\">'\+\(sumFuel\|\|'-'\)\+'</td><td class=\\\"c\\\">-</td></tr></table>"
          ]
          repl="h+='<tr class=\"sum avgrow\"><td class=\"noLine\"></td><td class=\"noLine\"></td><td class=\"labelCell b\">ค่าเฉลี่ยรถวิ่ง กม. / ลิตร</td><td class=\"keepBox\"></td><td class=\"noLine\"></td><td class=\"keepBox r b\">'+(sumKm||'-')+'</td><td class=\"keepBox r b\">'+(sumLit?sumLit.toFixed(2):'-')+'</td><td class=\"keepBox r b\">'+(avg?avg.toFixed(2):'-')+'</td><td class=\"keepBox r b\">'+(sumFuel||'-')+'</td><td class=\"keepBox c\">-</td></tr></table>"
          changed=False
          for pat in patterns:
              ns=re.sub(pat,repl,s)
              if ns!=s:
                  s=ns;changed=True
          if not changed:
              # fallback for actual one-line minified source
              start=s.find("h+='<tr class=\\\"sum")
              needle='ค่าเฉลี่ยรถวิ่ง กม. / ลิตร'
              idx=s.find(needle,start)
              if idx!=-1:
                  a=s.rfind("h+='<tr",0,idx)
                  b=s.find("</tr></table>",idx)
                  if a!=-1 and b!=-1:
                      b+=len("</tr></table>")
                      s=s[:a]+repl+s[b:]
                      changed=True
          if not changed:
              raise SystemExit('average row pattern not found')
          s=s.replace('เตรียมปริ้นบิลน้ำมัน • grid-line-fix</b>','เตรียมปริ้นบิลน้ำมัน • border-pattern-fix</b>')
          s=s.replace('เตรียมปริ้นบิลน้ำมัน • avg-row-fix</b>','เตรียมปริ้นบิลน้ำมัน • border-pattern-fix</b>')
          s=s.replace('เตรียมปริ้นบิลน้ำมัน • expense-holiday</b>','เตรียมปริ้นบิลน้ำมัน • border-pattern-fix</b>')
          p.write_text(s)
          PY
      - name: Commit patch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add dist/fuel-print.html
          git commit -m "Match original average row border pattern" || exit 0
          git push
