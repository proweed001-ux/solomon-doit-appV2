name: Apply Android app icon

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-android-app-icon.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-icon:
    runs-on: ubuntu-latest
    steps:
