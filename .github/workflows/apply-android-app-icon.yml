          p = Path('android-apk/app/src/main/AndroidManifest.xml')
          s = p.read_text()
          if 'android:icon="@mipmap/ic_launcher"' not in s:
              s = s.replace('android:theme="@style/AppTheme"\n        android:label="AYA DOIT"', 'android:theme="@style/AppTheme"\n        android:icon="@mipmap/ic_launcher"\n        android:roundIcon="@mipmap/ic_launcher_round"\n        android:label="AYA DOIT"')
          p.write_text(s)
          PY
      - name: Commit icon assets
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git rm --ignore-unmatch android-apk/app/src/main/res/values/test-delete.txt
          git rm --ignore-unmatch .github/workflows/apply-android-app-icon.yml
          git add android-apk/app/src/main/AndroidManifest.xml android-apk/app/src/main/res
          git commit -m "Set Android app launcher icon" || exit 0
          git push
