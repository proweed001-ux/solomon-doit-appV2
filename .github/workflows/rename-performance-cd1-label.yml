name: Rename Performance CD1 Label
on:
  push:
    branches: [main]
    paths: ['.github/workflows/rename-performance-cd1-label.yml']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Patch Performance CD1 label
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('dist/assets/performance-board-v4.js')
          s=p.read_text()
          old="dc1:'DC1 / CD1'"
          new="dc1:'CD1 RJ SH RH JJ 70ML'"
          if new in s:
              print('CD1 label already updated')
          elif old in s:
              s=s.replace(old,new,1)
              p.write_text(s)
              print('CD1 label updated')
          else:
              raise SystemExit('target dc1 label not found')
          PY
      - name: Commit patch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add dist/assets/performance-board-v4.js
          git commit -m "Rename Performance CD1 label" || exit 0
          git push
