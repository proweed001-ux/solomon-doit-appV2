name: Fix Fuel Average Row Alignment
on:
  push:
    branches: [main]
    paths: ['.github/workflows/fix-fuel-average-row.yml']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Patch average summary row in fuel print
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('dist/fuel-print.html')
          s=p.read_text()
          old="h+='<tr class=\"sum\"><td colspan=\"3\"></td><td colspan=\"2\" class=\"r b\">ค่าเฉลี่ยรถวิ่ง กม. / ลิตร</td><td class=\"r b\">'+(sumKm||'-')+'</td><td class=\"r b\">'+(sumLit?sumLit.toFixed(2):'-')+'</td><td class=\"r b\">'+(avg?avg.toFixed(2):'-')+'</td><td class=\"r b\">'+(sumFuel||'-')+'</td><td class=\"c\">-</td></tr></table>"
          new="h+='<tr class=\"sum\"><td colspan=\"2\"></td><td class=\"r b\">ค่าเฉลี่ยรถวิ่ง กม. / ลิตร</td><td></td><td></td><td class=\"r b\">'+(sumKm||'-')+'</td><td class=\"r b\">'+(sumLit?sumLit.toFixed(2):'-')+'</td><td class=\"r b\">'+(avg?avg.toFixed(2):'-')+'</td><td class=\"r b\">'+(sumFuel||'-')+'</td><td class=\"c\">-</td></tr></table>"
          if old not in s:
              raise SystemExit('target average row snippet not found')
          s=s.replace(old,new)
          s=s.replace('เตรียมปริ้นบิลน้ำมัน • expense-holiday</b>','เตรียมปริ้นบิลน้ำมัน • avg-row-fix</b>')
          p.write_text(s)
          PY
      - name: Commit patch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add dist/fuel-print.html
          git commit -m "Align fuel average summary row to original template" || exit 0
          git push
