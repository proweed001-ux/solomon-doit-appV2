name: Patch Pro QR No Blank

on:
  push:
    paths:
      - '.github/workflows/patch-pro-qr-no-blank.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch QR no blank fallback
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('dist/assets/pro-team-single.js')
          s=p.read_text(encoding='utf-8')
          old="async function loadQr(){if(qrCache)return qrCache;if(qrPromise)return qrPromise;qrPromise=(async()=>{try{const r=await fetch(QR_CONFIG,{cache:'no-store'});if(!r.ok)throw Error(String(r.status));qrCache=normalize(await r.json());try{localStorage.setItem('doit-dev-qr-config-v1',JSON.stringify(qrCache))}catch{}}catch{try{qrCache=normalize(JSON.parse(localStorage.getItem('doit-dev-qr-config-v1')||'null'))}catch{qrCache=null}}return qrCache})();return qrPromise}"
          new="async function loadQr(){if(qrCache)return qrCache;if(qrPromise)return qrPromise;qrPromise=(async()=>{try{const r=await fetch(QR_CONFIG,{cache:'no-store'});if(!r.ok)throw Error(String(r.status));qrCache=normalize(await r.json());try{localStorage.setItem('doit-dev-qr-config-v1',JSON.stringify(qrCache))}catch{}}catch{try{qrCache=normalize(JSON.parse(localStorage.getItem('doit-dev-qr-config-v1')||'null'))}catch{qrCache=null}}if(!qrCache)qrCache=normalize({image_url:QR_IMAGE+'&t=stable'});return qrCache})();return qrPromise}"
          if old not in s: raise SystemExit('loadQr marker not found')
          s=s.replace(old,new,1)
          old2="async function primeQr(){qrBlock();if(!qrRendered)renderQr(null);const cfg=await loadQr();renderQr(cfg)}"
          new2="async function primeQr(){qrBlock();let cached=null;try{cached=normalize(JSON.parse(localStorage.getItem('doit-dev-qr-config-v1')||'null'))}catch{}if(cached)renderQr(cached);else if(!qrRendered)renderQr(normalize({image_url:QR_IMAGE+'&t=stable'}));const cfg=await loadQr();if(cfg)renderQr(cfg)}"
          if old2 not in s: raise SystemExit('primeQr marker not found')
          s=s.replace(old2,new2,1)
          p.write_text(s,encoding='utf-8')
          Path('.github/workflows/patch-pro-qr-no-blank.yml').unlink()
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/assets/pro-team-single.js .github/workflows/patch-pro-qr-no-blank.yml
          git commit -m "Keep Pro QR from resetting to blank [skip ci]" || exit 0
          git push
