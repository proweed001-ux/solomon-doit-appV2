name: Revert wrong src upload progress patch

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/revert-wrong-src-upload-progress.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  revert-src:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Revert wrong React source changes only
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git revert --no-edit 2c29cb22bc8de0f1e5ab70eb7a323724427e5cdd || true
          git revert --no-edit 2a760452c25f759e64f90201f6f32649ae5babe4 || true
          git rm --ignore-unmatch .github/workflows/revert-wrong-src-upload-progress.yml
          git add -A
          git commit -m "Revert wrong React upload progress changes" || exit 0
          git push
