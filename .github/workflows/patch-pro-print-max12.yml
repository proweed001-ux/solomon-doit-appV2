name: Patch Pro print max 12 rows

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/patch-pro-print-max12.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch existing prepare print logic only
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          p = Path('dist/assets/pro-core-v4.js')
          s = p.read_text()

          if 'function formalPrintPickAuto12(' not in s:
              marker = "function printPick(){"
              helper = r'''function formalPrintPickAuto12(title,heads,data){if(!data.length)return alert('ไม่มีข้อมูลสำหรับปริ้นในหน้า '+title);const chunks=[];for(let i=0;i<data.length;i+=12)chunks.push(data.slice(i,i+12));const pages=chunks.map(chunk=>{const doc='DOIT-'+Date.now().toString().slice(-8),total=B(chunk.reduce((s,x)=>s+x.qty*x.unit,0)),metaRows=printMetaPick(total),m=metaRows.map(([k,v])=>`<div contenteditable="true"><b>${E(k)}:</b> ${k==='ราคารวม'?`<span data-header-total>${E(v)}</span>`:E(v)}</div>`).join(''),h=heads.map(x=>`<th>${E(x)}</th>`).join(''),b=chunk.map((x,i)=>{const r=[x.code,x.name,F(x.qty),B(x.unit),B(x.qty*x.unit)];return `<tr data-line><td class="c">${i+1}</td>${r.map((v,j)=>`<td class="${j>=2?'r':''} ${j===2?'rq':''} ${j===3?'ru':''} ${j===4?'rt':''}" contenteditable="${j===4?'false':'true'}">${E(v)}</td>`).join('')}</tr>`}).join(''),foot=`<tr class="totalRow"><td colspan="${heads.length}" class="r" contenteditable="true">รวมทั้งหมด</td><td class="r" data-page-total>${E(total)}</td></tr>`;return `<section class="receiptPage"><div class="receiptTop"><div><h1 class="receiptTitle" contenteditable="true">${E(title)}</h1></div><div class="docBox"><div contenteditable="true"><b>เลขที่เอกสาร:</b> ${E(doc)}</div></div></div><div class="metaGrid">${m}</div><table class="receiptTable"><thead><tr><th style="width:36px">#</th>${h}</tr></thead><tbody>${b}${foot}</tbody></table><div class="noteBox" contenteditable="true">หมายเหตุ: </div><div class="signGrid"><div class="signBox" contenteditable="true">ผู้ส่งสินค้า / ผู้จัดทำ</div><div class="signBox" contenteditable="true">ผู้รับสินค้า</div></div></section>`}).join('');const ov=openPrint(pages),recalc=()=>{ov.querySelectorAll('.receiptPage').forEach(pg=>{let total=0;pg.querySelectorAll('tr[data-line]').forEach(tr=>{const q=N(tr.querySelector('.rq')?.textContent),u=N(tr.querySelector('.ru')?.textContent),t=q*u;total+=t;const rt=tr.querySelector('.rt');if(rt)rt.textContent=B(t)});const tt=pg.querySelector('[data-page-total]'),hh=pg.querySelector('[data-header-total]');if(tt)tt.textContent=B(total);if(hh)hh.textContent=B(total)+' บาท'})};ov.addEventListener('input',e=>{if(e.target.closest('.receiptTable'))recalc()});ov.addEventListener('blur',e=>{if(e.target.closest('.receiptTable'))recalc()},true);recalc();return ov}
'''
              s = s.replace(marker, helper + marker)

          old = "function printPick(){const data=printRowsForPick(),total=B(data.reduce((s,x)=>s+x.qty*x.unit,0)),trs=data.map(x=>[x.code,x.name,F(x.qty),B(x.unit),B(x.qty*x.unit)]);formalPrint('บิลสินค้า/ ใบเสร็จ',['รหัส','รายการสินค้า','จำนวน','ราคา/หน่วย','รวมเงิน'],trs,{calc:true,total,meta:printMetaPick(total)})}"
          new = "function printPick(){const data=printRowsForPick();formalPrintPickAuto12('บิลสินค้า/ ใบเสร็จ',['รหัส','รายการสินค้า','จำนวน','ราคา/หน่วย','รวมเงิน'],data)}"
          if old not in s:
              raise SystemExit('printPick target not found; no change made')
          s = s.replace(old, new)
          p.write_text(s)

          html_path = Path('dist/pro.html')
          if html_path.exists():
              html = html_path.read_text()
              html = re.sub(r'(pro-core-v4\.js\?v=)(\d+)', lambda m: m.group(1)+str(int(m.group(2))+1), html)
              html_path.write_text(html)
          PY
      - name: Commit patch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git rm --ignore-unmatch .github/workflows/patch-pro-print-max12.yml
          git add dist/assets/pro-core-v4.js dist/pro.html
          git commit -m "Limit Pro prepare print bills to 12 rows" || exit 0
          git push
