name: Apply launcher icon from base64

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-icon-from-b64.yml"
      - ".icon-upload/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-icon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Pillow
        run: python3 -m pip install --upgrade pillow
      - name: Decode and rebuild PNG launcher icons
        run: |
          python3 <<'PY'
          from pathlib import Path
          from PIL import Image
          import base64
          from io import BytesIO

          b64_path = Path('.icon-upload/mdpi.b64')
          data = base64.b64decode(b64_path.read_text().strip())
          img = Image.open(BytesIO(data)).convert('RGBA')
          img.load()

          sizes = {
              'mdpi': 48,
              'hdpi': 72,
              'xhdpi': 96,
              'xxhdpi': 144,
              'xxxhdpi': 192,
          }

          for density, size in sizes.items():
              outdir = Path(f'android-apk/app/src/main/res/mipmap-{density}')
              outdir.mkdir(parents=True, exist_ok=True)
              resized = img.resize((size, size), Image.Resampling.LANCZOS)
              for name in ('ic_launcher.png', 'ic_launcher_round.png'):
                  out = outdir / name
                  resized.save(out, 'PNG')
                  Image.open(out).load()

          drawable = Path('android-apk/app/src/main/res/drawable')
          drawable.mkdir(parents=True, exist_ok=True)
          img.resize((192, 192), Image.Resampling.LANCZOS).save(drawable / 'ic_launcher.png', 'PNG')
          Image.open(drawable / 'ic_launcher.png').load()

          for p in [
              Path('android-apk/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml'),
              Path('android-apk/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml'),
          ]:
              if p.exists():
                  p.unlink()
          PY
      - name: Update manifest and version
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          manifest = Path('android-apk/app/src/main/AndroidManifest.xml')
          s = manifest.read_text()
          s = s.replace('@drawable/ic_launcher', '@mipmap/ic_launcher')
          if 'android:icon="@mipmap/ic_launcher"' not in s:
              s = s.replace(
                  'android:theme="@style/AppTheme"\n        android:label="AYA DOIT"',
                  'android:theme="@style/AppTheme"\n        android:icon="@mipmap/ic_launcher"\n        android:roundIcon="@mipmap/ic_launcher"\n        android:label="AYA DOIT"'
              )
          manifest.write_text(s)

          gradle = Path('android-apk/app/build.gradle')
          g = gradle.read_text()
          g = re.sub(r'versionCode\s+\d+', 'versionCode 4', g)
          g = re.sub(r"versionName\s+'[^']+'", "versionName '1.0.3'", g)
          gradle.write_text(g)
          PY
      - name: Commit rebuilt launcher icons
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git rm --ignore-unmatch .github/workflows/apply-icon-from-b64.yml .github/workflows/rebuild-icons-from-drawable.yml .github/workflows/fix-valid-icon-build.yml
          git add android-apk/app/build.gradle android-apk/app/src/main/AndroidManifest.xml android-apk/app/src/main/res .icon-upload/mdpi.b64
          git commit -m "Apply valid PNG launcher icon from base64" || exit 0
          git push
