name: Patch Pro Core Raw Net

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/patch-pro-core-raw-net.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Patch Pro core
        run: |
          node <<'NODE'
          const fs = require('fs');
          const p = 'dist/assets/pro-core-v4.js';
          let s = fs.readFileSync(p, 'utf8');

          const norm = String.raw`function norm(r){const ps=psOf(r)||'ไม่ระบุ PS',tele=cleanPs(by(r,TK)),type=typeOf(r),isTele=!!(tele&&!same(tele,ps))||flag(r)||isTeleType(r);const qty=N(r.qty??r.qtyPcs??r.ShipQtyPCS??r.raw?.ShipQtyPCS??r.raw?.Qty),rawAmt=moneyVal(r,['lineamtbeforedisc','lineamountbeforedisc','rawamount','grossamount','grossamt'])||N(r.rawAmt??r.rawAmount),netAmt=moneyVal(r,['invoiceamt','invoiceamount','invamt','netamount','netamt'])||N(r.netAmt??r.netAmount??r.correctAmount),fallback=N(r.amt??r.amount??r.correctAmount??r.InvoiceAmt??r.raw?.InvoiceAmt??r.raw?.Amount),raw=rawAmt||fallback,net=netAmt||raw||fallback;return{date:T(val(r,'date','invoiceDate','InvoiceDate','InvcDate','raw.date','raw.InvoiceDate','raw.InvcDate')),inv:T(val(r,'inv','invoiceNo','InvoiceNo','raw.InvoiceNo','raw.Invoice Number')),type,ps,store:T(val(r,'store','customerName','storeName','CustomerName','Customer Name','raw.CustomerName','raw.Customer Name','raw.StoreName','raw.ShipName','raw.ShipToName'))||'ไม่ระบุร้าน',tele:isTele?(tele||ps||'Telesale'):'',isTele,code:T(val(r,'code','skuCode','SKUCode','ItemCode','raw.SKUCode','raw.ItemCode')),sku:T(val(r,'sku','productName','SKUDescription','SKU Description','SKU_Desc','ItemName','raw.SKUDescription','raw.SKU Description','raw.SKU_Desc','raw.ItemName'))||'ไม่ระบุสินค้า',brand:T(val(r,'brand','GroupBrand','Group Brand','raw.GroupBrand','raw.Group Brand'))||'ไม่ระบุแบรนด์',size:T(val(r,'size','TAS_SizeGroup','SizeGroup','raw.TAS_SizeGroup','raw.SizeGroup'))||'ไม่ระบุไซซ์',qty,amt:raw,rawAmt:raw,netAmt:net,unit:qty?raw/qty:N(r.unit),netUnit:qty?net/qty:0}}
function arr`;

          s = s.replace(/function val\(r,[\s\S]*?return''}/, m => m + "\nfunction moneyVal(r,keys){for(const o of objs(r)){for(const k of Object.keys(o)){if(keys.includes(K(k))){const n=N(o[k]);if(n!==0)return n}}}return 0}");
          s = s.replace(/function norm\(r\)[\s\S]*?\nfunction arr/, norm);

          s = s.replace(/function group\(rs\)[\s\S]*?\nfunction rec/, String.raw`function group(rs){const m=new Map();rs.forEach(r=>{const k=pkey(r);let g=m.get(k);if(!g){g={poolKey:k,brand:r.brand,size:r.size,code:r.code,sku:r.sku,type:r.type,qty:0,amt:0,rawAmt:0,netAmt:0,unit:0,netUnit:0,bills:new Set(),stores:new Map(),rows:[],inserted:false};m.set(k,g)}g.qty+=r.qty;g.amt+=r.rawAmt;g.rawAmt+=r.rawAmt;g.netAmt+=r.netAmt;g.unit=g.qty&&g.rawAmt?g.rawAmt/g.qty:g.unit;g.netUnit=g.qty&&g.netAmt?g.netAmt/g.qty:g.netUnit;g.bills.add(r.inv);g.stores.set(r.store,(g.stores.get(r.store)||0)+r.qty);g.rows.push(r)});return[...m.values()].sort((a,b)=>a.brand.localeCompare(b.brand,'th')||a.size.localeCompare(b.size,'th')||a.sku.localeCompare(b.sku,'th'))}
function rec`);

          s = s.replace(/function insertedGroups\(\)[\s\S]*?\nfunction pickPool/, String.raw`function insertedGroups(){return(ins||[]).map(x=>({poolKey:T(x.id),brand:'แทรกสินค้า',size:'เพิ่มเอง',code:T(x.code)||'INSERT',sku:T(x.name)||'สินค้าแทรก',type:'INSERT',qty:N(x.qty),amt:N(x.qty)*N(x.unit),rawAmt:N(x.qty)*N(x.unit),netAmt:N(x.qty)*N(x.unit),unit:N(x.unit),netUnit:N(x.unit),bills:new Set(['เพิ่มเอง']),stores:new Map(),rows:[],inserted:true}))}
function pickPool`);

          s = s.replace(/function pickTable\(pool\)[\s\S]*?\nfunction shipPool/, String.raw`function pickTable(pool){const r=rec(),shown=pool.slice((page-1)*pageSize,page*pageSize);let h='<thead><tr><th>#</th><th>สินค้า</th><th>คงเหลือ</th><th>ส่งร้านนี้</th><th>ใส่เพิ่ม</th><th>ดึงออก</th><th>ยอดดิบ</th><th>ยอดสุทธิ</th></tr></thead><tbody>';if(!r)h+='<tr><td colspan="8" class="empty">เลือก “ส่งให้ร้าน” 1 ร้านเท่านั้นก่อนใส่จำนวนส่ง</td></tr>';shown.forEach((g,i)=>{const k=rkey(g.poolKey),dis=!r?'disabled':'',meta=[g.code||'',g.type||''].filter(Boolean).join(' · '),rv=remain(g),del=g.inserted?'<button type="button" class="insertDelBtn" data-insert-del="'+E(g.poolKey)+'">ลบ</button>':'';h+='<tr data-pool-key="'+E(g.poolKey)+'" data-base-qty="'+N(g.qty)+'"><td>'+((page-1)*pageSize+i+1)+'</td><td class="p"><b>'+E(g.sku)+'</b>'+del+'<small>'+E(meta)+' · '+F(g.qty)+' ชิ้น · '+F(g.stores.size)+' ร้าน · '+F(g.bills.size)+' บิล</small>'+sourceDetail(g)+'</td><td class="remainCell '+(rv<0?'bad':'blue')+'">'+F(rv)+'</td><td><input '+dis+' class="pick jdata" data-map="send" data-k="'+E(k)+'" value="'+(mapVal(send,g.poolKey)||'')+'" type="number"></td><td><input '+dis+' class="pick jdata" data-map="add" data-k="'+E(k)+'" value="'+(mapVal(add,g.poolKey)||'')+'" type="number"></td><td><input '+dis+' class="pick jdata" data-map="pull" data-k="'+E(k)+'" value="'+(mapVal(pull,g.poolKey)||'')+'" type="number"></td><td>'+B(g.rawAmt)+'</td><td>'+B(g.netAmt)+'</td></tr>'});if(!shown.length)h+='<tr><td colspan="8" class="empty">ไม่พบข้อมูล</td></tr>';return h+'</tbody>'}
function shipPool`);

          s = s.replace(/\['#','สินค้า','จำนวน','ยอด'\]/g, "['#','สินค้า','จำนวน','ยอดดิบ','ยอดสุทธิ']");
          s = s.replace(/'<td>'\+B\(g\.amt\)\+'<\/td><\/tr>'/g, "'<td>'+B(g.rawAmt)+'</td><td>'+B(g.netAmt)+'</td></tr>'");
          s = s.replace(/'<td>'\+B\(l\.amt\)\+'<\/td><\/tr>'/g, "'<td>'+B(l.rawAmt)+'</td><td>'+B(l.netAmt)+'</td></tr>'");
          s = s.replace(/out\.push\(\{name:g\.sku,qty,amt:qty\*N\(g\.unit\)\}\)/, "out.push({name:g.sku,qty,rawAmt:qty*N(g.unit),netAmt:qty*N(g.netUnit)})");
          s = s.replace(/\['date','ps','excludedBillStores','receiver','sku','qty','amount'\]/, "['date','ps','excludedBillStores','receiver','sku','qty','rawAmount','netAmount']");
          s = s.replace(/r\.sku,r\.qty,r\.amt\]/, "r.sku,r.qty,r.rawAmt,r.netAmt]");
          s = s.replace(/const pool=pickPool\(\),tot=pool\.reduce\(\(s,g\)=>s\+g\.qty,0\),sent=pool\.reduce\(\(s,g\)=>s\+manualSent\(g\),0\),rem=pool\.reduce\(\(s,g\)=>s\+remain\(g\),0\),amt=pool\.reduce\(\(s,g\)=>s\+N\(g\.amt\),0\);\$\('#amount'\)\.textContent='฿ '\+\(amt\?B\(amt\):'—'\);/, "const pool=pickPool(),tot=pool.reduce((s,g)=>s+g.qty,0),sent=pool.reduce((s,g)=>s+manualSent(g),0),rem=pool.reduce((s,g)=>s+remain(g),0),raw=pool.reduce((s,g)=>s+N(g.rawAmt),0),net=pool.reduce((s,g)=>s+N(g.netAmt),0);$('#amount').textContent='฿ '+(raw?B(raw):'—')+(net?' / สุทธิ ฿ '+B(net):'—');");
          s = s.replace(/flow:'single-core-no-wrapper-auto-team'/, "flow:'single-core-raw-net-v2'");
          fs.writeFileSync(p, s);
          NODE
          node --check dist/assets/pro-core-v4.js
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/assets/pro-core-v4.js
          git commit -m "Add raw and net amount columns to Pro core" || exit 0
          git push
