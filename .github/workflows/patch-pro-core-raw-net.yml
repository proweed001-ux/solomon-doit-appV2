name: Fix remaining Pro raw net cells
# trigger: raw-net-4

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/patch-pro-core-raw-net.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fix remaining Pro cells
        run: |
          set -e
          node <<'NODE'
          const fs = require('fs');
          const p = 'dist/assets/pro-core-v4.js';
          let s = fs.readFileSync(p, 'utf8');
          s = s.replace(/\['#','สินค้า','จำนวนที่คีย์','ยอด'\]/g, "['#','สินค้า','จำนวนที่คีย์','ยอดดิบ','ยอดสุทธิ']");
          s = s.replace(/B\(g\.amt\)\+'<\/td><\/tr>'\)\.join\(''\)\);return\}if\(mode==='dist'/, "B(g.rawAmt)+'</td><td>'+B(g.netAmt)+'</td></tr>').join(''));return}if(mode==='dist'");
          s = s.replace(/B\(l\.amt\)\+'<\/td><\/tr>'\)\.join\(''\)\);return\}const r=sourceRows/, "B(l.rawAmt)+'</td><td>'+B(l.netAmt)+'</td></tr>').join(''));return}const r=sourceRows");
          fs.writeFileSync(p, s);
          NODE
          node --check dist/assets/pro-core-v4.js
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/assets/pro-core-v4.js
          git commit -m "Fix remaining raw and net Pro table cells" || exit 0
          git push
