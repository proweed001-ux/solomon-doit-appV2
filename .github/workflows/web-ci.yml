name: Web CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "docs/**"
      - "dist/*.html"
      - "dist/assets/**"
      - "supabase/functions/promo-latest-upload-preview/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.*"
      - ".github/workflows/web-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "docs/**"
      - "dist/*.html"
      - "dist/assets/**"
      - "supabase/functions/promo-latest-upload-preview/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.*"
      - ".github/workflows/web-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Foundation smoke check
        run: node scripts/smoke-check.mjs
      - name: Promo dynamic grid and OCR safety regression
        run: node scripts/test-promo-dynamic-grid-price-safety.mjs
      - name: Promo product master and publish safety regression
        run: node scripts/test-promo-master-consensus.mjs
      - name: Promo browser runtime and objective release gate regression
        run: node scripts/test-promo-runtime-release-gate.mjs
      - name: Promo latest-only backend regression
        run: node scripts/test-promo-latest-only.mjs