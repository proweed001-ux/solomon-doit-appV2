name: Web CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.*"
      - ".github/workflows/web-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "docs/**"
      - "dist/pro.html"
      - "dist/assets/pro-core-v4.js"
      - "dist/assets/pro-print-store-bills.js"
      - "dist/assets/pro-print.css"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.*"
      - ".github/workflows/web-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: TypeScript and Vite build
        run: npm run build
      - name: Foundation smoke check
        run: npm run smoke
