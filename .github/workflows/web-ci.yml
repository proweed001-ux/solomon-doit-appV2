name: Web CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.*"
      - ".github/workflows/web-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "docs/**"
      - "dist/pro.html"
      - "dist/assets/pro-core-v4.js"
      - "dist/assets/pro-print-store-bills.js"
      - "dist/assets/pro-print.css"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.*"
      - ".github/workflows/web-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: |
          npm ci --include=dev
          test -x node_modules/.bin/vite || npm install --include=dev --no-audit --no-fund --registry=https://registry.npmjs.org
      - name: Build
        run: npm run build > build.log 2>&1
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-ci-build-log
          path: build.log
      - name: Smoke check
        run: npm run smoke > smoke.log 2>&1
      - name: Upload smoke log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-ci-smoke-log
          path: smoke.log
