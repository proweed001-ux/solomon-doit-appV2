name: Web CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "docs/**"
      - "dist/*.html"
      - "dist/assets/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.*"
      - ".github/workflows/web-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "docs/**"
      - "dist/*.html"
      - "dist/assets/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.*"
      - ".github/workflows/web-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Foundation smoke check
        run: node scripts/smoke-check.mjs
