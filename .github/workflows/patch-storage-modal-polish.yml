name: Patch Storage Modal Polish

on:
  push:
    branches:
      - admin-storage-manager
    paths:
      - '.github/workflows/patch-storage-modal-polish.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: admin-storage-manager
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Polish modal UI
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          p = Path('dist/assets/admin-storage-manager-v1.js')
          s = p.read_text(encoding='utf-8')
          new_style = r'''document.head.insertAdjacentHTML('beforeend', `<style id="storagePopupStyle">
        body.storageModalOpen{overflow:hidden}.storageOpenBtn{height:46px;border:0;border-radius:14px;background:#087b34;color:#fff;font-weight:950;padding:0 18px;box-shadow:0 8px 18px #087b3430}.storageInlineTools{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:10px 0}.storageModalBackdrop{display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:9999;padding:14px;align-items:center;justify-content:center}.storageModalBackdrop.show{display:flex}.storageModalBox{background:#fff;border-radius:24px;box-shadow:0 24px 90px rgba(0,0,0,.32);width:min(620px,100%);max-height:min(86dvh,860px);display:flex;flex-direction:column;overflow:hidden}.storageModalTop{background:linear-gradient(90deg,#067a34,#078d3d);color:#fff;padding:14px 14px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px}.storageModalTitle b{display:block;font-size:17px}.storageModalTitle small{display:block;opacity:.9;margin-top:2px}.storageCloseBtn{height:38px;border:0;border-radius:14px;background:#ffffff22;color:#fff;font-weight:950;padding:0 14px}.storageModalBody{background:#f8fafc;overflow:auto;flex:1}.storageModalSearch{position:sticky;top:0;background:#f8fafc;padding:10px 12px 8px;z-index:2;border-bottom:1px solid #e5e7eb}.storageModalSearch input{width:100%;height:44px;border:1px solid #d1d5db;border-radius:14px;padding:0 14px;font-weight:800;background:#fff}.storageModalList{padding:10px 12px 92px}.storageItem{display:grid;grid-template-columns:30px 1fr auto;gap:10px;align-items:center;background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:12px;margin-bottom:9px;box-shadow:0 2px 10px rgba(15,23,42,.04)}.storageItem.isProtected{background:#fffafa}.storageItem input{width:24px;height:24px;accent-color:#087b34}.storageItemBody b{display:block;font-size:14px;line-height:1.35;margin:5px 0;color:#0f172a;word-break:break-word}.storageItemBody small{display:block;color:#64748b;font-size:12px;line-height:1.35}.storageItemBody small:last-child{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;word-break:break-all}.storageModalFoot{position:sticky;bottom:0;background:#fff;border-top:1px solid #e5e7eb;padding:10px 12px;display:grid;grid-template-columns:1fr 1fr 1.15fr;gap:8px}.storageModalFoot button{height:44px;border-radius:14px;font-weight:950}.storageModalFootMeta{grid-column:1/-1;text-align:center;color:#475569;font-size:13px;font-weight:900}.storageModalClear{border:1px solid #d1d5db;background:#fff;color:#334155}.storageModalOld{border:1px solid #d1d5db;background:#fff;color:#111827}.storageModalOk{border:0;background:#087b34;color:#fff}.pill{display:inline-flex;align-items:center;height:22px;border-radius:999px;padding:0 8px;font-size:11px;font-weight:950}@media(max-width:720px){.storageModalBackdrop{padding:0;align-items:flex-end}.storageModalBox{width:100%;height:88dvh;max-height:none;border-radius:22px 22px 0 0}.storageItem{grid-template-columns:30px 1fr}.storageItem .storageDownload{grid-column:2;justify-self:start}.storageModalFoot{grid-template-columns:1fr 1fr 1fr;padding-bottom:calc(10px + env(safe-area-inset-bottom))}}
      </style>`);'''
          s = re.sub(r"document\.head\.insertAdjacentHTML\('beforeend', `<style id=\\\"storagePopupStyle\\\">[\s\S]*?</style>`\);", new_style, s)
          new_modal = r'''document.body.insertAdjacentHTML('beforeend', `<div id="storageModal" class="storageModalBackdrop" role="dialog" aria-modal="true">
        <div class="storageModalBox">
          <div class="storageModalTop"><div class="storageModalTitle"><b>เลือกไฟล์ที่จะล้าง</b><small>เลือกเฉพาะไฟล์ที่ไม่ถูกกันลบ</small></div><button type="button" class="storageCloseBtn" id="storageModalClose">ปิด</button></div>
          <div class="storageModalBody"><div class="storageModalSearch"><input id="storageModalFilter" placeholder="ค้นหาไฟล์ / วันที่ / Excel / JSON"></div><div id="storageModalList" class="storageModalList"></div></div>
          <div class="storageModalFoot"><div class="storageModalFootMeta" id="storageModalSelectedCount">เลือกแล้ว 0 ไฟล์</div><button class="storageModalClear" id="storageModalClear">ล้าง</button><button class="storageModalOld" id="storageModalPreviewOld">เลือกไฟล์เก่า</button><button class="storageModalOk" id="storageModalDeleteSelected">ตกลง</button></div>
        </div>
      </div>`);'''
          s = re.sub(r"document\.body\.insertAdjacentHTML\('beforeend', `<div id=\\\"storageModal\\\"[\s\S]*?</div>`\);", new_modal, s)
          s = s.replace('เปิด Pop-up เลือกไฟล์', 'เลือกไฟล์ในหน้าต่าง')
          s = s.replace('เปิด Pop-up เลือกไฟล์', 'เลือกไฟล์ในหน้าต่าง')
          s = s.replace('เพื่อเลือกโดยไม่ต้องเลื่อนหน้ายาว', 'เพื่อเลือกแบบหน้าต่าง ไม่ต้องเลื่อนหน้าหลัก')
          s = s.replace('เลือกไฟล์เก่าให้แล้วใน Pop-up ยังไม่ลบจริง', 'เลือกไฟล์เก่าให้แล้วในหน้าต่าง ยังไม่ลบจริง')
          wf = Path('.github/workflows/patch-storage-modal-polish.yml')
          wf.unlink()
          p.write_text(s, encoding='utf-8')
          PY
      - name: Run smoke
        run: npm run smoke
      - name: Commit modal polish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/assets/admin-storage-manager-v1.js .github/workflows/patch-storage-modal-polish.yml
          git commit -m "Polish storage cleanup modal UI"
          git push origin admin-storage-manager
