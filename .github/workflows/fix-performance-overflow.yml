name: Fix Performance Overflow

on:
  push:
    paths:
      - '.github/workflows/fix-performance-overflow.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch mobile overflow after compare carousel
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('dist/performance.html')
          s=p.read_text(encoding='utf-8')
          s=s.replace('*{box-sizing:border-box}body{margin:0;background', '*{box-sizing:border-box}html,body{max-width:100%;overflow-x:hidden}body{margin:0;background', 1)
          s=s.replace('.wrap{max-width:1220px;margin:auto;padding:12px}', '.wrap{max-width:1220px;margin:auto;padding:12px;width:100%;overflow:hidden}', 1)
          s=s.replace('box-shadow:0 10px 26px #0004}.title', 'box-shadow:0 10px 26px #0004;overflow:hidden}.title', 1)
          s=s.replace('.row{width:100%;display:grid;grid-template-columns:30px 1fr auto;', '.row{width:100%;max-width:100%;min-width:0;display:grid;grid-template-columns:30px minmax(0,1fr) auto;', 1)
          s=s.replace('.row:hover,.card:hover,.chip:hover', '.row>*{min-width:0}.row:hover,.card:hover,.chip:hover', 1)
          s=s.replace('.right{font-weight:920;text-align:right;min-width:64px}', '.right{font-weight:920;text-align:right;min-width:64px;max-width:112px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}', 1)
          s=s.replace('.cmpSlider{display:flex;gap:10px;overflow-x:auto;', '.cmpSlider{display:flex;gap:10px;width:100%;max-width:100%;overflow-x:auto;overscroll-behavior-x:contain;-webkit-overflow-scrolling:touch;', 1)
          s=s.replace('.cmpCard{min-width:210px;scroll-snap-align:start;', '.cmpCard{flex:0 0 min(260px,72vw);min-width:0;scroll-snap-align:start;', 1)
          s=s.replace('@media(max-width:900px){.cmpCard{min-width:72vw}}', '@media(max-width:900px){.cmpCard{flex-basis:72vw}}', 1)
          if 'minmax(0,1fr)' not in s or 'overflow-x:hidden' not in s or 'flex-basis:72vw' not in s:
              raise SystemExit('overflow patch incomplete')
          p.write_text(s,encoding='utf-8')
          Path('.github/workflows/fix-performance-overflow.yml').unlink()
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/performance.html .github/workflows/fix-performance-overflow.yml
          git commit -m "Fix Performance compare carousel mobile overflow [skip ci]" || exit 0
          git push
