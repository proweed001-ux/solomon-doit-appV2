name: Patch Performance Compare Carousel

on:
  push:
    paths:
      - '.github/workflows/patch-performance-compare-carousel.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add DS Compare carousel modes
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          p=Path('dist/performance.html')
          s=p.read_text(encoding='utf-8')

          # 1) CSS carousel
          css=".cmpSlider{display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:4px;margin-bottom:12px}.cmpCard{min-width:210px;scroll-snap-align:start;background:#202f44;border:1px solid #3a4f68;border-radius:16px;padding:12px;text-align:left;color:#e6edf3}.cmpCard b{display:block;font-size:15px;color:#f4f8fb}.cmpCard span{display:block;margin-top:4px;color:#b8c6d1;font-size:11px;line-height:1.35}.cmpCard.on{background:#4f7d74;border-color:#7fb6a9;color:#f7fffb}.cmpCard.on span{color:#eefaf6}@media(max-width:900px){.cmpCard{min-width:72vw}}"
          if '.cmpSlider{' not in s:
              s=s.replace('@media(max-width:1100px)', css+'@media(max-width:1100px)', 1)

          # 2) state + click + URL preserve compare mode
          s=s.replace("return{mode:md,cat:q.get('cat')||'',ads:q.get('ads')||'',ps:q.get('ps')||''}}function go", "return{mode:md,cat:q.get('cat')||'',ads:q.get('ads')||'',ps:q.get('ps')||'',cmp:q.get('cmp')||'prev'}}function go", 1)
          s=s.replace("state={mode:s.mode||state.mode||'ds',cat:s.cat??'',ads:s.ads??'',ps:s.ps??''};", "state={mode:s.mode||state.mode||'ds',cat:s.cat??'',ads:s.ads??'',ps:s.ps??'',cmp:s.cmp??state.cmp??'prev'};", 1)
          s=s.replace("if(state.ps)q.set('ps',state.ps);history.pushState", "if(state.ps)q.set('ps',state.ps);if(state.mode==='compare'&&state.cmp&&state.cmp!=='prev')q.set('cmp',state.cmp);history.pushState", 1)
          s=s.replace("go({mode:b.dataset.mode,cat:b.dataset.cat||'',ads:b.dataset.ads||'',ps:b.dataset.ps||''})", "go({mode:b.dataset.mode,cat:b.dataset.cat||'',ads:b.dataset.ads||'',ps:b.dataset.ps||'',cmp:b.dataset.cmp||state.cmp||'prev'})", 1)

          # 3) Replace oldPack with multiple compare packs and carousel UI
          oldpack=re.search(r"async function oldPack\(\).*?function meter\(v\)", s, flags=re.S)
          if not oldpack:
              raise SystemExit('oldPack block not found')
          newpack=r"""function avgMetric(list,k){let t=0,a=0,ix=0,c=0;list.forEach(r=>{const m=r?.[k]||{};t+=N(m.target);a+=N(m.actual);ix+=N(m.index);c++});return{target:c?t/c:0,actual:c?a/c:0,index:c?ix/c:0}}function avgOne(list,base){const r={...(base||{})};Object.keys(C).forEach(k=>r[k]=avgMetric(list,k));return r}function avgSet(packs,set,key){const first=(packs[0]?.[set]||[]),out=[];first.forEach(b=>{const id=b[key]||b.code,rows=packs.map(p=>(p?.[set]||[]).find(x=>(x[key]||x.code)===id)).filter(Boolean);if(rows.length)out.push(avgOne(rows,b))});return out}function avgPack(packs){const ds=avgOne(packs.map(x=>x.ds).filter(Boolean),packs[0]?.ds||{}),ads=avgSet(packs,'ads','ads'),ps=avgSet(packs,'ps','ps');return{meta:{reportKey:'AVG3'},ds,ads,ps}}async function oldPack(kind='prev'){kind=kind||'prev';const key='perf-old-'+kind+'-'+(data?.meta?.reportKey||'');try{const c=sessionStorage.getItem(key);if(c)return JSON.parse(c)}catch{}const hist=await jf('performance/history-index.json',8000),cur=data.meta||{},older=(Array.isArray(hist)?hist:[]).filter(x=>x.path&&x.path!==cur.comparePath&&x.reportKey!==cur.reportKey);let pack=null;if(kind==='same'){const target=N(cur.workdayNo)-12,pick=older.find(x=>N(x.workdayNo)===target&&(!cur.period||!x.period||String(x.period)===String(cur.period)));if(!pick)throw Error('ยังไม่มีข้อมูลตลาดเดิมรอบก่อนในเดือนนี้');pack={pick:{...pick,reportKey:'ตลาดเดิม '+oldLabel(pick)},old:await jf(pick.path,12000)}}else if(kind==='avg3'){const picks=older.slice(0,3);if(!picks.length)throw Error('ยังไม่มีข้อมูลย้อนหลังสำหรับค่าเฉลี่ย');const packs=await Promise.all(picks.map(x=>jf(x.path,12000)));pack={pick:{reportKey:'เฉลี่ย '+picks.length+' วันล่าสุด',workdayNo:picks.map(x=>x.workdayNo).join(',')},old:avgPack(packs)}}else{const pick=older[0];if(!pick)throw Error('ยังไม่มีไฟล์วันทำงานก่อนหน้าให้เทียบ');pack={pick:{...pick,reportKey:kind==='pace'?'Pace เป้า':oldLabel(pick)},old:await jf(pick.path,12000)}}try{sessionStorage.setItem(key,JSON.stringify(pack))}catch{}return pack}function cmpSlider(){const m=data?.meta||{},wd=N(m.workdayNo),market=((wd-1)%12)+1,round=Math.floor((wd-1)/12)+1,items=[['prev','เทียบวันก่อน','ดูแรงขยับจาก WD ก่อนหน้า'],['same','เทียบตลาดเดิม','ตลาด '+market+' รอบ '+round+(wd>12?' เทียบรอบก่อน':' ยังไม่มีรอบก่อน')],['avg3','เฉลี่ย 3 วัน','เทียบกับค่าเฉลี่ยย้อนหลัง'],['pace','Pace เป้า','เพิ่มล่าสุดเทียบต้องทำ/วัน']];return `<section class='panel'><div class='title'>DS Compare</div><div class='muted'>เลือกรูปแบบการเทียบ</div><div class='cmpSlider'>${items.map(([k,t,d])=>`<button class='cmpCard ${state.cmp===k?'on':''}' data-mode='compare' data-cmp='${k}' data-cat='${E(state.cat||'')}' data-ads='${E(state.ads||'')}'><b>${E(t)}</b><span>${E(d)}</span></button>`).join('')}</div></section>`}function meter(v)"""
          s=s[:oldpack.start()]+newpack+s[oldpack.end():]

          # 4) Add mode-aware comparison helpers by replacing diffBtn/deltas block
          block=re.search(r"function diffBtn\(cur,old,k,i\).*?function chipCat\(cat,ad\)", s, flags=re.S)
          if not block:
              raise SystemExit('diff/deltas block not found')
          newblock=r"""function cmpPair(c,o){if((state.cmp||'prev')==='pace'){const inc=Math.max(N(c?.actual)-N(o?.actual),0),pace=pc(c).p;return{a:inc,b:pace,d:inc-pace,ix:pace?inc/pace*100:0,oi:100,label:'เพิ่มล่าสุด'}}const a=N(c?.actual),b=N(o?.actual);return{a,b,d:a-b,ix:N(c?.index),oi:N(o?.index),label:'ล่าสุด'}}function diffBtn(cur,old,k,i){const r=cmpPair(cur[k]||{},old?.[k]||{}),cls=r.d>=0?'up':'dn',left=(state.cmp==='pace'?`เพิ่ม ${M(r.a)} / Pace ${M(r.b)}`:`ล่าสุด ${M(r.a)} / ก่อนหน้า ${M(r.b)}`);return `<button class='row' data-mode='compare' data-cat='${E(k)}' data-cmp='${E(state.cmp||'prev')}'><div class='no'>${i+1}</div><div><b>${E(C[k])}</b><span>${left} / ${pct(cur[k])}</span></div><div class='right ${cls}'>${r.d>=0?'+':''}${M(r.d)}</div></button>`}function by(a,k){const m=new Map();(a||[]).forEach(x=>m.set(x[k]||x.code,x));return m}function deltas(cur,old,k,id){const om=by(old,id);return(cur||[]).map(x=>{const o=om.get(x[id]||x.code)||{},cv=x[k]||{},ov=o[k]||{},rem=Math.max(N(cv.remaining)||(N(cv.target)-N(cv.actual)),0),per=N(cv.perDay)||(dl()>0?rem/dl():rem),r=cmpPair(cv,ov);return{...x,current:r.a,previous:r.b,remaining:rem,perDay:per,diff:r.d,indexNow:r.ix,indexOld:r.oi,indexDiff:r.ix-r.oi}})}function drow(r,i,s=null){const cls=r.diff>=0?'up':'dn',tag=s?'button':'div',attr=s?` data-mode='${E(s.mode||'compare')}' data-cat='${E(s.cat||'')}' data-ads='${E(s.ads||'')}' data-cmp='${E(state.cmp||'prev')}'`:'';const txt=state.cmp==='pace'?`เพิ่ม ${M(r.current)} / Pace ${M(r.previous)}`:`ล่าสุด ${M(r.current)} / ก่อนหน้า ${M(r.previous)}`;return `<${tag} class='row'${attr}><div class='no'>${i+1}</div><div><b>${E(r.ps||r.ads||r.code)} · ${E(r.name||'')}</b><span>${txt} / เหลือ ${M(r.remaining)} / วันละ ${M(r.perDay)} / Index ${P(r.indexNow)}</span></div><div class='right ${cls}'>${r.diff>=0?'+':''}${M(r.diff)}</div></${tag}>`}function chipCat(cat,ad)"""
          s=s[:block.start()]+newblock+s[block.end():]

          # 5) screenCompare: use selected compare pack and insert carousel in DS Compare windows
          s=s.replace('p=await oldPack()', "p=await oldPack(state.cmp||'prev')", 1)
          s=s.replace("app.innerHTML=nav()+hero('เทียบย้อนหลัง'", "app.innerHTML=nav()+cmpSlider()+hero('เทียบย้อนหลัง'", 1)
          s=s.replace("app.innerHTML=nav()+`<section class='panel fade'><button class='chip' data-mode='compare' data-cat='${E(cat)}'>", "app.innerHTML=nav()+cmpSlider()+`<section class='panel fade'><button class='chip' data-mode='compare' data-cat='${E(cat)}' data-cmp='${E(state.cmp||'prev')}'>", 1)
          s=s.replace("app.innerHTML=nav()+`<section class='panel fade'><button class='chip' data-mode='compare'>", "app.innerHTML=nav()+cmpSlider()+`<section class='panel fade'><button class='chip' data-mode='compare' data-cmp='${E(state.cmp||'prev')}'>", 1)

          # 6) keep compare mode when category chips switch
          s=s.replace("btn(n,{mode:'compare',cat:k,ads:ad||''},'chip')", "btn(n,{mode:'compare',cat:k,ads:ad||'',cmp:state.cmp||'prev'},'chip')", 1)
          # make generic button include cmp attr when present
          s=s.replace("data-ps='${E(s.ps||'')}'>${E(t)}</button>`", "data-ps='${E(s.ps||'')}' data-cmp='${E(s.cmp||'')}'>${E(t)}</button>`", 1)

          # 7) remove temporary diagnostic dump if present
          fp=Path('dist/assets/perf-compare-dump.txt')
          if fp.exists(): fp.unlink()
          Path('.github/workflows/patch-performance-compare-carousel.yml').unlink()

          if 'cmpSlider' not in s or 'avgPack' not in s or "state.cmp" not in s:
              raise SystemExit('compare carousel patch incomplete')
          p.write_text(s,encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/performance.html .github/workflows/patch-performance-compare-carousel.yml
          git add -u dist/assets/perf-compare-dump.txt || true
          git commit -m "Add DS Compare carousel modes [skip ci]" || exit 0
          git push
