name: Patch Pro combined order mode

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/patch-pro-core-order-combined.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Patch pro.html and pro-core-v4.js
        run: |
          node <<'NODE'
          const fs = require('fs');

          const htmlPath = 'dist/pro.html';
          let html = fs.readFileSync(htmlPath, 'utf8');
          const htmlBefore = html;
          html = html.replace(/grid-template-columns:repeat\(5,1fr\)/g, 'grid-template-columns:repeat(6,1fr)');
          html = html.replace(/(<button[^>]*class="tab"[^>]*>รายการดิบ<\/button>)(?!<button[^>]*class="tab"[^>]*>รวม order<\/button>)/, '$1<button class="tab">รวม order</button>');
          if (html === htmlBefore) throw new Error('pro.html was not patched');
          if (!html.includes('รวม order')) throw new Error('combined order button missing');
          fs.writeFileSync(htmlPath, html);

          const jsPath = 'dist/assets/pro-core-v4.js';
          let s = fs.readFileSync(jsPath, 'utf8');
          const before = s;

          s = s.replace(
            "remain:'สรุปของเหลือ'}[mode]||'รายการ'",
            "remain:'สรุปของเหลือ',order:'รวม order'}[mode]||'รายการ'"
          );

          const marker = "if(mode==='dist'){const p=distPool();";
          const orderBlock = "if(mode==='order'){const p=group(rows.filter(r=>okDate(r)&&okPs(r)&&okCut(r)&&okBrand(r)&&okType(r)&&okQ(r)));simpleTable('รวม order PS + Telesale '+F(p.length)+' รายการ',['#','สินค้า','จำนวนรวม','ยอดดิบ','ยอดสุทธิ','รวม VAT'],p.map((g,i)=>'<tr><td>'+(i+1)+'</td><td>'+E(g.sku)+'</td><td>'+F(g.qty)+'</td><td>'+B(g.rawAmt)+'</td><td>'+B(g.netAmt)+'</td><td>'+B((N(g.netAmt)||N(g.rawAmt))*1.07)+'</td></tr>').join(''));return}";
          if (!s.includes("mode==='order'")) {
            if (!s.includes(marker)) throw new Error('renderMode marker not found');
            s = s.replace(marker, orderBlock + marker);
          }

          s = s.replace(
            "['pick','dist','ship','done','raw'][i]===mode",
            "['pick','dist','ship','done','raw','order'][i]===mode"
          );
          s = s.replace(
            "mode=['pick','dist','ship','done','raw'][i]||'pick'",
            "mode=['pick','dist','ship','done','raw','order'][i]||'pick'"
          );

          if (s === before) throw new Error('pro-core-v4.js was not patched');
          if (!s.includes("mode==='order'")) throw new Error('order mode missing');
          if (!s.includes("รวม order PS + Telesale")) throw new Error('order table title missing');
          fs.writeFileSync(jsPath, s);
          NODE
          node --check dist/assets/pro-core-v4.js
      - name: Commit combined order patch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add dist/pro.html dist/assets/pro-core-v4.js
          git commit -m "Add combined PS and Telesale order mode" || exit 0
          git push