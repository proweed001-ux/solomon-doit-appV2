name: Move Pro actions under details
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/move-pro-actions-under-details.yml"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          node <<'NODE'
          const fs=require('fs');
          let p='dist/assets/pro-core-v4.js';
          let s=fs.readFileSync(p,'utf8');
          const old="if(!$('#remainBtn')){const b=document.createElement('button');b.id='remainBtn';b.className='outline';b.textContent='สรุปของเหลือ';$('#prepPrint')?.parentNode?.insertBefore(b,$('#prepPrint').nextSibling);b.onclick=()=>{push();mode='remain';page=1;render();msg('สรุปของเหลือ')}}";
          const add="function moveProActions(){let st=$('#sendActionMoveCss');if(!st){st=document.createElement('style');st.id='sendActionMoveCss';st.textContent='.sendActionButtons{grid-column:1/-1;display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:0}.sendActionButtons button{width:100%;height:42px}@media(max-width:720px){.sendActionButtons{grid-template-columns:1fr 1fr}}';document.head.appendChild(st)}const bar=document.querySelector('.sendBar');const detail=$('#showDetailBtn');if(!bar||!detail)return;let box=$('#sendActionButtons');if(!box){box=document.createElement('div');box.id='sendActionButtons';box.className='sendActionButtons';detail.insertAdjacentElement('afterend',box)}['teleBtn','insertBtn','prepPrint','remainBtn'].forEach(id=>{const el=$('#'+id);if(el&&el.parentElement!==box)box.appendChild(el)})}";
          const neu=old+add+'moveProActions();';
          if(!s.includes(old))throw new Error('remainBtn block not found');
          if(!s.includes('moveProActions()'))s=s.replace(old,neu);
          fs.writeFileSync(p,s);
          p='dist/pro.html';
          s=fs.readFileSync(p,'utf8');
          s=s.replace(/\/assets\/pro-core-v4\.js\?v=\d+/g,'/assets/pro-core-v4.js?v=346');
          fs.writeFileSync(p,s);
          NODE
          node --check dist/assets/pro-core-v4.js
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git rm .github/workflows/move-pro-actions-under-details.yml
          git add dist/pro.html dist/assets/pro-core-v4.js
          git commit -m "Move Pro action buttons under details" || exit 0
          git push