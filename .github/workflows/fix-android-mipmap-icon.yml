name: Fix Android mipmap launcher icon
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/fix-android-mipmap-icon.yml"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fix-icon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy PNG launcher icon into mipmap folders
        run: |
          set -e
          SRC="android-apk/app/src/main/res/drawable/ic_launcher.png"
          test -f "$SRC"
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p "android-apk/app/src/main/res/mipmap-$d"
            cp "$SRC" "android-apk/app/src/main/res/mipmap-$d/ic_launcher.png"
            cp "$SRC" "android-apk/app/src/main/res/mipmap-$d/ic_launcher_round.png"
          done
      - name: Point manifest to mipmap launcher icon
        run: |
          python3 <<'PY'
          from pathlib import Path
          p=Path('android-apk/app/src/main/AndroidManifest.xml')
          s=p.read_text()
          s=s.replace('@drawable/ic_launcher','@mipmap/ic_launcher')
          p.write_text(s)
          PY
      - name: Commit mipmap icon fix
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git rm .github/workflows/fix-android-mipmap-icon.yml
          git add android-apk/app/src/main/AndroidManifest.xml android-apk/app/src/main/res/mipmap-mdpi android-apk/app/src/main/res/mipmap-hdpi android-apk/app/src/main/res/mipmap-xhdpi android-apk/app/src/main/res/mipmap-xxhdpi android-apk/app/src/main/res/mipmap-xxxhdpi
          git commit -m "Use PNG launcher icon from mipmap resources" || exit 0
          git push
