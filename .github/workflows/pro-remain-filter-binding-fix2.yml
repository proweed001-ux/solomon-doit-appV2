name: Fix Pro remain filter binding v2
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pro-remain-filter-binding-fix2.yml"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          node <<'NODE'
          const fs = require('fs');
          const jsPath = 'dist/assets/pro-core-v4.js';
          let s = fs.readFileSync(jsPath, 'utf8');

          s = s.replace(/\$\('\[data-remain-view\]'\)\.forEach/g, () => "$$('[data-remain-view]').forEach");

          if (!s.includes("$$('[data-remain-view]').forEach")) {
            throw new Error('remain filter button binding still not fixed');
          }
          if (!s.includes("data-remain-view=\"positive\"")) throw new Error('remain filter buttons missing');
          if (!s.includes("unit:N(g.netUnit)*1.07")) throw new Error('net plus VAT unit formula missing; aborting');
          if (!s.includes("['รหัส','รายการสินค้า','จำนวน','ราคา/หน่วย','รวมเงิน']")) throw new Error('print header was not kept as default; aborting');

          fs.writeFileSync(jsPath, s);

          const htmlPath = 'dist/pro.html';
          let h = fs.readFileSync(htmlPath, 'utf8');
          h = h.replace(/\/assets\/pro-core-v4\.js\?v=\d+/g, '/assets/pro-core-v4.js?v=356');
          fs.writeFileSync(htmlPath, h);
          NODE
          node --check dist/assets/pro-core-v4.js
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git rm .github/workflows/pro-remain-filter-binding-fix2.yml
          git add dist/pro.html dist/assets/pro-core-v4.js
          git commit -m "Fix remain filter buttons binding" || exit 0
          git push

# trigger: 2
