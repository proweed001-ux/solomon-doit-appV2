name: Patch Telesale bill columns to raw and VAT
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pro-tele-vat-columns.yml"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          node <<'NODE'
          const fs = require('fs');
          const jsPath = 'dist/assets/pro-core-v4.js';
          let s = fs.readFileSync(jsPath, 'utf8');

          const oldText = "function renderTele(){const bs=teleBills();$('#teleBtn').textContent='บิล Telesale ('+F(bs.length)+')';$('#drawerBody').innerHTML=bs.length?bs.map(b=>'<div class=\"teleBill\"><div class=\"teleBillHead\"><b>ร้าน: '+E(b.store)+'</b><br><small>บิล: '+E(b.inv)+' · วันที่ '+E(dlabel(b.date))+' · Tele: '+E(b.tele)+'</small></div><table class=\"teleTbl\"><tbody>'+b.lines.map((r,i)=>'<tr><td>'+(i+1)+'</td><td>'+E(r.sku)+'</td><td>'+F(r.qty)+'</td><td>'+B(r.amt)+'</td></tr>').join('')+'</tbody></table></div>').join(''):'<div class=\"empty\">ไม่พบ Telesale ตามตัวเลือกที่ติ๊ก</div>'}";
          const newText = "function renderTele(){const bs=teleBills();$('#teleBtn').textContent='บิล Telesale ('+F(bs.length)+')';$('#drawerBody').innerHTML=bs.length?bs.map(b=>'<div class=\"teleBill\"><div class=\"teleBillHead\"><b>ร้าน: '+E(b.store)+'</b><br><small>บิล: '+E(b.inv)+' · วันที่ '+E(dlabel(b.date))+' · Tele: '+E(b.tele)+'</small></div><table class=\"teleTbl\"><thead><tr><th>สินค้า</th><th>จำนวน</th><th>ยอดดิบ</th><th>สุทธิ+VAT</th></tr></thead><tbody>'+b.lines.map(r=>'<tr><td>'+E(r.sku)+'</td><td>'+F(r.qty)+'</td><td>'+B(r.rawAmt)+'</td><td>'+B((N(r.netAmt)||N(r.rawAmt))*1.07)+'</td></tr>').join('')+'</tbody></table></div>').join(''):'<div class=\"empty\">ไม่พบ Telesale ตามตัวเลือกที่ติ๊ก</div>'}";

          if (s.includes(oldText)) {
            s = s.replace(oldText, newText);
          } else if (!s.includes(newText)) {
            throw new Error('renderTele block not found');
          }

          if (!s.includes('<th>สินค้า</th><th>จำนวน</th><th>ยอดดิบ</th><th>สุทธิ+VAT</th>')) {
            throw new Error('Telesale VAT columns missing');
          }
          if (!s.includes("B((N(r.netAmt)||N(r.rawAmt))*1.07)")) {
            throw new Error('Telesale VAT formula missing');
          }
          if (!s.includes("$$('[data-remain-view]').forEach")) {
            throw new Error('remain filter buttons are not bound correctly; aborting');
          }
          if (!s.includes("unit:N(g.netUnit)*1.07")) {
            throw new Error('net plus VAT unit formula missing; aborting');
          }
          if (!s.includes("['รหัส','รายการสินค้า','จำนวน','ราคา/หน่วย','รวมเงิน']")) {
            throw new Error('print header was not kept as default; aborting');
          }
          if (!s.includes("if(mode==='remain'){heads=heads.slice(1);data=data.map(r=>r.slice(1))}")) {
            throw new Error('remain print duplicate-number fix missing; aborting');
          }

          fs.writeFileSync(jsPath, s);

          const htmlPath = 'dist/pro.html';
          let h = fs.readFileSync(htmlPath, 'utf8');
          h = h.replace(/\/assets\/pro-core-v4\.js\?v=\d+/g, '/assets/pro-core-v4.js?v=358');
          fs.writeFileSync(htmlPath, h);
          NODE
          node --check dist/assets/pro-core-v4.js
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git rm .github/workflows/pro-tele-vat-columns.yml
          git add dist/pro.html dist/assets/pro-core-v4.js
          git commit -m "Show raw and VAT totals in Telesale bills" || exit 0
          git push

# trigger: 1
